                        example: true
                      pattern:
                        type: string
                        description: 查找的字符串模式，str_replace 时使用
                        example: test from
                      replacement:
                        type: string
                        description: 替换内容，str_replace 和 block_replace 时使用
                        example: test from1
                    required:
                    - action
                  description: 替换操作列表，每项包含一个元素级别的编辑操作，最少1条，最多200条
