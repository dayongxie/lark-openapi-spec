                        example: bab
                      insert_before_block_id:
                        type: string
                        description: 在指定块之前插入，为空时追加到末尾，block_insert 时使用，格式为 3 位 short element ID
                        example: baa
                      insertion:
                        type: string
                        description: 要插入的 XML 元素片段，block_insert 时使用
                        example: <shape><p>inserted element</p></shape>
                      is_multiple:
                        type: boolean
