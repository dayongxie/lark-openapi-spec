  /open-apis/task/v2/sections:
    post:
      operationId: task_sections_create
      summary: 创建自定义分组
      tags:
      - sections
      description: 创建自定义分组
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/api-explorer?from=op_doc_tab&apiName=create&project=task&resource=section&version=v2
      parameters:
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          default: open_id
        description: 表示user的ID的类型，支持open_id, user_id, union_id
        example: open_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                insert_after:
                  type: string
                  description: 要将新分组插入到自定义分分组的后面的目标分组的guid。insert_before/insert_after二选一。也可以都不设置。都不设置时表示将新分组查到对应容器的最前面。
                  example: e6e37dcc-f75a-5936-f589-12fb4b5c80c2
                insert_before:
                  type: string
                  description: 要将新分组插入到自定义分分组的前面的目标分组的guid。insert_before/insert_after二选一。也可以都不设置。都不设置时表示将新分组查到对应容器的最前面。
                  example: e6e37dcc-f75a-5936-f589-12fb4b5c80c2
                name:
                  type: string
                  description: 自定义分组名。不允许为空，最大100个UTF-8字符。
                  example: 已经审核过的任务
                resource_id:
                  type: string
                  description: 自定义分组要归属的资源id
                  example: cc371766-6584-cf50-a222-c22cd9055004
                resource_type:
                  type: string
                  description: 自定义分组的资源类型，支持"tasklist"（清单）或者"my_tasks"（我负责的）。
                  example: tasklist
              required:
              - name
              - resource_type
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达，见官方错误码文档）
          content:
            application/json:
              schema:
                type: object
                description: 飞书开放平台统一响应信封；业务数据位于 data 字段。
                properties:
                  code:
                    type: integer
                    description: 错误码，0 表示成功
                  msg:
                    type: string
                    description: 错误描述
                  data:
                    type: object
                    properties:
                      section:
                        type: object
                        properties:
                          created_at:
                            type: string
                            description: 自定义分组创建时间戳(ms)
                            example: '1675742789470'
                          creator:
                            type: object
                            properties:
                              id:
                                type: string
                                description: 表示member的id
                                example: oc_2cefb2f014f8d0c6c2d2eb7bafb0e54f
                              name:
                                type: string
                                description: 成员名称
                                example: 张明德（明德）
                              role:
                                type: string
                                description: 成员角色
                                example: editor
                              type:
                                type: string
                                description: 成员的类型
                                example: chat
                            description: 清单所有者
                          guid:
                            type: string
                            description: 自定义分组的GUID
                            example: e6e37dcc-f75a-5936-f589-12fb4b5c80c2
                          is_default:
                            type: boolean
                            description: 分组是否为默认自定义分组
                            example: true
                          name:
                            type: string
                            description: 自定义分组名。如更新，不允许设为空，支持最大100个UTF-8字符。
                            example: 已经评审过的任务
                          resource_type:
                            type: string
                            description: 资源类型
                            example: tasklist
                          tasklist:
                            type: object
                            properties:
                              guid:
                                type: string
                                description: 清单GUID
                                example: cc371766-6584-cf50-a222-c22cd9055004
                              name:
                                type: string
                                description: 清单名字
                                example: 活动分工任务列表
                            description: 如果该分组归属于清单，展示清单的简要信息
                          updated_at:
                            type: string
                            description: 自定义分组最近一次更新时间戳(ms)
                            example: '1675742789470'
                        description: 创建的自定义分组数据
      x-lark-method-id: sections.create
      x-lark-scopes:
      - task:section:writeonly
      - task:section:write
      x-lark-access-tokens:
      - tenant
      - user
      x-lark-risk: write
      x-lark-danger: true
    get:
      operationId: task_sections_list
      summary: 获取自定义分组列表
      tags:
      - sections
      description: 获取自定义分组列表
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/api-explorer?from=op_doc_tab&apiName=list&project=task&resource=section&version=v2
      parameters:
