        schema:
          type: string
        description: 如`resource_type`为"tasklist"，这里需要填写要列取自定义分组的清单的GUID。
        example: caef228f-2342-23c1-c36d-91186414dc64
      - name: resource_type
        in: query
        required: true
        schema:
          type: string
        description: 自定义分组所属的资源类型。支持my_tasks(我负责的）和tasklist（清单）。当使用tasklist时，需要用resource_id提供清单的全局唯一ID。
        example: tasklist
      - name: update_msec
        in: query
        required: false
        schema:
          type: string
        description: 更新时间戳过滤(ms)
        example: '1'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          default: open_id
        description: 表示user的ID的类型，支持open_id, user_id, union_id
        example: open_id
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达，见官方错误码文档）
          content:
            application/json:
              schema:
                type: object
                description: 飞书开放平台统一响应信封；业务数据位于 data 字段。
                properties:
                  code:
                    type: integer
                    description: 错误码，0 表示成功
                  msg:
                    type: string
                    description: 错误描述
                  data:
                    type: object
                    properties:
                      has_more:
                        type: boolean
                        description: 是否有更多数据
                        example: true
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            guid:
                              type: string
                              description: 自定义分组的全局唯一ID
                              example: e6e37dcc-f75a-5936-f589-12fb4b5c80c2
                            is_default:
                              type: boolean
                              description: 是否是默认分组
                              example: true
                            name:
                              type: string
                              description: 自定义分组的名称
                              example: 审核过的任务
                        description: 自定义分组的摘要列表
                      page_token:
                        type: string
                        description: 获取下一页数据的分页标记，没有更多数据时返回空
                        example: aWQ9NzEwMjMzMjMxMDE=
      x-lark-method-id: sections.list
      x-lark-scopes:
      - task:section:write
      - task:section:read
      x-lark-access-tokens:
      - tenant
      - user
      x-lark-risk: read
