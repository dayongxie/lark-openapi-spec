        example: user@xxx.xx or me
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  type: object
                  properties:
                    bcc:
                      type: array
                      items: {}
                      description: 密送人姓名或邮箱地址筛选，仅返回秘送人列表包含该秘送人的邮件。
                    cc:
                      type: array
                      items: {}
                      description: 抄送人姓名或邮箱地址筛选，仅返回抄送人列表包含该抄送人的邮件。
                    create_time:
                      type: object
                      properties:
                        end_time:
                          type: string
                          description: 时间范围的截止时间。（iso8601）精确到秒
                          example: '2026-03-10T00:00:00+08:00'
                        start_time:
                          type: string
                          description: 时间范围的开始时间。（iso8601）精确到秒
                          example: '2026-03-10T00:00:00+08:00'
                      description: |-
                        邮件接收时间范围筛选，只返回在所选时间范围内的邮件。
                        限制：一次搜索请求的时间范围不要超过1年。
                    folder:
                      type: array
                      items: {}
                      description: 文件夹名称筛选，仅返回在所选目录下的邮件。仅支持传入系统文件夹名称（固定值 inbox/sent/draft/trash/spam/archive/priority/flagged/other/scheduled，其中，priority指重要邮件）、自定义文件夹名称。子文件夹需使用
                        parent_name/child_name格式，可通过 folder list 接口查看文件夹名称。
                    from:
                      type: array
                      items: {}
                      description: 发件人姓名或邮箱地址筛选，仅返回来自该发件人的邮件
                    has_attachment:
                      type: boolean
                      description: 是否只筛选有附件的邮件，默认值：**否**
                      example: true
                    is_unread:
                      type: boolean
                      description: 是否只筛选未读邮件，默认为**否**
                      example: true
                    label:
                      type: array
                      items: {}
                      description: 自定义标签名称筛选，仅返回包含指定自定义标签的邮件。子标签需使用parent_name/child_name 格式，可通过 label list 接口查看标签名称。
                    subject:
                      type: string
                      description: 邮件主题搜索，仅返回主题中能搜到搜索词的结果。
                      example: 合同签署
                    to:
                      type: array
                      items: {}
                      description: 收件人姓名或邮箱地址筛选，仅返回收件人列表包含该收件人的邮件。
                  description: |-
                    用于对搜索结果进行精细化筛选，支持按发件人、收件人、文件夹、时间范围等多维度组合过滤，缩小查询范围，提升搜索精准度。
                    **示例值：** {"from":["user@example.com"],"is_unread":true}
                query:
                  type: string
                  description: |-
                    搜索关键词。
                    **数据校验规则：**
                    - 长度范围：0 ～ 50 字符
                  example: 合同审批通知
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达，见官方错误码文档）
          content:
            application/json:
              schema:
                type: object
                description: 飞书开放平台统一响应信封；业务数据位于 data 字段。
                properties:
                  code:
                    type: integer
                    description: 错误码，0 表示成功
                  msg:
                    type: string
                    description: 错误描述
                  data:
                    type: object
                    properties:
                      has_more:
                        type: boolean
                        description: 可继续翻页
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            display_info:
                              type: string
                              description: 包含邮件基本信息的卡片，用户搜索关键词命中的文本片段，使用<h></h>标签包裹标注
                              example: '{}'
                            id:
                              type: string
                              description: 邮件唯一标识
                              example: msg_XXX
                            meta_data:
                              type: object
                              properties:
                                create_time:
                                  type: string
                                  description: 邮件接收时间
                                  example: '2026-03-15T14:30:00+08:00'
                                from:
                                  type: object
                                  properties: {}
                                  description: 邮件发件人
                                message_biz_id:
                                  type: string
                                  description: 邮件唯一标识
                                  example: msg_id_xxx
                                thread_id:
                                  type: string
                                  description: 邮件线程 ID
                                  example: thread_id_XXX
                                title:
                                  type: string
                                  description: 邮件主题
                                  example: 测试邮件
                              description: 邮件元信息
                          required:
                          - id
                        description: 搜索结果列表
                      page_token:
                        type: string
                        description: 翻页用的token。当has_more=true时，可用这个token作为入参继续翻页搜索。
                      total:
                        type: integer
                        description: 搜索命中结果数
                        example: 99
                    required:
                    - has_more
                    - items
      x-lark-method-id: user_mailbox.search
      x-lark-scopes:
      - mail:user_mailbox.message:readonly
      x-lark-access-tokens:
      - user
      x-lark-risk: write
