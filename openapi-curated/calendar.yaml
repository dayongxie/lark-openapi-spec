                          hide: 隐藏显示
                          readonly: 只读
                          editable: 可编辑
                          unknown: 未知UI项自定义状态，仅用于读取时兼容
                        example: hide
                  description: 日程自定义信息，控制日程详情页的 UI 展示。不传值则默认为空。
                source:
                  type: string
                  description: 日程source
                  example: source
                start_time:
                  type: object
                  properties:
                    date:
                      type: string
                      description: |-
                        开始时间，仅全天日程使用该字段，[RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339) 格式，例如，2018-09-01。

                        **注意**：该参数不能与 `timestamp` 同时指定。
                      example: '2018-09-01'
                    timestamp:
                      type: string
                      description: |-
                        秒级时间戳，用于设置具体的开始时间。例如，1602504000 表示 2020/10/12 20:00:00（UTC +8 时区）。

                        **注意**：该参数不能与 `date` 同时指定。
                      example: '1602504000'
                    timezone:
                      type: string
                      description: |-
                        时区。使用 IANA Time Zone Database 标准，例如 Asia/Shanghai。

                        - 全天日程时区固定为UTC +0
                        - 非全天日程时区默认为 Asia/Shanghai
                      example: Asia/Shanghai
                  description: 日程开始时间。
