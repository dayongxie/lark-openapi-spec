  /open-apis/calendar/v4/calendars/{calendar_id}/events/{event_id}/attendees/batch_delete:
    post:
      operationId: calendar_event_attendees_batch_delete
      summary: 删除日程参与人
      tags:
      - event.attendees
      description: 删除日程参与人
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar-event-attendee/batch_delete
      parameters:
      - name: calendar_id
        in: path
        required: true
        schema:
          type: string
        description: 日程对应的日历 ID。了解更多，参见[日历 ID 说明](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar/introduction)。
        example: feishu.cn_xxxxxxxxxx@group.calendar.feishu.cn
      - name: event_id
        in: path
        required: true
        schema:
          type: string
        description: |-
          日程 ID。

          创建日程时会返回日程 ID。你也可以调用以下接口获取某一日历的 ID。
          - [获取日程列表](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar-event/list)
          - [搜索日程](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar-event/search)
        example: xxxxxxxxx_0
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户id
            union_id: 以union_id来识别用户id
            open_id: 以open_id来识别用户id
        description: 此次调用中使用的用户ID的类型
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                attendee_ids:
                  type: array
                  items: {}
                  description: |-
                    需要删除的参与人 ID 列表。

                    添加日程参与人时，会返回参与人 ID（attendee_id），你也可以调用[获取日程参与人列表](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar-event-attendee/list)接口，查询指定日程的参与人 ID。
                    - 一次最多删除500个参与人（与delete_ids一起计算）
                delete_ids:
                  type: array
                  items:
                    type: object
                    properties:
                      chat_id:
                        type: string
                        description: 群组 ID。当选择群组类型参与人（type 取值为 chat）时，需要传入该参数。
                        example: oc_xxxxxxxxx
                      room_id:
                        type: string
                        description: 会议室 ID。当选择会议室类型参与人（type 取值为 resource）时，需要传入该参数。
                        example: omm_xxxxxxxx
                      third_party_email:
                        type: string
                        description: 邮箱地址。当选择外部邮箱类型参与人（type 取值为 third_party）时，需要传入该参数。
                        example: wangwu@email.com
                      type:
                        type: string
                        description: 参与人类型。
                        enum:
                        - user
                        - chat
                        - resource
                        - third_party
                        x-enum-descriptions:
                          user: 用户
                          chat: 群组
                          resource: 会议室
                          third_party: 外部邮箱
                        example: user
                      user_id:
                        type: string
                        description: 用户 ID。当选择用户类型参与人（type 取值为 user）时，需要传入该参数。传入的用户 ID 类型需要和 user_id_type 的值保持一致。
                        example: ou_xxxxxxxx
                  description: |-
                    参与人类型对应的 ID，该 ID 是 attendee_ids 字段的补充字段。
                    - 一次最多删除500个参与人（与attendee_ids一起计算）
                instance_start_time_admin:
                  type: string
                  description: 使用管理员身份访问时，要修改的实例（仅用于重复日程修改其中的一个实例，非重复日程无需填此字段）。
                  example: '1647320400'
                is_enable_admin:
                  type: boolean
                  description: |-
                    是否启用会议室管理员身份（需先在管理后台设置某人为会议室管理员）。

                    **可选值有**：
                    - true：启用
                    - false（默认值）：不启用
                  example: false
                need_notification:
                  type: boolean
                  description: |-
                    删除日程参与人时，是否向参与人发送 Bot 通知。

                    **可选值有**：
                    - true（默认值）：发送
                    - false：不发送
                  example: false
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达，见官方错误码文档）
          content:
            application/json:
              schema:
                type: object
                description: 飞书开放平台统一响应信封；业务数据位于 data 字段。
                properties:
                  code:
                    type: integer
                    description: 错误码，0 表示成功
                  msg:
                    type: string
                    description: 错误描述
                  data:
                    type: object
                    properties: {}
      x-lark-method-id: calendar.event.attendee.batch_delete
      x-lark-scopes:
      - calendar:calendar
      - calendar:calendar.event:writeonly
      - calendar:calendar.event:update
      x-lark-access-tokens:
      - tenant
      - user
      x-lark-risk: write
      x-lark-danger: true
