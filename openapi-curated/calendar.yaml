                                    **附件校验规则**：附件总大小不超过 25 MB。
                                  example: xAAAAA
                                is_deleted:
                                  type: boolean
                                  description: 是否删除附件
                                  example: false
                                name:
                                  type: string
                                  description: 附件名称
                                  example: 附件.jpeg
                            description: 日程附件。
                          attendee_ability:
                            type: string
                            description: 参与人权限。
                            enum:
                            - none
                            - can_see_others
                            - can_invite_others
                            - can_modify_event
                            x-enum-descriptions:
                              none: 无法编辑日程、无法邀请其它参与人、无法查看参与人列表
                              can_see_others: 无法编辑日程、无法邀请其它参与人、可以查看参与人列表
                              can_invite_others: 无法编辑日程、可以邀请其它参与人、可以查看参与人列表
                              can_modify_event: 可以编辑日程、可以邀请其它参与人、可以查看参与人列表
                            example: can_see_others
                          color:
                            type: integer
                            description: |-
