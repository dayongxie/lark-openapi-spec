    patch:
      operationId: calendar_events_patch
      summary: 更新日程
      tags:
      - events
      description: 更新日程
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar-event/patch
      parameters:
      - name: calendar_id
        in: path
        required: true
        schema:
          type: string
        description: |-
          日程所在的日历 ID。ID 获取方式：

          - [创建共享日历](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar/create)时，接口会返回日历 ID。
          - 调用[查询主日历信息](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar/primary)、[查询日历列表](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar/list)或者[搜索日历](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar/search)接口，获取所需的日历 ID。
          -
        example: feishu.cn_xxxxxxxxxx@group.calendar.feishu.cn
      - name: event_id
        in: path
        required: true
        schema:
          type: string
        description: |-
          日程 ID。ID 获取方式：

          - [创建日程](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar-event/create)时，接口会返回日程 ID。
          - 调用[获取日程列表](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar-event/list)或者[搜索日程](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar-event/search)接口，获取所需的日程 ID。
        example: 00592a0e-7edf-4678-bc9d-1b77383ef08e_0
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
        description: 此次调用中使用的用户ID的类型
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                attachments:
                  type: array
                  items:
                    type: object
                    properties:
                      file_token:
                        type: string
                        description: |-
                          附件 Token。调用[上传素材](https://open.larkoffice.com/document/server-docs/docs/drive-v1/media/upload_all)接口，获取附件的 file_token。在调用上传素材接口时需要注意：

                          - `parent_type` 需传入固定值 `calender`。
                          - `parent_node` 需传入与当前接口一致的日历 ID。

                          **附件校验规则**：附件总大小不超过 25 MB。
                        example: boxcnrHpsg1QDqXAAAyachaxxxx
                      is_deleted:
                        type: boolean
                        description: "是否删除附件。\n\n**可选值有**： \n- true：删除\n- false：不删除\n\n**默认值**：false"
                        example: true
                  description: 日程附件。
                attendee_ability:
                  type: string
                  description: |-
                    参与人权限。

                    **默认值**：空，表示不更新该字段
                  enum:
                  - none
                  - can_see_others
                  - can_invite_others
                  - can_modify_event
                  x-enum-descriptions:
                    none: 无法编辑日程、无法邀请其它参与人、无法查看参与人列表
                    can_see_others: 无法编辑日程、无法邀请其它参与人、可以查看参与人列表
                    can_invite_others: 无法编辑日程、可以邀请其它参与人、可以查看参与人列表
                    can_modify_event: 可以编辑日程、可以邀请其它参与人、可以查看参与人列表
                  example: can_see_others
                color:
                  type: integer
                  description: |-
                    日程颜色，取值通过颜色 RGB 值的 int32 表示。

                    **注意**：
                    - 该参数仅对当前身份生效。
                    - 客户端展示时会映射到色板上最接近的一种颜色。
                    - 取值为 0 或 -1 时，默认跟随日历颜色。

                    **默认值**：空，表示不更新该字段
                  example: -1
                description:
                  type: string
                  description: |-
                    日程描述。

                    **注意**：目前 API 方式不支持编辑富文本描述。如果日程描述通过客户端编辑为富文本内容，则使用 API 更新描述会导致富文本格式丢失。

                    **默认值**：空，表示不更新该字段
                  example: 讨论项目进展
                end_time:
                  type: object
                  properties:
                    date:
                      type: string
                      description: |-
                        结束时间，仅全天日程使用该字段，[RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339) 格式，例如，2018-09-01。

                        **注意**：该参数不能与 `timestamp` 同时指定。
                      example: '2018-09-01'
                    timestamp:
                      type: string
                      description: |-
                        秒级时间戳，用于设置具体的结束时间。例如，1602504000 表示 2020/10/12 20:00:00（UTC +8 时区）。

                        **注意**：该参数不能与 `date` 同时指定。
                      example: '1602504000'
                    timezone:
                      type: string
                      description: |-
                        时区。使用 IANA Time Zone Database 标准，例如 Asia/Shanghai。

                        - 全天日程时区固定为UTC +0
                        - 非全天日程时区默认为 Asia/Shanghai
                      example: Asia/Shanghai
                  description: 日程结束时间。需要与start_time同时有值才会生效。
                event_check_in:
                  type: object
                  properties:
                    check_in_end_time:
                      type: object
                      properties:
                        duration:
                          type: integer
                          description: |-
                            相对于日程开始或者结束的偏移量(分钟)。
                            - 目前取值只能为列表[0, 5, 15, 30, 60]之一，0表示立即开始。
                            - 当time_type为before_event_start，duration不能取0。
                          example: 0
                          minimum: 0
                          maximum: 60
                        time_type:
                          type: string
                          description: 偏移量(分钟)相对于的日程时间节点类型。
                          enum:
                          - before_event_start
                          - after_event_start
                          - after_event_end
                          x-enum-descriptions:
                            before_event_start: 日程开始前
                            after_event_start: 日程开始后
                            after_event_end: 日程结束后
                      required:
                      - duration
                      - time_type
                      description: |-
                        日程签到结束时间。

                        **注意**：签到开始时间不能大于或者等于签到结束时间。
                    check_in_start_time:
                      type: object
                      properties:
                        duration:
                          type: integer
                          description: |-
                            相对于日程开始或者结束的偏移量(分钟)。
                            - 目前取值只能为列表[0, 5, 15, 30, 60]之一，0表示立即开始。
                            - 当time_type为before_event_start，duration不能取0。
                          example: 0
                          minimum: 0
                          maximum: 60
                        time_type:
                          type: string
                          description: 偏移量(分钟)相对于的日程时间节点类型。
                          enum:
                          - before_event_start
                          - after_event_start
                          - after_event_end
                          x-enum-descriptions:
                            before_event_start: 日程开始前
                            after_event_start: 日程开始后
                            after_event_end: 日程结束后
                      required:
                      - duration
                      - time_type
                      description: |-
                        日程签到开始时间。

                        **注意**：签到开始时间不能大于或者等于签到结束时间。
                    enable_check_in:
                      type: boolean
                      description: 是否启用日程签到。
                      example: true
                    need_notify_attendees:
                      type: boolean
                      description: 签到开始时是否自动发送签到通知给参与者
                  required:
                  - enable_check_in
                  description: 日程签到设置，为空则不进行日程签到设置。
                free_busy_status:
                  type: string
                  description: |-
                    日程占用的忙闲状态，新建日程默认为 `busy`。

                    **注意**：更新日程时如果修改了该参数值，则仅对当前身份生效。

                    **默认值**：空，表示不更新该字段
                  enum:
                  - busy
                  - free
                  x-enum-descriptions:
                    busy: 忙碌
                    free: 空闲
                  example: busy
                location:
                  type: object
                  properties:
                    address:
                      type: string
                      description: 地点地址。
                      example: 公司大楼三层
                    latitude:
                      type: number
                      description: |-
                        地点坐标纬度信息。
                        - 对于国内的地点，采用 GCJ-02 标准。
                        - 对于海外的地点，采用 WGS84 标准。
                      example: 1.100000023841858
                    longitude:
                      type: number
                      description: |-
                        地点坐标经度信息。
                        - 对于国内的地点，采用 GCJ-02 标准。
                        - 对于海外的地点，采用 WGS84 标准。
                      example: 2.200000047683716
                    name:
                      type: string
                      description: 地点名称。
                      example: 301会议室
                  description: 日程地点。不传值则表示不更新该字段。
                need_notification:
                  type: boolean
                  description: |-
                    更新日程时，是否给日程参与人发送 Bot 通知。

                    **默认值**：空，表示不更新该字段

                    **可选值有**：
                    - true：发送通知
                    - false：不发送通知
                  example: false
                recurrence:
                  type: string
                  description: |-
                    重复日程的重复性规则，规则设置方式参考[rfc5545](https://datatracker.ietf.org/doc/html/rfc5545#section-3.3.10)。

                    **注意**：
                    - COUNT 和 UNTIL 不支持同时出现。
                    - 预定会议室重复日程长度不得超过两年。

                    **默认值**：空，表示不更新该字段
                  example: FREQ=DAILY;INTERVAL=1
                reminders:
                  type: array
                  items:
                    type: object
                    properties:
                      minutes:
                        type: integer
                        description: |-
                          日程提醒时间的偏移量。
                          - 正数时表示在日程开始前 X 分钟提醒。
                          - 负数时表示在日程开始后 X 分钟提醒。

                          **注意**：更新日程时修改该字段仅对当前身份生效。
                        example: 5
                        minimum: -20160
                        maximum: 20160
                  description: 日程提醒列表。不传值则表示不更新该字段。
                schemas:
                  type: array
                  items:
                    type: object
                    properties:
                      app_link:
                        type: string
                        description: |-
                          按钮点击后跳转的链接。

                          **注意**：兼容性参数，只读，因此暂不支持传入该请求参数。
                        example: https://applink.feishu.cn/client/calendar/event/detail?calendarId=xxxxxx&key=xxxxxx&originalTime=xxxxxx&startTime=xxxxxx
                      ui_name:
                        type: string
                        description: "UI 名称。\n\n**可选值有**： \n- ForwardIcon：日程转发按钮 \n- MeetingChatIcon：会议群聊按钮 \n- MeetingMinutesIcon：会议纪要按钮\
                          \ \n- MeetingVideo：视频会议区域 \n- RSVP：接受、拒绝、待定区域 \n- Attendee：参与者区域 \n- OrganizerOrCreator：组织者或创建者区域"
                        example: ForwardIcon
                      ui_status:
                        type: string
                        description: UI 项的状态。目前只支持选择 `hide`。
                        enum:
                        - hide
                        - readonly
                        - editable
                        - unknown
