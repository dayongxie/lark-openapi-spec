        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/api-explorer?from=op_doc_tab&apiName=instance_view&project=calendar&resource=calendar.event&version=v4
      parameters:
      - name: calendar_id
        in: path
        required: true
        schema:
          type: string
        description: 日历 ID。关于日历 ID 可参见[日历 ID 说明](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar/introduction)。
        example: feishu.cn_HF9U2MbibE8PPpjro6xjqa@group.calendar.feishu.cn
      - name: end_time
        in: query
        required: true
        schema:
          type: string
        description: |-
          结束时间，Unix 时间戳，单位为秒。该参数与 start_time 用于设置查询的时间范围。

          **注意**：start_time 与 end_time 之间的时间区间需要小于 40 天。
        example: '1631777271'
      - name: start_time
        in: query
        required: true
        schema:
          type: string
        description: |-
          开始时间，Unix 时间戳，单位为秒。该参数与 end_time 用于设置查询的时间范围。

          **注意**：start_time 与 end_time 之间的时间区间需要小于 40 天。
        example: '1631777271'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
