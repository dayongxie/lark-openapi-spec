  /open-apis/calendar/v4/calendars/{calendar_id}/events/search_event:
    post:
      operationId: calendar_events_search_event
      summary: 搜索日程
      tags:
      - events
      description: 搜索日程
      parameters:
      - name: calendar_id
        in: path
        required: true
        schema:
          type: string
        description: 日历ID
        example: feishu.cn_HF9U2MbibE8PPpjro6xjqa@group.calendar.feishu.cn
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          maximum: 30
          default: 20
        description: 分页大小
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该page_token 获取查询结果
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
        description: 此次调用中使用的用户ID的类型
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  type: object
                  properties:
                    attendee_chat_ids:
                      type: array
                      items: {}
                      description: 群 ID 列表。设置该字段后，被搜索到的日程中至少包含其中一个群。
                    attendee_user_ids:
                      type: array
                      items: {}
                      description: 日程参与人的用户 ID 列表。设置该字段后，被搜索到的日程中至少包含其中一个参与人。
                    calendar_ids:
                      type: array
                      items: {}
                      description: 日历 ID 列表
                    meeting_room_ids:
                      type: array
                      items: {}
                      description: 会议室 ID 列表。设置该字段后，被搜索到的日程中至少包含其中一个会议室。
                    time_range:
                      type: object
                      properties:
                        end_time:
                          type: string
                          description: 范围内的结束时间 (RFC 3339)
                          example: '2026-03-21T16:15:30+08:00'
                        start_time:
                          type: string
                          description: 范围内的起始时间 (RFC 3339)
                          example: '2026-03-21T16:15:30+08:00'
                      description: 日程搜索区间的开始时间。不传值时，默认搜索当前时间前后一个周内的日程。
                  description: 搜索过滤器
                query:
                  type: string
                  description: |-
                    搜索关键字，用于模糊查询日程名称。

                    **注意**：如果日程名称包含下划线（_），则必须精准查询。该场景模糊查询可能无法搜索到日程。
                  example: query words
              required:
              - query
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达，见官方错误码文档）
          content:
            application/json:
              schema:
                type: object
                description: 飞书开放平台统一响应信封；业务数据位于 data 字段。
                properties:
                  code:
                    type: integer
                    description: 错误码，0 表示成功
                  msg:
                    type: string
                    description: 错误描述
                  data:
                    type: object
                    properties:
                      has_more:
                        type: boolean
                        description: 是否有下一页
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            display_info:
                              type: string
                              description: 包含日程基本信息的卡片，用户搜索关键词命中的文本片段，使用<h></h>标签包裹标注
                              example: Q2 <h>周会</h>\n2026-04-23 15:00-16:00\n会议室 A103
                            meta_data:
                              type: object
                              properties:
                                app_link:
                                  type: string
                                  description: 日程的 app_link，跳转到具体的某个日程。
                                  example: https://applink.feishu.cn/client/calendar/event/detail?calendarId=feishu.cn_xxxxxxxxxx@group.calendar.feishu.cn&key=xxxxxxxx
                                calendar_id:
                                  type: string
                                  description: 日程所在的日历 ID
                                  example: feishu.cn_xxxxxxxxxx@group.calendar.feishu.cn
                                end:
                                  type: object
                                  properties: {}
                                  description: 日程结束时间
                                event_id:
                                  type: string
                                  description: 日程 ID。后续可通过该 ID 查询、更新或删除日程信息。
                                  example: 00592a0e-7edf-4678-bc9d-1b77383ef08e_0
                                is_all_day:
                                  type: boolean
                                  description: true表示全天日程，默认是非全天日程
                                  example: false
                                start:
                                  type: object
                                  properties: {}
                                  description: 日程开始时间
                                summary:
                                  type: string
                                  description: 日程标题
                                  example: 日程标题
                              description: 日程元信息，包含搜索日程的基本数据；更多数据可通过获取日程接口拉取。
                        description: 搜索命中的日程列表
                      page_token:
                        type: string
                        description: 下次请求需要带上的分页标记
      x-lark-method-id: calendar.event.search_event
      x-lark-scopes:
      - calendar:calendar:readonly
      - calendar:calendar
      - calendar:calendar.event:read
      x-lark-access-tokens:
      - tenant
      - user
      x-lark-risk: read
      x-lark-danger: true
