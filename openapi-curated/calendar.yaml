      - calendar:calendar
      - calendar:calendar.event:read
      x-lark-access-tokens:
      - user
      - tenant
      x-lark-risk: read
      x-lark-danger: true
  /open-apis/calendar/v4/freebusy/list:
    post:
      operationId: calendar_freebusys_list
      summary: 查询主日历日程忙闲信息
      tags:
      - freebusys
      description: 查询主日历日程忙闲信息
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/freebusy/list
      parameters:
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户id
            union_id: 以union_id来识别用户id
            open_id: 以open_id来识别用户id
        description: 此次调用中使用的用户ID的类型
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                include_external_calendar:
                  type: boolean
                  description: |-
                    是否包含绑定的三方日历中的日程。

                    **取值**：
                    - true（默认值）：包含
                    - false：不包含
                  example: true
                need_rsvp_status:
                  type: boolean
                  description: 是否需要RSVP状态信息
                  example: true
                only_busy:
                  type: boolean
                  description: |-
                    是否只查询忙碌日程信息。

                    **取值**：

                    - true（默认值）：是，查询结果不包含空闲日程。
                    - false：否，查询结果包含空闲日程。
                  example: true
                room_id:
                  type: string
                  description: |-
                    会议室 room_id。你可以调用[查询会议室列表](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/vc-v1/room/list)接口或者[搜索会议室](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/vc-v1/room/search)接口，获取相应会议室的 room_id。

                    **注意**：user_id 与 room_id 需要二选一传入，如果同时传入则只生效 user_id。
                  example: omm_xxxxxxxxxx
                time_max:
                  type: string
                  description: |-
                    查询时段结束时间，[RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339) date_time 格式。

                    **注意**：time_min 与 time_max 之间的时间间隔不能大于 90 天。
                  example: '2020-12-28T12:00:00+08:00'
                time_min:
                  type: string
                  description: |-
                    查询时段开始时间，[RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339) date_time 格式。

                    **注意**：time_min 与 time_max 之间的时间间隔不能大于 90 天。
                  example: '2020-10-28T12:00:00+08:00'
                user_id:
                  type: string
                  description: |-
                    用户 ID，需要传入与查询参数 user_id_type 相匹配的 id。例如，`user_id_type=open_id` 时，需要传入用户的 open_id。了解用户 ID 参见[用户相关的 ID 概念](https://open.feishu.cn/document/home/user-identity-introduction/introduction)。

                    **注意**：user_id 与 room_id 需要二选一传入，如果同时传入则只生效 user_id。
                  example: ou_xxxxxxxxxx
              required:
              - time_max
              - time_min
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达，见官方错误码文档）
          content:
            application/json:
              schema:
                type: object
                description: 飞书开放平台统一响应信封；业务数据位于 data 字段。
                properties:
                  code:
                    type: integer
                    description: 错误码，0 表示成功
                  msg:
                    type: string
                    description: 错误描述
                  data:
                    type: object
                    properties:
                      freebusy_list:
                        type: array
                        items:
                          type: object
                          properties:
                            end_time:
                              type: string
                              description: 忙闲信息结束时间，[RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339) date_time 格式。
                              example: '2020-10-28T22:45:00+08:00'
                            rsvp_status:
                              type: string
                              description: 用户RSVP状态
                              enum:
                              - needs_action
                              - accept
                              - tentative
                              - decline
                              - removed
                              x-enum-descriptions:
                                needs_action: 参与人尚未回复状态，或表示会议室预约中
                                accept: 参与人回复接受，或表示会议室预约成功
                                tentative: 参与人回复待定
                                decline: 参与人回复拒绝，或表示会议室预约失败
                                removed: 参与人或会议室已经从日程中被移除
                            start_time:
                              type: string
                              description: 忙闲信息开始时间，[RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339) date_time 格式。
                              example: '2020-10-28T22:30:00+08:00'
                          required:
                          - end_time
                          - start_time
                        description: 在请求的时间区间内的忙碌时间段列表。
      x-lark-method-id: freebusy.list
      x-lark-scopes:
      - calendar:calendar:readonly
      - calendar:calendar
      - calendar:calendar.free_busy:read
      x-lark-access-tokens:
      - tenant
      - user
      x-lark-risk: read
