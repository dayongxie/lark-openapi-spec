          - 'true'
          - 'false'
          x-enum-descriptions:
            'true': 发送
            'false': 不发送
        description: |-
          删除日程是否给日程参与人发送 Bot 通知。

          **默认值**：true
        example: 'false'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达，见官方错误码文档）
          content:
            application/json:
              schema:
                type: object
                description: 飞书开放平台统一响应信封；业务数据位于 data 字段。
                properties:
                  code:
                    type: integer
                    description: 错误码，0 表示成功
                  msg:
                    type: string
                    description: 错误描述
                  data:
                    type: object
                    properties: {}
