                            example: '1602504000'
                          description:
                            type: string
                            description: 日程描述。
                            example: 日程描述
                          end_time:
                            type: object
                            properties:
                              date:
                                type: string
                                description: 结束时间，仅全天日程使用该字段，[RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339) 格式，例如，2018-09-01。
                                example: '2018-09-01'
                              timestamp:
                                type: string
                                description: 秒级时间戳，指日程具体的结束时间。例如，1602504000 表示 2020/10/12 20:00:00（UTC +8 时区）。
                                example: '1602504000'
                              timezone:
                                type: string
                                description: 时区。使用 IANA Time Zone Database 标准。
                                example: Asia/Shanghai
                            description: 日程结束时间。
                          event_check_in:
                            type: object
                            properties:
                              check_in_end_time:
                                type: object
                                properties: {}
