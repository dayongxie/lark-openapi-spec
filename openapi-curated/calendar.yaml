        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar-event/delete
      parameters:
      - name: calendar_id
        in: path
        required: true
        schema:
          type: string
        description: 日程所在的日历 ID。了解更多，参见[日历 ID 说明](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar/introduction)。
        example: feishu.cn_xxxxxxxxxx@group.calendar.feishu.cn
      - name: event_id
        in: path
        required: true
        schema:
          type: string
        description: |-
          日程 ID。获取方式：

          - [创建日程](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar-event/create)会返回日程 ID
          - [获取日程列表](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar-event/list)
          - [搜索日程](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar-event/search)
        example: xxxxxxxxx_0
      - name: need_notification
        in: query
