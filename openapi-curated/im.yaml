                              example: '1663054162546'
                            operator:
                              type: object
                              properties:
                                operator_id:
                                  type: string
                                  description: "操作人 ID，具体的取值与 `operator_type` 相关：\n      \n- 当 `operator_type` 取值 `app` 时返回机器人的应用\
                                    \ ID（app_id）。\n- 当 `operator_type` 取值 `user` 时返回用户的 ID（ID 类型与查询参数 `user_id_type` 的取值一致）。"
                                  example: ou_ff0b7ba35fb********67dfc8b885136
                                operator_type:
                                  type: string
                                  description: 操作人身份。
                                  enum:
                                  - app
                                  - user
                                  x-enum-descriptions:
                                    app: '"app"'
                                    user: '"user"'
                                  example: app/user
                              required:
                              - operator_id
                              - operator_type
                              description: 添加表情回复的操作人
                            reaction_id:
                              type: string
                              description: 表情回复 ID。
                              example: ZCaCIjUBVVWSrm5L-3ZTw*************sNa8dHVplEzzSfJVUVLMLcS_
                            reaction_type:
                              type: object
                              properties:
                                emoji_type:
                                  type: string
                                  description: emoji 类型。emoji_type 值对应的表情参考[表情文案说明](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/message-reaction/emojis-introduce)。
                                  example: SMILE
                              required:
                              - emoji_type
                              description: 表情类型
                        description: 表情回复列表。
                      page_token:
                        type: string
                        description: 分页标记，当 has_more 为 true 时，会同时返回新的 page_token，否则不返回 page_token
                        example: YhljsPiGfUgnVAg9urvRFd-BvSqRL****
                    required:
                    - has_more
                    - items
                    - page_token
