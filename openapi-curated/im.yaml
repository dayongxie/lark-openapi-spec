  /open-apis/im/v1/messages/{message_id}/read_users:
    get:
      operationId: im_messages_read_users
      summary: 查询消息已读信息
      tags:
      - messages
      description: |-
        查询消息已读信息。Identity: `bot` only (`tenant_access_token`)
         the bot must be in the chat, and can only query read status for messages it sent within the last 7 days.
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/message/read_users
      parameters:
      - name: message_id
        in: path
        required: true
        schema:
          type: string
        description: "待查询的消息 ID。ID 获取方式：\n  \n- 调用[发送消息](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/message/create)接口后，从响应结果的\
          \ `message_id` 参数获取。\n- 监听[接收消息](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/message/events/receive)事件，当触发该事件后可以从事件体内获取消息的\
          \ `message_id`。\n- 调用[获取会话历史消息](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/message/list)接口，从响应结果的\
          \ `message_id` 参数获取。"
        example: om_dc13264520392913993dd051dba21dcf
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
        description: 分页大小，用于限制单次请求所返回的数据条目数。
        example: 20
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该 page_token 获取查询结果
        example: GxmvlNRvP0NdQZpa7yIqf_Lv_QuBwTQ8tXkX7w-irAghVD_TvuYd1aoJ1LQph86O-XImC4X9j9FhUPhXQDvtrQ==
      - name: user_id_type
        in: query
        required: true
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
        description: 此次调用中使用的用户ID的类型
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达，见官方错误码文档）
          content:
            application/json:
              schema:
                type: object
                description: 飞书开放平台统一响应信封；业务数据位于 data 字段。
                properties:
                  code:
                    type: integer
                    description: 错误码，0 表示成功
                  msg:
                    type: string
                    description: 错误描述
                  data:
                    type: object
                    properties:
                      has_more:
                        type: boolean
                        description: 是否还有更多项
                        example: true
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            tenant_key:
                              type: string
                              description: 租户唯一标识。该标识用来识别租户，也可以用来获取租户访问凭证（tenant_access_token）。
                              example: 736588c9260f175e
                            timestamp:
                              type: string
                              description: 已读消息的时间，毫秒级时间戳。
                              example: '1609484183000'
                            user_id:
                              type: string
                              description: 用户 ID，ID 类型与查询参数 user_id_type 取值一致。
                              example: ou_9b851f7b51a9d58d109982337c46f3de
                            user_id_type:
                              type: string
                              description: 用户id类型
                          required:
                          - timestamp
                          - user_id
                          - user_id_type
                        description: '-'
                      page_token:
                        type: string
                        description: 分页标记，当 has_more 为 true 时，会同时返回新的 page_token，否则不返回 page_token
                        example: GxmvlNRvP0NdQZpa7yIqf_Lv_QuBwTQ8tXkX7w-irAghVD_TvuYd1aoJ1LQph86O-XImC4X9j9FhUPhXQDvtrQ==
                    required:
                    - has_more
      x-lark-method-id: messages.read_users
      x-lark-scopes:
      - im:message:basic
      - im:message:readonly
      - im:message
      x-lark-access-tokens:
      - tenant
      x-lark-risk: read
