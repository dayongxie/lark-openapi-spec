                      - not_anyone
                      x-enum-descriptions:
                        all_members: 所有成员允许下载资源
                        not_anyone: 所有成员禁止下载资源
                      example: all_members
                    message_has_permission_setting:
                      type: string
                      description: 允许复制和转发消息
                      enum:
                      - all_members
                      - not_anyone
                      x-enum-descriptions:
                        all_members: 所有成员允许复制和转发消息
                        not_anyone: 所有成员禁止复制和转发消息
                      example: all_members
