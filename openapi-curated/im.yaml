      parameters:
      - name: message_id
        in: path
        required: true
        schema:
          type: string
        description: "待加急的消息 ID。ID 获取方式：\n  \n- 调用[发送消息](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/message/create)接口后，从响应结果的\
          \ `message_id` 参数获取。\n- 监听[接收消息](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/message/events/receive)事件，当触发该事件后可以从事件体内获取消息的\
          \ `message_id`。\n- 调用[获取会话历史消息](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/message/list)接口，从响应结果的\
          \ `message_id` 参数获取。\n\n**注意**：不支持加急[批量发送的消息](https://open.feishu.cn/document/ukTMukTMukTM/ucDO1EjL3gTNx4yN4UTM)（对应的消息ID\
          \ 格式为 `bm_xxx`）。"
        example: om_dc13264520392913993dd051dba21dcf
      - name: user_id_type
        in: query
        required: true
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
        description: 此次调用中使用的用户ID的类型
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id_list:
                  type: array
                  items: {}
                  description: "加急的目标用户 ID 列表。ID 类型与查询参数 user_id_type 取值一致，推荐使用 open_id。\n\n**注意**：需要确保目标用户在加急消息所属的会话内。如果\
                    \ ID 列表中有用户不在消息所属的会话内，则接口会将这些无效的 ID 返回（响应参数 invalid_user_id_list），只加急有效的用户 ID。如果 ID 列表内的所有 ID 均无效，则会返回\
                    \ `230001` 错误码。 \n\n**数据校验规则**：列表长度不能大于 200。"
              required:
              - user_id_list
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达，见官方错误码文档）
          content:
            application/json:
              schema:
                type: object
                description: 飞书开放平台统一响应信封；业务数据位于 data 字段。
                properties:
                  code:
                    type: integer
                    description: 错误码，0 表示成功
                  msg:
                    type: string
                    description: 错误描述
                  data:
                    type: object
                    properties:
                      invalid_user_id_list:
                        type: array
                        items: {}
                        description: 无效的用户 ID。当传入的用户 ID 列表内存在部分用户 ID 有效时，将对有效的用户进行加急操作，同时返回无效的用户 ID。当所有的用户 ID 无效时，将返回 `230001`
                          错误码。
                    required:
                    - invalid_user_id_list
      x-lark-method-id: messages.urgent_app
      x-lark-scopes:
      - im:message.urgent
      - im:message.urgent:app_send
      x-lark-access-tokens:
      - tenant
      x-lark-risk: write
      x-lark-danger: true
