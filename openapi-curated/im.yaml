        description: 消息接收者 ID 类型。
        example: open_id
      - name: uuid
        in: query
        required: false
        schema:
          type: string
        description: 自定义设置的唯一字符串序列，用于在合并转发消息时请求去重。持有相同 uuid 的请求，在 1 小时内向同一目标的合并转发只可成功一次。
