        in: path
        required: true
        schema:
          type: string
        description: |-
          群 ID。获取方式：

          - [创建群](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/chat/create)，从返回结果中获取该群的 chat_id。
          - 调用[获取用户或机器人所在的群列表](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/chat/list)接口，可以查询用户或机器人所在群的 chat_id。
          - 调用[搜索对用户或机器人可见的群列表](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/chat/search)，可搜索用户或机器人所在的群、对用户或机器人公开的群的 chat_id。

          **注意**：仅支持群模式为 `group` 的群组 ID。你可以调用[获取群信息](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/chat/get)接口，在返回结果中查看 `chat_mode` 参数取值是否为 `group`。
        example: oc_a0553eda9014c201e6969b478895c230
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
        description: 此次调用中使用的用户ID的类型
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                add_member_permission:
                  type: string
                  description: |-
                    谁可以添加群成员，群成员包括用户或机器人

                    **可选值有**：
                    - `only_owner`：仅群主和管理员
                    - `all_members`：所有成员

                    **注意**：`add_member_permission` 和 `share_card_permission` 两个参数必须同步配置。

                    - 如果 `add_member_permission` 值为 `only_owner`，则 `share_card_permission` 只能设置为 `not_allowed`。
                    - 如果 `add_member_permission` 值为`all_members`，则 `share_card_permission` 只能设置为 `allowed`。
                  example: all_members
                at_all_permission:
                  type: string
                  description: |-
                    谁可以 at 所有人

                    **可选值有**：
                    - `only_owner`：仅群主和管理员
                    - `all_members`：所有成员
                  example: all_members
                avatar:
                  type: string
                  description: 群头像对应的 Image Key，可通过[上传图片](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/image/create)获取（注意：上传图片的
                    `image_type` 需要指定为 `avatar`）
                  example: default-avatar_44ae0ca3-e140-494b-956f-78091e348435
                chat_type:
                  type: string
                  description: |-
                    群类型

                    **可选值有**：
                    - `private`：私有群
                    - `public`：公开群
                  example: private
                description:
                  type: string
                  description: 群描述，建议不超过 100 字符
                  example: 测试群描述
                edit_permission:
                  type: string
                  description: |-
                    谁可以编辑群信息

                    **可选值有**：
                    - `only_owner`：仅群主和管理员
                    - `all_members`：所有成员
                  example: all_members
                group_message_type:
                  type: string
                  description: 群消息形式
                  enum:
                  - chat
                  - thread
                  x-enum-descriptions:
                    chat: 对话消息
                    thread: 话题消息
                  example: chat
                hide_member_count_setting:
                  type: string
                  description: 隐藏群成员人数设置
                  enum:
                  - all_members
                  - only_owner
                  x-enum-descriptions:
                    all_members: 所有群成员可见
                    only_owner: 仅群主群管理员可见
                  example: all_members
                i18n_names:
                  type: object
                  properties:
                    en_us:
                      type: string
                      description: 英文名
                      example: group chat
                    ja_jp:
                      type: string
                      description: 日文名
                      example: グループチャット
                    zh_cn:
                      type: string
                      description: 中文名
                      example: 群聊
                  description: 群国际化名称
                join_message_visibility:
                  type: string
                  description: |-
                    成员入群提示消息的可见性

                    **可选值有**：
                    - `only_owner`：仅群主和管理员可见
                    - `all_members`：所有成员可见
                    - `not_anyone`：任何人均不可见
                  example: only_owner
                labels:
                  type: array
                  items: {}
                  description: 群标签
                leave_message_visibility:
                  type: string
                  description: |-
                    成员退群提示消息的可见性

                    **可选值有**：
                    - `only_owner`：仅群主和管理员可见
                    - `all_members`：所有成员可见
                    - `not_anyone`：任何人均不可见
                  example: only_owner
                membership_approval:
                  type: string
                  description: |-
                    加群是否需要审批

                    **可选值有**：
                    - `no_approval_required`：无需审批
                    - `approval_required`：需要审批
                  example: no_approval_required
                name:
                  type: string
                  description: "群名称\n\n**注意：** \n- 建议群名称不超过 60 字符\n- 公开群名称的长度不得少于 2 个字符"
                  example: 群聊
                owner_id:
                  type: string
                  description: 新群主的用户 ID，不转让群主时无需填写。ID 类型与查询参数 user_id_type 取值一致，ID 类型推荐使用 OpenID，获取方式可参考文档[如何获取 Open ID？](https://open.feishu.cn/document/uAjLw4CM/ugTN1YjL4UTN24CO1UjN/trouble-shooting/how-to-obtain-openid)。
                  example: 4d7a3c6g
                pin_manage_setting:
                  type: string
                  description: 谁可以管理置顶
                  enum:
                  - only_owner
                  - all_members
                  x-enum-descriptions:
                    only_owner: 仅群主和管理员
                    all_members: 所有成员
                  example: all_members
                restricted_mode_setting:
                  type: object
                  properties:
                    download_has_permission_setting:
                      type: string
                      description: 允许下载消息中图片、视频和文件
                      enum:
