                              example: oc_a0553eda9014c201e6969b478895c230
                            msg:
                              type: string
                              description: 无效的原因
                              example: user is not in the chat
                        description: |-
                          未能返回群人设置的 chat_id 列表，每项含原始 id 与失败原因 msg。chat_ids 去重后凡未出现在 items 中的 id 均会出现在此处。
