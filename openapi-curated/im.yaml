                    type: integer
                    description: 错误码，0 表示成功
                  msg:
                    type: string
                    description: 错误描述
                  data:
                    type: object
                    properties:
                      invalid_id_list:
                        type: array
                        items: {}
                        description: |-
                          无效成员列表

                          **注意**：
                          - 当`success_type` 取值为 `0`时，`invalid_id_list`只包含已离职的用户ID
                          - 当`success_type` 取值为 `1`时，`invalid_id_list`中包含已离职的、不可见的、应用未激活的 ID
                      not_existed_id_list:
                        type: array
                        items: {}
                        description: ID 不存在的成员列表
                      pending_approval_id_list:
                        type: array
