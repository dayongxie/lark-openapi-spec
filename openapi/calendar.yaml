                                    type: integer
                                    description: |-
                                      日程提醒时间的偏移量，正数时表示在日程开始前X分钟提醒，负数时表示在日程开始后X分钟提醒
                                      新建或更新日程时传入该字段，仅对当前身份生效
                                    example: '5'
                              description: 日程提醒列表
                            recurrence:
                              type: string
                              description: 重复日程的重复性规则
                              example: FREQ=DAILY;INTERVAL=1
