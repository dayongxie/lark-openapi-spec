    post:
      operationId: calendar_freebusy_batch
      summary: 批量查询主日历日程忙闲信息
      tags:
      - freebusy
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/freebusy/batch
      parameters:
