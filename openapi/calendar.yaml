                                  file_size:
                                    type: string
                                    description: 附件大小
                                    example: '2345'
                                  is_deleted:
                                    type: boolean
                                    description: 是否删除附件
                                    example: 'true'
                                  name:
                                    type: string
                                    description: 附件名称
                                    example: 附件.jpeg
                              description: 日程附件
