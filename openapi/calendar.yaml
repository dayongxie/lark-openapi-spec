                          example: '2018-09-01'
                        timestamp:
                          type: string
                          description: 秒级时间戳，如1602504000(表示2020/10/12 20:0:00 +8时区)
                          example: '1602504000'
                        timezone:
                          type: string
                          description: 时区名称，使用IANA Time Zone Database标准，如Asia/Shanghai；全天日程时区固定为UTC，非全天日程时区默认为Asia/Shanghai
                          example: Asia/Shanghai
                      description: 搜索过滤项，日程搜索区间的结束时间，被搜索日程的事件必须与搜索区间有交集
                    user_ids:
                      type: array
                      items:
                        type: string
                      description: 搜索过滤项，参与人的用户ID列表，被搜索日程中必须包含至少一个其中的参与人
                      example: xx
