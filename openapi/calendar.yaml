                                accept: 参与人回复接受，或表示会议室预约成功
                                tentative: 参与人回复待定
                                decline: 参与人回复拒绝，或表示会议室预约失败
                                removed: 参与人或会议室已经从日程中被移除
                            description_rich:
                              type: string
                              description: 日程富文本描述
                              example: desc
                          required:
                          - event_id
                          - start_time
                          - end_time
