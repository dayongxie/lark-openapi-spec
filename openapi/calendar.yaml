      tags:
      - calendar.event
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar-event/create
      parameters:
      - name: calendar_id
        in: path
        required: true
        schema:
          type: string
        description: 日历ID。参见[日历ID说明](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/calendar/introduction)
        example: feishu.cn_HF9U2MbibE8PPpjro6xjqa@group.calendar.feishu.cn
      - name: idempotency_key
        in: query
        required: false
        schema:
          type: string
        description: 幂等唯一key
        example: 25fdf41b-8c80-2ce1-e94c-de8b5e7aa7e6
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户ID的类型
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                summary:
                  type: string
                  description: 日程标题
                  example: 日程标题
                description:
                  type: string
                  description: 日程描述
                  example: 日程描述
                need_notification:
                  type: boolean
                  description: 是否发送通知消息
                  example: 'false'
                start_time:
                  type: object
                  properties:
                    date:
                      type: string
                      description: 仅全天日程使用该字段，如2018-09-01。需满足 RFC3339 格式。不能与 time_stamp 同时指定
                      example: '2018-09-01'
                    timestamp:
                      type: string
                      description: 秒级时间戳，如1602504000(表示2020/10/12 20:0:00 +8时区)
                      example: '1602504000'
                    timezone:
                      type: string
                      description: 时区名称，使用IANA Time Zone Database标准，如Asia/Shanghai；全天日程时区固定为UTC，非全天日程时区默认为Asia/Shanghai
                      example: Asia/Shanghai
                  description: 日程开始时间
                end_time:
                  type: object
                  properties:
                    date:
                      type: string
                      description: 仅全天日程使用该字段，如2018-09-01。需满足 RFC3339 格式。不能与 time_stamp 同时指定
                      example: '2018-09-01'
                    timestamp:
                      type: string
                      description: 秒级时间戳，如1602504000(表示2020/10/12 20:0:00 +8时区)
                      example: '1602504000'
                    timezone:
                      type: string
                      description: 时区名称，使用IANA Time Zone Database标准，如Asia/Shanghai；全天日程时区固定为UTC，非全天日程时区默认为Asia/Shanghai
                      example: Asia/Shanghai
                  description: 日程结束时间
                vchat:
                  allOf:
                  - $ref: '#/components/schemas/Vchat2'
                  description: 视频会议信息，仅当日程至少有一位attendee时生效
                visibility:
                  type: string
                  description: 日程公开范围，新建日程默认为Default；仅新建日程时对所有参与人生效，之后修改该属性仅对当前身份生效
                  enum:
                  - default
                  - public
                  - private
                  x-enum-descriptions:
                    default: 默认权限，仅向他人显示是否“忙碌”
                    public: 公开，显示日程详情
                    private: 私密，仅自己可见
                attendee_ability:
                  type: string
                  description: 参与人权限
                  enum:
                  - none
                  - can_see_others
                  - can_invite_others
                  - can_modify_event
                  x-enum-descriptions:
                    none: 无法编辑日程、无法邀请其它参与人、无法查看参与人列表
                    can_see_others: 无法编辑日程、无法邀请其它参与人、可以查看参与人列表
                    can_invite_others: 无法编辑日程、可以邀请其它参与人、可以查看参与人列表
                    can_modify_event: 可以编辑日程、可以邀请其它参与人、可以查看参与人列表
                free_busy_status:
                  type: string
                  description: 日程占用的忙闲状态，新建日程默认为Busy；仅新建日程时对所有参与人生效，之后修改该属性仅对当前身份生效
                  enum:
                  - busy
                  - free
                  x-enum-descriptions:
                    busy: 忙碌
                    free: 空闲
                location:
                  type: object
                  properties:
                    name:
                      type: string
                      description: 地点名称
                      example: 东方明珠
                    address:
                      type: string
                      description: 地点地址
                      example: 普通市和平区世纪大道1号
                    latitude:
                      type: number
                      description: 地点坐标纬度信息，对于国内的地点，采用GCJ-02标准，海外地点采用WGS84标准
                      example: '31.239702224731445'
                    longitude:
                      type: number
                      description: 地点坐标经度信息，对于国内的地点，采用GCJ-02标准，海外地点采用WGS84标准
                      example: '121.49971771240234'
                  description: 日程地点
                color:
