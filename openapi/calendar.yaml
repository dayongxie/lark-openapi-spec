            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      freebusy_lists:
                        type: array
                        items:
                          type: object
                          properties:
                            freebusy_items:
                              type: array
                              items:
                                type: object
                                properties:
                                  start_time:
                                    type: string
                                    description: 忙闲信息开始时间，RFC3339 date_time格式
                                    example: '2020-10-28T12:00:00+08:00'
                                  end_time:
                                    type: string
                                    description: 忙闲信息结束时间，RFC3339 date_time格式
                                    example: '2020-10-28T12:00:00+08:00'
                                  rsvp_status:
                                    type: string
                                    description: 参与人RSVP状态
                                    enum:
                                    - needs_action
                                    - accept
                                    - tentative
                                    - decline
                                    - removed
                                    x-enum-descriptions:
                                      needs_action: 参与人尚未回复状态，或表示会议室预约中
                                      accept: 参与人回复接受，或表示会议室预约成功
                                      tentative: 参与人回复待定
                                      decline: 参与人回复拒绝，或表示会议室预约失败
                                      removed: 参与人或会议室已经从日程中被移除
                                required:
