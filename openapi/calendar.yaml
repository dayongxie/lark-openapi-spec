          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户ID的类型
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                time_min:
                  type: string
                  description: 获取忙闲信息的开始时间，RFC3339 date_time格式；time_min与time_max的时间区间不能超过3个月。
                  example: '2020-10-28T12:00:00+08:00'
                time_max:
                  type: string
                  description: 获取忙闲信息的开始时间，RFC3339 date_time格式；time_min与time_max的时间区间不能超过3个月。
                  example: '2020-10-28T12:00:00+08:00'
                user_ids:
                  type: array
                  items:
                    type: string
                  description: 用户ID列表
                include_external_calendar:
                  type: boolean
                  description: 是否包含绑定的三方日历中的日程，不传默认为true，即包含。
                  example: 'true'
                only_busy:
                  type: boolean
                  description: 是否包含标记为空闲的日程，不传默认为true，即包含空闲日程。
                  example: 'true'
                need_rsvp_status:
                  type: boolean
                  description: 是否需要RSVP状态信息
                  example: 'true'
