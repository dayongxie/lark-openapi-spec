components:
  schemas:
    Schema:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          $ref: '#/components/schemas/Data'
    Data:
      type: object
      properties:
        event:
          allOf:
          - $ref: '#/components/schemas/Event'
          description: 日程信息
    Event:
      type: object
      properties:
        event_id:
          type: string
          description: 日程ID
          example: 75d28f9b-e35c-4230-8a83-4a661497db54_0
        organizer_calendar_id:
          type: string
          description: 日程组织者日历ID
          example: feishu.cn_HF9U2MbibE8PPpjro6xjqa@group.calendar.feishu.cn
        summary:
          type: string
          description: 日程标题
          example: 日程标题
        description:
          type: string
          description: 日程描述
          example: 日程描述
        start_time:
          type: object
          properties:
            date:
              type: string
              description: 仅全天日程使用该字段，如2018-09-01。需满足 RFC3339 格式。不能与 time_stamp 同时指定
              example: '2018-09-01'
            timestamp:
              type: string
              description: 秒级时间戳，如1602504000(表示2020/10/12 20:0:00 +8时区)
              example: '1602504000'
            timezone:
              type: string
              description: 时区名称，使用IANA Time Zone Database标准，如Asia/Shanghai；全天日程时区固定为UTC，非全天日程时区默认为Asia/Shanghai
              example: Asia/Shanghai
          description: 日程开始时间
        end_time:
          type: object
          properties:
            date:
              type: string
              description: 仅全天日程使用该字段，如2018-09-01。需满足 RFC3339 格式。不能与 time_stamp 同时指定
              example: '2018-09-01'
            timestamp:
              type: string
              description: 秒级时间戳，如1602504000(表示2020/10/12 20:0:00 +8时区)
              example: '1602504000'
            timezone:
              type: string
              description: 时区名称，使用IANA Time Zone Database标准，如Asia/Shanghai；全天日程时区固定为UTC，非全天日程时区默认为Asia/Shanghai
              example: Asia/Shanghai
          description: 日程结束时间
        vchat:
          allOf:
          - $ref: '#/components/schemas/Vchat'
          description: 视频会议信息，仅当日程至少有一位attendee时生效
        visibility:
          type: string
          description: 日程公开范围，新建日程默认为Default；仅新建日程时对所有参与人生效，之后修改该属性仅对当前身份生效
          enum:
          - default
          - public
          - private
          x-enum-descriptions:
            default: 默认权限，仅向他人显示是否“忙碌”
            public: 公开，显示日程详情
            private: 私密，仅自己可见
        attendee_ability:
          type: string
          description: 参与人权限
          enum:
          - none
          - can_see_others
          - can_invite_others
          - can_modify_event
          x-enum-descriptions:
            none: 无法编辑日程、无法邀请其它参与人、无法查看参与人列表
            can_see_others: 无法编辑日程、无法邀请其它参与人、可以查看参与人列表
            can_invite_others: 无法编辑日程、可以邀请其它参与人、可以查看参与人列表
            can_modify_event: 可以编辑日程、可以邀请其它参与人、可以查看参与人列表
        free_busy_status:
          type: string
          description: 日程占用的忙闲状态，新建日程默认为Busy；仅新建日程时对所有参与人生效，之后修改该属性仅对当前身份生效
          enum:
          - busy
          - free
          x-enum-descriptions:
            busy: 忙碌
            free: 空闲
        location:
          type: object
          properties:
            name:
              type: string
              description: 地点名称
              example: 东方明珠
            address:
              type: string
              description: 地点地址
              example: 普通市和平区世纪大道1号
            latitude:
              type: number
              description: 地点坐标纬度信息，对于国内的地点，采用GCJ-02标准，海外地点采用WGS84标准
              example: '31.239702224731445'
            longitude:
              type: number
              description: 地点坐标经度信息，对于国内的地点，采用GCJ-02标准，海外地点采用WGS84标准
              example: '121.49971771240234'
          description: 日程地点
        color:
          type: integer
          description: 日程颜色，颜色RGB值的int32表示。仅对当前身份生效；客户端展示时会映射到色板上最接近的一种颜色；值为0或-1时默认跟随日历颜色。
          example: '0'
        reminders:
          type: array
          items:
            type: object
            properties:
              minutes:
                type: integer
                description: |-
                  日程提醒时间的偏移量，正数时表示在日程开始前X分钟提醒，负数时表示在日程开始后X分钟提醒
                  新建或更新日程时传入该字段，仅对当前身份生效
                example: '5'
          description: 日程提醒列表
        recurrence:
          type: string
          description: 重复日程的重复性规则
          example: FREQ=DAILY;INTERVAL=1
        status:
          type: string
          description: 日程状态
          enum:
          - tentative
          - confirmed
          - cancelled
          x-enum-descriptions:
            tentative: 未回应
            confirmed: 已确认
            cancelled: 日程已取消
        is_exception:
          type: boolean
          description: 日程是否是一个重复日程的例外日程
          example: 'false'
        recurring_event_id:
          type: string
          description: 例外日程的原重复日程的event_id
          example: 75d28f9b-e35c-4230-8a83-4a661497db54_0
        create_time:
          type: string
          description: 日程的创建时间戳
          example: '1675612800'
        schemas:
          type: array
          items:
            type: object
            properties:
              ui_name:
                type: string
                description: UI项名称 TODO文档
                example: xxx
              ui_status:
                type: string
                description: UI项自定义状态
                enum:
                - hide
                - readonly
                - editable
                - unknown
                x-enum-descriptions:
                  hide: 隐藏显示
                  readonly: 只读
                  editable: 可编辑
                  unknown: 未知UI项自定义状态，仅用于读取时兼容
              app_link:
                type: string
                description: 按钮点击后跳转的链接
                example: xxxx
          description: 日程自定义信息
        event_organizer:
          type: object
          properties:
            user_id:
              type: string
              description: 日程组织者user ID
              example: ou_xxxxxx
            display_name:
              type: string
              description: 日程组织者姓名
              example: 孙二二
          description: 日程组织者信息
        app_link:
          type: string
          description: 日程的app_link,跳转到具体的某个日程
          example: https://applink.larkoffice.com/client/calendar/event/detail?calendarId=7039673579105026066&key=aeac9c56-aeb1-4179-a21b-02f278f59048&originalTime=0&startTime=1700496000
        attachments:
          type: array
          items:
            type: object
            properties:
              file_token:
                type: string
                description: 附件token
                example: xAAAAA
                x-lark-id-types:
                  file_token: ccm_file
              file_size:
                type: string
                description: 附件大小
                example: '2345'
              is_deleted:
