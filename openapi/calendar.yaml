  /open-apis/calendar/v4/timeoff_events:
    post:
      operationId: calendar_timeoff_event_create
      summary: 创建请假日程
      tags:
      - timeoff_event
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/calendar-v4/timeoff_event/create
      parameters:
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户id
            union_id: 以union_id来识别用户id
            open_id: 以open_id来识别用户id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户ID的类型
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
                  description: 用户的user id
                  example: ou_XXXXXXXXXX
                timezone:
                  type: string
                  description: 休假人的时区
                  example: Asia/Shanghai
                start_time:
                  type: string
                  description: 休假开始时间（时间戳）/日期（2021-01-01），为日期时将生成全天日程，且与end_time对应，不符合将返回错误
                  example: '2021-01-01'
                end_time:
                  type: string
                  description: 休假结束时间（时间戳）/日期（2021-01-01），为日期时将生成全天日程，与start_time对应，不符合将返回错误
                  example: '2021-01-02'
                title:
                  type: string
                  description: 休假日程标题，可自定义例如："请假中(全天) / 1-Day Time Off"，"请假中(半天) / 0.5-Day Time Off"，"长期休假中 / Leave of Absence"，"请假中"
                  example: 请假日程标题
                description:
                  type: string
                  description: |-
                    休假日程描述，可自定义,例如：
                    "若拒绝或删除此日程，飞书中相应的“请假”标签将自动消失，而请假系统中的休假申请不会被撤销。

                    If the event is rejected or deleted, corresponding "On Leave" tag in Feishu will disappear, while the leave request in the time off system will not be revoked."
                  example: 请假日程描述
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      timeoff_event_id:
                        type: string
                        description: 休假申请的唯一标识id
                        example: timeoff:XXXXXX-XXXX-0917-1623-aa493d591a39-XXXXXX
                      user_id:
                        type: string
                        description: 用户的user id
                        example: ou_XXXXXXXXXX
                      timezone:
                        type: string
                        description: 休假人的时区
                        example: Asia/Shanghai
                      start_time:
                        type: string
                        description: 休假开始时间（时间戳）/日期（2021-01-01），为日期时将生成全天日程，且与end_time对应，不符合将返回错误
                        example: '2021-01-01'
                      end_time:
                        type: string
                        description: 休假结束时间（时间戳）/日期（2021-01-01），为日期时将生成全天日程，与start_time对应，不符合将返回错误
                        example: '2021-01-02'
                      title:
                        type: string
                        description: 休假日程标题，可自定义例如："请假中(全天) / 1-Day Time Off"，"请假中(半天) / 0.5-Day Time Off"，"长期休假中 / Leave
                          of Absence"，"请假中"
                        example: 请假日程标题
                      description:
                        type: string
                        description: |-
                          休假日程描述，可自定义,例如：
                          "若拒绝或删除此日程，飞书中相应的“请假”标签将自动消失，而请假系统中的休假申请不会被撤销。

                          If the event is rejected or deleted, corresponding "On Leave" tag in Feishu will disappear, while the leave request in the time off system will not be revoked."
                        example: 请假日程描述
                    required:
                    - timeoff_event_id
                    - user_id
                    - timezone
                    - start_time
                    - end_time
