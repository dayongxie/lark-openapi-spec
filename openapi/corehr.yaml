  /open-apis/corehr/v2/employees/international_assignments:
    post:
      operationId: corehr_employees_international_assignment_create
      summary: 创建外派信息
      tags:
      - employees.international_assignment
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/employees-international_assignment/create
      parameters:
      - name: client_token
        in: query
        required: false
        schema:
          type: string
        description: 幂等标识，服务端会忽略 client_token 重复的请求
        example: '12454646'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          - people_corehr_id
          x-enum-descriptions:
            user_id: 以 user_id 来识别用户
            union_id: 以 union_id 来识别用户
            open_id: 以 open_id 来识别用户
            people_corehr_id: 以飞书人事的 ID 来识别用户
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户 ID 类型
        example: open_id
      - name: department_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - open_department_id
          - department_id
          - people_corehr_department_id
          x-enum-descriptions:
            open_department_id: 以 open_department_id 来标识部门
            department_id: 以 department_id 来标识部门
            people_corehr_department_id: 以 people_corehr_department_id 来标识部门
          default: open_department_id
          x-lark-id-types:
            department_id: department
            open_department_id: department
        description: 此次调用中使用的部门 ID 类型
        example: open_department_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                work_location_id:
                  type: string
                  description: |-
                    外派工作地点 ID
                      - 可通过[【批量查询地点】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/corehr-v1/location/list)获取
                  example: '7127921432117937708'
                service_company:
                  type: string
                  description: |-
                    外派任职公司 ID
                    - 可通过[【批量查询公司】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/corehr-v1/company/list)获取
                  example: '7127921432117937708'
                work_shift:
                  type: string
                  description: |-
                    排班类型
                    - 可通过[【获取字段详情】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/corehr-v1/custom_field/get_by_param)接口查询，查询参数如下：
                      - object_api_name：job_data
                      - custom_api_name：work_shift
                  example: work_shift
                weekly_working_hours_v2:
                  type: number
                  description: |-
                    周工作时长
                    - 限制两位小数
                  example: '8'
                working_hours_type_id:
                  type: string
                  description: |-
                    工时制度ID
                    -  可通过[【批量查询工时制度】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/corehr-v1/working_hours_type/list)获取
                  example: '7127921432117937708'
                employee_type_id:
                  type: string
                  description: |-
                    人员类型ID
                    - 可通过[【批量查询人员类型】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/corehr-v1/employee_type/list)获取
                  example: '7127921432117937708'
                department_id:
                  type: string
                  description: |-
                    部门 ID
                    - 可通过[【批量查询部门】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/department/batch_get)获取
                    - 类型与 department_id_type 一致
                  example: '7127921432117937708'
                job_id:
                  type: string
                  description: |-
                    职务 ID
                    - 可通过[【批量查询职务】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/job/list)获取
                  example: '7127921432117937708'
                job_family_id:
                  type: string
                  description: |-
                    序列 ID
                    - 可通过[【批量查询序列】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/corehr-v1/job_family/list)获取
                  example: '7127921432117937708'
                job_level_id:
                  type: string
                  description: |-
                    职级 ID
                    - 可通过[【批量查询职级】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/corehr-v1/job_level/list)获取
                  example: '7127921432117937708'
                job_grade_id:
                  type: string
                  description: |-
                    职等 ID
                    - 可通过[【查询职等】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/job_grade/query)获取
                  example: '7127921432117937708'
                compensation_type:
                  type: string
                  description: |-
                    薪资类型
                    - 可通过[【获取字段详情】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/corehr-v1/custom_field/get_by_param)接口查询，查询参数如下：
                      - object_api_name：job_data
                      - custom_api_name：compensation_type
                  example: daily
                direct_manager_id:
                  type: string
                  description: |-
                    直属上级雇佣 ID
                    - 可通过[【批量查询员工信息】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/employee/batch_get)获取
                    - 类型与 user_id_type 一致
                  example: '7127921432117937708'
                dotted_line_manager_id:
                  type: string
                  description: |-
                    虚线上级雇佣 ID
                    - 可通过[【批量查询员工信息】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/employee/batch_get)获取
                    - 类型与 user_id_type 一致
                  example: '7127921432117937708'
                work_calendar_id:
                  type: string
                  description: |-
                    工作日历 ID
                    - 可通过[【查询工作日历】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/corehr-v1/leave/work_calendar)获取
                  example: '7127921432117937708'
                position_id:
                  type: string
                  description: |-
                    岗位 ID
                    - 功能灰度中，请联系[技术支持](https://applink.feishu.cn/TLJpeNdW)
                  example: '7127921432117937708'
                employment_id:
                  type: string
                  description: |-
                    雇佣 ID
                    - 可通过[【批量查询员工信息】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/employee/batch_get)获取
                    - 类型与 user_id_type 一致
                  example: '7127921432117937708'
                custom_fields:
                  type: array
                  items:
                    type: object
                    properties:
                      field_name:
                        type: string
                        description: 字段名
                        example: name
                      value:
                        type: string
                        description: 字段值，是json转义后的字符串，根据元数据定义不同，字段格式不同(123, 123.23, true, [\"id1\",\"id2\], 2006-01-02 15:04:05])
                        example: Sandy
                    required:
                    - field_name
                    - value
                  description: |-
                    自定义字段
                    - 请参考[【自定义字段说明】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/corehr-v1/custom-fields-guide)
                international_assignment_reason:
                  type: string
                  description: 外派原因说明
                  example: xxx 项目派遣
                description:
                  type: string
                  description: 备注
                  example: xxx 项目
                international_assignment_expected_end_date:
                  type: string
                  description: |-
                    预计结束日期
                    - 格式：yyyy-mm-dd
                  example: '2024-01-02'
                international_assignment_type:
                  type: string
                  description: |-
                    外派类型
                    - 可通过[【获取字段详情】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/corehr-v1/custom_field/get_by_param)接口查询，查询参数如下：
                      - object_api_name：international_assignment
                      - custom_api_name：international_assignment_type
                  example: global_assignment
                effective_time:
                  type: string
                  description: |-
                    开始日期
                    - 格式：yyyy-mm-dd
                  example: '2024-01-02'
                expiration_time:
                  type: string
                  description: |-
                    结束日期
                    - 格式：yyyy-mm-dd
                  example: '2024-01-02'
                international_assignment_allowance:
                  type: boolean
                  description: 是否享有派驻津贴
                  example: 'true'
                accommodation:
                  type: boolean
                  description: 是否提供住宿
                  example: 'true'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schema9'
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - corehr:employees.international_assignment:write
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      - corehr:employment.international_assignment.accommodation:write
      - corehr:employment.international_assignment.compensation_type:write
      - corehr:employment.international_assignment.custom_field:write
      - corehr:employment.international_assignment.international_assignment_allowance:write
      - corehr:employment.international_assignment.job:write
      - corehr:employment.international_assignment.job_grade:write
      - corehr:employment.international_assignment.job_level:write
      - corehr:employment.international_assignment.position:write
      - corehr:employment.international_assignment.service_company:write
      - corehr:employment.international_assignment.weekly_working_hours:write
      - corehr:employment.international_assignment.work_calendar:write
      - corehr:employment.international_assignment.work_location:write
      - corehr:employment.international_assignment.work_shift:write
      - corehr:employment.international_assignment.working_hours_type:write
      x-lark-error-mappings:
      - code: 1160001
        httpCode: 400
        msg: ''
      - code: 1160002
        httpCode: 500
        msg: ''
      - code: 1160002
        httpCode: 500
        msg: ''
      x-lark-rate-limit:
        tier: 7
      x-lark-id-transform:
      - fromTo:
          from: x_department_id
          idType: ''
          idTypeKey: department_id_type
          idTypeSection: 2
          to: lark_id
        key: $.department_id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.direct_manager_id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.dotted_line_manager_id
        section: 0
      - fromTo:
