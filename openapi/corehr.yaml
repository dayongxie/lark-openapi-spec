                            hrbp_ids:
                              type: array
                              items:
                                type: string
                              description: 员工直属 HRBP 雇佣 ID，若员工是部门负责人，且同部门 HRBP 在权限中配置了 HRBP 不可见部门负责人，则在结果中不会出现该 HRBP
                            location_bp_ids:
                              type: array
                              items:
                                type: string
                              description: 员工直属属地 BP 雇佣 ID
                        description: 员工直属 BP 信息，当员工所在部门、属地无 BP 时，会上钻找到最近的 BP
                      employment_all_bps:
                        type: array
                        items:
                          type: object
                          properties:
                            employment_id:
                              type: string
                              description: 员工雇佣 ID
                              example: '6863326262618752123'
                            hrbp_ids:
                              type: array
                              items:
                                type: string
                              description: 员工所在部门及上级部门全部 HRBP 雇佣 ID
                            location_bp_ids:
                              type: array
                              items:
                                type: string
                              description: 员工所在部门及上级部门全部属地 BP 雇佣 ID
