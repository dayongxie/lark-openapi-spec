  /open-apis/corehr/v2/processes/{process_id}/approvers/{approver_id}:
    put:
      operationId: corehr_process_approver_update
      summary: 通过/拒绝审批任务
      tags:
      - process.approver
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/process-approver/update
      parameters:
      - name: process_id
        in: path
        required: true
        schema:
          type: string
        description: 流程实例id
        example: '7328345170959681068'
      - name: approver_id
        in: path
        required: true
        schema:
          type: string
        description: 审批任务id
        example: '7328345235136726572'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - open_id
          - union_id
          - user_id
          - people_corehr_id
          x-enum-descriptions:
            open_id: 标识一个用户在某个应用中的身份。同一个用户在不同应用中的 Open ID 不同。了解更多：如何获取 Open ID
            union_id: 标识一个用户在某个应用开发商下的身份。同一用户在同一开发商下的应用中的 Union ID 是相同的，在不同开发商下的应用中的 Union ID 是不同的。通过 Union ID，应用开发商可以把同个用户在多个应用中的身份关联起来。了解更多：如何获取
              Union ID？
            user_id: 标识一个用户在某个租户内的身份。同一个用户在租户 A 和租户 B 内的 User ID 是不同的。在同一个租户内，一个用户的 User ID 在所有应用（包括商店应用）中都保持一致。User ID 主要用于在不同的应用间打通用户数据。了解更多：如何获取
              User ID？ 默认值：open_id 当值为 user_id，字段权限要求：获取用户 user ID（仅自建应用）
            people_corehr_id: 以飞书人事的 ID 来识别用户
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户 ID 类型
        example: open_id
      - name: department_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - open_department_id
          - department_id
          - people_corehr_department_id
          x-enum-descriptions:
            open_department_id: 以 open_department_id 来标识部门
            department_id: 以 department_id 来标识部门
            people_corehr_department_id: 以 people_corehr_department_id 来标识部门
          default: open_department_id
          x-lark-id-types:
            department_id: department
            open_department_id: department
        description: 此次调用中使用的部门 ID 类型
        example: open_department_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: integer
                  description: 将审批任务修改为同意/拒绝
                  enum:
                  - 2
                  - 3
                  x-enum-descriptions:
                    '2': 拒绝
                    '3': 通过
                  example: '2'
                user_id:
                  type: string
                  description: 按user_id_type类型传递。如果system_approval为false，则必填。否则非必填。
                  example: ou_91791271921729102012
                system_approval:
                  type: boolean
                  description: true - 使用系统身份审批
                  default: false
                  example: 'true'
                reason:
                  type: string
                  description: 通过原因，长度限制为1000
                  example: 原因自定义字符串
                field_values_v2:
                  type: array
                  items:
                    $ref: '#/components/schemas/Item15'
                  description: 表单数据
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      code:
                        type: integer
                        description: 错误码，非 0 表示失败
                        example: '0'
                      msg:
                        type: string
                        description: 错误描述
                        example: 错误原因
                    required:
                    - code
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - corehr:process.instance:write
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      x-lark-error-mappings:
      - code: 1161001
        httpCode: 400
        msg: 审批已被处理
      - code: 1161002
        httpCode: 400
        msg: 参数非法
      - code: 1161003
        httpCode: 403
        msg: 无权限
      - code: 1161004
        httpCode: 400
        msg: 自动提交表单失败
      - code: 1161005
        httpCode: 400
        msg: 审批状态已更新
      - code: 1161002
        httpCode: 400
        msg: 参数非法
      - code: 1161002
        httpCode: 400
        msg: 参数非法
      x-lark-rate-limit:
        tier: 10
      x-lark-id-transform:
      - fromTo:
          from: x_user_id
          idType: ''
