  /open-apis/corehr/v1/leaves/work_calendar:
    post:
      operationId: corehr_leave_work_calendar
      summary: 获取工作日历
      tags:
      - leave
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/corehr-v1/leave/work_calendar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                wk_calendar_ids:
                  type: array
                  items:
                    type: string
                  description: 工作日历ID列表
                wk_calendar_id_gt:
                  type: string
                  description: 工作日历ID大于
                  example: '12344'
                wk_option:
                  type: object
                  properties:
                    count:
                      type: boolean
                      description: 是否返回符合条件的工作日历总数
                      example: 'false'
                    offset:
                      type: integer
                      description: 分页查询的位移，从0开始
                      example: '0'
                    limit:
                      type: integer
                      description: 分页查询 单次查询数量
                      example: '20'
                    sort_options:
                      type: array
                      items:
                        type: object
                        properties:
                          sort_field:
                            type: string
                            description: 排序字段
                            example: wk_id
                          sort_order:
                            type: integer
                            description: 排序顺序
                            enum:
                            - 0
                            - 1
                            x-enum-descriptions:
                              '0': 升序
                              '1': 降序
                            example: '0'
                          sort_i18n:
                            type: integer
                            description: 0=中文关键字;1=英文关键字;2=拼音
                            enum:
                            - 0
                            - 1
                            - 2
                            x-enum-descriptions:
                              '0': 中文关键字
                              '1': 英文关键字
                              '2': 拼音
                            example: '1'
                          sort_by_strand_length:
                            type: boolean
                            description: 按某个字段的层级深度排序
                            example: 'false'
                          sort_by_pinyin:
                            type: boolean
                            description: 是否按照拼音排序
                            example: 'false'
                          sort_by_enum_value_order:
                            type: boolean
                            description: 是否按照枚举类型 value_order 排序
                            example: 'false'
                      description: 排序
                  required:
                  - limit
                  description: 分页、排序等选项
                only_enable:
                  type: boolean
                  description: 是否只返回启用的工作日历，不填默认true
                  default: true
                  example: 'true'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      work_calendars:
                        type: array
                        items:
                          type: object
                          properties:
                            calendar_id:
                              type: string
                              description: 工作日历ID
                              example: '123456'
                            calendar_name:
                              type: object
                              properties:
                                zh_cn:
                                  type: string
                                  description: 中文值
                                  example: 日历1
                                en_us:
                                  type: string
                                  description: 英文值
                                  example: calendar1
                              description: 工作日历名称
                            enable:
                              type: boolean
                              description: 工作日历是否启用
                              example: 'true'
                          required:
                          - calendar_id
                          - enable
                        description: 工作日历列表
                      count:
                        type: integer
                        description: 入参count=true，则返回符合条件的工作日历总数
                        example: '20'
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - corehr:corehr:readonly
      - corehr:common_data.basic_data:read
      - corehr:employee:read
      - corehr:work_calendar:read
      x-lark-error-mappings:
      - code: 1160501
        httpCode: 200
        msg: 内部错误
      x-lark-rate-limit:
        tier: 3
