                            description: 授予记录的更新人，值为更新人的员工 ID
                            example: '123456789'
                          section_type:
                            type: integer
                            description: 是否参与折算
                            example: '1'
                        required:
                        - id
                        - employment_id
                        - leave_type_id
                        - granting_quantity
                        - granting_unit
                        - effective_date
                        - expiration_date
                        - granted_by
                        - reason
                        - created_at
                        - created_by
                        - updated_at
                        - updated_by
                        description: 假期授予记录
