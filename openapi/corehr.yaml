                object_api_name:
                  type: string
                  description: 自定义组织类型编码
                  example: custom_org_03
                custom_org_with_rates:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        description: 自定义组织id
                        example: '7382048365313261588'
                      rate:
                        type: string
                        description: 比例
                        example: '50.01'
                    required:
                    - id
                  description: 自定义组织列表
                start_reason:
                  type: string
                  description: 变更原因
                  example: 开放平台变更
                effective_time:
                  type: string
                  description: 生效时间
                  example: '2024-06-01'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      job_data_custom_org_id:
