        httpCode: 400
        msg: Incorrect email format, work email need to be lowercase
      - code: 1161122
        httpCode: 400
        msg: Incorrect email format, special character in work email
      - code: 1161123
        httpCode: 400
        msg: Incorrect email format
      - code: 1161124
        httpCode: 400
        msg: Incorrect email format, the total length of the email exceeds 20 characters
      - code: 1161125
        httpCode: 400
        msg: Work email already exists in the account LDAP
      - code: 1161126
