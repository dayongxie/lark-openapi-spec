  /open-apis/corehr/v2/pre_hires/restore_flow_instance:
    post:
      operationId: corehr_pre_hire_restore_flow_instance
      summary: 恢复入职
      tags:
      - pre_hire
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/pre_hire/restore_flow_instance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pre_hire_id:
                  type: string
                  description: 待入职ID，可从待入职列表接口获取
                  example: '7345005664477775407'
                confirm_workforce:
                  type: boolean
                  description: 是否强制占编；true为强制占编；false为非强制占编
                  example: 'false'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                        description: 是否成功恢复入职
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - corehr:pre_hire:restore_flow_instance
      x-lark-error-mappings:
      - code: 1161001
        httpCode: 400
        msg: param is invalid
      - code: 1161000
        httpCode: 500
        msg: Server system error
      - code: 1161204
        httpCode: 503
        msg: Requset timeout
      - code: 1161604
        httpCode: 429
        msg: QPS over limit
      - code: 1161116
        httpCode: 400
        msg: A conflict occurred as multiple people are operating at the same time. Please refresh the page and try again
          later.
      - code: 1161097
        httpCode: 400
        msg: Permission denied, please contact the administrator.
      - code: 1161105
        httpCode: 400
        msg: You don't have the permission to view the prehire, or the prehire does not exist
      - code: 1161129
        httpCode: 400
        msg: ''
      - code: 1161063
        httpCode: 400
        msg: workforce has exceed
      - code: 1161034
        httpCode: 400
        msg: Incorrect work email format. Please fill in a valid email address.
      - code: 1161035
        httpCode: 400
        msg: Incorrect work email domain.
      - code: 1161036
        httpCode: 400
        msg: Work email is duplicate with an active individual in the system.
      - code: 1161118
        httpCode: 400
        msg: Work email is duplicate with the existing mailbox in the Feishu business mailbox.
      - code: 1161119
        httpCode: 400
        msg: Work email is duplicate with an offboarded individual in the system, can be viewed in the Feishu Enterprise Mailbox
          Recycle Bin.
      - code: 1161120
        httpCode: 400
        msg: Currently, there is no permission to edit the work email of the person being operated on. You can modify the
          address book settings by accessing the application permissions in the 'Feishu HR Application Management' interface
          within the 'Feishu Management Backend'
