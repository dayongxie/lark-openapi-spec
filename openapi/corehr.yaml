  /open-apis/corehr/v1/job_datas:
    post:
      operationId: corehr_job_data_create
      summary: 创建任职信息
      tags:
      - job_data
      description: 创建任职信息数据
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/corehr-v1/job_data/create
      parameters:
      - name: client_token
        in: query
        required: false
        schema:
          type: string
        description: 根据client_token是否一致来判断是否为同一请求
        example: '12454646'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          - people_corehr_id
          x-enum-descriptions:
            user_id: 以 user_id 来识别用户
            union_id: 以 union_id 来识别用户
            open_id: 以 open_id 来识别用户
            people_corehr_id: 以飞书人事的 ID 来识别用户
          default: people_corehr_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户 ID 类型
        example: people_corehr_id
      - name: department_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - open_department_id
          - department_id
          - people_corehr_department_id
          x-enum-descriptions:
            open_department_id: 以 open_department_id 来标识部门
            department_id: 以 department_id 来标识部门
            people_corehr_department_id: 以 people_corehr_department_id 来标识部门
          default: people_corehr_department_id
          x-lark-id-types:
            department_id: department
            open_department_id: department
        description: 此次调用中使用的部门 ID 类型
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                job_level_id:
                  type: string
                  description: 级别
                  example: '6890452208593372679'
                job_grade_id:
                  type: string
                  description: 职等ID
                  example: '6890452208593372679'
                employee_type_id:
                  type: string
                  description: 雇员类型
                  example: '6890452208593372679'
                working_hours_type_id:
                  type: string
                  description: 工时制度
                  example: '6890452208593372679'
                work_location_id:
                  type: string
                  description: 工作地点
                  example: '6890452208593372679'
                department_id:
                  type: string
                  description: 部门
                  example: '6890452208593372679'
                job_id:
                  type: string
                  description: 职务
                  example: '6890452208593372679'
                probation_start_date:
                  type: string
                  description: 试用期开始日期
                  example: '2018-03-16T00:00:00'
                probation_end_date:
                  type: string
                  description: 试用期
                  example: '2019-05-24T00:00:00'
                primary_job_data:
                  type: boolean
                  description: 主任职
                  example: 'true'
                employment_id:
                  type: string
                  description: Employment ID
                  example: '6893014062142064135'
                effective_time:
                  type: string
                  description: 生效时间
                  example: '2020-05-01 00:00:00'
                expiration_time:
                  type: string
                  description: 失效时间
                  example: '2020-05-02 00:00:00'
                job_family_id:
                  type: string
                  description: 职务分类 ID
                  example: '1245678'
                assignment_start_reason:
                  type: object
                  properties:
                    enum_name:
                      type: string
                      description: 枚举值
                      example: phone_type
                  required:
                  - enum_name
                  description: 任职原因
                  example: onboarding
                probation_expected_end_date:
                  type: string
                  description: 试用期结束日期
                  example: '2006-01-02'
                weekly_working_hours:
                  type: integer
                  description: 周工作时长
                  example: '30'
