  /open-apis/corehr/v2/positions/active:
    post:
      operationId: corehr_position_active
      summary: 启停用岗位
      tags:
      - position
      description: 启/停用岗位
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/position/active
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                position_id:
                  type: string
                  description: 岗位ID
                  example: '6862995757234914823'
                active:
                  type: boolean
                  description: 启用停用状态
                  example: 'true'
                effective_time:
                  type: string
                  description: 生效时间
                  example: '2020-01-01'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - corehr:position:write
      x-lark-error-mappings:
      - code: 1160285
        httpCode: 400
        msg: Failed to disable as it still has active employees after the deactivation effective time.
      - code: 1160267
        httpCode: 400
        msg: Activation date cannot be earlier than the effective date of the last deactivated version
      - code: 1160104
        httpCode: 400
        msg: Record doesn't exist
      - code: 1160281
        httpCode: 400
        msg: Failed to disable as 1 or more members of it are in a job status change process after the current deactivation
          date
      - code: 1160269
        httpCode: 400
        msg: Effective date can't be later than the year 9999
      - code: 1160353
        httpCode: 400
        msg: Effective Date cannot earlier than 1900
      - code: 1160501
        httpCode: 400
        msg: Failed to disable as it still has sub position(s) after the deactivation effective time.
      - code: 1160508
        httpCode: 400
        msg: Failed to disable. As the position still has pre-hires after the deactivation effective time.
      - code: 1160501
        httpCode: 400
        msg: Failed to disable this position as it still has sub position after the deactivation effective time.
      - code: 1160281
        httpCode: 400
        msg: 1 or more members are in a job status change process after the current deactivation date
      - code: 1160508
        httpCode: 400
        msg: Still has an individual to be onboarded after the current deactivation date
      - code: 1160268
        httpCode: 400
        msg: Effective date for disabling the position can't be earlier than the effective date of the last version
      - code: 1161200
        httpCode: 400
        msg: There are still enabled subordinates on the current deactivation date
      - code: 1160266
        httpCode: 400
        msg: Effective date must be later than the first effective date
      - code: 1161604
        httpCode: 429
        msg: QPS over limit
      x-lark-rate-limit:
        tier: 6
