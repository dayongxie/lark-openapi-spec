          idTypeKey: department_id_type
          idTypeSection: 2
          to: lark_id
        key: $.field_values_v2[*].variable_value.department_value
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.field_values_v2[*].variable_value.employment_value
