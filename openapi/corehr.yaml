  /open-apis/corehr/v2/processes:
    get:
      operationId: corehr_process_list
      summary: 查询流程实例列表
      tags:
      - process
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/process/list
      parameters:
      - name: statuses
        in: query
        required: false
        schema:
          type: array
          items:
            type: integer
        description: 查询流程状态列表。
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该 page_token 获取查询结果
        example: '7278949005675988535'
      - name: page_size
        in: query
        required: true
        schema:
          type: integer
        description: 分页大小
        example: '100'
      - name: modify_time_from
        in: query
        required: true
        schema:
          type: string
        description: 查询开始时间（unix毫秒时间戳），闭区间，开始时间和结束时间跨度不能超过31天
        example: '1547654251506'
      - name: modify_time_to
        in: query
        required: true
        schema:
          type: string
        description: 1. 任务查询结束时间，闭区间 2. 单位：ms。从1970年1月1日(UTC/GMT的午夜) 开始经过的毫秒数 3. 注意：开始时间和结束时间跨度不能超过31天 4. 示例值：1719549169735
        example: '1547654251506'
      - name: flow_definition_id
        in: query
        required: false
        schema:
          type: string
        description: 流程定义ID
        example: people_6961286846093788680_7081951411982077732
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      process_ids:
                        type: array
                        items:
                          type: string
                        description: 流程实例ID列表
                      has_more:
                        type: boolean
                        description: 是否还有更多项
                        example: 'true'
                      page_token:
                        type: string
                        description: 有更多项时的分页键
                        example: '7278949005675988535'
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - corehr:process:read
      x-lark-error-mappings:
      - code: 1160101
        httpCode: 400
        msg: invalid param
      - code: 1160500
        httpCode: 500
        msg: system error
      - code: 1160102
        httpCode: 500
        msg: 系统异常
      - code: 1160101
        httpCode: 400
        msg: invalid param
      - code: 1160101
        httpCode: 400
        msg: invalid param
      x-lark-rate-limit:
        tier: 2
      x-lark-pagination: true
  /open-apis/corehr/v2/process_revoke/{process_id}:
    put:
      operationId: corehr_process_revoke_update
      summary: 撤销流程
      tags:
      - process_revoke
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/process_revoke/update
      parameters:
      - name: process_id
        in: path
        required: true
        schema:
          type: string
        description: 流程实例id
        example: '7328345170959681068'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - open_id
          - union_id
          - user_id
          - people_corehr_id
          x-enum-descriptions:
            open_id: 标识一个用户在某个应用中的身份。同一个用户在不同应用中的 Open ID 不同。了解更多：如何获取 Open ID
            union_id: 标识一个用户在某个应用开发商下的身份。同一用户在同一开发商下的应用中的 Union ID 是相同的，在不同开发商下的应用中的 Union ID 是不同的。通过 Union ID，应用开发商可以把同个用户在多个应用中的身份关联起来。了解更多：如何获取
              Union ID？
            user_id: 标识一个用户在某个租户内的身份。同一个用户在租户 A 和租户 B 内的 User ID 是不同的。在同一个租户内，一个用户的 User ID 在所有应用（包括商店应用）中都保持一致。User ID 主要用于在不同的应用间打通用户数据。了解更多：如何获取
              User ID？ 默认值：open_id 当值为 user_id，字段权限要求：获取用户 user ID（仅自建应用）
            people_corehr_id: people corehr系统的用户id
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户 ID 类型
        example: open_id
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
                  description: 按照指定的用户ID类型传递对应的用户ID。
                  example: ou_91791271921729102012
                reason:
                  type: string
                  description: 原因
                  example: 原因自定义字符串
                system_user:
                  type: boolean
                  description: true-系统身份操作
                  default: false
                  example: 'true'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - corehr:process.instance:write
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      x-lark-error-mappings:
      - code: 1160101
        httpCode: 400
        msg: 参数错误
      - code: 1161003
        httpCode: 403
        msg: 无权限
      - code: 1160100
        httpCode: 400
        msg: 流程不存在
      - code: 1161007
        httpCode: 400
        msg: 流程不能撤销
      - code: 1160101
        httpCode: 400
        msg: 参数错误
      - code: 1160101
        httpCode: 400
        msg: 参数错误
      - code: 1161008
        httpCode: 400
        msg: Process cannot be revoked
      x-lark-rate-limit:
        tier: 9
      x-lark-id-transform:
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.user_id
        section: 0
