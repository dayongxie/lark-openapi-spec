  /open-apis/corehr/v2/pre_hires/query:
    post:
      operationId: corehr_pre_hire_query
      summary: 查询待入职信息
      tags:
      - pre_hire
      description: 批量查询待入职数据
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/pre_hire/query
      parameters:
      - name: page_size
        in: query
        required: true
        schema:
          type: integer
        description: 分页大小，最大 10
        example: '10'
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该 page_token 获取查询结果
        example: '6891251722631890445'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          - people_corehr_id
          x-enum-descriptions:
            user_id: 以 user_id 来识别用户
            union_id: 以 union_id 来识别用户
            open_id: 以 open_id 来识别用户
            people_corehr_id: 以飞书人事的 ID 来识别用户
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户 ID 类型
        example: open_id
      - name: department_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - open_department_id
          - department_id
          - people_corehr_department_id
          x-enum-descriptions:
            open_department_id: 以 open_department_id 来标识部门
            department_id: 以 department_id 来标识部门
            people_corehr_department_id: 以 people_corehr_department_id 来标识部门
          default: open_department_id
          x-lark-id-types:
            department_id: department
            open_department_id: department
        description: 此次调用中使用的部门 ID 类型
        example: open_department_id
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                pre_hire_ids:
                  type: array
                  items:
                    type: string
                  description: 待入职人员 ID 列表；如果该字段非空，则不按照page_size、page_token分页方式查询
                fields:
                  type: array
                  items:
                    type: string
                  description: |-
                    返回数据的字段列表，填写方式：
                    - 为空时只返回 pre_hire_id
                    - 不为空时按照传入的字段返回数据，格式如下：
                        - person_info 字段：person_info.gender，person_info.age
                        - employment_info 字段：employment_info.department
                        - onboarding_info 字段：onboarding_info.onboarding_date
                        - probation_info 字段：probation_info.probation_period
                        - contract_info 字段：contract_info.contract_type
                    - 如果要返回所有下级，只用传上级结构体名称，例如 person_info
                    - 返回数据越多，查询接口性能越慢，请按需填写返回字段
                  example: \["person_info","employment_info.department","probation_info.probation_period"\]
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            person_info:
                              allOf:
                              - $ref: '#/components/schemas/PersonInfo'
                              description: 个人信息
                            employment_info:
                              allOf:
                              - $ref: '#/components/schemas/EmploymentInfo'
                              description: 工作信息
                            onboarding_info:
                              type: object
                              properties:
                                offer_id:
                                  type: string
                                  description: Offer id , 可以通过招聘【获取 Offer 列表】接口获取
                                  example: '7032210902531327521'
                                offer_hr_id:
                                  type: string
                                  description: Offer hr 的 雇佣 ID
                                  example: '7032210902531327521'
                                offer_hr_id_v2:
                                  type: string
                                  description: Offer hr 的 雇佣 ID,ID可以根据user_id_type转换成对应ID
                                  example: '7032210902531327521'
                                entry_mode:
                                  type: string
                                  description: -| 入职方式，枚举值可查询【获取字段详情】接口获取，按如下参数查询即可： - object_api_name = "pre_hire" - custom_api_name
                                    = "onboarding_method"
                                  example: onsite
                                onboarding_date:
                                  type: string
                                  description: 入职日期
                                  example: '2022-10-08'
                                ats_application_id:
                                  type: string
                                  description: 招聘投递 ID ，详细信息可以通过招聘【获取投递信息】接口查询获得
                                  example: '7140946969586010376'
                                recruitment_type:
                                  type: string
                                  description: -| 招聘来源 ，枚举值可查询【获取字段详情】接口获取，按如下参数查询即可： - object_api_name = "pre_hire" - custom_api_name
                                    = "recruitment_type"
                                  example: recent_graduates
                                onboarding_location_id:
                                  type: string
                                  description: -| 入职地点id , 详细信息可通过【批量查询地点】接口获得
                                  example: '6977976687350924832'
                                company_sponsored_visa:
                                  type: boolean
                                  description: -| 需要公司办理签证
                                  example: 'true'
                                onboarding_status:
                                  type: string
                                  description: -| 入职状态
                                  enum:
                                  - preboarding
                                  - deleted
                                  - day_one
                                  - withdrawn
                                  - completed
                                  x-enum-descriptions:
                                    preboarding: 待入职
                                    deleted: 已删除
                                    day_one: 准备就绪
                                    withdrawn: 已撤销
                                    completed: 已完成
                                onboarding_task_list:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      task_name:
                                        type: string
                                        description: 任务名称
                                        example: task_1
                                      task_status:
                                        type: string
                                        description: 任务名称
                                        enum:
                                        - initiating
                                        - terminated
                                        - exception
                                        - in_progress
                                        - not_started
                                        - skipped
                                        - uninitialized
                                        - failed
                                        - in_review
                                        - rejected
                                        - completed
                                        x-enum-descriptions:
                                          initiating: 发起中
                                          terminated: 已终止
                                          exception: 异常
                                          in_progress: 进行中
                                          not_started: 未开始
                                          skipped: 已跳过
                                          uninitialized: 未初始化
                                          failed: 已失败
                                          in_review: 审核中
                                          rejected: 已退回
                                          completed: 已完成
                                      operator_id:
                                        type: string
                                        description: 当前操作人雇佣 ID
                                        example: '7032210902531327521'
                                      task_code:
                                        type: string
                                        description: 任务code
                                        example: task_11
                                      current_operators:
                                        type: array
                                        items:
                                          type: string
                                        description: 当前操作人雇佣 ID 列表
                                  description: 入职任务列表
                                onboarding_address:
                                  allOf:
                                  - $ref: '#/components/schemas/Address'
                                  description: 入职地址
                                flow_name:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      lang:
                                        type: string
                                        description: 语言编码（IETF BCP 47）
                                        example: zh-CN
                                      value:
                                        type: string
                                        description: 文本内容
                                        example: 中文示例
                                    required:
                                    - lang
                                    - value
                                  description: 入职流程
                                flow_id:
                                  type: string
                                  description: 入职流程 ID
                                  example: '2342352325'
                                check_in_time:
                                  type: string
                                  description: 签到时间
                                  example: '2023-09-01 13:21:12'
                                check_in_method:
                                  type: object
                                  properties:
                                    enum_name:
                                      type: string
                                      description: 枚举值
                                      example: phone_type
                                    display:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          lang:
                                            type: string
                                            description: 语言编码（IETF BCP 47）
                                            example: zh-CN
                                          value:
                                            type: string
                                            description: 文本内容
                                            example: 中文示例
                                        required:
                                        - lang
                                        - value
                                      description: 枚举多语展示
                                  required:
                                  - enum_name
                                  description: -| 招聘来源 ，枚举值可查询【获取字段详情】接口获取，按如下参数查询即可： - object_api_name = "pre_hire" - custom_api_name
                                    = "check_in_method"
                                withdrawn_reason:
                                  type: string
                                  description: 撤销原因：当流程状态为撤销时,在fields中传入onboarding_info.withdrawn_reason字段，可获取撤销原因
                                  example: 撤销原因
                              description: 入职信息
                            probation_info:
                              type: object
                              properties:
                                probation_start_date:
                                  type: string
                                  description: 试用期开始日期
                                  example: '2022-07-29'
                                probation_end_date:
                                  type: string
                                  description: 试用期结束日期
                                  example: '2023-04-07'
                                probation_period:
                                  type: integer
                                  description: 试用期时长（单位：天）
                                  example: '6'
                              description: 试用期信息
                            contract_info:
                              allOf:
                              - $ref: '#/components/schemas/ContractInfo'
                              description: 合同信息
                            pre_hire_id:
                              type: string
                              description: 待入职 id
                              example: '7032210902531327521'
                        description: 查询待入职的信息
                      page_token:
                        type: string
                        description: 下一页页码
