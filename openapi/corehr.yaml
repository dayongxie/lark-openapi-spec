                  description: 更新待入职（prehire）信息
                standard_update_fields:
                  type: array
                  items:
                    type: string
                  description: |-
                    指定需要更新的系统字段，只支持最多下钻一层，格式如下：
                     - basic_info_update字段：basic_info_update.name（对name整体进行覆盖更新）；basic_info_update.emails（对邮箱整体进行更新）
                     - offer_info_update字段：offer_info_update.onboarding_method
                     - 招聘ID：ats_application_id
                  example: \["basic_info_update.names","offer_info_update.onboarding_method"\]
                custom_update_fields:
                  type: array
                  items:
                    type: string
                  description: |-
                    指定需要更新的PreHire对象上的自定义字段，格式如下：
                     - custom_field1__c
                  example: \["custom_field1__c","custom_field2__c"\]
                person_custom_update_fields:
                  type: array
                  items:
                    type: string
                  description: |-
                    指定需要更新的Person对象上的自定义字段，格式如下：
                     - custom_field1__c
                  example: \["custom_field1__c","custom_field2__c"\]
      responses:
