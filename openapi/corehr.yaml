  /open-apis/corehr/v2/approvers:
    get:
      operationId: corehr_approver_list
      summary: 获取指定人员审批任务列表
      tags:
      - approver
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/approver/list
      parameters:
      - name: page_size
        in: query
        required: true
        schema:
          type: integer
          default: 20
        description: 分页大小
        example: '20'
      - name: page_token
        in: query
        required: false
        schema:
          type: string
          default: '1'
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该 page_token 获取查询结果
        example: '1'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          - people_corehr_id
          x-enum-descriptions:
            user_id: 以 user_id 来识别用户
            union_id: 以 union_id 来识别用户
            open_id: 以 open_id 来识别用户
            people_corehr_id: 以飞书人事的 ID 来识别用户
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户 ID 类型
        example: open_id
      - name: user_id
        in: query
        required: true
        schema:
          type: string
        description: 按user_id_type类型传递。如果system_approval为false，则必填。否则非必填。
        example: ou_91791271921729102012
      - name: approver_status
        in: query
        required: false
        schema:
          type: integer
          enum:
          - -2
          - -1
          - 0
          - 1
          - 2
          - 3
          - 4
          - 5
          - 6
          - 12
