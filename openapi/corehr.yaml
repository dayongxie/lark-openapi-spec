  /open-apis/corehr/v2/approval_groups/open_query_position_change_list_by_ids:
    post:
      operationId: corehr_approval_groups_open_query_position_change_list_by_ids
      summary: 批量查询岗位调整内容
      tags:
      - approval_groups
      description: 获取岗位调整信息详情
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/approval_groups/open_query_position_change_list_by_ids
      parameters:
      - name: process_id
        in: query
        required: true
        schema:
          type: string
        description: 组织架构调整流程 ID
        example: '6893014062142064111'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          - people_corehr_id
          x-enum-descriptions:
            user_id: 以 user_id 来识别用户
            union_id: 以 union_id 来识别用户
            open_id: 以 open_id 来识别用户
            people_corehr_id: 以飞书人事的 ID 来识别用户
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户 ID 类型
        example: open_id
      - name: department_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - open_department_id
          - department_id
          - people_corehr_department_id
          x-enum-descriptions:
            open_department_id: 以 open_department_id 来标识部门
            department_id: 以 department_id 来标识部门
            people_corehr_department_id: 以 people_corehr_department_id 来标识部门
          default: open_department_id
          x-lark-id-types:
            department_id: department
            open_department_id: department
        description: 此次调用中使用的部门 ID 类型
        example: open_department_id
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                position_change_ids:
                  type: array
                  items:
                    type: string
                  description: 岗位调整记录 ID List
                need_department_path:
                  type: boolean
                  description: 是否返回部门全路径
                  default: false
                  example: 'false'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      position_changes:
                        type: array
                        items:
                          type: object
                          properties:
                            position_change_id:
                              type: string
                              description: 岗位调整记录 ID
                              example: '6991776076699549697'
                            position_id:
                              type: string
                              description: 岗位 ID
                              example: '6966236933198579208'
                            draft_position_id:
                              type: string
                              description: 调整过程岗位 ID 。对于在本次调整中新建的岗位，在调整未生效前会返回格式为 td_xxx 的过程岗位 ID，生效后将返回正式的岗位 ID
                              example: '6966236933198579208'
                            position_change_type:
                              type: string
                              description: 调整类型
                              enum:
                              - Unknown
                              - Create
                              - Modify
                              - Inactive
                              x-enum-descriptions:
                                Unknown: 未知
                                Create: 新建
                                Modify: 编辑
                                Inactive: 停用
                              example: Create
                            position_adjustment_info:
                              type: object
                              properties:
                                original_job_families:
                                  type: array
                                  items:
                                    type: string
                                  description: 原序列 ID
                                target_job_families:
                                  type: array
                                  items:
                                    type: string
                                  description: 新序列 ID
                                original_department:
                                  type: string
                                  description: 原所属部门 ID
                                  example: '6974659700705068581'
                                target_department:
                                  type: string
                                  description: 新所属部门 ID
                                  example: '6974659700705068581'
                                target_draft_department:
                                  type: string
                                  description: 新所属部门 ID，新建部门审批完成前会返回 td_xxx 的临时 ID
                                  example: '6974659700705068581'
                                original_cost_center:
                                  type: string
                                  description: 原岗位默认成本中心 ID
                                  example: '6974659700705068581'
                                target_cost_center:
                                  type: string
                                  description: 新岗位默认成本中心 ID
                                  example: '6974659700705068581'
                                original_working_hours_type:
                                  type: string
                                  description: 原工时制度 ID
                                  example: '6974659700705068581'
                                target_working_hours_type:
                                  type: string
                                  description: 新工时制度 ID
                                  example: '6974659700705068581'
                                original_job:
                                  type: string
                                  description: 原职务 ID
                                  example: '6974659700705068581'
                                target_job:
                                  type: string
                                  description: 新职务 ID
                                  example: '6974659700705068581'
                                original_is_key_position:
                                  type: boolean
                                  description: 原是否关键岗位
                                  example: 'true'
                                target_is_key_position:
                                  type: boolean
                                  description: 新是否关键岗位
                                  example: 'true'
                                original_employee_types:
                                  type: array
                                  items:
                                    type: string
                                  description: 原人员类型 ID
                                target_employee_types:
                                  type: array
                                  items:
                                    type: string
                                  description: 新人员类型 ID
                                original_names:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      lang:
                                        type: string
                                        description: 语言编码（IETF BCP 47）
                                        example: zh-CN
                                      value:
                                        type: string
                                        description: 文本内容
                                        example: 中文示例
                                    required:
                                    - lang
                                    - value
                                  description: 原名称
                                target_names:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      lang:
                                        type: string
                                        description: 语言编码（IETF BCP 47）
                                        example: zh-CN
                                      value:
                                        type: string
                                        description: 文本内容
                                        example: 中文示例
                                    required:
                                    - lang
                                    - value
                                  description: 新名称
                                original_job_grades:
                                  type: array
                                  items:
                                    type: string
                                  description: 原职等 ID
                                target_job_grades:
                                  type: array
                                  items:
                                    type: string
                                  description: 新职等 ID
                                original_code:
                                  type: string
                                  description: 原编码
                                  example: P00000456
                                target_code:
                                  type: string
                                  description: 新编码
                                  example: P00000456
                                original_job_levels:
                                  type: array
                                  items:
                                    type: string
                                  description: 原职级 ID
                                target_job_levels:
                                  type: array
                                  items:
                                    type: string
                                  description: 新职级 ID
                                original_active:
                                  type: boolean
                                  description: 原状态
                                  example: 'true'
                                target_active:
                                  type: boolean
                                  description: 新状态
                                  example: 'true'
                                original_direct_leader:
                                  type: string
                                  description: 原直线上级（岗位） ID
                                  example: '6974659700705068581'
                                target_direct_leader:
                                  type: string
                                  description: 新直线上级（岗位） ID
                                  example: '6974659700705068581'
                                target_draft_direct_leader:
                                  type: string
                                  description: 新直线上级（岗位） ID，新建岗位审批完成前会返回 td_xxx 的临时 ID
                                  example: '6974659700705068581'
                                original_work_locations:
                                  type: array
                                  items:
                                    type: string
                                  description: 原工作地点 ID
                                target_work_locations:
                                  type: array
                                  items:
                                    type: string
                                  description: 新工作地点 ID
                                original_descriptions:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      lang:
                                        type: string
                                        description: 语言编码（IETF BCP 47）
                                        example: zh-CN
                                      value:
                                        type: string
                                        description: 文本内容
                                        example: 中文示例
                                    required:
                                    - lang
                                    - value
                                  description: 原描述
                                target_descriptions:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      lang:
                                        type: string
                                        description: 语言编码（IETF BCP 47）
                                        example: zh-CN
                                      value:
                                        type: string
                                        description: 文本内容
                                        example: 中文示例
                                    required:
                                    - lang
                                    - value
                                  description: 新描述
                                original_department_id_paths:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      department_id:
                                        type: string
                                        description: 部门 ID ，新建部门审批通过前会返回空值
                                        example: '6974659700705068581'
                                      draft_department_id:
                                        type: string
                                        description: 调整部门 ID ，新建部门审批通过前会返回格式为 td_xxx 的临时 ID
                                        example: '6974659700705068581'
                                  description: 原部门全路径，从根部门开始自上而下返回部门 ID 列表
                                target_department_id_paths:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      department_id:
                                        type: string
                                        description: 部门 ID ，新建部门审批通过前会返回空值
                                        example: '6974659700705068581'
                                      draft_department_id:
                                        type: string
                                        description: 调整部门 ID ，新建部门审批通过前会返回格式为 td_xxx 的临时 ID
                                        example: '6974659700705068581'
                                  description: 新部门全路径，从根部门开始自上而下返回部门 ID 列表
                                custom_fields:
                                  type: array
                                  items:
                                    $ref: '#/components/schemas/Item54'
                                  description: 自定义字段
