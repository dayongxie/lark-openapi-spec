  /open-apis/corehr/v2/probation/assessments:
    post:
      operationId: corehr_probation_assessment_create
      summary: 新增试用期考核信息
      tags:
      - probation.assessment
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/probation-assessment/create
      parameters:
      - name: client_token
        in: query
        required: false
        schema:
          type: string
        description: 根据 client_token 是否一致来判断是否为同一请求
        example: '6822122262122064111'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          - people_corehr_id
          x-enum-descriptions:
            user_id: 以 user_id 来识别用户
            union_id: 以 union_id 来识别用户
            open_id: 以 open_id 来识别用户
            people_corehr_id: 以飞书人事的 ID 来识别用户
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户 ID 类型
        example: open_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                employment_id:
                  type: string
                  description: 试用期人员的雇佣 ID
                  example: '7140964208476371111'
                assessments:
                  type: array
                  items:
                    type: object
                    properties:
                      assessment_status:
                        type: string
                        description: 考核状态
                        enum:
                        - not_started
                        - in_process
                        - completed
                        - no_need
                        x-enum-descriptions:
                          not_started: 未开始
                          in_process: 进行中
                          completed: 已完成
                          no_need: 无需考核
                        example: completed
                      assessment_result:
                        type: string
                        description: 试用期考核结果
                        enum:
                        - approved
                        - rejected
                        x-enum-descriptions:
                          approved: 通过
                          rejected: 不通过
                        example: approved
                      assessment_score:
                        type: number
                        description: 考核得分
                        example: '99.9'
                      assessment_grade:
                        type: string
                        description: 试用期考核等级
                        example: grade_a
                      assessment_comment:
                        type: string
                        description: 考核评语
                        example: 超出预期
                      assessment_detail:
                        type: string
                        description: 考核结果页面超链接
                        example: 暂无示例
                      is_final_asssessment:
                        type: boolean
                        description: 是否为最终考核结果
                        example: 'false'
                    required:
                    - assessment_status
                    - is_final_asssessment
                  description: 试用期考核结果列表
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      assessment_ids:
                        type: array
                        items:
                          type: string
                        description: 创建的试用期考核记录 ID 列表，有序返回
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - corehr:probation.assessment:write
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      x-lark-rate-limit:
        tier: 3
      x-lark-id-transform:
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.employment_id
        section: 0
