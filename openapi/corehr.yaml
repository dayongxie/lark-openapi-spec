  /open-apis/corehr/v1/offboardings/submit:
    post:
      operationId: corehr_offboarding_submit
      summary: 操作员工离职
      tags:
      - offboarding
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/corehr-v1/offboarding/submit
      parameters:
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          - people_corehr_id
          x-enum-descriptions:
            user_id: 以 user_id 来识别用户
            union_id: 以 union_id 来识别用户
            open_id: 以 open_id 来识别用户
            people_corehr_id: 以飞书人事的 ID 来识别用户
          default: people_corehr_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户 ID 类型
        example: people_corehr_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                offboarding_mode:
                  type: integer
                  description: 离职方式
                  enum:
                  - 1
                  x-enum-descriptions:
                    '1': 直接离职
                  example: '1'
                employment_id:
                  type: string
                  description: 雇员 id
                  example: '6982509313466189342'
                offboarding_date:
                  type: string
                  description: 离职日期
                  example: '2022-05-18'
                offboarding_reason_unique_identifier:
                  type: string
                  description: |-
                    离职原因，可通过接口
                    [【查询员工离职原因列表】](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/corehr-v1/offboarding/query)获取
                  example: reason_for_offboarding_option8
                offboarding_reason_explanation:
                  type: string
                  description: 离职原因说明，长度限制6000
                  example: 离职原因说明
                initiator_id:
                  type: string
                  description: 操作发起人 ID（employment_id），为空默认为系统发起。注意：只有操作发起人可以撤销流程
                  example: '6982509313466189341'
                add_block_list:
                  type: boolean
                  description: 是否加入离职屏蔽名单
                  example: 'false'
                block_reason:
                  type: string
                  description: 屏蔽原因
                  example: 红线
                block_reason_explanation:
                  type: string
                  description: 屏蔽原因说明
                  example: xx 年 xx 月 xx 日因 xx 原因红线
                custom_fields:
                  type: array
                  items:
                    type: object
                    properties:
                      field_name:
                        type: string
                        description: 字段名
                        example: name
                      value:
                        type: string
                        description: 字段值，是json转义后的字符串，根据元数据定义不同，字段格式不同(123, 123.23, true, [\"id1\",\"id2\], 2006-01-02 15:04:05])
                        example: Sandy
                    required:
                    - field_name
                    - value
                  description: 自定义字段
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      offboarding_id:
                        type: string
                        description: 离职记录 id
                        example: '7095671727698478604'
                      employment_id:
                        type: string
                        description: 雇员 id
                        example: '6982509313466189342'
                      offboarding_reason_unique_identifier:
                        type: string
                        description: 离职原因
                        example: reason_for_offboarding_option8
                      offboarding_date:
                        type: string
                        description: 离职日期
                        example: '2022-05-18'
                      offboarding_reason_explanation:
                        type: string
                        description: 离职原因说明
                        example: 离职原因说明
                      add_block_list:
                        type: boolean
                        description: 是否加入离职屏蔽名单
                        example: 'false'
                      block_reason:
                        type: string
                        description: 屏蔽原因
                        example: 红线
                      block_reason_explanation:
                        type: string
                        description: 屏蔽原因说明
                        example: xx 年 xx 月 xx 日因 xx 原因红线
                      created_time:
                        type: string
                        description: 创建时间
                        example: '2022-05-09 17:50:17'
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - corehr:corehr
      - corehr:offboarding:write
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      x-lark-error-mappings:
      - code: 1160103
        httpCode: 500
        msg: general internal server error code
      - code: 1160201
        httpCode: 500
        msg: has approving offboarding
      - code: 1160203
        httpCode: 500
        msg: no current contract
      - code: 1160204
        httpCode: 500
        msg: has future contract
      - code: 1160205
        httpCode: 500
        msg: contract has actual end date
      - code: 1160210
        httpCode: 500
        msg: has offboarding record
      - code: 1160602
        httpCode: 500
        msg: offboarding is earlier than probation
      - code: 1160603
        httpCode: 500
        msg: offboarding is earlier than transform
      - code: 1160604
        httpCode: 400
        msg: reason explanation length exceed maximum
      - code: 1160616
        httpCode: 500
        msg: no valid job data
      - code: 1161000
        httpCode: 500
        msg: unknown error
      - code: 1160710
        httpCode: 400
        msg: invalid block list
      - code: 1160200
        httpCode: 400
        msg: has approving transform
      - code: 1160601
        httpCode: 400
        msg: offboarding is earlier than onboarding
      - code: 1160617
        httpCode: 400
        msg: hyperlink field format is illegal
      - code: 1160618
        httpCode: 400
        msg: text field exceeds maximum limit
      - code: 1160619
        httpCode: 400
        msg: enum value of the enum field is invalid
      - code: 1160621
        httpCode: 400
        msg: offboarding reason is required
      - code: 1160622
        httpCode: 400
        msg: offboarding date is required
      - code: 1160631
        httpCode: 400
        msg: employee is not exist or has offboarded
      x-lark-rate-limit:
        tier: 3
      x-lark-id-transform:
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.employment_id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.initiator_id
        section: 0
