                                    - value
                                  description: 入职流程
                                flow_id:
                                  type: string
                                  description: 入职流程 ID
                                  example: '2342352325'
                                check_in_time:
                                  type: string
                                  description: 签到时间
                                  example: '2023-09-01 13:21:12'
                                check_in_method:
                                  type: object
                                  properties:
                                    enum_name:
                                      type: string
                                      description: 枚举值
                                      example: phone_type
                                    display:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          lang:
                                            type: string
                                            description: 语言编码（IETF BCP 47）
                                            example: zh-CN
                                          value:
                                            type: string
                                            description: 文本内容
                                            example: 中文示例
                                        required:
