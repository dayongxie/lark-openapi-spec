    post:
      operationId: corehr_offboarding_search
      summary: 搜索离职信息
      tags:
      - offboarding
      description: 根据 雇佣 ID 查询员工离职信息
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/corehr-v1/offboarding/search
      parameters:
      - name: page_size
        in: query
        required: true
        schema:
          type: integer
        description: 分页大小，最大 100
        example: '100'
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该 page_token 获取查询结果
        example: '6891251722631890445'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          - people_corehr_id
          x-enum-descriptions:
            user_id: 以 user_id 来识别用户
            union_id: 以 union_id 来识别用户
            open_id: 以 open_id 来识别用户
            people_corehr_id: 以飞书人事的 ID 来识别用户
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户 ID 类型
        example: open_id
      - name: department_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - open_department_id
          - department_id
          - people_corehr_department_id
          x-enum-descriptions:
            open_department_id: 以 open_department_id 来标识部门
            department_id: 以 department_id 来标识部门
            people_corehr_department_id: 以 people_corehr_department_id 来标识部门
          default: open_department_id
          x-lark-id-types:
            department_id: department
            open_department_id: department
        description: 此次调用中使用的部门 ID 类型
        example: open_department_id
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                employment_ids:
                  type: array
                  items:
                    type: string
                  description: 雇佣 ID 列表，为空默认查询所有离职人员
                apply_initiating_time_start:
                  type: string
                  description: 离职审批发起时间-搜索范围开始，需要与搜索范围结束一同使用
                  example: '2022-01-01 11:22:33'
                apply_initiating_time_end:
                  type: string
                  description: 离职审批发起时间 - 搜索范围结束
                  example: '2022-01-01 11:22:33'
                apply_finished_time_start:
                  type: string
                  description: 离职审批结束时间 - 搜索范围开始，需要与搜索范围结束一同使用
                  example: '1641007353'
                apply_finished_time_end:
                  type: string
                  description: 离职审批结束时间 - 搜索范围结束
                  example: '1641007353'
                expected_offboarding_date_start:
                  type: string
                  description: 期望离职日期-搜索范围开始，需要与搜索范围结束一同使用
                  example: '2022-01-01'
                expected_offboarding_date_end:
                  type: string
                  description: 期望离职日期 - 搜索范围结束
                  example: '2022-01-01'
                offboarding_date_start:
                  type: string
                  description: 离职日期-搜索范围开始，需要与搜索范围结束一同使用
                  example: '2022-01-01'
                offboarding_date_end:
                  type: string
                  description: 离职日期 - 搜索范围结束
                  example: '2022-01-01'
                statuses:
                  type: array
                  items:
                    type: string
                    enum:
                    - Approving
                    - Approved
                    - Offboarded
                    - Rejected
                    - Withdrawn
                    - NoNeedApproval
                    x-enum-descriptions:
                      Approving: Approving  审批中
                      Approved: Approved  审批通过
                      Offboarded: Offboarded  已离职
                      Rejected: Rejected  已拒绝
                      Withdrawn: Withdrawn  已撤销
                      NoNeedApproval: NoNeedApproval  无需审批
                  description: 离职状态，多个状态之间为「或」的关系
                reasons:
                  type: array
                  items:
                    type: string
                  description: 离职原因列表 , 可以通过【查询员工离职原因列表】接口获取 ，查询时不返回下级原因相关的离职信息
                employee_reasons:
                  type: array
                  items:
                    type: string
                  description: 离职原因（员工）列表 , 可以通过【查询员工离职原因列表】接口获取，查询时不返回下级原因相关的离职信息
                department_ids:
                  type: array
                  items:
                    type: string
                  description: 离职人员部门，多个部门之间为「或」的关系
                select_fields:
                  type: array
                  items:
                    type: string
                  description: 返回数据的字段列表
                filter_str:
                  type: string
                  description: 筛选项json
                  example: abb
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            initiating_type:
                              type: string
                              description: 离职发起类型，包括：
                              example: offboarding_directly
                            status:
                              type: string
                              description: 离职状态
                              enum:
                              - Approving
                              - Approved
                              - Offboarded
                              - Rejected
                              - Withdrawn
                              - NoNeedApproval
                              x-enum-descriptions:
                                Approving: 审批中
                                Approved: 审批通过
