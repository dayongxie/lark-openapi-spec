  /open-apis/corehr/v2/employees/search:
    post:
      operationId: corehr_employee_search
      summary: 搜索员工信息
      tags:
      - employee
      description: 根据 email、工号、个人电话等条件查询员工雇佣信息以及个人基础信息
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/employee/search
      parameters:
      - name: page_size
        in: query
        required: true
        schema:
          type: integer
        description: 分页大小，最大 100
        example: '100'
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该 page_token 获取查询结果
        example: '6891251722631890445'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          - people_corehr_id
          x-enum-descriptions:
            user_id: 以 user_id 来识别用户
            union_id: 以 union_id 来识别用户
            open_id: 以 open_id 来识别用户
            people_corehr_id: 以飞书人事的 ID 来识别用户
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户 ID 类型
        example: open_id
      - name: department_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - open_department_id
          - department_id
          - people_corehr_department_id
          x-enum-descriptions:
            open_department_id: 以 open_department_id 来标识部门
            department_id: 以 department_id 来标识部门
            people_corehr_department_id: 以 people_corehr_department_id 来标识部门
          default: open_department_id
          x-lark-id-types:
            department_id: department
            open_department_id: department
        description: 此次调用中使用的部门 ID 类型
        example: open_department_id
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                fields:
                  type: array
                  items:
                    type: string
                  description: 返回数据的字段列表，填写方式：为空时默认仅返回 ID
                employment_id_list:
                  type: array
                  items:
                    type: string
                  description: 雇佣 ID 列表
                employee_number_list:
                  type: array
                  items:
                    type: string
                  description: 工号列表
                work_email:
                  type: string
                  description: 邮箱，精确匹配查询
                  example: 13312345678@qq.com
                phone_number:
                  type: string
                  description: 个人电话，精确匹配查询
                  example: '16760342300'
                key_word:
                  type: string
                  description: 搜索关键字，支持对邮箱、工号和姓名的模糊匹配
                  example: 张三
                employment_status:
                  type: string
                  description: 雇佣状态
                  enum:
                  - hired
                  - terminated
                  x-enum-descriptions:
                    hired: 在职
                    terminated: 离职
                employee_type_id:
                  type: string
                  description: 人员类型 ID
                  example: '6971090097697521314'
                department_id_list:
                  type: array
                  items:
                    type: string
                  description: 部门 ID，根据员工主职的直接部门查询，可以通过【查询部门】API 获取 部门 ID
                direct_manager_id_list:
                  type: array
                  items:
                    type: string
                  description: 直接上级的雇佣 ID，根据员工主职的直接上级查询
                  example: '7027024823985447820'
                dotted_line_manager_id_list:
                  type: array
                  items:
                    type: string
                  description: 虚线上级的雇佣 ID，根据员工主职的虚线上级查询
                  example: '7027024823985117820'
                regular_employee_start_date_start:
                  type: string
                  description: 转正式员工日期-搜索范围开始
                  example: '2020-01-01'
                regular_employee_start_date_end:
                  type: string
                  description: 转正式员工日期-搜索范围结束
                  example: '2020-01-01'
                effective_time_start:
                  type: string
                  description: 入职日期-搜索范围开始，需要与搜索范围结束一同使用
                  example: '2020-01-01'
                effective_time_end:
                  type: string
                  description: 入职日期-搜索范围结束
                  example: '2020-01-01'
                work_location_id_list_include_sub:
                  type: array
                  items:
                    type: string
                  description: 工作地点 ID 列表，查询属于该工作地点及下级工作地点的员工
                preferred_english_full_name_list:
                  type: array
                  items:
                    type: string
                  description: 常用英文全名精确搜索
                preferred_local_full_name_list:
                  type: array
                  items:
                    type: string
                  description: 常用本地全名精确搜索
                national_id_number_list:
                  type: array
                  items:
                    type: string
                  description: 居民身份证件号码精确搜索
                phone_number_list:
                  type: array
                  items:
                    type: string
                  description: 个人电话列表，精确匹配查询
                email_address_list:
                  type: array
                  items:
                    type: string
                  description: 工作邮箱地址列表，精确匹配查询
                department_id_list_include_sub:
                  type: array
                  items:
                    type: string
                  description: 部门 ID 列表，查询属于该部门及下级部门的员工
                additional_national_id_number_list:
                  type: array
                  items:
                    type: string
                  description: 其他国籍ID列表，精准匹配查询
                citizenship_status_list:
