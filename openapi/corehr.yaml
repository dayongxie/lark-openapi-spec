  /open-apis/corehr/v2/pre_hires/transform_onboarding_task:
    post:
      operationId: corehr_pre_hire_transform_onboarding_task
      summary: 流转入职任务
      tags:
      - pre_hire
      description: 入职常规任务的流转，支持手动开启任务，提交任务以及审批任务
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/pre_hire/transform_onboarding_task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pre_hire_id:
                  type: string
                  description: 待入职ID，可从待入职列表接口获取
                  example: '7345005664477775407'
                task_code:
                  type: string
                  description: 任务的标识ID,入职系统的任务分为预置任务和自定义任务，预置任务的task_code是系统写死的，如职位信息任务的task_code为1，自定义任务的task_code为一串UUID。待入职人员任务的task_code可以通过查询待入职接口获取
                  example: 27691344-699b-47fb-a352-7b41e992a536
                transform_type:
                  type: string
                  description: 流转类型，描述对任务做何种流转，manual_start_task表示手动开启任务，submit_task表示提交任务，review_task表示审批任务
                  example: manual_start_task/submit_task/review_task
                review_decision:
                  type: string
                  description: 审批结果，approve表示通过，reject表示拒绝，当审批任务时，该字段需要传值，否则报错
                  example: approve/reject
                reason:
                  type: string
                  description: 审批原因，审批任务时，如果审批通过，审批原因可以不填；如果审批拒绝，审批原因必填
                  example: 信息填写完整，允许通过
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                        description: 是否成功流转任务
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - corehr:pre_hire:transform_onboarding_task
      x-lark-error-mappings:
      - code: 1161093
        httpCode: 400
        msg: Transit task failed.
      - code: 1161095
        httpCode: 400
        msg: The task was not found, unable to operate.
      - code: 1161096
        httpCode: 400
        msg: Task status error, unable to operate.
      - code: 1161097
        httpCode: 400
        msg: Permission denied, please contact the administrator.
      - code: 1161098
        httpCode: 400
        msg: The values of the required fields in the form are missing, and the task cannot be submitted.
      - code: 1161116
        httpCode: 400
        msg: A conflict occurred as multiple people are operating at the same time. Please refresh the page and try again
          later.
      - code: 1161129
        httpCode: 400
        msg: Unable to perform this action as this pre-hire isn't in the "To be onboarded" stage.
      - code: 1161142
        httpCode: 400
        msg: Current task not support to submit.
      x-lark-rate-limit:
        tier: 4
