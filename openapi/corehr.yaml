                            description: 假期授予记录 ID
                            example: '4718803945687580505'
                          employment_id:
                            type: string
                            description: 员工 ID
                            example: '4718803945687580505'
                          leave_type_id:
                            type: string
                            description: 假期类型 ID
                            example: '4718803945687580505'
                          granting_quantity:
                            type: string
                            description: 授予数量
                            example: '4718803945687580505'
                          granting_unit:
                            type: integer
                            description: 授予时长单位
                            example: '1'
                          effective_date:
                            type: string
                            description: 生效时间
                            example: '2022-01-01'
                          expiration_date:
                            type: string
                            description: 失效时间（根据休假规则自动计算）
                            example: '2022-01-01'
                          granted_by:
                            type: integer
                            description: 授予来源
                            example: '1'
                          reason:
                            type: array
                            items:
                              type: object
                              properties:
                                lang:
                                  type: string
                                  description: 语言
                                  example: zh-CN
                                value:
                                  type: string
                                  description: 内容
                                  example: 刘梓新
                              required:
