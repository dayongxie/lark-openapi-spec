  /open-apis/corehr/v2/probation/edit:
    post:
      operationId: corehr_probation_edit
      summary: 编辑试用期
      tags:
      - probation
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/probation/edit
      parameters:
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          - people_corehr_id
          x-enum-descriptions:
            user_id: 以 user_id 来识别用户
            union_id: 以 union_id 来识别用户
            open_id: 以 open_id 来识别用户
            people_corehr_id: 以飞书人事的 ID 来识别用户
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户 ID 类型
        example: open_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                employment_id:
                  type: string
                  description: 试用期人员的雇佣 ID
                  example: '7140964208476371111'
                probation_start_date:
                  type: string
                  description: 试用期开始日期，格式："YYYY-MM-DD"，填写时满足以下规则 - 「试用期开始日期」和「试用期预计结束日期」需要一同填写。 - 若该员工存在试用期记录，且同时填写「试用期开始日期」和「试用期预计结束日期」为空串，则删除该试用期记录。
                    - 若该员工不存在试用期记录，且填写「试用期开始日期」和「试用期预计结束日期」，则新增试用期记录。 - 若该员工不存在试用期记录，且未填写「试用期开始日期」和「试用期预计结束日期」，则试用期记录不会创建，其他写入数据不会生效。
                    - 入职日期 <= 试用期开始日期 <= 试用期预计结束日期
                  example: '2024-01-01'
                probation_expected_end_date:
                  type: string
                  description: 试用期预计结束日期，格式："YYYY-MM-DD"，填写时满足以下规则 - 「试用期开始日期」和「试用期预计结束日期」需要一同填写。 - 若该员工存在试用期记录，且同时填写「试用期开始日期」和「试用期预计结束日期」为空串，则删除该试用期记录。
                    - 若该员工不存在试用期记录，且填写「试用期开始日期」和「试用期预计结束日期」，则新增试用期记录。 - 若该员工不存在试用期记录，且未填写「试用期开始日期」和「试用期预计结束日期」，则试用期记录不会创建，其他写入数据不会生效。
                    - 试用期开始日期 <= 试用期预计结束日期
                  example: '2025-01-01'
                probation_outcome:
                  type: string
                  description: 试用期结果，填写时满足以下规则 - 填写「通过」时，必填「试用期实际结束日期」。 - 填写「延长」时，「延长后试用期预计结束日期」和「试用期预计延长时长」至少填写一项。
                  enum:
                  - passed
                  - failed
                  - delayed
                  x-enum-descriptions:
                    passed: 通过
                    failed: 未通过
                    delayed: 延期
                  example: passed
                actual_probation_end_date:
                  type: string
                  description: 试用期实际结束日期，格式："YYYY-MM-DD"，填写时满足以下规则 - 需同时指定试用期结果为「通过」。 - 在试用期结果为空时，填写后将自动赋值试用期结果为「通过」。 - 试用期开始时间
                    <= 试用期实际结束日期 <= 试用期预计结束日期。
                  example: '2025-01-01'
                probation_extend_expected_end_date:
                  type: string
                  description: 延长后试用期预计结束日期，格式："YYYY-MM-DD"，填写时满足以下规则 - 需同时指定「试用期结果」为「延期」。 - 若同时填写「试用期预计延长时长」，需保持两者数据一致。 -
                    延长后试用期预计结束日期 > 试用期预计结束日期。
                  example: '2025-01-01'
                extended_probation_period_duration:
                  type: integer
                  description: 试用期预计延长时长，填写时满足以下规则 - 需同时指定「试用期结果」为「延期」。 - 填写时需要指定「试用期延长时长单位」。 - 若同时填写「延长后试用期预计结束日期」，需保持两者数据一致。
                    - 试用期预计延长时长 > 0。
                  example: '1'
                extended_probation_period_unit:
                  type: string
                  description: 试用期延长时长单位，填写时满足以下规则 - 需要和「试用期预计延长时长」一同填写。 - 需同时指定「试用期结果」为「延期」。
                  enum:
                  - day
                  - week
                  - month
                  x-enum-descriptions:
                    day: 天
                    week: 周
                    month: 月
                  example: day
                notes:
                  type: string
                  description: 备注
                  example: 试用期表现良好。
                self_review:
                  type: string
                  description: 员工自评
                  example: 试用期表现良好。
                custom_fields:
                  type: array
                  items:
                    $ref: '#/components/schemas/OriginValue'
                  description: 自定义字段（当前不支持附件类型字段写入）
      responses:
