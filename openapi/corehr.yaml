                              - value
                            description: 授予原因
                          created_at:
                            type: string
                            description: 授予记录的创建时间，毫秒级unix时间戳
                            example: '4718803945687580505'
                          created_by:
                            type: string
                            description: 授予记录的创建人，值为创建人的员工 ID
                            example: '1'
