                  example: 'false'
                data_date:
                  type: string
                  description: 查看数据日期
                  example: '2020-01-01'
                effective_date_start:
                  type: string
                  description: 生效日期 - 搜索范围开始
                  example: '2020-01-01'
                effective_date_end:
                  type: string
                  description: 生效日期 - 搜索范围结束
                  example: '2020-01-01'
                department_id:
                  type: string
                  description: 部门 ID
                  example: '6891251722631890445'
                employment_ids:
                  type: array
                  items:
                    type: string
                  description: 员工雇佣 ID 列表
                primary_job_data:
                  type: boolean
                  description: |-
                    是否仅查询主职
                    - true：仅返回 primary_job_data 为 true 的任职记录
                    - false：仅返回 primary_job_data 为 false 的任职记录
                    - 不传：返回全部
