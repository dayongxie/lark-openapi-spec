    get:
      operationId: drive_quota_details_get
      summary: 获取当前用户的容量信息，包含各业务使用量、租户配额是否超限、用户配额、所在部门配额
      tags:
      - quota_details
      description: 获取当前用户的容量信息，包含各业务使用量、租户配额是否超限、用户配额、所在部门配额
      externalDocs:
        description: 飞书开放平台官方文档
