  /open-apis/drive/v1/files/{file_token}/new_comments:
    post:
      operationId: drive_file_comments_create_v2
      summary: 开放平台：添加评论(V2)
      tags:
      - file.comments
      description: 开放平台：添加评论(V2)
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/api-explorer?from=op_doc_tab&apiName=create_v2&project=drive&resource=file.comment&version=v1
      parameters:
      - name: file_token
        in: path
        required: true
        schema:
          type: string
        description: 文档 Token
        example: TLLKdcpDro9ijQxA33ycNMabcef
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                anchor:
                  type: object
                  properties:
                    base_record_id:
                      type: string
                      description: base划线评论的行记录标识
                    base_view_id:
                      type: string
                      description: base划线评论的视图标识
                    block_id:
                      type: string
                      description: 文档块级元素的唯一标识,用于将评论锚定到指定的内容块。可通过「获取文档所有块」接口获取目标文档的块级元素ID。
                      example: block1234567890abcdef
                    content_anchor_id:
                      type: string
                      description: 划线锚点信息
                    file_extra:
                      type: string
                      description: file类型的extra内容
                    file_page_num:
                      type: string
                      description: file类型划线评论的页序号
                    parent_file_token:
                      type: string
                      description: 父文件token，可选
                      example: fldabc123xyz7sfjsfjh89
                    parent_file_type:
                      type: string
                      description: 父文件类型，可选
                      example: docx
                    sheet_col:
                      type: integer
                      description: sheet划线评论的列序号，可选
                      example: 10
                      minimum: 0
                      maximum: 100000
                    sheet_row:
                      type: integer
                      description: sheet划线评论的行序号，可选
                      example: 1
                    slide_block_type:
                      type: string
                      description: slide划线block元素类型
                  required:
                  - block_id
                  description: |-
                    评论锚点配置,用于指定评论在文档中的关联位置。当不传入该对象时,创建全局评论
                    当传入时,将锚定到block_id指定的块级元素。
                extra:
                  type: string
                  description: 额外信息
                  example: '{\"refer_reply_id\":17785864760900000,\"ai_reply_source_type\":1}'
                file_type:
                  type: string
                  description: 文档类型标识，用于区分不同类型的云文档。需与目标文档的实际类型严格匹配，可通过文档详情接口获取。
                  example: docx
                reply_elements:
                  type: array
                  items:
                    type: object
                    properties:
                      link:
                        type: string
                        description: 跳转链接地址。仅当 type 为 link 时生效，需符合 HTTP/HTTPS 协议规范，长度限制为 1-2000 字符。
                        example: https://example.com/docs/approval-guide
                      mention_user:
                        type: string
                        description: 被@用户的唯一标识。仅当 type 为 mention_user 时生效，可通过调用「获取用户信息」接口获取目标用户的 ID。
                        example: ou_1234567890abcdef1234567890abcdef
                      text:
                        type: string
                        description: 评论元素的文本内容。仅当 type 为 text 时生效，支持普通文本输入，长度限制为 1-1000 字符。
                        example: 请尽快处理这份文件的审批流程
                      type:
                        type: string
                        description: text | mention_user | link
                        example: text
                    required:
                    - type
                  description: 评论内容元素集合，支持文本、@用户、链接等多种元素类型的组合，用于构建结构化的评论内容。每个元素需指定对应的类型及匹配的内容参数。
              required:
              - file_type
              - reply_elements
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达，见官方错误码文档）
          content:
            application/json:
              schema:
                type: object
                description: 飞书开放平台统一响应信封；业务数据位于 data 字段。
                properties:
                  code:
                    type: integer
                    description: 错误码，0 表示成功
                  msg:
                    type: string
                    description: 错误描述
                  data:
                    type: object
                    properties:
                      comment_id:
                        type: string
                        description: 新增评论的唯一标识，可用于后续的评论回复、删除等操作。
                        example: comment-1234567890abcdef1234567890abcdef
                      created_at:
                        type: string
                        description: 评论创建时间，采用ISO 8601格式，精确到毫秒。
                        example: '2024-05-20T14:30:00.123Z'
                      idempotency_key:
                        type: string
                        description: 返回请求中传入的幂等键，用于关联请求与响应结果。
                        example: uuid-12345678-1234-5678-1234-567812345678
                      reply_id:
                        type: string
                        description: 回复 ID
                        example: '7620742045199518919'
                    required:
                    - comment_id
                    - created_at
      x-lark-method-id: file.comments.create_v2
      x-lark-scopes:
      - docs:document.comment:create
      - docs:document.comment:write_only
      x-lark-access-tokens:
      - user
      - tenant
      x-lark-risk: write
      x-lark-danger: true
