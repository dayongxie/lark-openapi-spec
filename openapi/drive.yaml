      parameters:
      - name: quota_detail_id
        in: path
        required: true
        schema:
          type: string
        description: 传当前用户user_id，且只返回当前用户的容量信息
        example: '12'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达，见官方错误码文档）
          content:
            application/json:
              schema:
                type: object
                description: 飞书开放平台统一响应信封；业务数据位于 data 字段。
                properties:
                  code:
                    type: integer
                    description: 错误码，0 表示成功
                  msg:
                    type: string
                    description: 错误描述
                  data:
                    type: object
                    properties:
                      biz_infos:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              description: 业务名称，ccm代表云文档容量，vc代表视频会议，mail代表邮箱，im代表聊天文件
                              example: ccm
                            quota:
                              type: string
                              description: 额度，单位byte，最大可能为int64，需要自己转换为数字
                              example: '23455666'
                            unlimited:
                              type: boolean
                              description: 是否没设置容量限制
                              example: true
                            used:
                              type: string
                              description: 业务已经使用的容量，单位byte，最大可能为int64，需要自己转换为数字
                              example: '345567888'
                        description: 当前用户各业务的容量使用列表（ccm=云文档容量、im=聊天文件、vc=视频会议、mail=邮箱）
                      department_quota:
                        type: object
                        properties:
                          id:
                            type: string
                            description: 配额归属实体ID，租户/用户/部门三选一，具体含义由所在字段区分（TenantQuota/UserQuota/DepartmentQuota）。最大可能为int64，需要自己转换为数字
                            example: '7123456789012345678'
                          limit:
                            type: string
                            description: 配额上限，单位byte，最大可能为int64，需要自己转换为数字
                            example: '10737418240'
                          type:
                            type: integer
                            description: 配额作用范围
                            enum:
                            - 1
                            - 2
                            x-enum-descriptions:
                              '1': Doc，仅校验云文档容量
                              '2': All，对全部业务生效
                            example: 1
                            minimum: 1
                            maximum: 2
                          usage:
                            type: string
                            description: 已使用容量，单位byte，最大可能为int64，需要自己转换为数字
                            example: '2345678'
                        description: 用户/部门/租户的容量配额配置（上限与已使用量）
                      is_tenant_quota_exceeded:
                        type: boolean
                        description: 租户额度是否超限
                        example: false
                      user_quota:
                        type: object
                        properties:
                          id:
                            type: string
                            description: 配额归属实体ID，租户/用户/部门三选一，具体含义由所在字段区分（TenantQuota/UserQuota/DepartmentQuota）。最大可能为int64，需要自己转换为数字
                            example: '7123456789012345678'
                          limit:
                            type: string
                            description: 配额上限，单位byte，最大可能为int64，需要自己转换为数字
                            example: '10737418240'
                          type:
                            type: integer
                            description: 配额作用范围
                            enum:
                            - 1
                            - 2
                            x-enum-descriptions:
                              '1': Doc，仅校验云文档容量
