                id:
                  type: string
                  description: 唯一ID
                  example: '6981801914270744596'
                job_name:
                  type: string
                  description: 任务名称
                  example: 测试推送任务
                status:
                  type: integer
                  description: 0(草稿)、1(等待审批)、 2(审批未通过)、3(正在发送中)、4(发送完成)、5(等待设置发送时间)、6(取消发送)、7(新人入职执行发送)、8(等待倒计时发送)
                  example: '0'
                create_user:
                  type: object
                  properties:
                    user_id:
                      type: string
                      description: 用户id
                      example: ou_7277fd1262bfafc363d5b2a1f9c2ac90
                    avatar_url:
                      type: string
                      description: 头像地址
                      example: http://*.com/*.png
                    name:
                      type: string
                      description: 用户名称
                      example: test
                  description: 创建人
                  example: '{"avatar_url":"","name":"","user_id":"ou_7277fd1262bfafc363d5b2a1f9c2ac90"}'
                created_at:
                  type: string
                  description: 创建时间（毫秒时间戳）
                  example: '1626332244719'
                update_user:
                  type: object
                  properties:
                    user_id:
                      type: string
                      description: 用户id
                      example: ou_7277fd1262bfafc363d5b2a1f9c2ac90
                    avatar_url:
                      type: string
                      description: 头像地址
                      example: http://*.com/*.png
                    name:
                      type: string
                      description: 用户名称
                      example: test
                  description: 更新用户
                  example: '{"avatar_url":"","name":"","user_id":"ou_7277fd1262bfafc363d5b2a1f9c2ac90"}'
                updated_at:
                  type: string
                  description: 更新时间（毫秒时间戳）
                  example: '1626332244719'
                target_user_count:
                  type: integer
                  description: 目标推送用户
                  example: '1'
                sent_user_count:
                  type: integer
                  description: 已推送用户总数
                  example: '1'
                read_user_count:
                  type: integer
                  description: 已读用户总数
                  example: '1'
                send_at:
                  type: string
                  description: 推送任务触发时间（毫秒时间戳）
                  example: '1626332244719'
                push_content:
                  type: string
                  description: 推送内容，详见：https://open.feishu.cn/tool/cardbuilder?from=howtoguide
                  example: '{   "config": {     "wide_screen_mode": true   },   "elements": [     {       "tag": "div",       "text":
                    {         "tag": "lark_md",         "content": "[飞书](https://www.feishu.cn)整合即时沟通、日历、音视频会议、云文档、云盘、工作台等功能于一体，成就组织和个人，更高效、更愉悦。"       }     }   ]
                    }'
                push_type:
                  type: integer
                  description: 0（定时推送：push_scope不能等于3） 1（新人入职推送：push_scope必须等于1或者3；new_staff_scope_type不能为空）
                  example: '0'
                push_scope_type:
                  type: integer
                  description: 推送范围（服务台私信） 0：组织内全部成员（user_list和department_list必须为空） 1：不推送任何成员（user_list和department_list必须为空，chat_list不可为空）
                    2：推送到部分成员（user_list或department_list不能为空） 3：入职新人 以上四种状态，chat_list都相对独立，只有在推送范围为1时，必须需要设置chat_list
                  example: '0'
                new_staff_scope_type:
                  type: integer
                  description: 新人入职范围类型（push_type为1时生效） 0：组织内所有新人 1：组织内特定的部门（new_staff_scope_department_list 字段不能为空）
                  example: '0'
                new_staff_scope_department_list:
                  type: array
                  items:
                    type: object
                    properties:
                      department_id:
                        type: string
                        description: 部门ID
                        example: od_7277fd1262bfafc363d5b2a1f9c2ac90
                      name:
                        type: string
                        description: 部门名称
                        example: 测试部门
                  description: 新人入职生效部门列表
                  example: '[{"department_id":"od_7c1a2815c9846b5e518b950de0e62de8"}]'
                user_list:
                  type: array
                  items:
                    type: object
                    properties:
                      user_id:
                        type: string
                        description: 用户id
                        example: ou_7277fd1262bfafc363d5b2a1f9c2ac90
                      avatar_url:
                        type: string
                        description: 头像地址
                        example: http://*.com/*.png
                      name:
                        type: string
                        description: 用户名称
                        example: test
                  description: push推送到成员列表
                  example: '[{"user_id":"ou_7277fd1262bfafc363d5b2a1f9c2ac90"}]'
                department_list:
                  type: array
                  items:
                    type: object
                    properties:
                      department_id:
                        type: string
                        description: 部门ID
                        example: od_7277fd1262bfafc363d5b2a1f9c2ac90
                      name:
                        type: string
                        description: 部门名称
                        example: 测试部门
                  description: push推送到的部门信息列表
                  example: '[{"department_id":"od_7c1a2815c9846b5e518b950de0e62de8"}]'
                chat_list:
                  type: array
                  items:
                    type: object
                    properties:
                      chat_id:
                        type: string
                        description: 会话ID
                        example: oc_7277fd1262bfafc363d5b2a1f9c2ac90
                        x-lark-id-types:
                          chat_id: chat
                      name:
                        type: string
                        description: 会话名称
                        example: 测试群聊
                  description: push推送到的会话列表(群)
                  example: '[{"chat_id":"oc_7c1a2815c9846b5e518b950de0e62de8"}]'
                ext:
                  type: string
                  description: 预留扩展字段
                  example: '{}'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
      x-lark-access-tokens:
      - user
      x-lark-scopes:
      - helpdesk:all
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      x-lark-error-mappings:
      - code: 154000
        httpCode: 400
        msg: ''
      - code: 154001
        httpCode: 401
        msg: ''
      - code: 154003
        httpCode: 403
        msg: ''
      - code: 154004
        httpCode: 404
        msg: ''
      - code: 154005
        httpCode: 405
        msg: ''
      - code: 155000
        httpCode: 500
        msg: ''
      x-lark-rate-limit:
        tier: 2
      x-lark-id-transform:
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.create_user.user_id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.update_user.user_id
        section: 0
      - fromTo:
          from: x_department_id
          idType: ''
          idTypeKey: department_id_type
          idTypeSection: 2
          to: lark_id
        key: $.new_staff_scope_department_list[*].department_id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.user_list[*].user_id
        section: 0
      - fromTo:
          from: x_department_id
          idType: ''
          idTypeKey: department_id_type
          idTypeSection: 2
          to: lark_id
        key: $.department_list[*].department_id
        section: 0
      - fromTo:
          from: open_chat_id
          idType: ''
          idTypeKey: ''
          idTypeSection: 2
          to: lark_id
        key: $.chat_list[*].chat_id
        section: 0
