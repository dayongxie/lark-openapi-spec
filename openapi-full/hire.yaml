                        type: string
                        description: 更新入/离职状态的操作
                        enum:
                        - confirm_onboarding
                        - cancel_onboarding
                        - offboard
                        x-enum-descriptions:
                          confirm_onboarding: 确认入职
                          cancel_onboarding: 放弃入职
                          offboard: 操作离职
                        example: confirm_onboarding
