        required: false
        schema:
          type: string
          enum:
          - people_admin_job_level_id
          - job_level_id
          x-enum-descriptions:
            people_admin_job_level_id: 「人力系统管理后台」适用的职级 ID。人力系统管理后台逐步下线中，建议不继续使用此 ID。
            job_level_id: 「飞书管理后台」适用的职级 ID，通过「获取租户职级列表」接口获取
          default: people_admin_job_level_id
        description: 此次调用中使用的「职级 ID」的类型
      - name: job_family_id_type
