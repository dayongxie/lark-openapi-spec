  /open-apis/hire/v1/external_referral_rewards:
    post:
      operationId: hire_external_referral_reward_create
      summary: 导入外部内推奖励
      tags:
      - external_referral_reward
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/ukTMukTMukTM/uMzM1YjLzMTN24yMzUjN/hire-v1/external_referral_reward/create
      parameters:
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户ID的类型
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                referral_user_id:
                  type: string
                  description: 内推人ID
                  example: on_94a1ee5551019f18cd73d9f111898cf2
                create_user_id:
                  type: string
                  description: 奖励创建人，管理员与内推人可见，若不传，则默认为「外部系统」
                  example: on_94a1ee5551019f18cd73d9f111898cf2
                confirm_user_id:
                  type: string
                  description: 奖励确认人，若导入的「内推奖励状态」为「已确认」可传入，若不传，则默认为「外部系统」
                  example: on_94a1ee5551019f18cd73d9f111898cf2
                pay_user_id:
                  type: string
                  description: 奖励发放人，导入奖励状态为「已发放」的奖励传入，若不传，则默认为「外部系统」
                  example: on_94a1ee5551019f18cd73d9f111898cf2
                external_id:
                  type: string
                  description: 外部系统奖励唯一id（仅用于幂等）
                  example: '6930815272790114324'
                application_id:
                  type: string
                  description: 投递id，和「人才id」二选一
                  example: '6930815272790114325'
                talent_id:
                  type: string
                  description: 人才id，和「投递id」二选一
                  example: '6930815272790114326'
                job_id:
                  type: string
                  description: 职位id，当参数包含「人才id」时，可以选填职位id
                  example: '6930815272790114327'
                reason:
                  type: string
                  description: 奖励原因
                  example: 首次推荐
                rule_type:
                  type: integer
                  description: 导入的奖励规则类型，将展示在内推奖励明细中，管理员与内推人可见
                  enum:
                  - 1
                  - 2
                  - 3
                  - 4
                  - 5
                  x-enum-descriptions:
                    '1': 入职奖励，候选人入职或转正后产生的奖励
                    '2': 过程奖励，入职奖励外，若候选人有阶段性进展，则给予内推人对应的奖励
                    '3': 活动奖励，额外奖励，用于支持内推周期性活动
                    '4': 开源奖励，若内推候选人首次进入人才库，且在被推荐后一段时间内，入职了规则内的任意职位的奖励
                    '5': 其他奖励，以上奖励无法覆盖的奖励
                  example: '1'
                bonus:
                  type: object
                  properties:
                    bonus_type:
                      type: integer
                      description: 奖励类型
                      enum:
                      - 1
                      - 2
                      x-enum-descriptions:
                        '1': 积分
                        '2': 现金
                      default: 1
                      example: '1'
                    point_bonus:
                      type: integer
                      description: 积分奖励
                      example: '100'
                    cash:
                      type: object
                      properties:
                        currency_type:
                          type: string
                          description: 币种
                          example: CNY
                        amount:
                          type: number
                          description: 数额
                          example: '100'
                      required:
                      - currency_type
                      - amount
                      description: 现金奖励
                  required:
                  - bonus_type
                  description: 奖励数据
                stage:
                  type: integer
                  description: 导入的内推奖励状态
                  enum:
                  - 1
                  - 2
                  - 3
                  x-enum-descriptions:
                    '1': 待确认
                    '2': 已确认
                    '3': 已发放
                  example: '1'
                create_time:
                  type: string
                  description: 奖励产生时间，内推奖励触发时间，若未传入，取接口传入时间
                  example: '1704720275000'
                confirm_time:
                  type: string
                  description: 奖励确认时间，若导入的「内推奖励状态」为「已确认」可传入，若未传入，取接口传入时间
                  example: '1704720275000'
                pay_time:
                  type: string
                  description: 奖励发放时间，若导入的「内推奖励状态」为「已确认」可传入，若未传入，取接口传入时间
                  example: '1704720275001'
                onboard_time:
                  type: string
                  description: 入职时间，管理员与内推人可见，若为「入职奖励」可传入
                  example: '1704720275002'
                conversion_time:
                  type: string
                  description: 入职时间，管理员与内推人可见，若为「入职奖励」可传入
                  example: '1704720275003'
                comment:
                  type: string
                  description: 操作备注，管理员与内推人可见，若为空，将展示为奖励原因
                  example: 已发放
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: 创建的内推奖励的id
                        example: '6930815272790114324'
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - hire:external_referral_reward
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      x-lark-error-mappings:
      - code: 1002001
        httpCode: 500
        msg: system error
      - code: 1002002
        httpCode: 400
        msg: ''
      x-lark-rate-limit:
        tier: 7
      x-lark-id-transform:
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.referral_user_id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.create_user_id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.confirm_user_id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.pay_user_id
        section: 0
