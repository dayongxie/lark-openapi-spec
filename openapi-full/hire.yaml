  /open-apis/hire/v1/jobs:
    get:
      operationId: hire_job_list
      summary: 获取职位列表
      tags:
      - job
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/ukTMukTMukTM/uMzM1YjLzMTN24yMzUjN/hire-v1/job/list
      parameters:
      - name: update_start_time
        in: query
        required: false
        schema:
          type: string
          format: int64
        description: 最早更新时间，毫秒级时间戳
        example: '1618500278663'
      - name: update_end_time
        in: query
        required: false
        schema:
          type: string
          format: int64
        description: 最晚更新时间，毫秒级时间戳
        example: '1618500278663'
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 10
        description: 分页大小, 不能超过 20
        example: '10'
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该 page_token 获取查询结果
        example: eyJvZmZzZXQiOjEwLCJ0aW1lc3RhbXAiOjE2Mjc1NTUyMjM2NzIsImlkIjpudWxsfQ==
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以 user_id 来识别用户
            union_id: 以 union_id 来识别用户
            open_id: 以 open_id 来识别用户
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户 ID 类型
        example: open_id
      - name: department_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - open_department_id
          - department_id
          x-enum-descriptions:
            open_department_id: 以 open_department_id 来标识部门
            department_id: 以 department_id 来标识部门
          default: open_department_id
          x-lark-id-types:
            department_id: department
            open_department_id: department
        description: 此次调用中使用的部门 ID 的类型
      - name: job_level_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - people_admin_job_level_id
          - job_level_id
          x-enum-descriptions:
            people_admin_job_level_id: 「人力系统管理后台」适用的职级 ID。人力系统管理后台逐步下线中，建议不继续使用此 ID。
            job_level_id: 「飞书管理后台」适用的职级 ID，通过「获取租户职级列表」接口获取
          default: people_admin_job_level_id
        description: 此次调用中使用的「职级 ID」的类型
      - name: job_family_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - people_admin_job_category_id
          - job_family_id
          x-enum-descriptions:
            people_admin_job_category_id: 「人力系统管理后台」适用的序列 ID。人力系统管理后台逐步下线中，建议不继续使用此 ID。
            job_family_id: 「飞书管理后台」适用的序列 ID，通过「获取租户序列列表」接口获取
          default: people_admin_job_category_id
        description: 此次调用中使用的「序列 ID」的类型
      - name: recruiter_id_list
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: 招聘负责人 ID，与入参user_id_type类型一致
      - name: hiring_manager_id_list
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: 用人经理 ID 列表，与入参user_id_type类型一致
      - name: assistant_id_list
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: 招聘协助人 ID 列表，与入参user_id_type类型一致
      - name: department_id
        in: query
        required: false
        schema:
          type: string
        description: 部门 ID，与入参中的department_id_type类型一致
      - name: with_sub_department
        in: query
        required: false
        schema:
          type: boolean
          default: false
        description: 是否包含子部门的职位。默认 false，仅返回指定部门的直属职位；设为 true 时，返回该部门及所有下属部门的职位
