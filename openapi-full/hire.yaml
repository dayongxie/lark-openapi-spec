      summary: 操作候选人入职
      tags:
      - application
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/ukTMukTMukTM/uMzM1YjLzMTN24yMzUjN/hire-v1/application/transfer_onboard
      parameters:
      - name: application_id
        in: path
        required: true
        schema:
          type: string
        description: 投递ID
        example: '12312312312'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以 user_id 来识别用户
            union_id: 以 union_id 来识别用户
            open_id: 以 open_id 来识别用户
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户 ID 类型
        example: open_id
      - name: department_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - open_department_id
          - department_id
          - people_admin_department_id
          x-enum-descriptions:
            open_department_id: 以 open_department_id 来标识部门
            department_id: 以 department_id 来标识部门
            people_admin_department_id: 以 people_admin_department_id 来标识部门
          default: people_admin_department_id
          x-lark-id-types:
            department_id: department
            open_department_id: department
        description: 此次调用中使用的部门 ID 的类型
      - name: job_level_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - people_admin_job_level_id
          - job_level_id
          x-enum-descriptions:
            people_admin_job_level_id: 「人力系统管理后台」适用的职级 ID。人力系统管理后台逐步下线中，建议不继续使用此 ID。
            job_level_id: 「飞书管理后台」适用的职级 ID，通过「获取租户职级列表」接口获取
          default: people_admin_job_level_id
        description: 此次调用中使用的「职级 ID」的类型
      - name: job_family_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - people_admin_job_category_id
          - job_family_id
          x-enum-descriptions:
            people_admin_job_category_id: 「人力系统管理后台」适用的序列 ID。人力系统管理后台逐步下线中，建议不继续使用此 ID。
            job_family_id: 「飞书管理后台」适用的序列 ID，通过「获取租户序列列表」接口获取
          default: people_admin_job_category_id
        description: 此次调用中使用的「序列 ID」的类型
      - name: employee_type_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - people_admin_employee_type_id
          - employee_type_enum_id
          x-enum-descriptions:
            people_admin_employee_type_id: 「人力系统管理后台」适用的人员类型 ID。人力系统管理后台逐步下线中，建议不继续使用此 ID。
            employee_type_enum_id: 「飞书管理后台」适用的人员类型 ID，通过「查询人员类型」接口获取
          default: people_admin_employee_type_id
        description: 此次调用中使用的「人员类型 ID」的类型
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                actual_onboard_time:
                  type: integer
                  description: 实际入职时间
                  example: '1616428800000'
                expected_conversion_time:
                  type: integer
                  description: 预期转正时间
                  example: '1616428800000'
                job_requirement_id:
                  type: string
                  description: 招聘需求 ID
                  example: '6960663240925956402'
                operator_id:
                  type: string
                  description: 操作人 UserID
                  example: ou-xxx
                onboard_city_code:
                  type: string
                  description: 候选人办公地点 ID ，枚举可通过接口「获取地址列表」获取，将用于候选人内推奖规则判断
                  example: C20
                department:
                  type: string
                  description: 候选人入职部门 ID ，枚举可通过接口「获取部门信息列表」获取，将用于候选人内推奖规则判断
                  example: '6966123381141866028'
                leader:
                  type: string
                  description: 候选人直属上级 UserID ，将用于候选人内推奖规则判断
                  example: ou-xxx
                sequence:
                  type: string
                  description: 候选人序列 ID ，枚举可通过接口「获取职务分类列表」获取，将用于候选人内推奖规则判断
                  example: '6501'
                level:
                  type: string
                  description: 候选人职级 ID ，枚举可通过接口「获取职级列表」获取，将用于候选人内推奖规则判断
                  example: '6301'
                employee_type:
                  type: string
                  description: 候选人入职人员类型 ID，可通过接口人力资源管理平台「获取员工类型列表」获取，将用于候选人内推奖规则判断
                  example: '1'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schema4'
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - hire:application
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      x-lark-error-mappings:
      - code: 1002001
        httpCode: 500
        msg: ''
      - code: 1002002
        httpCode: 400
        msg: ''
      - code: 1002901
        httpCode: 404
        msg: application not exist
      - code: 1002902
        httpCode: 400
        msg: not support state transfer
      - code: 1002904
        httpCode: 400
        msg: employee entry already onboard
      - code: 1002905
        httpCode: 400
        msg: invalid time
      - code: 1002908
        httpCode: 500
        msg: ehr sync disabled
      - code: 1002210
        httpCode: 500
        msg: Talent is locked by other application
      x-lark-rate-limit:
        tier: 8
      x-lark-id-transform:
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.operator_id
        section: 0
      - fromTo:
          from: x_department_id
          idType: ''
          idTypeKey: department_id_type
          idTypeSection: 2
          to: lark_id
        key: $.department
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.leader
        section: 0
