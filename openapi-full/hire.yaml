        url: https://open.feishu.cn/document/ukTMukTMukTM/uMzM1YjLzMTN24yMzUjN/hire-v1/job_requirement/list
      parameters:
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 页码标识，获取第一页传空，每次查询会返回下一页的page_token
        example: eyJvZmZzZXQiOjEwLCJ0aW1lc3RhbXAiOjE2NTkwNzY4MjI5ODIsImlkIjpudWxsfQ==
      - name: page_size
        in: query
