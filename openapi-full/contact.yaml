        httpCode: 400
        msg: User not resigned
      - code: 44034
        httpCode: 400
        msg: User is in delete progress, retry later
      - code: 41008
        httpCode: 400
        msg: exceed bill seat limit error
      - code: 41007
        httpCode: 400
        msg: exceed uncertain tenant seat limit error
      - code: 44023
        httpCode: 400
        msg: exceed feature contact seat limit
      - code: 44041
        httpCode: 400
        msg: No feature access to resurrect
      - code: 44046
