    put:
      operationId: contact_user_update
      summary: 更新用户所有信息
      tags:
      - user
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/contact-v3/user/update
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
        description: 用户ID，需要与查询参数中的user_id_type类型保持一致。
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户ID的类型
      - name: department_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - department_id
          - open_department_id
          x-enum-descriptions:
            department_id: 以自定义department_id来标识部门
            open_department_id: 以open_department_id来标识部门
          default: open_department_id
          x-lark-id-types:
            department_id: department
            open_department_id: department
        description: 此次调用中使用的部门ID的类型
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 用户名
                  example: 张三
                en_name:
                  type: string
                  description: 英文名
                  example: San Zhang
                nickname:
                  type: string
                  description: 别名
                  example: Alex Zhang
                email:
                  type: string
                  description: 邮箱
                  example: zhangsan@gmail.com
                mobile:
                  type: string
                  description: 手机号
                  example: '+41446681800'
                mobile_visible:
                  type: boolean
                  description: 手机号码可见性，true 为可见，false 为不可见，目前默认为 true。不可见时，组织员工将无法查看该员工的手机号码
                  example: 'false'
                gender:
                  type: integer
                  description: 性别
                  enum:
                  - 0
                  - 1
                  - 2
                  - 3
                  x-enum-descriptions:
                    '0': 保密
                    '1': 男
                    '2': 女
                    '3': 其他
                avatar_key:
                  type: string
                  description: 头像的文件Key
                  example: 2500c7a9-5fff-4d9a-a2de-3d59614ae28g
                department_ids:
                  type: array
                  items:
                    type: string
                  description: 用户所在部门ID
                leader_user_id:
                  type: string
                  description: 用户直属上级
                  example: ou_7dab8a3d3cdcc9da365777c7ad535d62
                city:
                  type: string
                  description: 城市
                  example: 杭州
                country:
                  type: string
                  description: 国家
                  example: CN
                work_station:
                  type: string
                  description: 工位
                  example: 北楼-H34
                join_time:
                  type: integer
                  description: 入职时间
                  example: '2147483647'
                employee_no:
                  type: string
                  description: 工号
                  example: '1'
                employee_type:
                  type: integer
                  description: 员工类型
                  example: '1'
                orders:
                  type: array
                  items:
                    type: object
                    properties:
                      department_id:
                        type: string
                        description: 排序信息对应的部门ID
                      user_order:
                        type: integer
                        description: 用户在部门内的排序
                        example: '100'
                      department_order:
                        type: integer
                        description: 用户的部门间的排序
                        example: '100'
                      is_primary_dept:
                        type: boolean
                        description: 是否为用户主部门
                        example: 'true'
                  description: 用户排序信息
                custom_attrs:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        description: 自定义属性类型
                      id:
                        type: string
                        description: 自定义属性ID
                      value:
                        type: object
                        properties:
                          text:
                            type: string
                            description: 属性文本
                          url:
                            type: string
                            description: URL
                          pc_url:
                            type: string
                            description: PC上的URL
                          option_id:
                            type: string
                            description: 选项id，自定义选项和图片此项必填
                          generic_user:
                            type: object
                            properties:
                              id:
                                type: string
                                description: 用户id
                                example: '123456789'
                              type:
                                type: integer
                                description: 用户类型 1 User 2 Bot 11 Mail
                                example: '1'
                            required:
                            - id
                            - type
                            description: 用户信息
                        description: 自定义属性取值
                  description: 自定义属性
                enterprise_email:
                  type: string
                  description: 企业邮箱
                  example: demo@mail.com
                job_title:
                  type: string
                  description: 职务
                  example: xxxxx
                is_frozen:
                  type: boolean
                  description: 是否冻结用户
                  example: 'false'
