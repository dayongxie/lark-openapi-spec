    delete:
      operationId: contact_user_delete
      summary: 删除用户
      tags:
      - user
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/contact-v3/user/delete
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
        description: 用户ID，需要与查询参数中的user_id_type类型保持一致。
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户ID的类型
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                department_chat_acceptor_user_id:
                  type: string
                  description: 部门群接收者。被删除用户为部门群群主时，转让群主给指定接收者，不指定接收者则默认转让给群内第一个入群的人
                external_chat_acceptor_user_id:
                  type: string
                  description: 外部群接收者。被删除用户为外部群群主时，转让群主给指定接收者，不指定接收者则默认转让给群内与被删除用户在同一组织的第一个入群的人，如果组织内只有该用户在群里，则解散外部群
                docs_acceptor_user_id:
                  type: string
                  description: 文档接收者。用户被删除时，其拥有的文档转让给接收者。不指定接收者则默认转让给直属上级，如果无直属上级则将文档资源保留在该用户名下。
                calendar_acceptor_user_id:
                  type: string
                  description: 日程接收者。用户被删除时，其拥有的日程转让给接收者，不指定接收者则默认转让给直属上级，如果无直属上级则直接删除日程资源。
                application_acceptor_user_id:
                  type: string
                  description: 应用接受者。用户被删除时，其创建的应用转让给接收者，不指定接收者则默认转让给直属上级。如果无直属上级则保留应用在该用户名下，但该用户无法登录开发者后台进行应用管理，管理员可以在管理后台手动转移应用给其他人。
                minutes_acceptor_user_id:
                  type: string
                  description: 妙记接收者。用户被删除时，其拥有的妙记资源转让给接收者。如果不指定接收者，则默认转让给直属上级。如果无直属上级则将妙记保留在该用户名下。
                survey_acceptor_user_id:
                  type: string
                  description: 飞书问卷接收者。用户被删除时，其拥有的飞书问卷资源转让给接收者，不指定接收者则默认转让给直属上级，如果无直属上级则直接删除飞书问卷资源。
                email_acceptor:
                  type: object
                  properties:
                    processing_type:
                      type: string
                      description: 资源处理类型
                      enum:
                      - '1'
                      - '2'
                      - '3'
                      x-enum-descriptions:
                        '1': 转移资源
                        '2': 保留资源
                        '3': 删除资源
                      format: int64
                    acceptor_user_id:
                      type: string
                      description: 转移资源时，资源接收者
                      format: int64
                  required:
                  - processing_type
                  description: 用户邮件资源处理方式。用户被删除时，根据传递的操作指令对其拥有的邮件资源做对应处理。未传递指令时默认将邮件资源转让给直属上级，如果无直属上级则保留邮件资源在该用户名下。
                anycross_acceptor_user_id:
                  type: string
                  description: 用户集成平台资源接收者
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - contact:contact
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      x-lark-error-mappings:
      - code: 40001
        httpCode: 400
        msg: param error
      - code: 40004
        httpCode: 403
        msg: no dept authority error
      - code: 41050
        httpCode: 403
        msg: no user authority error
      - code: 41052
        httpCode: 400
        msg: acceptor id is invalid error
      - code: 44037
        httpCode: 400
        msg: tenant manager cannot be deleted
      - code: 44042
        httpCode: 400
        msg: User is in resurrect progress, retry later
      - code: 44062
        httpCode: 400
        msg: According to the settings, this member's account can only be deleted through Member life cycle.
      x-lark-rate-limit:
        tier: 4
      x-lark-id-transform:
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: user_id
        section: 3
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.department_chat_acceptor_user_id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.external_chat_acceptor_user_id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.docs_acceptor_user_id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.calendar_acceptor_user_id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.application_acceptor_user_id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.minutes_acceptor_user_id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.survey_acceptor_user_id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.email_acceptor.acceptor_user_id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.anycross_acceptor_user_id
        section: 0
