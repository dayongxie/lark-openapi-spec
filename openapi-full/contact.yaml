            department_id: department
            open_department_id: department
        description: 部门id类型
        example: department_id
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                departments:
                  type: array
                  items:
                    type: object
                    properties:
                      department_id:
                        type: string
                        description: 对应的部门ID
                        format: int64
                      user_order:
                        type: integer
                        description: 用户在部门内的排序
                      department_order:
                        type: integer
                        description: 用户的部门间的排序
                    required:
                    - department_id
                  description: 指定恢复后用户所在部门
                subscription_ids:
                  type: array
                  items:
                    type: string
                  description: 指定恢复后分配的席位
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
