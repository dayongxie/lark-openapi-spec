                  type: string
                  description: 部门的排序
                  example: '100'
                  format: int64
                create_group_chat:
                  type: boolean
                  description: 是否创建部门群，默认不创建
                  example: 'false'
                leaders:
                  type: array
                  items:
                    type: object
                    properties:
                      leaderType:
                        type: integer
                        description: 负责人类型
                        enum:
                        - 1
                        - 2
                        x-enum-descriptions:
                          '1': 主负责人
                          '2': 副负责人
                      leaderID:
                        type: string
                        description: 负责人ID
                    required:
                    - leaderType
                    - leaderID
                  description: 部门负责人
