              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            work_city_id:
                              type: string
                              description: 工作城市ID
                              example: 0dd1ec95f021
                            name:
                              type: string
                              description: 工作城市名称。1-100字符，支持中、英文及符号
                              example: 北京
                            i18n_name:
                              type: array
                              items:
                                type: object
                                properties:
                                  locale:
                                    type: string
                                    description: 语言
                                  value:
                                    type: string
                                    description: i18n内容
                              description: 多语言工作城市
