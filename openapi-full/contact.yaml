                              description: 成员ID
                            member_type:
                              type: string
                              description: 用户组成员的类型，目前取值为 user。未来将支持department
                            member_id_type:
                              type: string
                              description: 成员ID类别，仅请求参数中有效
                              x-lark-id-types:
                                open_id: user
                                union_id: user
                                user_id: user
                          required:
                          - member_id
                          - member_type
                        description: 成员列表
                      page_token:
                        type: string
                        description: 下次分页获取的page_token
                      has_more:
