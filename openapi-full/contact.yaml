  /open-apis/contact/v3/users/batch_get_id:
    post:
      operationId: contact_user_batch_get_id
      summary: 通过手机号或邮箱获取用户 ID
      tags:
      - user
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/contact-v3/user/batch_get_id
      parameters:
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - open_id
          - union_id
          - user_id
          x-enum-descriptions:
            open_id: 用户的 open id
            union_id: 用户的 union id
            user_id: 用户的 user id
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 返回的用户ID的类型
        example: user_id
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                emails:
                  type: array
                  items:
                    type: string
                  description: |-
                    要查询的用户邮箱，最多 50 条。

                    注意，emails与mobiles相互独立，每条用户邮箱返回对应的用户ID。

                    本接口返回的用户ID数量为emails数量与mobiles数量的和。
                  example: sync@a.com
                mobiles:
                  type: array
                  items:
                    type: string
                  description: |-
                    要查询的用户手机号，最多 50 条。

                    注意
                    1. emails与mobiles相互独立，每条用户手机号返回对应的用户ID。
                    2.  非中国大陆地区的手机号需要添加以 “+” 开头的国家 / 地区代码。
                  example: '17839872039'
                include_resigned:
                  type: boolean
                  description: 查询结果包含离职员工，可查询离职用户的ID
                  default: false
                  example: 'true'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      user_list:
                        type: array
                        items:
                          type: object
                          properties:
                            user_id:
                              type: string
                              description: 用户id，值为user_id_type所指定的类型。如果查询的手机号、邮箱不存在，或者无权限查看对应的用户，则此项为空。
                              example: ou_979112345678741d29069abcdef089d4
                            mobile:
                              type: string
                              description: 手机号
                              example: '13812345678'
                            email:
                              type: string
                              description: 邮箱
                              example: lisi@z.com
                            status:
                              type: object
                              properties:
                                is_frozen:
                                  type: boolean
                                  description: 是否冻结
                                is_resigned:
                                  type: boolean
                                  description: 是否离职
                                is_activated:
                                  type: boolean
                                  description: 是否激活
                                is_exited:
                                  type: boolean
                                  description: 是否主动退出，主动退出一段时间后用户会自动转为已离职
                                is_unjoin:
                                  type: boolean
                                  description: 是否未加入，需要用户自主确认才能加入团队
                              description: 用户状态
                        description: 手机号或者邮箱对应的用户id信息
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - contact:user.id:readonly
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      - contact:user.employee:readonly
      - contact:contact:readonly
      - contact:contact:access_as_app
      - contact:contact:readonly_as_app
      x-lark-rate-limit:
        tier: 4
