  /open-apis/contact/v3/users/{user_id}/resurrect:
    post:
      operationId: contact_user_resurrect
      summary: 恢复已删除用户
      tags:
      - user
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/contact-v3/user/resurrect
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: int64
        description: 用户ID，需要与查询参数中的user_id_type类型保持一致。
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - open_id
          - union_id
          - user_id
          x-enum-descriptions:
            open_id: 用户的 open id
            union_id: 用户的 union id
            user_id: 用户的 user id
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户id类型
        example: user_id
      - name: department_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - department_id
          - open_department_id
          x-enum-descriptions:
            department_id: 以自定义department_id来标识部门
            open_department_id: 以open_department_id来标识部门
          default: open_department_id
