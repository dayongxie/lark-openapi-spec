  /open-apis/vc/v1/participant_list:
    get:
      operationId: vc_participant_list_get
      summary: 查询参会人明细
      tags:
      - participant_list
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/vc-v1/participant_list/get
      parameters:
      - name: meeting_start_time
        in: query
        required: true
        schema:
          type: string
          format: int64
        description: 会议开始时间（需要精确到一分钟，unix时间，单位sec）
        example: '1655276858'
      - name: meeting_end_time
        in: query
        required: true
        schema:
          type: string
          format: int64
        description: 会议结束时间（unix时间，单位sec；对于进行中会议则传0）
        example: '1655276858'
      - name: meeting_status
        in: query
        required: false
        schema:
          type: integer
          enum:
          - 1
          - 2
          - 3
          x-enum-descriptions:
            '1': 进行中
            '2': 已结束
            '3': 待召开
        description: 会议状态（不传默认为已结束会议）
        example: '2'
      - name: meeting_no
        in: query
        required: true
        schema:
          type: string
        description: 9位会议号
        example: '123456789'
      - name: user_id
        in: query
        required: false
        schema:
          type: string
        description: 按参会Lark用户筛选（最多一个筛选条件）
        example: ou_3ec3f6a28a0d08c45d895276e8e5e19b
      - name: room_id
        in: query
        required: false
        schema:
          type: string
        description: 按参会Rooms筛选（最多一个筛选条件）
        example: omm_eada1d61a550955240c28757e7dec3af
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 20
        description: 分页尺寸大小
        example: '20'
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记,第一次请求不填,表示从头开始遍历.下次遍历可采用该 page_token获取查询结果
      - name: webinar_user_role
        in: query
        required: false
        schema:
          type: string
        description: 查询网络研讨会时的观众类型,"0"为嘉宾，"3"为观众
        example: '0'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
