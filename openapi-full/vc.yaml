  /open-apis/vc/v1/meetings/search:
    post:
      operationId: vc_meeting_search
      summary: 搜索会议记录
      tags:
      - meeting
      description: 搜索视频会议接口
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/vc-v1/meeting/search
      parameters:
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该page_token获取查询结果
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
        description: |-
          分页大小，**默认15**，最大单页**不超过30**

          **注意：** 总计最多返回**150条** 记录
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: |-
                    搜索关键词
                    长度范围：1 字符 ～ 50 字符
                  example: 周会
                meeting_filter:
                  type: object
                  properties:
                    organizer_ids:
                      type: array
                      items:
                        type: string
                      description: 组织者OpenID
                    participant_ids:
                      type: array
                      items:
                        type: string
                      description: 参与者OpenID
                    open_room_ids:
                      type: array
                      items:
                        type: string
                      description: 会议室ID
                    start_time:
                      type: object
                      properties:
                        start_time:
                          type: string
                          description: 起始时间（iso8601，精确到秒）
                          example: '2026-03-21T16:15:30+08:00'
                        end_time:
                          type: string
                          description: 截止时间（iso8601，精确到秒）
                          example: '2026-03-21T16:15:30+08:00'
                      description: 会议开始时间区间（iso8601格式）
                  description: 视频会议过滤参数
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                        description: 匹配结果总数（辅助分页参考）
                        example: '10'
                      has_more:
                        type: boolean
                        description: 是否有更多数据可供加载
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: 会议ID（视频会议的唯一标识，视频会议开始后才会产生）
                              example: '6911188411932033028'
                            display_info:
                              type: string
                              description: 包含基本信息的卡片，用户搜索关键词命中的文本片段，使用<h></h>标签包裹标注
                              example: '会议名 \n 片段1＜h>搜索词/h>片段2\n 会议时间 | 组织者：组织者姓名 | ID: 会议ID'
                            meta_data:
                              type: object
                              properties:
                                app_link:
                                  type: string
                                  description: 跳转链接
                                  example: https://applink.larkoffice.com/*
                                avatar:
                                  type: string
                                  description: 图标url
                                  example: https://lf-packag*
                                description:
                                  type: string
                                  description: 描述，包含会议时间、组织者和会议ID
                                  example: 会议时间 | 组织者：组织者姓名 | ID：123456789
                              description: 会议元信息
                        description: 返回结果列表
                      page_token:
                        type: string
                        description: 分页标记，当 has_more 为 true 时，会同时返回新的 page_token，否则不返回 page_token
                      notice:
                        type: string
                        description: 搜索补充提示信息，返回本次搜索的额外说明，例如：query被截断；搜索结果不全等
                        example: The query is too long and has been truncated to the first 50 characters for search.
                    required:
                    - has_more
      x-lark-access-tokens:
      - user
      x-lark-scopes:
      - vc:meeting.search:read
      x-lark-error-mappings:
      - code: 121001
        httpCode: 500
        msg: invalid param
      - code: 121002
        httpCode: 500
        msg: network error
      - code: 121011
        httpCode: 500
        msg: query is too long
      - code: 121012
        httpCode: 500
        msg: invalid filter
      - code: 121020
        httpCode: 500
        msg: page_token is invalid or expired
      - code: 121021
        httpCode: 500
        msg: page_size exceeds maximum allowed value
      - code: 121022
        httpCode: 500
        msg: pagination limit reached
      - code: 121030
        httpCode: 500
        msg: user identity not found
      - code: 121031
        httpCode: 500
        msg: failed to initialize request context
      - code: 121040
        httpCode: 500
        msg: search service error
      - code: 121041
        httpCode: 500
        msg: failed to process search result
      - code: 122601
        httpCode: 500
        msg: meeting time format is invalid
      - code: 122602
        httpCode: 500
        msg: failed to build meeting filter
      - code: 122603
        httpCode: 500
        msg: failed to convert meeting search result
      - code: 122604
        httpCode: 500
        msg: invalid meeting room ID format
      x-lark-rate-limit:
        tier: 3
      x-lark-pagination: true
      x-lark-id-transform:
      - fromTo:
          from: open_id
          idType: ''
          idTypeKey: ''
          idTypeSection: 2
          to: lark_id
        key: $.meeting_filter.organizer_ids[*]
        section: 0
      - fromTo:
          from: open_id
          idType: ''
          idTypeKey: ''
          idTypeSection: 2
          to: lark_id
        key: $.meeting_filter.participant_ids[*]
        section: 0
      - fromTo:
          from: open_room_id
          idType: ''
          idTypeKey: ''
          idTypeSection: 2
          to: lark_id
        key: $.meeting_filter.open_room_ids[*]
        section: 0
  /open-apis/vc/v1/meetings/{meeting_id}/set_host:
    patch:
      operationId: vc_meeting_set_host
      summary: 设置主持人
      tags:
      - meeting
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/vc-v1/meeting/set_host
      parameters:
      - name: meeting_id
        in: path
        required: true
        schema:
          type: string
          format: int64
        description: 会议ID（视频会议的唯一标识，视频会议开始后才会产生）
        example: '6911188411932033028'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户（推荐）
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户ID的类型，默认使用open_id可不填
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                host_user:
                  type: object
                  properties:
                    id:
                      type: string
                      description: 用户ID
                      example: ou_3ec3f6a28a0d08c45d895276e8e5e19b
                    user_type:
                      type: integer
                      description: 用户类型
                      enum:
                      - 1
                      - 2
                      - 3
                      - 4
                      - 5
                      - 6
                      - 7
                      x-enum-descriptions:
                        '1': lark用户
                        '2': rooms用户
                        '3': 文档用户
                        '4': neo单品用户
                        '5': neo单品游客用户
                        '6': pstn用户
                        '7': sip用户
                      example: '1'
                  description: 将要设置的主持人
                old_host_user:
                  type: object
                  properties:
                    id:
                      type: string
                      description: 用户ID
                      example: ou_3ec3f6a28a0d08c45d895276e8e5e19b
                    user_type:
                      type: integer
                      description: 用户类型
                      enum:
                      - 1
                      - 2
                      - 3
                      - 4
                      - 5
                      - 6
                      - 7
                      x-enum-descriptions:
                        '1': lark用户
                        '2': rooms用户
                        '3': 文档用户
                        '4': neo单品用户
                        '5': neo单品游客用户
                        '6': pstn用户
                        '7': sip用户
                      example: '1'
                  description: 当前主持人（CAS并发安全：如果和会中当前主持人不符则会设置失败，可使用返回的最新数据重新设置）
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      host_user:
                        type: object
                        properties:
                          id:
                            type: string
                            description: 用户ID
                            example: ou_3ec3f6a28a0d08c45d895276e8e5e19b
                          user_type:
                            type: integer
                            description: 用户类型
                            enum:
                            - 1
                            - 2
                            - 3
                            - 4
                            - 5
                            - 6
                            - 7
                            x-enum-descriptions:
                              '1': lark用户
                              '2': rooms用户
                              '3': 文档用户
                              '4': neo单品用户
                              '5': neo单品游客用户
                              '6': pstn用户
                              '7': sip用户
                            example: '1'
                        description: 会中当前主持人
      x-lark-access-tokens:
      - user
      - tenant
      x-lark-scopes:
      - vc:meeting
      - vc:meeting.participant:write
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      x-lark-error-mappings:
      - code: 121001
        httpCode: 500
        msg: internal error
      - code: 121002
        httpCode: 400
        msg: not support
      - code: 121003
        httpCode: 400
        msg: param error
      - code: 121005
        httpCode: 403
        msg: no permission
      - code: 121006
        httpCode: 409
        msg: data conflict
      - code: 122001
        httpCode: 400
        msg: meeting status unexpected
      - code: 122002
        httpCode: 404
        msg: meeting not exist
      - code: 122003
        httpCode: 400
        msg: operator user not in meeting
      - code: 122004
        httpCode: 400
        msg: target user not in meeting
      - code: 122005
        httpCode: 400
        msg: cannot operate self
      - code: 122009
        httpCode: 400
        msg: participant status not expected
      x-lark-rate-limit:
        tier: 4
      x-lark-id-transform:
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.host_user.id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.old_host_user.id
        section: 0
