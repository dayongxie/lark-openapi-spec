components:
  schemas:
    ScopeConfig:
      type: object
      properties:
        room_background:
          type: string
          description: 飞书会议室背景图
          example: https://lf1-ttcdn-tos.pstatp.com/obj/xxx
        display_background:
          type: string
          description: 飞书签到板背景图
          example: https://lf1-ttcdn-tos.pstatp.com/obj/xxx
        digital_signage:
          allOf:
          - $ref: '#/components/schemas/DigitalSignage'
          description: 飞书会议室数字标牌
        room_box_digital_signage:
          allOf:
          - $ref: '#/components/schemas/DigitalSignage'
          description: 飞书投屏盒子数字标牌
        room_status:
          allOf:
          - $ref: '#/components/schemas/RoomStatu'
          description: 会议室状态
    DigitalSignage:
      type: object
      properties:
        if_cover_child_scope:
          type: boolean
          description: 是否覆盖子层级及会议室
          example: 'true'
        enable:
          type: boolean
          description: 是否开启数字标牌功能
          example: 'true'
        mute:
          type: boolean
          description: 是否静音播放
          example: 'true'
        start_display:
          type: integer
          description: 日程会议开始前n分钟结束播放
          example: '3'
        stop_display:
          type: integer
          description: 会议结束后n分钟开始播放
          example: '3'
        materials:
          type: array
          items:
            $ref: '#/components/schemas/Item'
          description: 素材列表
      description: 飞书会议室数字标牌
    Item:
      type: object
      properties:
        id:
          type: string
          description: 素材ID
          example: '7847784676276'
        name:
          type: string
          description: 素材名称
          example: 测试.jpeg
        material_type:
          type: integer
          description: 素材类型
          enum:
          - 1
          - 2
          - 3
          x-enum-descriptions:
            '1': 图片
            '2': 视频
            '3': GIF
          example: '1'
        url:
          type: string
          description: 素材url
          example: https://lf1-ttcdn-tos.pstatp.com/obj/xxx
        duration:
          type: integer
          description: 播放时长（单位sec）
          example: '15'
        cover:
          type: string
          description: 素材封面url
          example: https://lf1-ttcdn-tos.pstatp.com/obj/xxx
        md5:
          type: string
          description: 素材文件md5
          example: ed076287532e86365e841e92bfc50d8c
        vid:
          type: string
          description: 素材文件vid
          example: vid
        size:
          type: string
          description: 素材文件大小（单位byte）
          example: '100'
    RoomStatu:
      type: object
      properties:
        status:
          type: boolean
          description: 是否启用会议室
          example: 'true'
        schedule_status:
          type: boolean
          description: 会议室未来状态为启用或禁用
          example: 'true'
        disable_start_time:
          type: string
          description: 禁用开始时间（unix时间，单位sec）
          example: '1652356050'
          format: int64
        disable_end_time:
          type: string
          description: 禁用结束时间（unix时间，单位sec，数值0表示永久禁用）
          example: '1652442450'
          format: int64
        disable_reason:
          type: string
          description: 禁用原因
          example: 测试占用
        contact_ids:
          type: array
          items:
            type: string
          description: 联系人列表，id类型由user_id_type参数决定
        disable_notice:
          type: boolean
          description: 是否在禁用时发送通知给预定了该会议室的员工
          example: 'true'
        resume_notice:
          type: boolean
          description: 是否在恢复启用时发送通知给预定了该会议室的员工
          example: 'true'
      required:
      - status
      description: 会议室状态
    Room:
      type: object
      properties:
        room_id:
          type: string
          description: 会议室ID
          example: omm_4de32cf10a4358788ff4e09e37ebbf9b
        name:
          type: string
          description: 会议室名称
          example: 测试会议室
        capacity:
          type: integer
          description: 会议室能容纳的人数
          example: '10'
        description:
          type: string
          description: 会议室的相关描述
          example: 测试会议室描述
        display_id:
          type: string
          description: 会议室的展示ID
          example: LM134742334
        custom_room_id:
          type: string
          description: 自定义的会议室ID
          example: '1234'
        room_level_id:
          type: string
          description: 层级ID
          example: omb_8d020b12fe49e82847c2af3c193d5754
        path:
          type: array
          items:
            type: string
          description: 层级路径
          example: '[omb_8d020b12fe49e82847c2af3c193d5754,omb_8d020b12fe49e82847c2af3c193d5754]'
        room_status:
          allOf:
          - $ref: '#/components/schemas/RoomStatu'
          description: 会议室状态
        device:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: 设施名称
                example: 电话
            required:
            - name
          description: 设施信息列表
    CurrentConfig:
      type: object
      properties:
        scope_type:
          type: integer
          description: 查询节点范围
          enum:
          - 1
          - 2
          x-enum-descriptions:
            '1': 会议室层级
            '2': 会议室
          example: '1'
        scope_id:
          type: string
