        description: 是否展示会议主题
        example: 'true'
      - name: start_time
        in: query
        required: true
        schema:
          type: string
          format: int64
        description: 查询开始时间（unix时间，单位sec）
        example: '1655276858'
      - name: end_time
        in: query
        required: true
        schema:
          type: string
          format: int64
        description: 查询结束时间（unix时间，单位sec）
        example: '1655276858'
      - name: room_ids
        in: query
        required: true
        schema:
          type: array
          items:
            type: string
        description: 待筛选的会议室id列表
