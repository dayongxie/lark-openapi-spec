  /open-apis/vc/v1/bots/user_active_meeting:
    get:
      operationId: vc_bot_user_active_meeting
      summary: 获取用户活跃会议列表
      tags:
      - bot
      description: |-
        ## 功能介绍
        查询指定用户当前正在参与的所有会议列表，包含会议号、会议ID及会议标题等核心信息，用于实时同步用户参会状态或会议管理场景。

        ### 注意事项
        - 返回结果仅包含用户当前处于活跃状态的会议，已结束或未开始的会议不会被返回。
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/vc-v1/bot/user_active_meeting
      parameters:
      - name: user_id
        in: query
        required: false
        schema:
          type: string
        example: usr_8a2e7d6f-3b4c-5d6e-7f8a-9b0c1d2e3f4a
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
