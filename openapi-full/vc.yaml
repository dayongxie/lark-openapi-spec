                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      current_config:
                        allOf:
                        - $ref: '#/components/schemas/CurrentConfig'
                        description: 当前节点的配置，根据层级顺序从底向上进行合并计算后的结果；如果当前节点某个值已配置，则取该节点的值，否则会从该节点的父层级节点获取，如果父节点依然未配置，则继续向上递归获取；若所有节点均未配置，则该值返回为空
                      origin_configs:
                        type: array
                        items:
                          $ref: '#/components/schemas/CurrentConfig'
                        description: 所有节点的原始配置，按照层级顺序从底向上返回；如果某节点某个值未配置，则该值返回为空
