        httpCode: 400
        msg: param error
      - code: 126003
        httpCode: 400
        msg: meeting number invalid (cannot smaller than 0)
      - code: 126004
        httpCode: 400
        msg: meeting number length not correct (supposed to be 9)
      - code: 126005
        httpCode: 400
        msg: start time error (cannot larger than now or smaller than 0)
      - code: 126006
        httpCode: 400
