            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户ID的类型
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      participants:
                        type: array
                        items:
                          type: object
                          properties:
                            participant_name:
                              type: string
                              description: 参会者
                              example: kehan
                            department:
                              type: string
                              description: 部门
                              example: development
                            user_id:
                              type: string
                              description: 用户ID
                              example: 8efq90
                            meeting_room_id:
                              type: string
                              description: 会议室ID
                              example: omm_8efq90
                            employee_id:
                              type: string
                              description: 工号
                              example: '202205789'
                            phone:
                              type: string
                              description: 电话
                              example: 021-883889
                            email:
                              type: string
                              description: 邮箱
                              example: xxxx@163.com
                            device:
                              type: string
                              description: 设备
                              default: windows
                              example: windows
                            app_version:
                              type: string
                              description: 客户端版本
                              example: 5.26.0-alpha.38
                            public_ip:
                              type: string
                              description: 公网IP
                              example: 27.xx.xx.183
                            internal_ip:
                              type: string
                              description: 内网IP
                              example: 192.xx.xx.13
                            use_rtc_proxy:
                              type: boolean
                              description: 代理服务
                              example: 'false'
                            location:
                              type: string
                              description: 位置
                              example: 东莞
                            network_type:
                              type: string
                              description: 网络类型
                              example: wifi
                            protocol:
                              type: string
                              description: 连接类型
                              example: udp
                            microphone:
                              type: string
                              description: 麦克风
                              default: mic
                              example: 麦克风阵列 (Realtek(R) Audio)
                            speaker:
                              type: string
                              description: 扬声器
                              example: 扬声器 (Realtek(R) Audio)
                            camera:
                              type: string
                              description: 摄像头
                              example: HD Camera
                            audio:
                              type: boolean
                              description: 音频
                              example: 'true'
                            video:
                              type: boolean
                              description: 视频
                              example: 'true'
                            sharing:
                              type: boolean
                              description: 共享
                              example: 'false'
                            join_time:
                              type: string
                              description: 入会时间
                              example: 2022.12.23 11:16:59 (GMT+08:00)
                            leave_time:
                              type: string
                              description: 离会时间
                              example: 2022.12.23 11:18:51 (GMT+08:00)
                            time_in_meeting:
                              type: string
                              description: 参会时长
                              example: 00:01:52
                            leave_reason:
                              type: string
                              description: 离会原因
                              example: 主持人结束会议
                            accept_status:
                              type: integer
                              description: 日程响应状态
                              enum:
                              - 1
                              - 2
                              - 3
                              - 4
                              x-enum-descriptions:
                                '1': 接受
                                '2': 拒绝
                                '3': 待确认
                                '4': 未响应
                            is_external:
                              type: boolean
                              description: 是否为外部参会人
                              example: 'false'
                            webinar_user_role:
                              type: string
                              description: 网络研讨会中的角色
                              example: '0'
                        description: 参会人列表
                      page_token:
                        type: string
                        description: 下一页分页的token，下次请求时传入
                        example: '20'
                      has_more:
                        type: boolean
                        description: 是否还有数据
                        example: 'true'
      x-lark-access-tokens:
