        in: query
        required: false
        schema:
          type: boolean
        description: 若为true表示导出room_ids范围外的会议室，默认为false
        example: 'false'
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 20
        description: 分页尺寸大小
        example: '20'
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记,第一次请求不填,表示从头开始遍历.下次遍历可采用该 page_token获取查询结果
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      room_reservation_list:
                        type: array
                        items:
                          type: object
                          properties:
                            room_id:
                              type: string
                              description: 会议室ID
                              example: omm_4de32cf10a4358788ff4e09e37ebbf9b
                            room_name:
                              type: string
                              description: 会议室名称
                              example: VIP Meeting Room
                            event_title:
                              type: string
                              description: 会议标题
                              example: 飞书邀请的日程
                            reserver:
                              type: string
                              description: 预定人
                              example: kehan
                            reserver_user_id:
                              type: string
                              description: 预定人ID
                              example: ou_1234567(UserID);cli_123123(BotID)
                            department_of_reserver:
                              type: string
                              description: 预定人所属部门
                              example: development
                            guests_number:
                              type: string
                              description: 邀约人数
                              example: '5'
                            accepted_number:
                              type: string
                              description: 接受人数
                              example: '2'
                            event_start_time:
                              type: string
                              description: 会议开始时间
                              example: 2022.12.17 21:00:00 (GMT+08:00)
                            event_end_time:
                              type: string
                              description: 会议结束时间
                              example: 2022.12.17 22:00:00 (GMT+08:00)
                            event_duration:
                              type: string
                              description: 会议时长
                              example: '1:00:00'
                            reservation_status:
                              type: string
                              description: 会议室预定状态
                              example: 预定成功
                            check_in_device:
                              type: string
                              description: 签到设备
                              example: 签到板
                            room_check_in_status:
                              type: string
                              description: 会议室签到状态
                              example: 已签到
                            check_in_time:
                              type: string
                              description: 会议室签到时间
                              example: 2022.12.09 13:35:30 (GMT+08:00)
                            is_release_early:
                              type: string
                              description: 是否提前释放
                              example: 已释放（手动释放）
                            releasing_person:
                              type: string
                              description: 释放人
                              example: kehan
                            releasing_time:
                              type: string
                              description: 释放时间
                              example: 2022.12.20 11:25:15 (GMT+08:00)
                        description: 会议室预定列表
                      page_token:
                        type: string
                        description: 下一页分页的token，下次请求时传入
                        example: '20'
                      has_more:
                        type: boolean
                        description: 是否还有数据
                        example: 'true'
      x-lark-access-tokens:
      - tenant
      - user
      x-lark-scopes:
      - vc:room:readonly
      - vc:rooms.room.detailinfo:read
      x-lark-error-mappings:
      - code: 121001
        httpCode: 500
        msg: internal error
      - code: 121002
        httpCode: 400
        msg: not support
      - code: 121003
        httpCode: 400
        msg: param error
      - code: 126005
        httpCode: 400
        msg: start time error (cannot larger than now or smaller than 0)
      - code: 126006
        httpCode: 400
        msg: end time cannot exceed start time for one day or smaller than start time
      - code: 121004
        httpCode: 404
        msg: data not exist
      - code: 121005
        httpCode: 403
        msg: the user does not have Admin Meeting Management module permission
      x-lark-rate-limit:
        tier: 3
      x-lark-pagination: true
