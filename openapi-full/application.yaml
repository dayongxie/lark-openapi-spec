  /open-apis/application/v6/applications/{app_id}/feedbacks:
    get:
      operationId: application_application_feedback_list
      summary: 获取应用反馈列表
      tags:
      - application.feedback
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/application-v6/application-feedback/list
      parameters:
      - name: app_id
        in: path
        required: true
        schema:
          type: string
        description: 目标应用 ID（本租户创建的所有应用）
        example: cli_9f115af860f7901b
      - name: from_date
        in: query
        required: false
        schema:
          type: string
        description: 查询的起始日期，格式为yyyy-mm-dd。不填则默认为当前日期减去180天。
        example: '2022-01-30'
      - name: to_date
        in: query
        required: false
        schema:
          type: string
        description: |-
          查询的结束日期，格式为yyyy-mm-dd。不填默认为当前日期。
          只能查询 180 天内的数据。
        example: '2022-01-30'
      - name: feedback_type
        in: query
        required: false
        schema:
          type: integer
          enum:
          - 1
          - 2
          x-enum-descriptions:
            '1': 故障反馈
            '2': 产品建议
        description: 反馈类型，不填写则表示查询所有反馈类型。
        example: '1'
      - name: status
        in: query
        required: false
        schema:
          type: integer
          enum:
          - 0
          - 1
          - 2
          - 3
          x-enum-descriptions:
            '0': 反馈未处理
            '1': 反馈已处理
            '2': 反馈处理中
            '3': 反馈已关闭
        description: 反馈处理状态，不填写则表示查询所有处理类型。
        example: '0'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - open_id
          - union_id
          - user_id
          x-enum-descriptions:
            open_id: 用户的 open id
            union_id: 用户的 union id
            user_id: 用户的 user id
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        example: open_id
      - name: page_token
        in: query
        required: false
        schema:
          type: string
          format: int64
        description: 分页拉取反馈列表起始位置标示，不填表示从头开始
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 100
        description: 本次拉取反馈列表最大个数
        example: '100'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      feedback_list:
                        type: array
                        items:
                          type: object
                          properties:
                            feedback_id:
                              type: string
                              description: 应用反馈 ID，应用反馈记录唯一标识
                              example: '7057888018203574291'
                              format: int64
                            app_id:
                              type: string
                              description: 被反馈应用ID
                              example: cli_9b445f5258795107
                            feedback_time:
                              type: string
                              description: 反馈提交时间，格式为yyyy-mm-dd hh:mm:ss
                              example: '2022-01-30 11:30:12'
                            tenant_name:
                              type: string
                              description: 反馈用户的租户名， 查询 isv 应用时反馈数据时返回
                              example: 字节跳动
                            feedback_type:
                              type: integer
                              description: 反馈类型
                              enum:
                              - 1
                              - 2
                              x-enum-descriptions:
                                '1': 故障反馈
                                '2': 产品建议
                              default: 1
                              example: '1'
                            status:
                              type: integer
                              description: 反馈处理状态
                              enum:
                              - 0
                              - 1
                              - 2
                              - 3
                              x-enum-descriptions:
                                '0': 反馈未处理
                                '1': 反馈已处理
                                '2': 反馈处理中
                                '3': 反馈已关闭
                              default: 0
                              example: '0'
                            fault_type:
                              type: array
                              items:
                                type: integer
                              description: '故障类型：1: 黑屏 2: 白屏 3: 无法打开小程序  4: 卡顿 5: 小程序闪退 6: 页面加载慢 7: 死机 8: 其他异常） 只在故障反馈时返回'
                              example: '[1,2,3]'
                            fault_time:
                              type: string
                              description: 故障时间，格式为yyyy-mm-dd hh:mm:ss
                              example: '2022-01-30 11:30:12'
                            source:
                              type: integer
                              description: 反馈来源：1： 小程序 2：网页应用 3：机器人 4：webSDK
                              enum:
                              - 1
                              - 2
                              - 3
                              - 4
                              x-enum-descriptions:
                                '1': 小程序
                                '2': 网页应用
                                '3': 机器人
                                '4': WebSDK
                              default: 1
                              example: '1'
                            contact:
                              type: string
                              description: 用户联系方式，只有用户填写联系方式后返回
                            update_time:
                              type: string
                              description: 反馈处理时间，格式为yyyy-mm-dd hh:mm:ss
                              example: '2022-01-30 11:30:12'
                            description:
                              type: string
                              description: 反馈问题描述
                            user_id:
                              type: string
                              description: 反馈用户id，租户内用户的唯一标识 ，ID值与查询参数中的user_id_type对应，应用为 isv 应用时不返回
                              example: ou_9565b69967831233761cc2f11b4c089f
                            operator_id:
                              type: string
                              description: 操作者id，租户内用户的唯一标识， ID值与查询参数中的user_id_type 对应 反馈未被处理时该值为 nil
                              example: ou_9565b69967831233761cc2f11b4c089f
                            images:
                              type: array
                              items:
                                type: string
                              description: 反馈图片url列表，url 过期时间三天
                            feedback_path:
                              type: string
                              description: 反馈页面路径
                          required:
                          - feedback_id
                          - app_id
                          - feedback_time
                          - feedback_type
                          - status
                          - description
                        description: 应用的反馈列表
                      has_more:
                        type: boolean
                        description: 是否还有更多用户反馈列表，true：是，false：否
                      page_token:
                        type: string
                        description: 拉取下一页应用反馈列表时使用的 page_token
                    required:
                    - has_more
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - application:application.feedback.feedback_info
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      - contact:user.phone:readonly
      - contact:user.email:readonly
      - directory:employee.base.email:read
      x-lark-error-mappings:
      - code: 211005
        httpCode: 400
        msg: invalid app id
      - code: 210504
        httpCode: 400
        msg: no such app in tenant
      - code: 211007
        httpCode: 400
        msg: invalid date format
      - code: 211010
        httpCode: 403
        msg: invalid date range
      - code: 211011
        httpCode: 404
        msg: data not found
      x-lark-rate-limit:
        tier: 3
