  /open-apis/application/v6/applications/{app_id}/app_versions:
    get:
      operationId: application_application_app_version_list
      summary: 获取应用版本列表
      tags:
      - application.app_version
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/application-v6/application-app_version/list
      parameters:
      - name: app_id
        in: path
        required: true
        schema:
          type: string
        description: 如果查询自身应用信息，可填入 "me" 或者应用自身 app_id。对应权限仅需申请“管理应用自身资源”。如需查询其他应用信息，必须申请获取应用信息权限，仅支持查询所在租户开发的自建应用。需要填入对应应用的appID。
        example: cli_9b445f5258795107
      - name: lang
        in: query
        required: true
        schema:
          type: string
          enum:
          - zh_cn
          - en_us
          - ja_jp
          x-enum-descriptions:
            zh_cn: 中文
            en_us: 英文
            ja_jp: 日文
        description: 应用信息的语言版本
        example: zh_cn
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 20
        description: 分页大小
        example: '10'
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该 page_token 获取查询结果
        example: new-e3c5a0627cdf0c2e057da7257b90376a
      - name: order
        in: query
        required: false
        schema:
          type: integer
          default: 0
        description: 0：按照时间倒序 1：按照时间正序
        example: '0'
