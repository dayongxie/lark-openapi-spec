                            bot:
                              type: array
                              items:
                                type: object
                                properties:
                                  metric_name:
                                    type: string
                                    description: 指标名称
                                    example: pv
                                  metric_value:
                                    type: integer
                                    description: 指标值
                                    example: '100'
                                required:
                                - metric_name
                                - metric_value
                              description: 机器人使用情况，没有机器人形态时为null
                        description: 部门内员工使用应用的概览数据
      x-lark-access-tokens:
