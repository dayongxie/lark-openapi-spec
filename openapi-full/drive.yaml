  /open-apis/drive/v1/metas/batch_query:
    post:
      operationId: drive_meta_batch_query
      summary: 获取文件元数据
      tags:
      - meta
      description: 获取文档元数据
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/drive-v1/meta/batch_query
      parameters:
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户ID的类型
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                request_docs:
                  type: array
                  items:
                    $ref: '#/components/schemas/RequestDocInfo'
                  description: 请求文档,  一次不超过200个
                with_url:
                  type: boolean
                  description: 是否获取文档链接
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      metas:
                        type: array
                        items:
                          type: object
                          properties:
                            doc_token:
                              type: string
                              description: 文件token
                              example: doccnfYZzTlvXqZIGTdAHKabcef
                            doc_type:
                              type: string
                              description: 文件类型
                              example: doc
                            title:
                              type: string
                              description: 标题
                              example: sampletitle
                            owner_id:
                              type: string
                              description: 文件所有者
                              example: ou_b13d41c02edc52ce66aaae67bf1abcef
                            create_time:
                              type: string
                              description: 创建时间（Unix时间戳）
                              example: '1652066345'
                              format: int64
                            latest_modify_user:
                              type: string
                              description: 最后编辑者
                              example: ou_b13d41c02edc52ce66aaae67bf1abcef
                            latest_modify_time:
                              type: string
                              description: 最后编辑时间（Unix时间戳）
                              example: '1652066345'
                              format: int64
                            url:
                              type: string
                              description: 文档链接
                              example: https://sample.feishu.cn/docs/doccnfYZzTlvXqZIGTdAHKabcef
                            sec_label_name:
                              type: string
                              description: 文档密级标签名称
                              example: L2-内部
                            request_doc_info:
                              allOf:
                              - $ref: '#/components/schemas/RequestDocInfo'
                              description: 请求的request_doc
                          required:
                          - doc_token
                          - doc_type
                          - title
                          - owner_id
                          - create_time
                          - latest_modify_user
                          - latest_modify_time
                          - url
                      failed_list:
                        type: array
                        items:
                          type: object
                          properties:
                            token:
                              type: string
                              description: 获取元数据失败的文档token
                            code:
                              type: integer
                              description: 获取元数据失败的错误码
                              enum:
                              - 970002
                              - 970003
                              - 970005
                              x-enum-descriptions:
                                '970002': Unsupported doc-type
                                '970003': No permission to access meta
                                '970005': Record not found
                          required:
                          - token
                          - code
                    required:
                    - metas
      x-lark-access-tokens:
      - tenant
      - user
      x-lark-scopes:
      - drive:drive
      - drive:drive.metadata:readonly
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      - drive:file.meta.sec_label.read_only
      x-lark-error-mappings:
      - code: 1069701
        httpCode: 401
        msg: User identity verification failed
      - code: 1069704
        httpCode: 503
        msg: Internal server error
      x-lark-rate-limit:
        tier: 4
