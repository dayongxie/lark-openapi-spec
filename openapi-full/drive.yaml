        example: 1674037112--7189934631754563585
      - name: file_type
        in: query
        required: true
        schema:
          type: string
          enum:
          - doc
          - docx
          - sheet
          - bitable
          - mindnote
          - wiki
          - file
          x-enum-descriptions:
            doc: 旧版文档
            docx: 新版文档
            sheet: 电子表格
            bitable: 多维表格
