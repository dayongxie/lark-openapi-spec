    get:
      operationId: drive_file_list
      summary: 获取文件夹中的文件清单
      tags:
      - file
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/drive-v1/file/list
      parameters:
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
        description: 分页大小
        example: '50'
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该 page_token 获取查询结果
        example: 54mp576O5beh5qOA5qGI5L6L6KeG6aKRfDE2NTIyNTQ2NDR8NzA5jM3OTcwNjM1Nzg5MTA5Mnwx
      - name: folder_token
        in: query
        required: false
        schema:
          type: string
        description: 文件夹的token（若不填写该参数或填写空字符串，则默认获取用户云空间下的清单，且不支持分页）
        example: fldbcA20e61hWy1yODd3tlaI9pd
      - name: order_by
        in: query
        required: false
        schema:
          type: string
          enum:
          - EditedTime
          - CreatedTime
          x-enum-descriptions:
            EditedTime: 编辑时间排序
            CreatedTime: 创建时间排序
          default: EditedTime
        description: 排序规则
        example: EditedTime
      - name: direction
        in: query
        required: false
        schema:
          type: string
          enum:
          - ASC
          - DESC
          x-enum-descriptions:
            ASC: 升序
            DESC: 降序
          default: DESC
        description: 升序降序
        example: DESC
      - name: option
        in: query
        required: false
        schema:
          type: string
        description: 指定获取文件清单的特殊方式
        example: get_all_children_unsort
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户ID的类型
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      files:
                        type: array
                        items:
                          $ref: '#/components/schemas/File'
                        description: 文档详细信息
                      next_page_token:
                        type: string
                        description: 下一页分页参数
                        example: 54mp576O5beh5qOA5qGI5L6L6KeG6aKRfDE2NTIyNTQ2NDR8NzA5NjM3OTcwNjM1Nzg5MTA5Mnwx
                      has_more:
                        type: boolean
                        description: 是否有下一页
                        example: 'true'
      x-lark-access-tokens:
      - tenant
      - user
      x-lark-scopes:
