components:
  schemas:
    Data:
      type: object
      properties:
        comment_id:
          type: string
          description: 评论 ID
          example: 69161068xxxxx512356
        user_id:
          type: string
          description: 用户 ID
        create_time:
          type: integer
          description: 创建时间
          example: '1610281603'
        update_time:
          type: integer
          description: 更新时间
          example: '1610281603'
        is_solved:
          type: boolean
          description: 是否已解决
        solved_time:
          type: integer
          description: 解决评论时间
          example: '1610281603'
        solver_user_id:
          type: string
          description: 解决评论者的用户 ID
        has_more:
          type: boolean
          description: 是否有更多回复
        page_token:
          type: string
          description: 回复分页标记
          example: '6916106822734512356'
        is_whole:
          type: boolean
          description: 是否是全文评论
        quote:
          type: string
          description: 局部评论的引用字段
          example: hello
        reply_list:
          allOf:
          - $ref: '#/components/schemas/ReplyList'
          description: 评论里的回复列表
    Item:
      type: object
      properties:
        content:
          allOf:
          - $ref: '#/components/schemas/Content'
          description: 回复内容
        reply_id:
          type: string
          description: 回复 ID
          example: 6916106xxxxx4512356
        user_id:
          type: string
          description: 用户 ID
          example: ou_cc19b2bfb93f8a44db4b4d6eab2abcef
        create_time:
          type: integer
          description: 创建时间
          example: '1610281603'
        update_time:
          type: integer
          description: 更新时间
          example: '1610281603'
        extra:
          type: object
          properties:
            image_list:
              type: array
              items:
                type: string
          description: 回复的其他内容，图片 Token 等
        reactions:
          type: array
          items:
            type: object
            properties:
              reaction_key:
                type: string
                description: 表情回复的唯一标识，用于区分不同类型的评论表情（如点赞、鼓掌等）。
                example: like
              count:
                type: integer
                description: 该表情回复的累计使用次数，统计范围为当前评论下所有用户的有效回复记录。
                example: '10'
              ahead_users:
                type: array
                items:
                  type: string
                description: 用于在界面优先展示核心互动用户。用户ID可通过用户信息查询接口获取。
            required:
            - reaction_key
            - count
          description: 评论回复卡片上对应的表情回复信息
      required:
      - content
    Content:
      type: object
      properties:
        elements:
          type: array
          items:
            $ref: '#/components/schemas/Item2'
          description: 回复内容的元素列表
      required:
      - elements
      description: 回复内容
    ReplyList:
      type: object
      properties:
        replies:
          type: array
          items:
            $ref: '#/components/schemas/Item'
          description: 回复列表
      required:
      - replies
      description: 评论里的回复列表
    Item2:
      type: object
      properties:
        type:
          type: string
          description: 回复内容的元素类型
          enum:
          - text_run
          - docs_link
          - person
          x-enum-descriptions:
            text_run: 普通文本
            docs_link: at 云文档链接
            person: at 联系人
          example: docs_link
        text_run:
          type: object
          properties:
            text:
              type: string
              description: 回复 普通文本
          required:
          - text
          description: 文本内容
        docs_link:
          type: object
          properties:
            url:
              type: string
              description: 回复 at 云文档
          required:
          - url
          description: 云文档链接
        person:
          type: object
          properties:
            user_id:
              type: string
              description: 回复 at 联系人
              example: ou_cc19b2bfb93f8a44db4b4d6eababcef
          required:
          - user_id
          description: 联系人
      required:
      - type
    Schema:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          $ref: '#/components/schemas/Data'
    Item3:
      type: object
      properties:
        member_type:
          type: string
          description: 协作者ID类型
          enum:
          - email
          - openid
          - unionid
          - openchat
          - opendepartmentid
          - userid
          - groupid
          - wikispaceid
          - appid
          x-enum-descriptions:
            email: 飞书邮箱
            openid: 开放平台OpenID
            unionid: 开放平台UnionID
            openchat: 开放平台群组ID
            opendepartmentid: 开放平台部门ID
            userid: 用户自定义ID
