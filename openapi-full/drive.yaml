      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      - contact:user.base:readonly
      - contact:contact:readonly
      - contact:contact:access_as_app
      - contact:contact:readonly_as_app
      x-lark-error-mappings:
      - code: 1061001
        httpCode: 500
        msg: server internal error
      - code: 1061002
        httpCode: 400
        msg: invalid params
      - code: 1061003
        httpCode: 404
        msg: file not found
      - code: 1061004
        httpCode: 403
        msg: no file permission
      - code: 1061007
        httpCode: 400
        msg: file is deleted
