                              example: ou_cc19b2bfb93f8a44db4b4d6eababcef
                            name:
                              type: string
                              description: 访问者名称
                              example: zhangsan
                            avatar_url:
                              type: string
                              description: 访问者头像 URL
                              example: https://foo.icon.com/xxxx
                            last_view_time:
