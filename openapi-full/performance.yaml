    post:
      operationId: performance_review_template_query
      summary: 获取绩效模板配置
      tags:
      - review_template
      description: 获取评估模板配置
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/performance-v2/review_template/query
      parameters:
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该 page_token 获取查询结果
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 20
        description: 分页大小
        example: '30'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                review_template_ids:
                  type: array
                  items:
                    type: string
