  /open-apis/performance/v2/reviewees/query:
    post:
      operationId: performance_reviewee_query
      summary: 获取被评估人信息
      tags:
      - reviewee
      description: 获取指定周期参与了的被评估人
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/performance-v2/reviewee/query
      parameters:
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          - people_admin_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
            people_admin_id: 以people_admin_id来识别用户
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        example: open_id
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该 page_token 获取
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 20
        description: 分页大小
        example: '30'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                semester_id:
                  type: string
                  description: 周期 ID，1 次只允许查询 1 个周期，semester_id 可通过【获取周期】接口获得
                  example: '6992035450862224940'
                  format: int64
                user_ids:
                  type: array
                  items:
                    type: string
                  description: 用户 ID，类型需要与查询参数中的user_id_type保持一致。不传则默认返回该周期所有被评估人的信息。
                activity_ids:
                  type: array
                  items:
                    type: string
                  description: 项目 ID 列表，查询指定的项目下的被评估人数据
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      semester_id:
                        type: string
                        description: 周期ID
                        example: '7291278856547794964'
                      reviewees:
                        type: array
                        items:
                          type: object
                          properties:
                            reviewee_user_id:
                              type: object
                              properties:
                                open_id:
                                  type: string
                                  description: 用户的 open_id
                                  example: od-asd2dasdasd
                                user_id:
                                  type: string
                                  description: 用户的 user_id，取值与user_id_type一致
                                  example: ou-ux987dsf6x
                              description: 被评估人 ID
                            activity_ids:
                              type: array
                              items:
                                type: string
                              description: 被评估人参与的项目
                            reviewprofile_url:
                              type: string
                              description: 被评估人在该周期的个人绩效详情页链接。如果参与的项目未启动则为空
                              example: https://performance.feishu.cn/perf/profile?rootReviewId=7380183500051202067
                        description: 被评估人列表
                      has_more:
                        type: boolean
                        description: 是否还有更多项
                      page_token:
                        type: string
                        description: 分页标记，当 has_more 为 true 时，会同时返回新的 page_token，否则不返回 page_token
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - performance:semester_user:read
      - performance:performance:readonly
      - performance:performance
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      x-lark-error-mappings:
      - code: 1580101
        httpCode: 500
        msg: internal error
      - code: 1580102
        httpCode: 400
        msg: param is invalid
      - code: 1580105
        httpCode: 400
        msg: invalid semester ID
      - code: 1580107
        httpCode: 400
        msg: page token invalid
      - code: 1580108
        httpCode: 400
        msg: page token expired
      - code: 1580901
        httpCode: 400
        msg: tenant no licnese
      x-lark-rate-limit:
        tier: 2
      x-lark-id-transform:
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.user_ids[*]
        section: 0
