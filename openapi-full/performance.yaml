                      reviewee: 被评估人
                      invited_reviewer: 360°评估人
                      solid_line_leader: 实线上级
                      dotted_line_leader: 虚线上级
                      secondary_solid_line_leader: 第二实线上级
                      direct_project_leader: 项目直属上级
                      custom_review_role: 自定义评估角色
