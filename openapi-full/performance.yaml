                                  example: Interactive experience
                              description: 填写题名称
                            tag_items:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: string
                                    description: 标签 ID
                                    example: '7343513161666707459'
                                  name:
                                    type: object
                                    properties:
                                      zh_cn:
                                        type: string
                                        description: 中文
                                        example: 体验
                                      en_us:
                                        type: string
                                        description: 英文
                                        example: Interactive experience
                                    description: 标签名称
                                required:
