                          required:
                          - question_id
                        description: 标签填写题
                      has_more:
                        type: boolean
                        description: 是否还有更多项
                      page_token:
                        type: string
                        description: 分页标记，当 has_more 为 true 时，会同时返回新的 page_token，否则不返回 page_token
