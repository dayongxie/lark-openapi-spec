                                example: グループチャット
                            description: 该字段标识发送者多语种的名称
                        required:
                        - id
                        - id_type
                        - sender_type
                        description: 发送者，可以是用户或应用
                        example: object
                      body:
                        type: object
                        properties:
                          content:
                            type: string
