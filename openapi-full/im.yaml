  /open-apis/im/v1/messages/search:
    post:
      operationId: im_message_search
      summary: 搜索消息
      tags:
      - message
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/message/search
      parameters:
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
      - name: page_token
        in: query
        required: false
        schema:
          type: string
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户ID的类型
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: query (长度范围：0 ～ 50 字符)
                  example: 下午去哪团建
                filter:
                  type: object
                  properties:
                    from_ids:
                      type: array
                      items:
                        type: string
                      description: 消息创建者
                    chat_ids:
                      type: array
                      items:
                        type: string
                      description: 消息所在的会话
                    time_range:
                      type: object
                      properties:
                        start_time:
                          type: string
                          description: 开始时间(iso8601)
                          example: '2026-03-21T16:15:30+08:00'
                        end_time:
                          type: string
                          description: 结束时间(iso8601)
                          example: '2026-03-21T16:15:30+08:00'
                      description: 开始与结束时间
                    include_attachment_types:
                      type: array
                      items:
                        type: string
                        enum:
                        - image
                        - video
                        - file
                        - link
                        x-enum-descriptions:
                          image: image
                          video: video
                          file: file
                          link: link
                      description: 包含某些附件类型
                    from_types:
                      type: array
                      items:
                        type: string
                        enum:
                        - user
                        - bot
                        x-enum-descriptions:
                          user: user
                          bot: bot
                      description: 来源类型(用户消息、机器人消息)
                    at_chatter_ids:
                      type: array
                      items:
                        type: string
                      description: 消息中包含at的user_id (包含at all)
                    chat_type:
                      type: string
                      description: 会话类型（单聊、群聊） 单选
                      enum:
                      - group
                      - p2p
                      x-enum-descriptions:
                        group: group
                        p2p: p2p
                    is_at_me:
                      type: boolean
                      description: 是否at过我，默认否
                    exclude_from_types:
                      type: array
                      items:
                        type: string
                        enum:
                        - user
                        - bot
                        x-enum-descriptions:
                          user: user
                          bot: bot
                      description: 过滤来源
                  description: 消息过滤器
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: 消息ID
                              example: om_40eb06e7b84dc71c03e00ida3c754892
                            display_info:
                              type: string
                              description: 包含群组基本信息的卡片,用户搜索关键词命中的文本 片段,使用<h></h>标签包裹标注
                              example: 飞书<h>搜索</h>
                            meta_data:
                              type: object
                              properties:
                                message_id:
                                  type: string
                                  description: 消息ID
                                  example: om_40eb06e7b84dc71c03e00ida3c754892
                                type:
                                  type: string
                                  description: 消息类型
                                  enum:
                                  - unknown
                                  - post
                                  - file
                                  - text
                                  - image
                                  - system
                                  - audio
                                  - email
                                  - share_group_chat
                                  - sticker
                                  - merge_forward
                                  - calendar
                                  - cloud_file
                                  - card
                                  - media
                                  - share_calendar_event
                                  - hongbao
                                  - general_calendar
                                  - video_chat
                                  - location
                                  - commercialized_hongbao
                                  - share_user_card
                                  - todo
                                  - folder
                                  - diagnose
                                  - vote
                                  - link
                                  x-enum-descriptions:
                                    unknown: unknown
                                    post: post
                                    file: file
                                    text: text
                                    image: image
                                    system: system
                                    audio: audio
                                    email: email
                                    share_group_chat: share_group_chat
                                    sticker: sticker
                                    merge_forward: merge_forward
                                    calendar: calendar
                                    cloud_file: cloud_file
                                    card: card
                                    media: media
                                    share_calendar_event: share_calendar_event
                                    hongbao: hongbao
                                    general_calendar: general_calendar
                                    video_chat: video_chat
                                    location: location
                                    commercialized_hongbao: commercialized_hongbao
                                    share_user_card: share_user_card
                                    todo: todo
                                    folder: folder
                                    diagnose: diagnose
                                    vote: vote
                                    link: link
                                  example: post
                                create_time:
                                  type: string
                                  description: 创建时间(iso8601)
                                  example: '2026-03-21T16:15:30+08:00'
                                update_time:
                                  type: string
                                  description: 更新时间(iso8601)
                                  example: '2026-03-21T16:15:30+08:00'
                                position:
                                  type: integer
                                  description: 消息位置
                                  example: '0'
                                chat_id:
                                  type: string
                                  description: 所在会话ID
                                  example: oc_5ad11d72b830411d72b836c20
                                  x-lark-id-types:
                                    chat_id: chat
                                from_id:
                                  type: string
                                  description: 消息发送者ID
                                  example: ou-7890123456abcdef
                                thread_id:
                                  type: string
                                  description: 消息话题ID
                                  example: omt_d4be107c616a
                                thread_position:
                                  type: integer
                                  description: 消息话题位置
                                  example: '10'
                                is_p2p_chat:
                                  type: boolean
                                  description: 是否为单聊
                                  example: 'false'
                              required:
                              - message_id
                              description: 消息元数据
                          required:
                          - id
                        description: items
                      total:
                        type: integer
                        description: total
                        example: '100'
                      has_more:
                        type: boolean
                        description: has_more
                      page_token:
                        type: string
                        description: page_token
                      notice:
                        type: string
                        description: 搜索补充提示信息，返回本次搜索的额外说明，例如：query被截断；搜索结果不全等
                        example: The query is too long and has been truncated to the first 50 characters for search.
                    required:
                    - items
                    - has_more
      x-lark-access-tokens:
      - user
      x-lark-scopes:
      - search:message
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      x-lark-error-mappings:
      - code: 230001
        httpCode: 400
        msg: param is invalid
      x-lark-rate-limit:
        tier: 3
      x-lark-pagination: true
      x-lark-id-transform:
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.filter.from_ids[*]
        section: 0
      - fromTo:
          from: open_chat_id
          idType: ''
          idTypeKey: ''
          idTypeSection: 2
          to: lark_id
        key: $.filter.chat_ids[*]
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.filter.at_chatter_ids[*]
        section: 0
