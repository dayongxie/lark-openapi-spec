                        example: '1609336806'
                        format: int64
                      deleted:
                        type: boolean
                        description: 消息是否被撤回
                        example: 'false'
                      updated:
                        type: boolean
                        description: 消息是否被更新
                        example: 'false'
                      chat_id:
                        type: string
                        description: 所属的群
                        example: oc_5ad11d72b830411d72b836c20
                        x-lark-id-types:
