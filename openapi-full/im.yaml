  /open-apis/im/v1/threads/{thread_id}/forward:
    post:
      operationId: im_thread_forward
      summary: 转发话题
      tags:
      - thread
      description: 转发
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/thread/forward
      parameters:
      - name: thread_id
        in: path
        required: true
        schema:
          type: string
        description: 要转发的话题ID
        example: ot_dc13264520392913993dd051dba21dcf
      - name: receive_id_type
        in: query
        required: true
        schema:
          type: string
          enum:
          - open_id
          - user_id
          - union_id
          - email
          - chat_id
          - thread_id
          x-enum-descriptions:
            open_id: 标识一个用户在某个应用中的身份。同一个用户在不同应用中的 Open ID 不同。
            user_id: 标识一个用户在某个租户内的身份。同一个用户在租户 A 和租户 B 内的 User ID 是不同的。在同一个租户内，一个用户的 User ID 在所有应用（包括商店应用）中都保持一致。User ID 主要用于在不同的应用间打通用户数据。
            union_id: 标识一个用户在某个应用开发商下的身份。同一用户在同一开发商下的应用中的 Union ID 是相同的，在不同开发商下的应用中的 Union ID 是不同的。通过 Union ID，应用开发商可以把同个用户在多个应用中的身份关联起来。
            email: 以用户的真实邮箱来标识用户。
            chat_id: 以群ID来标识群聊。
            thread_id: 以话题ID来标识话题。
          x-lark-id-types:
            chat_id: chat
            open_id: user
            union_id: user
            user_id: user
        description: 消息接收者id类型 open_id/user_id/union_id/email/chat_id/thread_id
      - name: uuid
        in: query
        required: false
        schema:
          type: string
        description: 由开发者生成的唯一字符串序列，用于转发消息请求去重；持有相同uuid的请求在1小时内向同一个目标的转发只可成功一次。
        example: b13g2t38-1jd2-458b-8djf-dtbca5104204
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                receive_id:
                  type: string
                  description: 依据receive_id_type的值，填写对应的转发目标的ID
                  example: oc_a0553eda9014c201e6969b478895c230
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      message_id:
                        type: string
                        description: 消息id open_message_id
                        example: om_dc13264520392913993dd051dba21dcf
                      root_id:
                        type: string
                        description: 根消息id open_message_id
                        example: om_40eb06e7b84dc71c03e009ad3c754195
                      parent_id:
                        type: string
                        description: 父消息的id open_message_id
                        example: om_d4be107c616aed9c1da8ed8068570a9f
                      thread_id:
                        type: string
                        description: 消息所属的话题 ID
                        example: omt_d4be107c616a
                      msg_type:
                        type: string
                        description: 消息类型 text post card image等等
                        example: card
                      create_time:
                        type: string
                        description: 消息生成的时间戳(毫秒)
                        example: '1609296809'
                        format: int64
                      update_time:
                        type: string
                        description: 消息更新的时间戳
                        example: '1609336806'
                        format: int64
                      deleted:
                        type: boolean
                        description: 消息是否被撤回
                        example: 'false'
                      updated:
                        type: boolean
                        description: 消息是否被更新
                        example: 'false'
                      chat_id:
                        type: string
                        description: 所属的群
                        example: oc_5ad11d72b830411d72b836c20
                        x-lark-id-types:
                          chat_id: chat
                      sender:
                        type: object
                        properties:
                          id:
                            type: string
                            description: 该字段标识发送者的id
                          id_type:
                            type: string
                            description: 该字段标识发送者的id类型
                          sender_type:
                            type: string
                            description: 该字段标识发送者的类型
                          tenant_key:
                            type: string
                            description: tenant key
                            example: 736588c9260f175e
                          open_bot_id:
                            type: string
                            description: 该字段表示bot发送者的openid
                            example: ou_4df0d86a696caae0d70054633af9565b
                          sender_i18n_names:
                            type: object
