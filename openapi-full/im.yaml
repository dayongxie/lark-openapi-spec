  /open-apis/im/v1/chats:
    post:
      operationId: im_chat_create
      summary: 创建群
      tags:
      - chat
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/chat/create
      parameters:
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户ID的类型
        example: open_id
      - name: set_bot_manager
        in: query
        required: false
        schema:
          type: boolean
          default: false
        description: 如果选择了设置群主为指定用户，可以选择是否同时设置创建此群的机器人为管理员，此标志位用于标记是否设置创建群的机器人为管理员
        example: 'false'
      - name: uuid
        in: query
        required: false
        schema:
          type: string
        description: 由开发者生成的唯一字符串序列，用于创建群组请求去重；持有相同uuid的请求10小时内只可成功创建1个群聊
        example: b13g2t38-1jd2-458b-8djf-dtbca5104204
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  description: 群头像对应的 Image Key，可通过[上传图片](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/image/create)获取（注意：上传图片的
                    `image_type` 需要指定为 `avatar`）
                  example: default-avatar_44ae0ca3-e140-494b-956f-78091e348435
                name:
                  type: string
                  description: |-
                    群名称

                     **注意：** 公开群名称的长度不得少于2个字符
                  example: 测试群名称
                description:
                  type: string
                  description: 群描述
                  example: 测试群描述
                i18n_names:
                  type: object
                  properties:
                    zh_cn:
                      type: string
                      description: 中文名
                      example: 群聊
                    en_us:
                      type: string
                      description: 英文名
                      example: group chat
                    ja_jp:
                      type: string
                      description: 日文名
                      example: グループチャット
                  description: 群国际化名称
                owner_id:
                  type: string
                  description: |-
                    创建群时指定的群主，不填时指定建群的机器人为群主。

                    群主 ID，ID值与查询参数中的 user_id_type 对应。

                    不同 ID 的说明参见 [用户相关的 ID 概念](https://open.feishu.cn/document/home/user-identity-introduction/introduction)
                  example: ou_7d8a6e6df7621556ce0d21922b676706ccs
                user_id_list:
                  type: array
                  items:
                    type: string
                  description: 创建群时邀请的群成员，id 类型为 user_id_type
                bot_id_list:
                  type: array
                  items:
                    type: string
                  description: "创建群时邀请的群机器人\n \n**注意：** 拉机器人入群请使用 `app_id`"
                group_message_type:
                  type: string
                  description: 群消息模式
                  enum:
                  - chat
                  - thread
                  x-enum-descriptions:
                    chat: 普通模式
                    thread: 话题模式
                  default: chat
                  example: chat
                chat_mode:
                  type: string
                  description: |-
                    群模式

                    **可选值有**：
                    - `group`：群组
                  default: group
                  example: group
                chat_type:
                  type: string
                  description: |-
                    群类型

                    **可选值有**：
                    - `private`：私有群
                    - `public`：公开群
                  default: private
                  example: private
                join_message_visibility:
                  type: string
                  description: |-
                    入群消息可见性

                    **可选值有**：
                    - `only_owner`：仅群主和管理员可见
                    - `all_members`：所有成员可见
                    - `not_anyone`：任何人均不可见
                  default: all_members
                  example: all_members
                leave_message_visibility:
                  type: string
                  description: |-
                    退群消息可见性

                    **可选值有**：
                    - `only_owner`：仅群主和管理员可见
                    - `all_members`：所有成员可见
                    - `not_anyone`：任何人均不可见
                  default: all_members
                  example: all_members
                membership_approval:
                  type: string
                  description: |-
                    加群审批

                    **可选值有**：
                    - `no_approval_required`：无需审批
                    - `approval_required`：需要审批
                  default: no_approval_required
                  example: no_approval_required
                restricted_mode_setting:
