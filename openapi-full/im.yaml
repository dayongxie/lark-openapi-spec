                                  type: string
                                  description: 群主ID
                                  example: 4d7a3c6g
                                owner_id_type:
                                  type: string
                                  description: 群主ID类型
                                  example: user_id
                                tenant_key:
                                  type: string
                                  description: tenant key
                                  example: fawefawea
                                chat_status:
                                  type: string
                                  description: 群状态
                                  enum:
                                  - normal
                                  - dissolved
                                  - dissolved_save
                                  x-enum-descriptions:
                                    normal: 正常
                                    dissolved: 解散
                                    dissolved_save: 解散并保留
                              required:
