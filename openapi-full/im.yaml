      - code: 232001
        httpCode: 400
        msg: ''
      - code: 232004
        httpCode: 400
        msg: ''
      - code: 232024
        httpCode: 400
        msg: ''
      - code: 232025
        httpCode: 400
        msg: Bot ability is not activated.
      - code: 232034
        httpCode: 400
        msg: ''
