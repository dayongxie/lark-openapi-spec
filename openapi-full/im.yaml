  /open-apis/im/v1/messages/merge_forward:
    post:
      operationId: im_message_merge_forward
      summary: 合并转发消息
      tags:
      - message
      description: 合并转发多条消息
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/im-v1/message/merge_forward
      parameters:
      - name: receive_id_type
        in: query
        required: true
        schema:
          type: string
          enum:
          - open_id
          - user_id
          - union_id
          - email
          - chat_id
          - thread_id
          x-enum-descriptions:
            open_id: 标识一个用户在某个应用中的身份。同一个用户在不同应用中的 Open ID 不同。
            user_id: 标识一个用户在某个租户内的身份。同一个用户在租户 A 和租户 B 内的 User ID 是不同的。在同一个租户内，一个用户的 User ID 在所有应用（包括商店应用）中都保持一致。User ID 主要用于在不同的应用间打通用户数据。
            union_id: 标识一个用户在某个应用开发商下的身份。同一用户在同一开发商下的应用中的 Union ID 是相同的，在不同开发商下的应用中的 Union ID 是不同的。通过 Union ID，应用开发商可以把同个用户在多个应用中的身份关联起来。
            email: 以用户的真实邮箱来标识用户。
            chat_id: 以群ID来标识群聊。
            thread_id: 以话题ID来标识话题。
          x-lark-id-types:
            chat_id: chat
            open_id: user
            union_id: user
            user_id: user
        description: 消息接收者id类型 open_id/user_id/union_id/email/chat_id
      - name: uuid
        in: query
        required: false
        schema:
          type: string
        description: 由开发者生成的唯一字符串序列，用于转发消息请求去重；持有相同uuid的请求在1小时内向同一个目标的转发只可成功一次。
        example: b13g2t38-1jd2-458b-8djf-dtbca5104204
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                receive_id:
                  type: string
                  description: 依据receive_id_type的值，填写对应的转发目标的ID
                  example: oc_a0553eda9014c201e6969b478895c230
                message_id_list:
                  type: array
                  items:
                    type: string
                  description: 要转发的消息ID列表
      responses:
        '200':
