                                type: string
                                description: 英文名
                                example: group chat
                              ja_jp:
                                type: string
                                description: 日文名
                                example: グループチャット
                            description: 该字段标识发送者多语种的名称
                        required:
                        - id
                        - id_type
                        - sender_type
                        description: 发送者，可以是用户或应用
                        example: object
                      body:
                        type: object
                        properties:
                          content:
                            type: string
                            description: 消息jsonContent
                            example: text:测试消息
                        required:
                        - content
                        description: 消息内容,json结构
                        example: json结构
                      mentions:
                        type: array
                        items:
                          type: object
                          properties:
                            key:
                              type: string
                              description: mention key
                              example: 1@_user_1
                            id:
                              type: string
                              description: 用户或机器人的 id, id 类型与 id_type 一致
                              example: ou_155184d1e73cbfb8973e5a9e698e74f2
                            id_type:
                              type: string
                              description: id类型，包括open_id，user_id，union_id 或 app_id
                              example: open_id
                            name:
                              type: string
                              description: 被at用户的姓名
                              example: Tom
                            tenant_key:
                              type: string
                              description: tenant key
                              example: 736588c9260f175e
                          required:
                          - key
                          - id
                          - id_type
                          - name
                        description: 被艾特的人或应用的id
                      upper_message_id:
                        type: string
                        description: 合并消息的上一层级消息id open_message_id
                        example: om_40eb06e7b84dc71c03e00ida3c754892
                      message_position:
