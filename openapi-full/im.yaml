                    <b>请求体大小限制</b>：
                    - 文本消息请求体最大不能超过150KB
                    - 卡片及富文本消息请求体最大不能超过30KB
                  example: '{"text":"test content"}'
                uuid:
                  type: string
                  description: 由开发者生成的唯一字符串序列，用于发送消息请求去重；持有相同uuid的请求1小时内至多成功执行一次
                  example: 选填，每次调用前请更换，如a0d69e20-1dd1-458b-k525-dfeca4015204
      responses:
