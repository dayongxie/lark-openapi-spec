          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            chat_id:
                              type: string
                              description: 群组ID
                              example: oc_a0553eda9014c201e6969b478895c230
                              x-lark-id-types:
                                chat_id: chat
                            avatar:
                              type: string
                              description: 群头像URL
                              example: https://p3-lark-file.byteimg.com/img/lark-avatar-staging/default-avatar_44ae0ca3-e140-494b-956f-78091e348435~100x100.jpg
                            name:
                              type: string
                              description: 群名称
                              example: 测试群名称
                            description:
                              type: string
                              description: 群描述
                              example: 测试群描述
                            owner_id:
                              type: string
                              description: 群主ID
                              example: 4d7a3c6g
                            owner_id_type:
                              type: string
                              description: 群主ID类型
                              example: user_id
                            external:
                              type: boolean
                              description: 是否是外部群
                              example: 'false'
                            tenant_key:
                              type: string
                              description: tenant key
                              example: fawefawea
                            chat_status:
                              type: string
                              description: 群状态
                              enum:
                              - normal
                              - dissolved
                              - dissolved_save
                              x-enum-descriptions:
                                normal: 正常
                                dissolved: 解散
                                dissolved_save: 解散并保留
                              example: normal
                            chat_mode:
                              type: string
                              description: 群模式;group=普通群/topic=话题群/p2p=单聊
                              enum:
                              - group
                              - topic
                              - p2p
                              x-enum-descriptions:
                                group: 普通群
                                topic: 话题群
                                p2p: 单聊
                              example: p2p
                            p2p_target_type:
                              type: string
                              description: 单聊对端类型;仅 chat_mode=p2p 时返回
                              enum:
                              - user
                              - bot
                              x-enum-descriptions:
                                user: 用户
                                bot: 机器人
                              example: user
                            p2p_target_id:
                              type: string
                              description: 单聊对端ID;仅 chat_mode=p2p 时返回
                              example: ou_7d8a6e6df7621556ce0d21922b676706ccs
                        description: chat列表
                      page_token:
                        type: string
                        description: 分页标记，当 has_more 为 true 时，会同时返回新的 page_token，否则不返回 page_token
                        example: '0'
                      has_more:
                        type: boolean
                        description: 是否还有更多群组
                        example: 'true'
      x-lark-access-tokens:
      - user
      - tenant
      x-lark-scopes:
      - im:chat:readonly
      - im:chat
      - im:chat.group_info:readonly
      - im:chat:read
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
