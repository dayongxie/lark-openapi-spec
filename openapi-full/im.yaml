                          root_id:
                            type: string
                            description: 根消息id open_message_id
                            example: om_40eb06e7b84dc71c03e009ad3c754195
                          parent_id:
                            type: string
                            description: 父消息的id open_message_id
                            example: om_d4be107c616aed9c1da8ed8068570a9f
                          thread_id:
                            type: string
                            description: 消息所属的话题 ID
                            example: omt_d4be107c616a
                          msg_type:
                            type: string
