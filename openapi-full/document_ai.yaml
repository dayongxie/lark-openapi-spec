                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      file_id:
                        type: string
                        description: 文件的唯一id
                        example: '7216597635774283796'
                      price:
                        type: object
                        properties:
                          contract_price:
                            type: number
                            description: 交易金额
                            example: '200000'
                          contract_price_original:
                            type: string
                            description: 从原文中抽取的交易金额
                            example: '"200000"'
                          text:
                            type: string
                            description: 原文中描述交易金额的文字
                            example: 本合同项下总金额共计￥200000（贰拾万元整）
                        description: 总交易金额
                      time:
                        type: object
                        properties:
                          time_start:
                            type: string
                            description: 开始时间
                            example: '2020-07-01'
                          time_end:
                            type: string
                            description: 结束时间
                            example: '2022-06-30'
                          original_time_start:
                            type: string
                            description: 原文中抽取出的开始时间
                            example: 2020年07月1日
                          original_time_end:
                            type: string
                            description: 原文中抽取出的结束时间
                            example: 2022年6月30日
                          text_start:
                            type: string
                            description: 原文中关于开始时间的描述
                            example: 本协议自有效期自【2020】年【07】月【1】日至【2022】年【6】月【30】日，有效期2年。
                          text_end:
                            type: string
                            description: 原文中关于结束时间的描述
                            example: 本协议自有效期自【2020】年【07】月【1】日至【2022】年【6】月【30】日，有效期2年。
                          initial_term:
                            type: object
                            properties:
                              initial_time:
                                type: string
                                description: 合同持续时长
                                example: '2'
                              initial_unit:
                                type: string
                                description: 持续时长单位
                                example: 年
                            description: 合同持续时长
                          text_initial_term:
                            type: string
                            description: 原文中关于持续时间的描述
                            example: 2年
                        description: 期限相关信息，包括开始日期、结束日期、有效时长
                      copy:
