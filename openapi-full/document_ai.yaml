                            description: 从原文中抽取的盖章份数
                            example: 一式贰份
                          key:
                            type: string
                            description: 盖章文件类型
                            example: 协议
                          text:
                            type: string
                            description: 原文有关盖章份数的描述
                            example: 此协议一式贰份，双方各执壹份，具有同等法律效力。
                        description: 盖章份数
                      currency:
                        type: object
                        properties:
                          currency_name:
                            type: string
                            description: 币种名称
                            example: CNY
                          currency_text:
                            type: string
                            description: 币种符号
                            example: ¥
                        description: 币种
                      header:
                        type: string
                        description: 合同标题
                        example: 项目活动框架协议
                      body_info:
                        type: array
                        items:
                          type: object
                          properties:
                            body_type:
                              type: string
                              description: 主体类型
                              enum:
                              - buy
                              - sell
                              - third
                              x-enum-descriptions:
                                buy: 甲方主体
                                sell: 乙方主体
                                third: 第三方、其他方主体
                              example: buy
                            value:
                              type: object
                              properties:
                                address:
                                  type: string
                                  description: 地址
                                  example: 北京市海淀区紫金数码园4号楼
                                contacts:
                                  type: string
                                  description: 联系人
                                  example: 张三
                                email:
                                  type: string
                                  description: 邮箱
                                  example: zhangsan.1111@bytedance.com
                                phone:
                                  type: string
                                  description: 电话
                                  example: '13600000000'
                                id_number:
                                  type: string
                                  description: ID
                                  example: 310XXXXXXXXXXXXXXX
                                legal_representative:
                                  type: string
                                  description: 法人代表
                                  example: 张三
                                party:
                                  type: string
                                  description: 当事人
                                  example: 北京字节跳动网络技术有限公司
                              description: 值
                              example: value
                        description: 主体信息
                      bank_info:
                        type: array
                        items:
                          type: object
                          properties:
                            bank_type:
                              type: string
