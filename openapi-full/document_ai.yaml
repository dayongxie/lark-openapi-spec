  /open-apis/document_ai/v1/contract/field_extraction:
    post:
      operationId: document_ai_contract_field_extraction
      summary: 提取文件中的合同字段
      tags:
      - contract
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/ai/document_ai-v1/contract/field_extraction
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 合同字段解析的源文件，当前只支持pdf, doc, docx三种类型的文件
                pdf_page_limit:
                  type: integer
                  description: pdf页数限制，太长会导致latency增加，最大允许100页
                  example: '15'
                ocr_mode:
                  type: string
                  description: ocr 参数，当前支持force, pdf, unused三种格式
                  enum:
                  - force
                  - auto
                  - unused
                  x-enum-descriptions:
                    force: pdf类型文件直接走OCR解析
                    auto: pdf类型文件先走本地解析，无法解析（扫描/图片版）再走OCR
                    unused: 不调用OCR，扫描/图片PDF返回不可解析信息
                  example: auto
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
