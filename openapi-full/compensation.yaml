    post:
      operationId: compensation_lump_sum_payment_batch_create
      summary: 批量创建一次性支付记录
      tags:
      - lump_sum_payment
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/compensation-v1/lump_sum_payment/batch_create
      parameters:
      - name: user_id_type
        in: query
        required: true
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          - people_corehr_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
            people_corehr_id: 以people_corehr_id来识别用户
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户ID类型
        example: open_id
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                records:
                  type: array
                  items:
                    type: object
                    properties:
                      unique_id:
                        type: string
                        description: 外部幂等id，由上游业务决定
                        example: '7402510801304718380_7309316347007764012_7402523725868058156_1726070400000_10000'
                      user_id:
                        type: string
                        description: 员工id，具体类型由入参中的 user_id_type 指定
                        example: '7337149697626801708'
                      total_amount:
                        type: string
                        description: 总金额，字符串表达的数字
                        example: '2000.00'
                      binding_period:
                        type: integer
                        description: 绑定期，单位为月
                        example: '2'
                      currency_id:
                        type: string
                        description: 币种id
                        example: '6863329932261459464'
                      issuance_frequency:
                        type: integer
                        description: 发放次数，必须与 details 的长度一致
                        example: '3'
                      item_id:
                        type: string
                        description: 薪酬项id（可通过 https://open.larkoffice.com/document/uAjLw4CM/ukTMukTMukTM/compensation-v1/item/list?appId=cli_a3077e2bb03c100d
                          进行查询）
                        example: '7411039006180312620'
                      reference_period_start_date:
                        type: string
                        description: 一次性支付记录所属期开始日期
                        example: '2024-08-01'
                      reference_period_end_date:
                        type: string
                        description: 一次性支付记录所属期结束日期
                        example: '2024-08-01'
                      details:
                        type: array
                        items:
                          type: object
                          properties:
                            issuance_amount:
                              type: string
                              description: 一次性支付明细发放金额，可转数字的字符串
                              example: '2000.00'
                            issuance_status:
                              type: string
                              description: 发放状态
                              enum:
                              - to_be_issued
                              - not_issued
                              x-enum-descriptions:
                                to_be_issued: 应发放
                                not_issued: 不发放
                              example: to_be_issued
                            issuance_way:
                              type: string
                              description: 发放方式
                              enum:
                              - with_salary
                              - with_cash
                              - with_year_end_bonus
                              x-enum-descriptions:
                                with_salary: 随工资发放
                                with_cash: 现金发放
                                with_year_end_bonus: 随年终奖发放
                              example: with_salary
                            issuance_time:
                              type: string
                              description: 发放日期
                              example: '2024-08-01'
                            belong_time:
                              type: string
                              description: 申请发放日期
                              example: '2025-01-20'
                            issuance_country_region_id:
                              type: string
                              description: 发放国家ID（可通过 https://open.larkoffice.com/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/basic_info-country_region/search进行查询）
                              example: '6862995757234914824'
                            issuance_pay_group_id:
                              type: string
                              description: 发放薪资组ID（可通过 https://open.larkoffice.com/document/uAjLw4CM/ukTMukTMukTM/payroll-v1/paygroup/list进行查询）
                              example: '6862995757234914824'
                            detail_reference_period_start_date:
                              type: string
                              description: 一次性支付明细所属期开始日期
                              example: '2024-08-01'
                            detail_reference_period_end_date:
                              type: string
                              description: 一次性支付明细所属期结束日期
                              example: '2024-08-01'
                            is_not_issued_due_to_offboardings:
                              type: integer
                              description: 是否因离职不发放 0, // 空，未填写或不适用     Yes   = 1, // 是，因离职停发     No    = 2, // 否，非离职停发
                              default: 0
                              example: '0'
                          required:
                          - issuance_amount
                          - issuance_status
                          - issuance_way
                          - issuance_time
                          - belong_time
                        description: 发放明细列表
                      remark:
                        type: string
                        description: 备注
                        example: 备注
                      binding_period_decimal:
                        type: string
                        description: 绑定期带小数
                        example: '12.56'
                    required:
                    - unique_id
                    - user_id
                    - total_amount
                    - binding_period
                    - currency_id
                    - issuance_frequency
                    - item_id
