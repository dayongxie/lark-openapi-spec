  /open-apis/compensation/v1/recurring_payment/batch_create:
    post:
      operationId: compensation_recurring_payment_batch_create
      summary: 批量创建经常性支付记录
      tags:
      - recurring_payment
      description: 创建经常性支付记录
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/compensation-v1/recurring_payment/batch_create
      parameters:
      - name: user_id_type
        in: query
        required: true
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          - people_corehr_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
            people_corehr_id: 以people_corehr_id来识别用户
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户ID类型
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                records:
                  type: array
                  items:
                    type: object
                    properties:
                      unique_id:
                        type: string
                        description: 外部幂等id，由上游业务决定
                        example: '7402510801304718380_7309316347007764012_7402523725868058156_1726070400000_10000'
                      user_id:
                        type: string
                        description: 员工id，具体类型由入参中的 user_id_type 指定
                        example: '7337149697626801708'
                      item_id:
                        type: string
                        description: 薪酬项id（可通过 https://open.larkoffice.com/document/uAjLw4CM/ukTMukTMukTM/compensation-v1/item/list?appId=cli_a3077e2bb03c100d
                          进行查询）
                        example: '7411039006180312620'
                      each_amount:
                        type: string
                        description: 每次发放金额
                        example: '20.00'
                      start_date:
                        type: string
                        description: 发放开始时间
                        example: '2024-08-01'
                      end_date:
                        type: string
                        description: 发放结束时间
                        example: '2025-08-01'
                      currency_id:
                        type: string
                        description: 币种id
                        example: '6863329932261459464'
                      issuance_type:
                        type: string
                        description: 发放方式
                        enum:
                        - with_salary
                        - with_cash
                        - with_physical_distribution
                        - with_year_end_bonus
                        x-enum-descriptions:
                          with_salary: 随工资发放
                          with_cash: 现金发放
                          with_physical_distribution: 实物发放
                          with_year_end_bonus: 随年终奖发放
                        example: with_salary
                      issuance_period:
                        type: string
                        description: 发放频率
                        enum:
                        - year
                        - half_year
                        - quarterly
                        - bimonthly
                        - month
                        - biweekly
                        - week
                        - day
                        - hour
                        x-enum-descriptions:
                          year: 年
                          half_year: 半年
                          quarterly: 季度
                          bimonthly: 双月
                          month: 月
                          biweekly: 双周
                          week: 周
                          day: 天
                          hour: 小时
                        example: year
                      remark:
                        type: string
                        description: 备注
                        example: 这是个备注
                      issuance_country_region_id:
                        type: string
                        description: 发放国家id（可通过 https://open.larkoffice.com/document/uAjLw4CM/ukTMukTMukTM/corehr-v2/basic_info-country_region/search进行查询）
                        example: '6862995745046267400'
                    required:
                    - unique_id
                    - user_id
                    - item_id
                    - each_amount
                    - start_date
                    - end_date
                    - currency_id
                    - issuance_type
                    - issuance_period
                  description: 要创建的经常性支付记录
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      operate_results:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: 操作记录的id
                              example: '7390583861280556588'
                            unique_id:
                              type: string
                              description: 操作的记录的 unique_id
                              example: '7390583861280556588'
                            code:
                              type: integer
                              description: 操作结果状态码
                              enum:
                              - 0
                              - 21280001
                              - 21280002
                              - 21280003
                              - 21270304
                              - 21270305
                              - 21270306
                              - 21270307
                              - 21270308
                              - 21270309
                              - 21270310
                              - 21270311
                              - 21270312
                              - 21270313
                              - 21270314
                              - 21270315
                              - 21270316
                              - 21270317
                              - 21270318
                              x-enum-descriptions:
                                '0': 操作成功
                                '21280001': 每次发放金额格式不正确
                                '21280002': 发放开始时间格式不正确
                                '21280003': 发放结束时间格式不正确
                                '21270304': 没有该经常性支付记录权限
                                '21270305': 经常性支付类型薪酬项不存在
                                '21270306': 币种不存在
                                '21270307': 发放方式不存在
                                '21270308': 发放开始时间大于发放结束时间
                                '21270309': 员工不在薪酬项规则适用范围之内
                                '21270310': 发放方式不匹配薪酬项规则
                                '21270311': 币种不匹配薪酬项规则
                                '21270312': 发放开始日期早于当前日期不可删除
                                '21270313': 该经常性支付记录不存在
                                '21270314': 发放频率不匹配薪酬项
                                '21270315': 发放开始日期和结束日期有重叠
                                '21270316': 发放国家为空
                                '21270317': 发放国家不存在
                                '21270318': 单次发放金额不允许为0
                              example: '21270202'
                            message:
                              type: string
                              description: 操作结果描述
                              example: uqniue id conflict
                        description: 每条记录的操作结果。对于创建成功的记录，会返回创建后的经常性支付记录id
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - corehr:compensation.recurring_payment:write
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      x-lark-error-mappings:
      - code: 2290001
        httpCode: 400
        msg: param is invalid
      - code: 2290002
        httpCode: 500
        msg: server error
      x-lark-rate-limit:
        tier: 7
      x-lark-id-transform:
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.records[*].user_id
        section: 0
