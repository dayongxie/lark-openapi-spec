                                          description: 企业缴纳金额
                                          example: '1000.20'
                                        personal_setting:
                                          type: object
                                          properties:
                                            lower_limit:
                                              type: string
                                              description: 基数下限，浮点数，保留二位小数
                                              example: '1000.00'
                                            upper_limit:
                                              type: string
                                              description: 基数上限，浮点数，保留二位小数
                                              example: '2000.00'
                                            payment_ratio:
                                              type: string
                                              description: 缴纳比例，浮点数，默认填充到二位小数，支持输入到四位，单位为 %
                                              example: '8.00'
                                            payment_rounding_rule:
                                              type: string
                                              description: '缴纳金舍入规则。rounding: 四舍五入; round_up: 向上舍入; round_down: 向下舍入'
                                              enum:
                                              - rounding
                                              - round_up
                                              - round_down
                                              x-enum-descriptions:
                                                rounding: 四舍五入
                                                round_up: 向上舍入
                                                round_down: 向下舍入
                                              example: '8.00'
                                            payment_decimals:
                                              type: integer
                                              description: 缴纳金小数位数，0-6之间选择
                                              example: '2'
                                            fixed_payment:
                                              type: string
                                              description: 附加固定金额，浮点数，保留二位小数
                                              example: '200.00'
                                          required:
                                          - lower_limit
                                          - upper_limit
                                          - payment_ratio
                                          - payment_rounding_rule
                                          - payment_decimals
                                          - fixed_payment
                                          description: 险种缴纳配置
