                    description: IM message id。
                    example: '7657833388933385753'
                  content:
                    type: string
                    description: 解码后的纯文本内容。merge-forward 时为子消息 content 聚合。
                    example: hi
                description: 底层字段名虽然叫 msg_payload_bytes，但对 OAPI 返回的是已解码后的消息 payload。\ncontent 和 decoded_messages 都需要透出。
              unavailable_reason:
                type: string
                description: 解码失败时返回原因；成功时为空。
                example: failed
          description: 任务来源关联资源。群聊消息创建任务时，这里返回消息资源上下文。
      description: 任务关联的第三方平台来源信息
    Attachment:
