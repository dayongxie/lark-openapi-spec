          example: https://www.example.com
        tip:
          allOf:
          - $ref: '#/components/schemas/Tip'
          description: 自定义完成的弹出提示为
      description: pc客户端自定义完成配置（含mac和windows）
    Schema2:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          $ref: '#/components/schemas/Data2'
    Data2:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Task'
          description: 子任务列表
        page_token:
          type: string
          description: 用于返回下一个分页的token
          example: aWQ9NzEwMjMzMjMxMDE=
        has_more:
          type: boolean
          description: 是否还有下一页数据。
          example: 'true'
    Origin:
      type: object
      properties:
        platform_i18n_name:
          allOf:
          - $ref: '#/components/schemas/Tip'
          description: 任务导入来源的名称，用于在任务中心详情页展示。需提供多语言版本。
        href:
          type: object
          properties:
            url:
              type: string
              description: 链接对应的地址
              example: https://www.example.com
            title:
              type: string
              description: 链接对应的标题
              example: 反馈一个问题，需要协助排查
          description: 任务关联的来源平台详情页链接
        refer_resources:
          type: array
          items:
            type: object
            properties:
              resource_id:
                type: string
                description: refer resource id，对应任务上的 refer_resource_ids。
                example: '7657833389273124377'
              type:
                type: string
                description: 资源类型。当前群聊消息资源为 message，若底层仍是枚举值，也可以先透出 string(enum_value)。
                example: '1'
              source_message:
                type: object
                properties:
                  message_id:
