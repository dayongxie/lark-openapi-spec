        msg: page_token is invalid or expired, please start a new search
      - code: 1474003
        httpCode: 400
        msg: page_size exceeds maximum allowed value 30
      - code: 1474004
        httpCode: 400
        msg: 'pagination limit reached (max offset: 150), please refine your query with more specific keywords or filters'
      - code: 1474005
        httpCode: 400
        msg: tasklist time format is invalid
      - code: 1474006
        httpCode: 400
        msg: failed to build tasklist filter
      - code: 1475001
        httpCode: 500
        msg: failed to convert tasklist search result
      - code: 1475002
        httpCode: 500
        msg: search service error
      x-lark-rate-limit:
        tier: 3
      x-lark-pagination: true
      x-lark-id-transform:
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.filter.user_id[*]
        section: 0
  /open-apis/task/v2/tasklists/{tasklist_guid}/tasks:
    get:
      operationId: task_tasklist_tasks
      summary: 获取清单任务列表
      tags:
      - tasklist
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/task-v2/tasklist/tasks
      parameters:
      - name: tasklist_guid
        in: path
        required: true
        schema:
          type: string
        description: 要获取任务的清单全局唯一ID
        example: d300a75f-c56a-4be9-80d1-e47653028ceb
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 50
        description: 每页返回的任务数量
        example: '50'
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记。第一次请求不填该参数，表示从头开始查询；查询结果若还有更多数据时会同时返回新的 page_token。使用page_token重新调用本接口可以获取下一页数据。
        example: aWQ9NzEwMjMzMjMxMDE=
      - name: completed
        in: query
        required: false
        schema:
          type: boolean
        description: 只查看特定完成状态的任务，不填写表示不按完成状态过滤
        example: 'true'
      - name: created_from
        in: query
        required: false
        schema:
          type: string
          format: int64
        description: 任务创建的起始时间戳（ms），闭区间，不填写默认为首个任务的创建时间戳
        example: '1675742789470'
      - name: created_to
        in: query
        required: false
        schema:
          type: string
          format: int64
        description: 任务创建的结束时间戳（ms），闭区间，不填写默认为最后创建任务的创建时间戳
        example: '1675742789470'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 表示user的ID的类型，支持open_id, user_id, union_id
        example: open_id
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schema8'
      x-lark-access-tokens:
      - tenant
      - user
      x-lark-scopes:
      - task:tasklist:read
      - task:tasklist:write
      x-lark-error-mappings:
      - code: 1470400
        httpCode: 400
        msg: ''
      - code: 1470404
        httpCode: 404
        msg: ''
      - code: 1470500
        httpCode: 500
        msg: ''
      - code: 1470403
        httpCode: 403
        msg: ''
      x-lark-rate-limit:
        tier: 4
components:
  schemas:
    Task:
      type: object
      properties:
        guid:
          type: string
          description: 任务guid，任务的唯一ID
          example: 83912691-2e43-47fc-94a4-d512e03984fa
        summary:
          type: string
          description: 任务标题
          example: 进行销售年中总结
        description:
          type: string
          description: 任务描述
          example: 进行销售年中总结
        due:
          type: object
          properties:
            timestamp:
              type: string
              description: 截止时间/日期的时间戳，距1970-01-01 00:00:00的毫秒数。如果截止时间是一个日期，需要把日期转换成时间戳，并设置 is_all_day=true
              example: '1675454764000'
              format: int64
            is_all_day:
              type: boolean
              description: 是否截止到一个日期。如果设为true，timestamp中只有日期的部分会被解析和存储。
              example: 'true'
          description: 任务截止时间
          example: '1675742789470'
        reminders:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: 提醒时间设置的 ID
                example: '10'
                format: int64
              relative_fire_minute:
                type: integer
                description: 相对于截止时间的提醒时间分钟数。例如30表示截止时间前30分钟提醒；0表示截止时提醒。
                example: '30'
            required:
            - relative_fire_minute
          description: 任务的提醒配置列表。目前每个任务最多有1个。
        creator:
          type: object
          properties:
            id:
              type: string
              description: 表示member的id
              example: ou_2cefb2f014f8d0c6c2d2eb7bafb0e54f
            type:
              type: string
              description: 成员的类型
              default: user
              example: user
            role:
              type: string
              description: 成员角色
              example: editor
            name:
              type: string
              description: 成员名称
              example: 张明德（明德）
          description: 任务创建者
        members:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: 表示member的id
                example: ou_2cefb2f014f8d0c6c2d2eb7bafb0e54f
              type:
                type: string
                description: 成员的类型
                default: user
                example: user
              role:
                type: string
                description: 成员角色
                example: editor
              name:
                type: string
                description: 成员名称
                example: 张明德（明德）
          description: 任务成员列表
        completed_at:
          type: string
          description: 任务完成的时间戳(ms)
          example: '1675742789470'
          format: int64
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Item'
          description: 任务的附件列表
        origin:
          allOf:
          - $ref: '#/components/schemas/Origin'
          description: 任务关联的第三方平台来源信息。创建是设置后就不可更改。
        extra:
          type: string
          description: 任务附带的自定义数据。
          example: dGVzdA==
        tasklists:
          type: array
          items:
            type: object
            properties:
              tasklist_guid:
                type: string
                description: 任务所在清单的guid
                example: cc371766-6584-cf50-a222-c22cd9055004
              section_guid:
                type: string
                description: 任务所在清单的自定义分组guid
                example: e6e37dcc-f75a-5936-f589-12fb4b5c80c2
          description: 任务所属清单的名字。调用者只能看到有权限访问的清单的列表。
        repeat_rule:
          type: string
          description: 如果任务为重复任务，返回重复任务的配置
          example: FREQ=WEEKLY;INTERVAL=1;BYDAY=MO,TU,WE,TH,FR
        parent_task_guid:
          type: string
          description: 如果当前任务为某个任务的子任务，返回父任务的guid
          example: e297ddff-06ca-4166-b917-4ce57cd3a7a0
        mode:
          type: integer
          description: 任务的模式。1 - 会签任务；2 - 或签任务
          example: '2'
        source:
          type: integer
          description: 任务创建的来源
          enum:
          - 0
          - 1
          - 2
          - 6
          - 7
          - 8
          x-enum-descriptions:
            '0': 未知来源
            '1': 任务中心
            '2': 群组任务/消息转任务
            '6': 通过开放平台以tenant_access_token授权创建的任务
            '7': 通过开放平台以user_access_token授权创建的任务
            '8': 文档任务
          example: '6'
        custom_complete:
          allOf:
          - $ref: '#/components/schemas/CustomComplete'
          description: 任务的自定义完成配置
        task_id:
          type: string
          description: 任务界面上的代码
          example: t6272302
        created_at:
          type: string
          description: 任务创建时间戳(ms)
          example: '1675742789470'
          format: int64
        updated_at:
          type: string
          description: 任务最后一次更新的时间戳(ms)
          example: '1675742789470'
          format: int64
        status:
          type: string
          description: 任务的状态，支持"todo"和"done"两种状态
          example: todo
        url:
          type: string
          description: 任务的分享链接
          example: https://applink.feishu.cn/client/todo/detail?guid=70577c8f-91ab-4c91-b359-a21a751054e8&suite_entity_num=t192012
        start:
          type: object
          properties:
            timestamp:
              type: string
              description: 开始时间/日期的时间戳，距1970-01-01 00:00:00的毫秒数。如果开始时间是一个日期，需要把日期转换成时间戳，并设置 is_all_day=true
              example: '1675454764000'
              format: int64
            is_all_day:
              type: boolean
              description: 是否开始于一个日期。如果设为true，timestamp中只有日期的部分会被解析和存储。
              example: 'true'
          description: 任务的开始时间
        subtask_count:
          type: integer
          description: 该任务的子任务的个数。
          example: '1'
        is_milestone:
          type: boolean
          description: 是否是里程碑任务
          example: 'false'
        custom_fields:
          type: array
          items:
            $ref: '#/components/schemas/Item2'
          description: 任务的自定义字段值
        dependencies:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                description: 依赖类型
                enum:
                - prev
                - next
                x-enum-descriptions:
                  prev: 前置依赖
                  next: 后置依赖
                example: next
              task_guid:
                type: string
                description: 依赖任务的GUID
                example: 93b7bd05-35e6-4371-b3c9-6b7cbd7100c0
            required:
            - type
            - task_guid
          description: 任务依赖
        assignee_related:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: 任务执行者的id
                example: ou_2cefb2f014f8d0c6c2d2eb7bafb0e54f
              completed_at:
                type: string
                description: 会签任务中执行者完成的时间戳(ms)
                example: '1675742789470'
                format: int64
          description: 任务执行者相关信息，如会签任务各执行者完成时间等
        positive_reminders:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: 提醒时间设置的 ID
                example: '10'
                format: int64
              relative_fire_minute:
                type: integer
                description: 相对于截止时间的提醒时间分钟数。例如30表示截止时间前30分钟提醒；0表示截止时提醒。
                example: '30'
            required:
            - relative_fire_minute
          description: 正数协议任务提醒
        agent_task_status:
          type: integer
          description: 智能体任务状态
          example: '1'
        agent_task_progress:
          type: string
          description: 智能体任务进度
          example: 1/4
        text_deliveries:
          type: array
          items:
            type: string
          description: 智能体文本类交付物
        attachment_deliveries:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
          description: 智能体附件类交付物
        next_task_guid:
          type: string
          description: 重复任务的下一个任务
          example: 83912691-2e43-47fc-94a4-d512e03984fa
      description: 创建的任务
    Schema:
      type: object
      properties:
        code:
          type: integer
        msg:
          type: string
        data:
          $ref: '#/components/schemas/Data'
    Data:
      type: object
      properties:
        task:
          allOf:
          - $ref: '#/components/schemas/Task'
          description: 更新完成后的任务实体数据
    Tip:
      type: object
      properties:
        en_us:
          type: string
          description: 英文
          example: workbench
        zh_cn:
          type: string
          description: 中文
          example: 工作台
        zh_hk:
          type: string
          description: 中文（香港地区）
          example: 工作臺
        zh_tw:
          type: string
          description: 中文（台湾地区）
          example: 工作臺
        ja_jp:
          type: string
          description: 日语
          example: 作業台
        fr_fr:
          type: string
          description: 法语
          example: Table de travail
        it_it:
          type: string
          description: 意大利语
          example: banco di lavoro
        de_de:
          type: string
          description: 德语
          example: Werkbank
        ru_ru:
          type: string
          description: 俄语
          example: верстак
        th_th:
          type: string
          description: 泰语
          example: โต๊ะทำงาน
        es_es:
          type: string
          description: 西班牙语
          example: banco de trabajo
        ko_kr:
          type: string
          description: 韩语
          example: 작업대
      description: 任务导入来源的名称，用于在任务中心详情页展示。需提供多语言版本。
    CustomComplete:
      type: object
      properties:
        pc:
          allOf:
          - $ref: '#/components/schemas/Pc'
          description: pc客户端自定义完成配置（含mac和windows）
        ios:
          allOf:
          - $ref: '#/components/schemas/Pc'
          description: ios端的自定义完成配置
        android:
          allOf:
          - $ref: '#/components/schemas/Pc'
          description: android端的自定义完成配置
      description: 如果设置，则将任务设计为“自定义完成”。用户在任务中心点击“完成”时，不会直接完成任务，而是跳转到第三方配置好的地址或者现实自定义提示。
    Pc:
      type: object
