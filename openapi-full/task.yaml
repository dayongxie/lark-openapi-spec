        httpCode: 500
        msg: ''
      - code: 1470403
        httpCode: 403
        msg: ''
      x-lark-rate-limit:
        tier: 4
  /open-apis/task/v2/tasklists/search:
    post:
      operationId: task_tasklist_search
      summary: 搜索清单
      tags:
      - tasklist
      description: 搜索任务清单
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/task-v2/tasklist/search
      parameters:
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
      - name: page_token
        in: query
        required: false
        schema:
          type: string
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户ID的类型
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: query (长度范围：0 ～ 50 字符)
                  example: 测试任务清单
                filter:
                  type: object
                  properties:
                    create_time:
                      type: object
                      properties:
                        start_time:
                          type: string
                          description: 范围内的起始时间 (ISO 8601)
                          example: '2026-03-21T16:15:30+08:00'
                        end_time:
                          type: string
                          description: 范围内的结束时间 (ISO 8601)
                          example: '2026-03-21T16:15:30+08:00'
                      description: 创建时间
                    user_id:
                      type: array
                      items:
                        type: string
                      description: 创建人 IDs
                  description: filter
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schema11'
      x-lark-access-tokens:
      - user
      x-lark-scopes:
      - task:tasklist:read
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      x-lark-error-mappings:
      - code: 1474002
