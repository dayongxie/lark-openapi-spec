      summary: 更新任务
      tags:
      - task
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/task-v2/task/patch
      parameters:
      - name: task_guid
        in: path
        required: true
        schema:
          type: string
        description: 要更新的任务全局唯一ID
        example: e297ddff-06ca-4166-b917-4ce57cd3a7a0
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 表示user的ID的类型，支持open_id, user_id, union_id
        example: open_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                task:
                  type: object
                  properties:
                    summary:
                      type: string
                      description: 任务标题
                      example: 针对全年销售进行一次复盘
                    description:
                      type: string
                      description: 任务描述
                      example: 需要事先阅读复盘总结文档
                    due:
                      type: object
                      properties:
                        timestamp:
                          type: string
                          description: 截止时间/日期的时间戳，距1970-01-01 00:00:00的毫秒数。如果截止时间是一个日期，需要把日期转换成时间戳，并设置 is_all_day=true
                          example: '1675454764000'
                          format: int64
                        is_all_day:
                          type: boolean
                          description: 是否截止到一个日期。如果设为true，timestamp中只有日期的部分会被解析和存储。
                          example: 'true'
                      description: 任务截止时间戳(ms)，截止时间戳和截止日期选择一个填写。
                      example: '1675742789470'
                    extra:
                      type: string
                      description: 调用者可以传入的任意附带到任务上的数据。在获取任务详情时会原样返回。
                      example: dGVzdA==
                    completed_at:
                      type: string
                      description: 任务的完成时刻时间戳(ms)
                      default: '0'
                      example: '1675742789470'
                      format: int64
                    repeat_rule:
                      type: string
                      description: 如果设置，则该任务为“重复任务”。该字段表示了重复任务的重复规则。
                      example: FREQ=WEEKLY;INTERVAL=1;BYDAY=MO,TU,WE,TH,FR
                    custom_complete:
                      allOf:
                      - $ref: '#/components/schemas/CustomComplete'
                      description: 如果设置，则将任务设计为“自定义完成”。用户在任务中心点击“完成”时，不会直接完成任务，而是跳转到第三方配置好的地址或者现实自定义提示。
                    start:
                      type: object
                      properties:
                        timestamp:
                          type: string
                          description: 开始时间/日期的时间戳，距1970-01-01 00:00:00的毫秒数。如果开始时间是一个日期，需要把日期转换成时间戳，并设置 is_all_day=true
                          example: '1675454764000'
                          format: int64
                        is_all_day:
                          type: boolean
                          description: 是否开始于一个日期。如果设为true，timestamp中只有日期的部分会被解析和存储。
                          example: 'true'
                      description: 任务的开始时间(ms)
                    mode:
                      type: integer
                      description: 任务的完成模式。1 - 会签任务；2 - 或签任务
                      example: '2'
                    is_milestone:
                      type: boolean
                      description: 是否是里程碑任务
                      example: 'false'
                    custom_fields:
                      type: array
                      items:
                        $ref: '#/components/schemas/Item4'
                      description: 自定义字段值
                    positive_reminders:
                      type: array
                      items:
                        type: object
                        properties:
                          relative_fire_minute:
                            type: integer
                            description: 相对于截止时间的提醒时间分钟数。例如30表示截止时间前30分钟提醒；0表示截止时提醒。
                            example: '30'
                        required:
                        - relative_fire_minute
                      description: 正数协议每日提醒
                    agent_task_status:
                      type: integer
                      description: 智能体任务状态
                      example: '1'
                    agent_task_progress:
                      type: string
                      description: 智能体任务进度
                      example: 1/4
                    text_deliveries:
                      type: array
                      items:
                        type: string
                      description: 智能体文本类交付物
                  description: 要更新的任务数据，只需要写明要更新的字段
                update_fields:
                  type: array
                  items:
                    type: string
                  description: 要更新的字段名称。支持summary, description, due, start, completed_at, extra, repeat_rule, custom_complete,
                    mode, is_milestone, custom_fields。
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
