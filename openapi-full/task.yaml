      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                resource_type:
                  type: string
                  description: 自定义字段要归属的资源类型，支持"tasklist"
                  default: tasklist
                  example: tasklist
                resource_id:
                  type: string
                  description: 自定义字段要归属的资源ID，可以填写清单的tasklist_guid
                  example: ec5ed63d-a4a9-44de-a935-7ba243471c0a
                name:
                  type: string
                  description: 字段名称
                  example: 优先级
                type:
                  type: string
                  description: 自定义字段类型，支持"number", "datetime", "member", "single_select", "multi_select"
                  enum:
                  - number
                  - datetime
                  - member
                  - single_select
                  - multi_select
                  - text
                  x-enum-descriptions:
                    number: 数字
                    datetime: 日期
                    member: 成员
                    single_select: 单选
                    multi_select: 多选
                    text: 文本
                  example: number
                number_setting:
                  allOf:
                  - $ref: '#/components/schemas/NumberSetting'
                  description: 数字类型的字段设置
                member_setting:
                  type: object
                  properties:
                    multi:
                      type: boolean
                      description: 是否支持多选
                      default: false
                      example: 'true'
                  description: 人员类型的字段设置
                datetime_setting:
                  type: object
                  properties:
                    format:
                      type: string
                      description: 日期显示格式
                      example: yyyy/mm/dd
                  description: 时间日期类型的字段设置
                single_select_setting:
                  type: object
                  properties:
                    options:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            description: 选项名称，不能为空，最大50个字符
                            example: 高优
                          color_index:
                            type: integer
                            description: 选项的颜色索引值，可以是0～54中的一个数字。如果不填写则会随机选一个。
                            example: '1'
                          is_hidden:
                            type: boolean
                            description: 选项是否隐藏。隐藏后的选项在界面不可见，也不可以再通过openapi将字段值设为该选项。
                            example: 'false'
                        required:
                        - name
                      description: 单选选项
                  description: 单选设置
                multi_select_setting:
                  type: object
                  properties:
                    options:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            description: 选项名称，不能为空，最大50个字符
                            example: 高优
                          color_index:
                            type: integer
                            description: 选项的颜色索引值，可以是0～54中的一个数字。如果不填写则会随机选一个。
                            example: '1'
                          is_hidden:
                            type: boolean
                            description: 选项是否隐藏。隐藏后的选项在界面不可见，也不可以再通过openapi将字段值设为该选项。
                            example: 'false'
                        required:
                        - name
                      description: 多选选项
                  description: 多选设置
                text_setting:
                  type: object
                  description: 文本类型
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schema3'
