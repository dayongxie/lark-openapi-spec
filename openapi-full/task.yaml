          example: 83912691-2e43-47fc-94a4-d512e03984fa
        summary:
          type: string
          description: 任务标题。创建任务时，如果没有标题填充，将其视为无主题的任务。
          example: 每天喝八杯水，保持身心愉悦
        description:
          type: string
          description: 任务备注
          example: 多吃水果，多运动，健康生活，快乐工作。
        complete_time:
          type: string
          description: 任务的完成时间戳（单位为秒），如果完成时间为 0，则表示任务尚未完成
          example: '1623499200'
          format: int64
        creator_id:
          type: string
          description: 任务的创建者 ID。在创建任务时无需填充该字段
          example: ou_99e1a581b36ecc4862cbfbce473f346a
        extra:
          type: string
          description: 接入方可以自定义的附属信息二进制格式，采用 base64 编码，解析方式由接入方自己决定
          example: dGVzdA==
        create_time:
          type: string
          description: 任务的创建时间戳（单位为秒）
          example: '1623392486'
          format: int64
        update_time:
          type: string
          description: 任务的更新时间戳（单位为秒）
          example: '1623392486'
          format: int64
        due:
          type: object
          properties:
            time:
              type: string
              description: 截止时间的时间戳（单位为秒）
              example: '1623124318'
              format: int64
            timezone:
              type: string
              description: 截止时间对应的时区，完整的时区名称列表可参考：https://docs.aws.amazon.com/zh_cn/redshift/latest/dg/time-zone-names.html
              default: Asia/Shanghai
              example: Asia/Shanghai
            is_all_day:
              type: boolean
              description: 标记任务是否为全天任务（全天任务的截止时间为当天 UTC 时间的 0 点）
              default: false
              example: 'false'
          description: 任务的截止时间设置
        origin:
          type: object
          properties:
            platform_i18n_name:
              type: string
              description: 任务导入来源的名称，用于在任务中心详情页展示。请提供一个字典，多种语言名称映射。支持的各地区语言名：it_it, th_th, ko_kr, es_es, ja_jp, zh_cn, id_id,
                zh_hk, pt_br, de_de, fr_fr, zh_tw, ru_ru, en_us, hi_in, vi_vn
              example: '{"zh_cn": "IT 工作台", "en_us": "IT Workspace"}'
            href:
              type: object
              properties:
