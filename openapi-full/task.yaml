  /open-apis/task/v2/tasks/{task_guid}/subtasks:
    post:
      operationId: task_task_subtask_create
      summary: 创建子任务
      tags:
      - task.subtask
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/task-v2/task-subtask/create
      parameters:
      - name: task_guid
        in: path
        required: true
        schema:
          type: string
        description: 父任务GUID
        example: e297ddff-06ca-4166-b917-4ce57cd3a7a0
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 表示user的ID的类型，支持open_id, user_id, union_id
        example: open_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                summary:
                  type: string
                  description: 任务标题
                  example: 针对全年销售进行一次复盘
                description:
                  type: string
                  description: 任务描述
                  example: 需要事先阅读复盘总结文档
                due:
                  type: object
                  properties:
                    timestamp:
                      type: string
                      description: 截止时间/日期的时间戳，距1970-01-01 00:00:00的毫秒数。如果截止时间是一个日期，需要把日期转换成时间戳，并设置 is_all_day=true
                      example: '1675454764000'
                      format: int64
                    is_all_day:
                      type: boolean
                      description: 是否截止到一个日期。如果设为true，timestamp中只有日期的部分会被解析和存储。
                      example: 'true'
                  description: 任务截止时间戳(ms)，截止时间戳和截止日期选择一个填写。
                  example: '1675742789470'
                origin:
                  allOf:
                  - $ref: '#/components/schemas/Origin'
                  description: 任务关联的第三方平台来源信息
                extra:
                  type: string
                  description: 调用者可以传入的任意附带到任务上的数据。在获取任务详情时会原样返回。
                  example: dGVzdA==
                completed_at:
                  type: string
                  description: 任务的完成时刻时间戳(ms)
                  default: '0'
                  example: '1675742789470'
                  format: int64
                members:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        description: 表示member的id
                        example: ou_2cefb2f014f8d0c6c2d2eb7bafb0e54f
                      type:
                        type: string
                        description: 成员的类型
                        default: user
                        example: user
                      role:
                        type: string
                        description: 成员角色
                        example: assignee
                      name:
                        type: string
                        description: 成员名称
                        example: 张明德（明德）
                    required:
                    - id
                    - role
                  description: 任务成员列表
                repeat_rule:
                  type: string
                  description: 如果设置，则该任务为“重复任务”。该字段表示了重复任务的重复规则。
                  example: FREQ=WEEKLY;INTERVAL=1;BYDAY=MO,TU,WE,TH,FR
                custom_complete:
                  allOf:
                  - $ref: '#/components/schemas/CustomComplete'
                  description: 如果设置，则将任务设计为“自定义完成”。用户在任务中心点击“完成”时，不会直接完成任务，而是跳转到第三方配置好的地址或者现实自定义提示。
                tasklists:
                  type: array
                  items:
                    type: object
                    properties:
                      tasklist_guid:
                        type: string
                        description: 任务所在清单的guid
                        example: cc371766-6584-cf50-a222-c22cd9055004
                      section_guid:
                        type: string
                        description: 任务所在清单的自定义分组guid
                        example: e6e37dcc-f75a-5936-f589-12fb4b5c80c2
                  description: 任务所在清单的信息
                client_token:
                  type: string
                  description: 幂等token，如果填写则触发幂等行为。
                  example: daa2237f-8310-4707-a83b-52c8a81e0fb7
                start:
                  type: object
                  properties:
                    timestamp:
                      type: string
                      description: 开始时间/日期的时间戳，距1970-01-01 00:00:00的毫秒数。如果开始时间是一个日期，需要把日期转换成时间戳，并设置 is_all_day=true
                      example: '1675454764000'
                      format: int64
                    is_all_day:
                      type: boolean
                      description: 是否开始于一个日期。如果设为true，timestamp中只有日期的部分会被解析和存储。
                      example: 'true'
                  description: 任务的开始时间(ms)
                reminders:
                  type: array
                  items:
                    type: object
                    properties:
                      relative_fire_minute:
                        type: integer
                        description: 相对于截止时间的提醒时间分钟数。例如30表示截止时间前30分钟提醒；0表示截止时提醒。
                        example: '30'
                    required:
                    - relative_fire_minute
                  description: 任务提醒
                mode:
                  type: integer
                  description: 任务完成模式, 1 - 会签任务; 2 - 或签任务
                  default: 2
                  example: '2'
                is_milestone:
                  type: boolean
                  description: 是否是里程碑任务
                  default: false
                  example: 'false'
                custom_fields:
                  type: array
                  items:
                    type: object
                    properties:
                      guid:
                        type: string
                        description: 自定义字段guid
                        example: 73b21903-0041-4796-a11e-f8be919a7063
                      number_value:
                        type: string
                        description: 数字类型的自定义字段值，填写一个合法数字的字符串表示，空字符串表示设为空。
                        example: '10.23'
                      member_value:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: 表示member的id
                              example: ou_2cefb2f014f8d0c6c2d2eb7bafb0e54f
                            type:
                              type: string
                              description: 成员的类型
                              default: user
                              example: user
                            role:
                              type: string
                              description: 成员角色
                              example: editor
                            name:
                              type: string
                              description: 成员名称
                              example: 张明德（明德）
                        description: 人员类型的自定义字段值。可以设置1个或多个用户的id（遵循member格式，只支持user类型）。当字段设为只不能多选时只能输入一个值。设为空数组表示设为空。
                      datetime_value:
                        type: string
                        description: 日期类型自定义字段值，可以输入一个表示日期的以毫秒为单位的字符串。设为空字符串表示设为空。
                        example: '1698192000000'
                      single_select_value:
                        type: string
                        description: 单选类型字段值，填写一个字段选项的option_guid。设置为空字符串表示设为空。
                        example: 73b21903-0041-4796-a11e-f8be919a7063
                      multi_select_value:
                        type: array
                        items:
                          type: string
                        description: 多选类型字段值，可以填写一个或多个本字段的option_guid。设为空数组表示设为空。
                      text_value:
                        type: string
                        description: 文本类型字段值。可以填写最多3000字符。使用空字符串表示设为空。
                        example: 文本类型字段值。可以输入一段文本。空字符串表示清空。
                    required:
                    - guid
                  description: 自定义字段值
                docx_source:
                  type: object
                  properties:
                    token:
                      type: string
                      description: 任务关联的文档token，要求：如果使用tenant_access_token请求，则请求机器人有文档编辑权限；如果使用user_access_token，则请求用户有文档的编辑权限
                      example: SFZHdZLo2oXprexhDSrbtvmScHm
                    block_id:
                      type: string
                      description: 任务关联的文档block_id，要求block_id存在于token对应文档中、且block_id没有绑定过其他的任务
                      example: O6wwd22uIoG8acxwxGtbljaUcfc
                  required:
                  - token
                  - block_id
                  description: 任务的新版云文档来源
                agent_task_status:
                  type: integer
                  description: 智能体任务状态
                  example: '1'
                agent_task_progress:
                  type: string
                  description: 智能体任务进度
                  example: 1/4
                text_deliveries:
                  type: array
                  items:
                    type: string
                  description: 智能体文本类交付物
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
