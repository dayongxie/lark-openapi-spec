        size:
          type: integer
          description: 附件的字节大小
          example: '62232'
        resource:
          type: object
          properties:
            type:
              type: string
              description: 资源类型
              example: task
            id:
              type: string
              description: 资源ID
              example: e6e37dcc-f75a-5936-f589-12fb4b5c80c2
          description: 附件归属的资源
        uploader:
          type: object
          properties:
            id:
              type: string
              description: 表示member的id
              example: ou_2cefb2f014f8d0c6c2d2eb7bafb0e54f
            type:
              type: string
              description: 成员的类型
              default: user
              example: user
            role:
              type: string
              description: 成员角色
              example: editor
            name:
              type: string
              description: 成员名称
              example: 张明德（明德）
          description: 附件上传者
        is_cover:
          type: boolean
          description: 是否是封面图
          example: 'false'
