components:
  schemas:
    Entity:
      type: object
      properties:
        id:
          type: string
          description: 实体词 Id
          example: enterprise_40217521
        main_keys:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
                description: 名称
                example: 企业百科
              display_status:
                type: object
                properties:
                  allow_highlight:
                    type: boolean
                    description: 是否允许在 IM 和 Doc 等场景进行高亮提示
                    example: 'true'
                  allow_search:
                    type: boolean
                    description: 是否允许在飞书中被搜索到
                    example: 'true'
                required:
                - allow_highlight
                - allow_search
                description: 展示状态
            required:
            - key
            - display_status
          description: 词条名
        aliases:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
                description: 名称
                example: 企业百科
              display_status:
                type: object
                properties:
                  allow_highlight:
                    type: boolean
                    description: 是否允许在 IM 和 Doc 等场景进行高亮提示
                    example: 'true'
                  allow_search:
                    type: boolean
                    description: 是否允许在飞书中被搜索到
                    example: 'true'
                required:
                - allow_highlight
                - allow_search
                description: 展示状态
            required:
            - key
            - display_status
          description: 别名
        description:
          type: string
          description: 详情描述
          example: 企业百科是飞书提供的一款知识管理工具，通过企业百科可以帮助企业将分散的知识信息进行聚合，并通过UGC的方式，促进企业知识的保鲜和流通
        creator:
          type: string
          description: 创建者
          example: ou_30b07b63089ea46518789914dac63d36
          format: int64
        create_time:
          type: string
          description: 词条创建时间（秒级时间戳）
          example: '1649318125'
          format: int64
        updater:
          type: string
          description: 最近一次更新者
          example: ou_30b07b63089ea46518789914dac63d36
          format: int64
        update_time:
          type: string
          description: 最近一次更新实体词时间（秒级时间戳）
          example: '1649318125'
          format: int64
        related_meta:
          allOf:
          - $ref: '#/components/schemas/RelatedMeta'
          description: 相关数据
        statistics:
          type: object
          properties:
            like_count:
              type: integer
              description: 点赞数量
              example: '55'
            dislike_count:
              type: integer
              description: 点踩数量
              example: '3'
          required:
          - like_count
          - dislike_count
          description: 统计数据
        outer_info:
          type: object
          properties:
            provider:
              type: string
              description: 数据提供方（不能包含中横线 "-"）
              example: 星云
            outer_id:
              type: string
              description: 唯一标识，可用来和其他平台的内容进行绑定。需保证和百科词条唯一对应（不能包含中横线 "-"）
              example: 12345abc
          required:
          - provider
          - outer_id
          description: 外部 id 关联数据
        rich_text:
          type: string
          description: 富文本格式（当填写富文本内容时，description字段将会失效可不填写），支持的格式参考[企业百科指南](https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/baike-v1/overview)中的释义部分
          example: '&lt;b&gt;加粗&lt;/b&gt;&lt;i&gt;斜体&lt;/i&gt;&lt;p&gt;&lt;a href="https://feishu.cn"&gt;l链接&lt;/a&gt;&lt;/p&gt;&lt;p&gt;&lt;span&gt;企业百科是飞书提供的一款知识管理工具，通过企业百科可以帮助企业将分散的知识信息进行聚合，并通过UGC的方式，促进企业知识的保鲜和流通&lt;/span&gt;&lt;/p&gt;'
        source:
          type: integer
          description: 词条的创建来源，1：用户主动创建，2：批量导入，3：官方词，4：OpenAPI 创建
          example: '1'
      required:
      - main_keys
      description: 实体词
    RelatedMeta:
      type: object
      properties:
        users:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: 数据 id
                example: 7dab8a3d3cdcc9da365777c7ad535d62
              title:
                type: string
                description: 标题
                example: 飞书官网
              url:
                type: string
                description: 链接地址
                example: https://www.feishu.cn/hc/zh-CN
