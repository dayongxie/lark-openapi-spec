              title:
                type: string
                description: 标题
                example: 飞书官网
              url:
                type: string
                description: 链接地址
                example: https://www.feishu.cn/hc/zh-CN
            required:
            - id
          description: 关联群组信息
        docs:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
                description: 标题
                example: 飞书官网
              url:
                type: string
