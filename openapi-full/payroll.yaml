                                    description: 算薪活动唯一标识
                                    example: '7371828319837012009'
                                    format: int64
                                  calculation_activity_names:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        locale:
                                          type: string
                                          description: 语种
                                          default: zh_cn
                                          example: zh_cn
                                        value:
                                          type: string
                                          description: 语种对应的值
                                          example: 名称
                                    description: 算薪活动名称
                              description: 发薪活动关联的算薪活动详情
                            activity_status:
                              type: integer
                              description: 发薪活动审批状态，其中：100-待确认发薪名单；150-待提交审批；200-审批中；300-审批被拒绝；350-审批被撤回；360-审批被撤销；375-审批通过；400-已封存。
                              example: '400'
                        description: 发薪活动列表
                      page_token:
                        type: string
                      has_more:
                        type: boolean
      x-lark-access-tokens:
      - user
      - tenant
      x-lark-scopes:
      - payroll:payment_activity:read
      x-lark-error-mappings:
      - code: 2500001
        httpCode: 500
        msg: unknown error
