                              description: 发薪活动唯一标识
                              example: '7202076988667019308'
                              format: int64
                            activity_names:
                              type: array
                              items:
                                type: object
                                properties:
                                  locale:
                                    type: string
                                    description: 语种
                                    default: zh_cn
                                    example: zh_cn
                                  value:
                                    type: string
                                    description: 语种对应的值
                                    example: 名称
                              description: 发薪活动名称
                            pay_date:
                              type: string
                              description: 发薪活动发薪日期
                              example: '2020-10-31'
                            total_number_of_payroll:
                              type: integer
                              description: 发薪总笔数
                              example: '100'
                            number_of_calculation_activities:
                              type: integer
                              description: 关联的算薪活动个数
