        example: '2024-01-01'
      - name: pay_period_end_date
        in: query
        required: true
        schema:
          type: string
        description: 发薪日结束时间，格式：YYYY-MM-dd，[pay_period_start_date, pay_period_end_date] 是一个左闭右闭区间。
        example: '2024-01-31'
