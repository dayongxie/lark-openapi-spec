                          operator:
                            type: string
                            description: 比较操作符。可选值有： - equal：等于，支持任何类型的左值 - in：属于任一
                          value:
                            type: string
                            description: 筛选条件的右值。内容为左值字段类型及操作符组合下，对应的值类型。注意： 1. field为int类型，operator为in时，value应当为list<int>的json字符串   1.
                              示例值："[11,22]" 2. field为string类型，operator为in时，value应当为json序列化后的json字符串   1. 示例值："[\"正式\",\"实习\"]"
                              3. field为string类型，operator为eq时，value应当为json序列化后的string   1. 示例值："\正式\""
                            example: '1'
                        required:
                        - field
                        - operator
                        - value
                      description: 比较表达式列表，内容如 base_info.mobile eq "\"+8613000000001\""的比较条件，多个表达式之间的关系为且
                  required:
                  - conditions
                  description: 查询条件
                required_fields:
                  type: array
                  items:
                    type: string
                  description: 需要查询的字段列表。将按照传递的字段列表返回有权限的行、列数据。不传则不会返回任何字段
                page_request:
                  type: object
                  properties:
