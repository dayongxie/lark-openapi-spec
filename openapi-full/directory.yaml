  /open-apis/directory/v1/employees/mget:
    post:
      operationId: directory_employee_mget
      summary: 批量获取员工信息
      tags:
      - employee
      description: 批量获取员工数据
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/directory-v1/employee/mget
      parameters:
      - name: employee_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - open_id
          - employee_id
          - union_id
          x-enum-descriptions:
            open_id: 标识一个用户在某个应用中的身份
            employee_id: 标识一个用户在某个租户内的身份
            union_id: 标识一个用户在某个应用开发商下的身份
          default: open_id
          x-lark-id-types:
            employee_id: user
            open_id: user
            union_id: user
        description: 此次调用中使用的用户ID的类型
        example: user_id
      - name: department_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - department_id
          - open_department_id
          x-enum-descriptions:
            department_id: 用来标识租户内一个唯一的部门
            open_department_id: open_department_id：用来在具体某个应用中标识一个部门，同一个部门 在不同应用中的 open_department_id 不相同。
          x-lark-id-types:
            department_id: department
            open_department_id: department
        description: 此次调用中使用的部门ID的类型
        example: department_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                employee_ids:
                  type: array
                  items:
                    type: string
                  description: 员工id
                required_fields:
                  type: array
                  items:
                    type: string
                  description: 字段枚举
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      employees:
                        type: array
                        items:
                          type: object
                          properties:
                            base_info:
                              type: object
                              properties:
                                employee_id:
                                  type: string
                                  description: EmployeeID 和UserID一致
                                  example: sddasdeqwe
                                name:
                                  type: object
                                  properties:
                                    name:
                                      type: object
                                      properties:
                                        default_value:
                                          type: string
                                          description: 默认值
                                          example: 张三
                                        i18n_value:
                                          type: string
                                          x-lark-original-type: map
                                          description: 国际化值，key为zh_cn, ja_jp, en_us, value为对应的值
                                      required:
                                      - default_value
                                      description: i18n文本
                                    another_name:
                                      type: string
                                      description: 别名
                                      example: 张小明
                                  description: 姓名
                                mobile:
                                  type: string
                                  description: 手机号
                                  example: 13011111111 或 +8613011111111
