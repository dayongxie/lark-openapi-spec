  /open-apis/directory/v1/employees/filter:
    post:
      operationId: directory_employee_filter
      summary: 批量获取员工列表
      tags:
      - employee
      description: 查询员工ID列表
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/directory-v1/employee/filter
      parameters:
      - name: employee_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - open_id
          - union_id
          - employee_id
          x-enum-descriptions:
            open_id: 标识一个用户在某个应用中的身份。同一个用户在不同应用中的 Open ID 不同
            union_id: 标识一个用户在某个应用开发商下的身份
            employee_id: 标识一个用户在某个租户内的身份
          default: open_id
          x-lark-id-types:
            employee_id: user
            open_id: user
            union_id: user
        description: 此次调用中使用的用户ID的类型
        example: open_id
      - name: department_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - department_id
          - open_department_id
          x-enum-descriptions:
            department_id: 用来标识租户内一个唯一的部门
            open_department_id: 用来在具体某个应用中标识一个部门，同一个部门 在不同应用中的 open_department_id 相同。
          default: open_department_id
          x-lark-id-types:
            department_id: department
            open_department_id: department
        description: 此次调用中使用的部门ID的类型
        example: open_department_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  type: object
                  properties:
                    conditions:
                      type: array
                      items:
                        type: object
                        properties:
                          field:
                            type: string
                            description: 筛选条件的左值，值为字段的参数名称。具体可填哪些字段请看 https://bytedance.larkoffice.com/wiki/Yyrgw6kLLiGxMIkrEZece1ZvnWg
                          operator:
                            type: string
                            description: 比较操作符。可选值有： - equal：等于，支持任何类型的左值 - in：属于任一
                          value:
                            type: string
                            description: 筛选条件的右值。内容为左值字段类型及操作符组合下，对应的值类型。注意： 1. field为int类型，operator为in时，value应当为list<int>的json字符串   1.
                              示例值："[11,22]" 2. field为string类型，operator为in时，value应当为json序列化后的json字符串   1. 示例值："[\"正式\",\"实习\"]"
                              3. field为string类型，operator为eq时，value应当为json序列化后的string   1. 示例值："\正式\""
                            example: '1'
                        required:
                        - field
                        - operator
                        - value
                      description: 比较表达式列表，内容如 base_info.mobile eq "\"+8613000000001\""的比较条件，多个表达式之间的关系为且
                  required:
                  - conditions
                  description: 查询条件
                required_fields:
                  type: array
                  items:
                    type: string
                  description: 需要查询的字段列表。将按照传递的字段列表返回有权限的行、列数据。不传则不会返回任何字段
                page_request:
                  type: object
                  properties:
                    page_size:
                      type: integer
                      description: 本次请求条数
                    page_token:
                      type: string
                      description: 顺序分页查询，不能跳页查询，支持深分页，在需要遍历全部数据的场景只能使用该方式。第一次传空字符串或者不传，后面传上一次的返回值中的page_token
                  description: 分页参数
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
