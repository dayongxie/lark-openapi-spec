      summary: 获取关联组织双方共享成员范围
      tags:
      - collboration_share_entity
      description: 获取双方租户分享的实体ID,完成可见性规则的设置
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/directory-v1/collboration_share_entity/list
      parameters:
      - name: target_tenant_key
        in: query
        required: true
        schema:
          type: string
        description: 对方租户的tenant key
        example: test_key
      - name: target_department_id
        in: query
        required: false
        schema:
          type: string
        description: 不填写该参数为租户的分享范围，可填写该字段继续下钻查看指定部门下的子部门+成员。填写0分为两种情况，若租户分享的为全员则展示一级部门，否则展示分享的部门+成员。
        example: test_key
      - name: target_group_id
        in: query
        required: false
        schema:
          type: string
        description: 获取用户组下的成员，填写该值后忽略target_department_id
        example: test_key
      - name: is_select_subject
        in: query
        required: false
        schema:
          type: boolean
        description: 是否主体租户分享范围，默认是客体租户的分享范围
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该 page_token 获取查询结果
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 100
        description: 分页大小
        example: '10'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      page_token:
                        type: string
                        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该 page_token 获取查询结果
                      has_more:
                        type: boolean
                        description: 是否还有更多项
                      share_departments:
