  /open-apis/aily/v1/app_stats:
    get:
      operationId: aily_tenant_app_stat_list
      summary: 查询应用统计数据
      tags:
      - tenant.app_stat
      description: '## 功能介绍获取租户下应用的统计数据列表，支持按时间范围筛选，包含日活用户数、运行次数、额度使用等核心指标，用于租户级应用运营分析与成本监控场景。'
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/aily-v1/tenant-app_stat/list
      parameters:
      - name: start_at
        in: query
        required: true
        schema:
          type: string
        description: 统计起始时间，格式为秒级时间戳。若未指定，默认取当前时间往前推1天的时间戳
        example: '1698729600'
      - name: end_at
        in: query
        required: true
        schema:
          type: string
        description: 统计结束时间，格式为秒级时间戳。若未指定，默认取当前时间戳
        example: '1701321599'
      - name: filter_type
        in: query
        required: true
        schema:
          type: string
        description: |-
          数据筛选类型，用于指定统计维度。可选值包括：
          - `app`：返回工作流应用数据
          - `agent`：返回智能体数据
        example: all
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，用于获取下一页数据。首次调用无需传入，后续调用使用上一次返回结果中的`page_token`值
        example: eyJwYWdlX251bWJlciI6MiwiY29udGVudF9pZCI6IjE2OTg3Mjk2MDAifQ==
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
        description: 每页返回的数据条数，默认值为20，最大值为100
        example: '20'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: 应用唯一标识
                              example: app_7d2f9c4a1b3e8
                            name:
                              type: string
                              description: 应用名称
                              example: 智能客服助手
                            avg_daily_active_user_num:
                              type: number
                              description: 活跃用户数
                              example: '1256.89'
                            avg_daily_run_num:
                              type: number
                              description: 日均对话次数
                              example: '8923.45'
                            avg_daily_credit_usage:
                              type: number
                              description: 日均消耗额度
                              example: '5678.23'
                            total_credit_usage:
                              type: number
                              description: 总消耗总额
                              example: '170346.9'
                            owner:
                              type: object
                              properties:
                                id:
                                  type: string
                                  description: 唯一标识
                                  example: '10001'
                                name:
                                  type: string
                                  description: 数据条目名称
                                  example: 张三
                                tenant_id:
                                  type: string
                                  description: 租户ID
                                  example: '200001'
                                lark_user_id:
                                  type: string
                                  description: 飞书 User ID
                                  example: '7622507401534524604'
                                open_user_id:
                                  type: string
                                  description: 开放平台 user_id
                                  example: 5f7g42d9
                                open_id:
                                  type: string
                                  description: 开放平台 open_id
                                  example: ou_80cbb9df643ab3872f6a0b1dc8f46078
                              required:
                              - id
                              description: 应用所有者信息
                            app_created_at:
                              type: string
                              description: 应用创建时间，格式为YYYY-MM-DD HH:mm:ss
                              example: '2024-01-15 14:30:00'
                          required:
                          - id
                        description: 统计数据列表
                      page_token:
                        type: string
                        description: 下一页分页标记，若`has_more`为true，使用该值调用接口获取下一页数据；若`has_more`为false，该字段为空
                        example: eyJwYWdlX251bWJlciI6MywiY29udGVudF9pZCI6IjE2OTg3Mjk2MDAifQ==
                      has_more:
                        type: boolean
                        description: 是否还有更多数据，true表示存在下一页，false表示已获取全部数据
                        example: 'true'
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - aily:stats:read
      x-lark-error-mappings:
      - code: 2700001
        httpCode: 400
        msg: param is invalid
      x-lark-rate-limit:
        tier: 5
      x-lark-pagination: true
