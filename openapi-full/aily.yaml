  /open-apis/aily/v1/apps/{app_id}/data_assets:
    post:
      operationId: aily_app_data_asset_create
      summary: 创建数据知识
      tags:
      - app.data_asset
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/aily-v1/app-data_asset/create
      parameters:
      - name: app_id
        in: path
        required: true
        schema:
          type: string
        description: APPID
        example: spring_dfasdf__c
      - name: tenant_type
        in: query
        required: false
        schema:
          type: string
        description: 应用环境，默认为线上环境，dev代表开发环境，只支持dev
        example: dev
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                connect_type:
                  type: string
                  description: 连接类型
                  enum:
                  - import
                  - direct
                  x-enum-descriptions:
                    import: 导入模式
                    direct: 直连模式
                  example: direct
                source_type:
                  type: string
                  description: 数据源类型
                  enum:
                  - file
                  - lark_wiki_space
                  - lark_doc
                  - lark_helpdesk
                  x-enum-descriptions:
                    file: 文件，只支持导入模式
                    lark_wiki_space: 飞书知识空间，只支持直连模式
                    lark_doc: 飞书云文档，导入模式只支持docx
                    lark_helpdesk: 飞书服务台，只支持直连模式
                import_knowledge_setting:
                  type: object
                  properties:
                    chunk_setting:
                      type: object
                      properties:
                        rule_type:
                          type: string
                          description: 切片规则
                          enum:
                          - separator
                          - intelligent
                          x-enum-descriptions:
                            separator: 按标识符
                            intelligent: 智能切片
                          example: intelligent
                        separate_type:
                          type: string
                          description: 切片分割符类型
                          enum:
                          - paragraph
                          - title
                          x-enum-descriptions:
                            paragraph: 段落分隔符："\n\n"、"\n"、空格
                            title: 标题分割符：######
                          example: paragraph
                        size:
                          type: integer
                          description: 分段最大长度（字符），按标识符切片时必须填写
                          example: '600'
                        overlap:
                          type: integer
                          description: 分段重叠字符数，按标识符切片时必须填写，不能超过size的数值
                          example: '10'
                      required:
                      - rule_type
                      description: 知识切片配置
                    file:
                      type: object
                      properties:
                        title:
                          type: string
                          description: 文件标题
                          example: 文件标题
                        token:
                          type: string
                          description: 上传文件获取到的token。和content二选一，优先使用token。
                          example: bb690637b49440b08f39459a2fdcd2ca
                        content:
                          type: string
                          description: 文件内容。和token二选一，优先使用token。有长度限制，大文件优先使用token方式。
                          example: 这是文件内容
                        mime_type:
                          type: string
                          description: 文件内容对应的 MIME 类型，使用token方式必须填写
                          example: .docx
                        url:
                          type: string
                          description: 文件源的URL
                          example: https://document.com/1
                      description: 知识导入-文件
                    lark_doc:
                      type: object
                      properties:
                        type:
                          type: string
                          description: 云文档类型
                          enum:
                          - doc
                          - file
                          - wiki
                          - docx
                          - folder
                          x-enum-descriptions:
                            doc: 飞书文档
                            file: 飞书文件
                            wiki: 飞书知识库
                            docx: 飞书新版文档
                            folder: 飞书文件夹
                          example: docx
                        token:
                          type: string
                          description: 云文档标识
                          example: T8FAcuilgC1fdaxkt58vcp91xngh
                        with_sub_docs:
                          type: boolean
                          description: 是否包含子文档，只有wiki类型的云文档支持
                      required:
                      - type
                      - token
                      description: 知识导入-飞书云文档
                    lark_wiki_space:
                      type: object
                      properties:
                        space_id:
                          type: string
                          description: 飞书知识空间ID
                          example: '798546548961351'
                        sub_docs:
                          type: array
                          items:
                            type: object
                            properties:
                              type:
                                type: string
                                description: 云文档类型，只支持wiki中的云文档
                                enum:
                                - wiki
                                x-enum-descriptions:
                                  wiki: 飞书知识库
                                example: wiki
                              token:
                                type: string
                                description: 云文档标识
                                example: T8FAcuilgC1fdaxkt58vcp91xngh
                              url:
                                type: string
                                description: 云文档链接
                                example: https://cdas.feishu.cn/wiki/fdisu1
                            required:
                            - type
                            - token
                          description: 指定知识空间子节点时使用
                        url:
                          type: string
                          description: 知识空间URL
                          example: https://ai-tenant.feishu-boe.cn/wiki/space/7283525110814736404
                      required:
                      - space_id
                      description: 知识导入-飞书知识空间
                    lark_helpdesk:
                      type: object
                      properties:
                        helpdesk_id:
                          type: string
                          description: 飞书服务台ID
                          example: '123'
                      required:
                      - helpdesk_id
                      description: 知识导入-飞书服务台
                  description: 知识导入配置
                description:
                  type: string
                  x-lark-original-type: map
                  description: 数据知识描述信息
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
