  /open-apis/aily/v1/apps/{app_id}/knowledges/ask:
    post:
      operationId: aily_app_knowledge_ask
      summary: 执行数据知识问答
      tags:
      - app.knowledge
      description: 执行一次数据知识问答
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/aily-v1/app-knowledge/ask
      parameters:
      - name: app_id
        in: path
        required: true
        schema:
          type: string
        description: 飞书智能伙伴搭建平台的AppID
        example: spring_5862e4fea8__c
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: object
                  properties:
                    content:
                      type: string
                      description: 消息内容
                      example: 推荐一部电影
                  description: 输入消息（当前仅支持纯文本输入）
                data_asset_ids:
                  type: array
                  items:
                    type: string
                  description: 控制知识问答所依据的数据知识范围
                data_asset_tag_ids:
                  type: array
                  items:
                    type: string
                  description: 控制知识问答所依据的数据知识分类范围
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        description: 响应状态，枚举值
                        enum:
                        - processing
                        - finished
                        x-enum-descriptions:
                          processing: 当前知识问答正在处理中
                          finished: 当前知识问答处理完成
                        example: processing
                      finish_type:
                        type: string
                        description: 结束类型，枚举值
                        enum:
                        - qa
                        - faq
                        x-enum-descriptions:
                          qa: 执行数据知识问答
                          faq: 执行标准问答对
                        example: qa
                      message:
                        type: object
                        properties:
                          content:
                            type: string
                            description: 消息内容
                            example: 推荐一部电影
                        description: 响应消息
                      process_data:
                        type: object
                        properties:
                          chart_dsls:
                            type: array
                            items:
                              type: string
                            description: 有数据分析时，根据数据生成的图表描述，按markdown语义描述
                          chunks:
                            type: array
                            items:
                              type: string
                            description: 召回的知识视图切片的文本数据
                          sql_data:
                            type: array
                            items:
                              type: string
                            description: 有数据分析时，查询到数据结果，每个元素为 json 序列化后的数据结果
                        description: 知识问答运行过程结构化数据，status=finished 且 finish_type=qa 时返回
                      faq_result:
                        type: object
                        properties:
                          question:
                            type: string
                            description: 匹配问题
                            example: 问题
                          answer:
                            type: string
                            description: 匹配描述
                            example: 答案
                        description: 匹配标准问答对结果，status=finished 且 finish_type=faq时返回
                      has_answer:
                        type: boolean
                        description: 是否有结果，true 则 代表 message 中的内容是通过配置知识而生成的
      x-lark-access-tokens:
      - user
      - tenant
      x-lark-scopes:
      - aily:knowledge:ask
      x-lark-error-mappings:
      - code: 2700001
        httpCode: 400
        msg: param is invalid
      - code: 2700033
        httpCode: 200
        msg: failed to ask knowledges
      - code: 2700034
        httpCode: 200
        msg: ask is forbidden, please contact developer
      - code: 2700035
        httpCode: 200
        msg: run time too long
      x-lark-rate-limit:
        tier: 3
