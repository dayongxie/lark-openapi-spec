  /open-apis/aily/v1/sessions/{aily_session_id}/messages:
    post:
      operationId: aily_aily_session_aily_message_create
      summary: 发送 Aily 消息
      tags:
      - aily_session.aily_message
      description: 该 API 用于向某个飞书智能伙伴应用发送一条消息（Message）。
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/aily-v1/aily_session-aily_message/create
      parameters:
      - name: aily_session_id
        in: path
        required: true
        schema:
          type: string
        description: 会话 ID
        example: session_4dfunz7sp1g8m
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                idempotent_id:
                  type: string
                  description: 幂等id，同一 session 下相同的幂等 id 算一条消息，有效期72h
                  example: idempotent_id_1
                content_type:
                  type: string
                  description: 消息内容类型
                  enum:
                  - MDX
                  - TEXT
                  - CLIP
                  - SmartCard
                  - JSON
                  x-enum-descriptions:
                    MDX: MDX
                    TEXT: TEXT
                    CLIP: GUI 卡片
                    SmartCard: SmartCard
                    JSON: JSON
                  example: MDX
                content:
                  type: string
                  description: 消息内容
                  example: 你好
                file_ids:
                  type: array
                  items:
                    type: string
                  description: 消息中包含的文件 ID 列表
                quote_message_id:
                  type: string
                  description: 引用的消息 ID
                  example: message_4de9bpg70qskh
                mentions:
                  type: array
                  items:
                    type: object
                    properties:
                      entity_id:
                        type: string
                        description: 实体 ID
                        example: ou_5ad573a6411d72b8305fda3a9c15c70e
                      identity_provider:
                        type: string
                        description: 身份提供者
                        enum:
                        - AILY
                        - FEISHU
                        x-enum-descriptions:
                          AILY: Aily 账号体系
                          FEISHU: 飞书账号体系
                        example: FEISHU
                      key:
                        type: string
                        description: 被@实体在消息体中的占位符
                        example: '@_user_1'
                      name:
                        type: string
                        description: 被@实体的名称
                        example: 张三
                      aily_id:
                        type: string
                        description: Aily 账号体系下的 ID
                        example: '1794840334557292'
                  description: 被@的实体
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Schema2'
