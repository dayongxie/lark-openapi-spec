  /open-apis/approval/v4/external_approvals:
    post:
      operationId: approval_external_approval_create
      summary: 创建三方审批定义
      tags:
      - external_approval
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/approval-v4/external_approval/create
      parameters:
      - name: department_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - department_id
          - open_department_id
          x-enum-descriptions:
            department_id: 以自定义department_id来标识部门
            open_department_id: 以open_department_id来标识部门
          default: open_department_id
          x-lark-id-types:
            department_id: department
            open_department_id: department
        description: 此次调用中使用的部门ID的类型
        example: open_department_id
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户ID的类型
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                approval_name:
                  type: string
                  description: 审批定义名称，创建审批定义返回的值，表示该实例属于哪个流程；该字段会影响到列表中该实例的标题，标题取自对应定义的 name 字段。
                  example: E78F1022-A166-447C-8320-E151DA90D70F
                approval_code:
                  type: string
                  description: 审批定义 code，用户自定义，定义的唯一标识，如果不存在该 code，则创建，否则更新
                  example: permission_test
                group_code:
                  type: string
                  description: 审批定义所属审批分组，用户自定义； 如果group_code当前不存在，则会新建审批分组； 如果group_code已经存在，则会使用group_name更新审批分组名称
                  example: work_group
                group_name:
                  type: string
                  description: 分组名称，值的格式是 i18n key，文案放在 i18n_resource； 如果是 group_code 当前不存在，则该 group_name 必填，否则，如果填写了则会更新分组名称，不填则不更新分组名称；
                    审批发起页 审批定义的分组名称来自该字段
                  example: '@i18n@2'
                description:
                  type: string
                  description: 审批定义的说明，值的格式是 i18n key，文案放在 i18n_resource； 审批发起页 审批定义的说明内容来自该字段
                  example: '@i18n@2'
                external:
                  allOf:
                  - $ref: '#/components/schemas/External'
                  description: 三方审批相关
                viewers:
                  type: array
                  items:
                    type: object
                    properties:
                      viewer_type:
                        type: string
                        description: 可见人类型，如果 viewer_type 是 TENANT 和 NONE,  viewer_user_id， viewer_department_id可不填
                        enum:
                        - TENANT
                        - DEPARTMENT
                        - USER
                        - NONE
                        x-enum-descriptions:
                          TENANT: 租户内可见
                          DEPARTMENT: 指定部门
                          USER: 指定用户
                          NONE: 任何人都不可见
                        example: USER
                      viewer_user_id:
                        type: string
                        description: 当 viewer_type 是 USER，根据user_id_type填写用户id
                        example: 19a294c2
                      viewer_department_id:
                        type: string
                        description: 当 view_type 为DEPARTMENT，根据department_id_type填写部门id
                        example: od-ac9d697abfa990b715dcc33d58a62a9d
                  description: 可见人列表，可通知配置多个可见人，只有在配置的范围内用户可以在审批发起也看到该审批，默认不传，则是任何人不可见
                i18n_resources:
                  type: array
                  items:
                    $ref: '#/components/schemas/Item'
                  description: 国际化文案
                managers:
                  type: array
                  items:
                    type: string
                  description: 根据user_id_type填写流程管理员id
                  example: 19a294c2
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      approval_code:
                        type: string
                        description: 审批定义 code，用户自定义，定义的唯一标识
                        example: C30381C8-7A5F-4717-A9CF-C233BF0202D4
                    required:
                    - approval_code
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - approval:approval
      - approval:external_approval
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      x-lark-error-mappings:
      - code: 1390001
        httpCode: 400
        msg: ''
      - code: 1395001
        httpCode: 400
        msg: ''
      x-lark-rate-limit:
        tier: 4
      x-lark-id-transform:
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.viewers[*].viewer_user_id
        section: 0
      - fromTo:
          from: x_department_id
          idType: ''
          idTypeKey: department_id_type
          idTypeSection: 2
          to: lark_id
        key: $.viewers[*].viewer_department_id
        section: 0
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.managers[*]
        section: 0
