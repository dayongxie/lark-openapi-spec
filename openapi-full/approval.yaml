  /open-apis/approval/v4/external_instances:
    post:
      operationId: approval_external_instance_create
      summary: 同步三方审批实例
      tags:
      - external_instance
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/approval-v4/external_instance/create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                approval_code:
                  type: string
                  description: 审批定义 code， 创建审批定义返回的值，表示该实例属于哪个流程；该字段会影响到列表中该实例的标题，标题取自对应定义的 name 字段
                  example: 81D31358-93AF-92D6-7425-01A5D67C4E71
                status:
                  type: string
                  description: 审批实例状态
                  enum:
                  - PENDING
                  - APPROVED
                  - REJECTED
                  - CANCELED
                  - DELETED
                  - HIDDEN
                  - TERMINATED
                  x-enum-descriptions:
                    PENDING: 审批中
                    APPROVED: 审批流程结束，结果为同意
                    REJECTED: 审批流程结束，结果为拒绝
                    CANCELED: 审批发起人撤回
                    DELETED: 审批被删除
                    HIDDEN: 状态隐藏(不显示状态)
                    TERMINATED: 审批终止
                  example: PENDING
                extra:
                  type: string
                  description: 审批实例扩展 JSON
                  example: '{"xxx":"xxx"}'
                instance_id:
                  type: string
                  description: 审批实例唯一标识，用户自定义，需确保证租户、应用下唯一
                  example: '24492654'
                links:
                  type: object
                  properties:
                    pc_link:
                      type: string
                      description: pc 端的跳转链接，当用户使用飞书 pc 端时，使用该字段进行跳转
                      example: https://applink.feishu.cn/client/mini_program/open?mode=appCenter&appId=cli_9c90fc38e07a9101&path=pc/pages/detail?id=1234
                    mobile_link:
                      type: string
                      description: 移动端 跳转链接，当用户使用飞书 移动端时，使用该字段进行跳转
                      example: https://applink.feishu.cn/client/mini_program/open?appId=cli_9c90fc38e07a9101&path=pages/detail?id=1234
                  required:
                  - pc_link
                  description: 审批实例链接集合 ，用于【已发起】列表的跳转，跳转回三方系统； pc_link 和 mobile_link 必须填一个，填写的是哪一端的链接，即会跳转到该链接，不受平台影响
                title:
                  type: string
                  description: 审批展示名称，如果填写了该字段，则审批列表中的审批名称使用该字段，如果不填该字段，则审批名称使用审批定义的名称
                  example: '@i18n@1'
                form:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: 表单字段名称
                        example: '@i18n@2'
                      value:
                        type: string
                        description: 表单值
                        example: '@i18n@3'
                  description: 用户提交审批时填写的表单数据，用于所有审批列表中展示。可传多个值，但审批中心pc展示前2个,移动端展示前3个,长度不超过2048字符
                  example: '[{ "name": "@i18n@2", "value": "@i18n@3" }]'
                user_id:
                  type: string
                  description: 审批发起人 user_id，发起人可在【已发起】列表中看到所有已发起的审批; 在【待审批】，【已审批】【抄送我】列表中，该字段展示审批是谁发起的。审批发起人 open id，和 user
                    id 二选一。
                  example: a987sf9s
                user_name:
                  type: string
                  description: 审批发起人 用户名，如果发起人不是真实的用户（例如是某个部门），没有 user_id，则可以使用该字段传名称
                  example: '@i18n@9'
                open_id:
                  type: string
                  description: 审批发起人 open id，和 user id 二选一
                  example: ou_be73cbc0ee35eb6ca54e9e7cc14998c1
                department_id:
                  type: string
                  description: 发起人部门，用于列表中展示发起人所属部门。不传则不展示。如果用户没加入任何部门，传 ""，将展示租户名称传 department_name 展示部门名称
                  example: od-8ec33278bc2
                department_name:
                  type: string
                  description: 审批发起人 部门，如果发起人不是真实的用户（例如是某个部门），没有 department_id，则可以使用该字段传名称
                  example: '@i18n@10'
                start_time:
                  type: string
                  description: 审批发起时间，Unix毫秒时间戳
                  example: '1556468012678'
                  format: int64
                end_time:
                  type: string
                  description: 审批实例结束时间：未结束的审批为 0，Unix毫秒时间戳
                  example: '1556468012678'
                  format: int64
                update_time:
                  type: string
                  description: 审批实例最近更新时间；用于推送数据版本控制如果 update_mode 值为 UPDATE，则只有传过来的 update_time 有变化时（变大），才会更新审批中心中的审批实例信息。使用该字段主要用来避免并发时老的数据更新了新的数据
                  example: '1556468012678'
                  format: int64
                display_method:
                  type: string
                  description: 列表页打开审批实例的方式
                  enum:
                  - BROWSER
                  - SIDEBAR
                  - NORMAL
                  - TRUSTEESHIP
                  x-enum-descriptions:
                    BROWSER: 跳转系统默认浏览器打开
                    SIDEBAR: 飞书中侧边抽屉打开
                    NORMAL: 飞书内嵌页面打开
                    TRUSTEESHIP: 以托管打开
                  example: BROWSER
                update_mode:
                  type: string
                  description: 更新方式， 当 update_mode=REPLACE时，每次都以当前推送的数据为最终数据，会删掉审批中心中多余的任务、抄送数据（不在这次推送的数据中）; 当 update_mode=UPDATE时，则不会删除审批中心的数据，而只是进行新增和更新实例、任务数据
                  enum:
