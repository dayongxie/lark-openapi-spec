            it-IT: 意大利语
            ko-KR: 韩语
            pt-BR: 葡萄牙语
            th-TH: 泰语
            vi-VN: 越南语
            ms-MY: 马来语
            ru-RU: 俄语
          example: zh-CN
        texts:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              value:
                type: string
            required:
            - key
            - value
          description: 文案 key, value, i18n key 以 @i18n@ 开头； 该字段主要用于做国际化，语序用户同时传多个语言的文案，审批中心会根据用户当前的语音环境使用对应的文案，如果没有传用户当前的语音环境文案，则会使用默认的语言文案。
          example: '{ "@i18n@1": "权限申请", "@i18n@2": "OA审批", "@i18n@3": "Permission" }'
        is_default:
          type: boolean
          description: 是否默认语言，默认语言需要包含所有key，非默认语言如果key不存在会使用默认语言代替
          example: 'true'
      required:
      - locale
      - texts
      - is_default
    Item2:
      type: object
      properties:
        task_id:
          type: string
          description: 审批实例内的唯一标识，用于更新审批任务时定位数据
          example: '112534'
        user_id:
          type: string
          description: 审批人 user_id，该任务会出现在审批人的【待审批】或【已审批】列表中
          example: a987sf9s
        open_id:
          type: string
          description: 审批人 open id，和 user id 二选一
          example: ou_be73cbc0ee35eb6ca54e9e7cc14998c1
        title:
          type: string
          description: 审批任务名称
          example: i18n1
        links:
          type: object
          properties:
            pc_link:
              type: string
              description: pc 端的跳转链接，当用户使用飞书 pc 端时，使用该字段进行跳转
              example: https://applink.feishu.cn/client/mini_program/open?mode=appCenter&appId=cli_9c90fc38e07a9101&path=pc/pages/detail?id=1234
            mobile_link:
              type: string
              description: 移动端 跳转链接，当用户使用飞书 移动端时，使用该字段进行跳转
              example: https://applink.feishu.cn/client/mini_program/open?appId=cli_9c90fc38e07a9101&path=pages/detail?id=1234
          required:
          - pc_link
          description: 【待审批】或【已审批】中使用的跳转链接，用于跳转回三方系统pc_link 和 mobile_link 必须填一个，填写的是哪一端的链接，即会跳转到该链接，不受平台影响
        status:
          type: string
          description: 任务状态
          enum:
          - PENDING
          - APPROVED
          - REJECTED
          - TRANSFERRED
          - DONE
          x-enum-descriptions:
            PENDING: 待审批
            APPROVED: 任务同意
            REJECTED: 任务拒绝
            TRANSFERRED: 任务转交
            DONE: 任务通过但审批人未操作；审批人看不到这个任务, 若想要看到, 可以通过抄送该人.
          example: PENDING
        extra:
          type: string
          description: 扩展 json
          example: '{"xxx":"xxx"}'
        create_time:
          type: string
          description: 任务创建时间，Unix 毫秒时间戳
          example: '1556468012678'
          format: int64
        end_time:
          type: string
          description: 任务完成时间：未结束的审批为 0，Unix 毫秒时间戳
          example: '1556468012678'
          format: int64
        update_time:
          type: string
          description: task最近更新时间，用于推送数据版本控制； 更新策略同 instance 中的 update_time
          example: '1556468012678'
          format: int64
        action_context:
          type: string
          description: 操作上下文，当用户操作时，回调请求中带上该参数，用于传递该任务的上下文数据
          example: '123456'
        action_configs:
          type: array
          items:
            type: object
            properties:
              action_type:
                type: string
                description: 操作类型，每个任务都可以配置2个操作，会展示审批列表中，当用户操作时，回调请求会带上该字段，表示用户进行了同意操作还是拒绝操作。APPROVE - 同意 REJECT - 拒绝 {KEY}
                  - 任意字符串，如果使用任意字符串，则需要提供 action_name
                example: APPROVE
              action_name:
                type: string
                description: 操作名称，i18n key 用于前台展示，如果 action_type 不是 APPROVAL和REJECT，则必须提供该字段，用于展示特定的操作名称
                example: '@i18n@5'
              is_need_reason:
                type: boolean
                description: 是否需要意见, 如果为true,则用户操作时，会跳转到 意见填写页面
                example: 'false'
              is_reason_required:
                type: boolean
                description: 审批意见是否必填
                example: 'false'
              is_need_attachment:
                type: boolean
                description: 意见是否支持上传附件
                example: 'false'
            required:
            - action_type
          description: 任务级别操作配置,快捷审批目前支持移动端操作
        display_method:
          type: string
          description: 列表页打开审批任务的方式
          enum:
          - BROWSER
          - SIDEBAR
          - NORMAL
          - TRUSTEESHIP
          x-enum-descriptions:
            BROWSER: 跳转系统默认浏览器打开
            SIDEBAR: 飞书中侧边抽屉打开
            NORMAL: 飞书内嵌页面打开
            TRUSTEESHIP: 以托管模式打开
          example: BROWSER
        exclude_statistics:
          type: boolean
          description: 三方任务支持不纳入效率统计
          default: false
          example: 'true'
        node_id:
          type: string
          description: 节点id
          example: node
        node_name:
          type: string
          description: 节点名称，示例：i18n@name。需要在i18n_resources中传该名称对应的国际化文案
          example: i18n@name
        generate_type:
          type: string
          description: 任务生成类型
          enum:
          - EXTERNAL_CONSIGN
          - DEFAULT
          x-enum-descriptions:
            EXTERNAL_CONSIGN: 给代理人生成的任务
            DEFAULT: 默认情况，可不填， 但是不要填空字符串
          example: EXTERNAL_CONSIGN
      required:
      - task_id
      - links
      - status
      - create_time
      - end_time
