  /open-apis/approval/v4/tasks/subscription:
    post:
      operationId: approval_task_subscription
      summary: 订阅审批任务状态变更事件
      tags:
      - task
      description: |-
        ## 功能介绍
        订阅指定类型的审批任务通知，支持参与审批或管理审批两类订阅场景，用于及时获取审批任务的状态变更提醒。

        ### 注意事项
        - 订阅操作仅对当前登录用户生效，订阅关系会随用户身份切换自动关联。
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/approval-v4/task/subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subscription_type:
                  type: string
                  description: |-
                    订阅类型，用于指定需要接收通知的审批任务范围。

                    可选值：
                    - `INVOLVED_APPROVAL`：订阅自身作为审批人的参与类审批任务通知；
                    - `MANAGED_APPROVAL`：订阅自身作为审批管理员的管理类审批任务通知。
                  enum:
                  - INVOLVED_APPROVAL
                  - MANAGED_APPROVAL
                  x-enum-descriptions:
                    INVOLVED_APPROVAL: 参与审批订阅
                    MANAGED_APPROVAL: 管理审批订阅
                  example: INVOLVED_APPROVAL
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
      x-lark-access-tokens:
      - user
      x-lark-scopes:
      - approval:task:read
      x-lark-error-mappings:
      - code: 1390001
        httpCode: 400
        msg: param is invalid
      x-lark-rate-limit:
        tier: 7
    delete:
      operationId: approval_task_unsubscription
      summary: 退订审批任务状态变更事件
      tags:
      - task
      description: |-
        ## 功能介绍
        取消指定类型的审批订阅，解除当前主体与对应审批事项的订阅关联，停止接收该类审批事项的相关通知。

        ### 注意事项
        - 取消订阅后将不再接收对应审批事项的通知。
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/approval-v4/task/unsubscription
      parameters:
      - name: subscription_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - INVOLVED_APPROVAL
          - MANAGED_APPROVAL
          x-enum-descriptions:
            INVOLVED_APPROVAL: 参与审批订阅
            MANAGED_APPROVAL: 管理审批订阅
        description: 需取消订阅的审批类型，支持指定取消参与审批或管理审批的订阅关系。未传入该字段时表示取消所有类别订阅
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
      x-lark-access-tokens:
      - user
      x-lark-scopes:
      - approval:task:read
      x-lark-error-mappings:
      - code: 1390001
        httpCode: 400
        msg: param is invalid
      x-lark-rate-limit:
        tier: 7
