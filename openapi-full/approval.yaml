                        description: 审批实例链接
                        example: https://go.feishu.cn/approval/s/iu848mdm/
                    required:
                    - instance_code
                    - instance_link
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - approval:approval
      - approval:instance
      x-lark-error-mappings:
      - code: 1390001
