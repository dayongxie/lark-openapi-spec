    get:
      operationId: approval_district_list
      summary: 查询地理库信息
      tags:
      - district
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/approval-v4/district/list
      parameters:
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
        description: 分页大小，用于指定一次请求所返回的数据量上限，默认20
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该 page_token 获取查询结果
      - name: root_district_id
        in: query
        required: false
        schema:
          type: string
        description: 指定根节点，仅遍历该节点下的数据，默认遍历根节点，返回值内容与list_type 参数有关
        example: '1816670'
      - name: list_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - sub_level
          - leaf_level
          x-enum-descriptions:
            sub_level: 遍历指定节点的下一层区域，默认方式
            leaf_level: 遍历指定节点的所有叶子节点，指定该参数时会返回parent_district
        description: 遍历类型，不同的类型内容会有差异
      - name: locale
        in: query
        required: false
        schema:
          type: string
          enum:
          - zh-CN
          - en-US
          x-enum-descriptions:
            zh-CN: 中文
            en-US: 英文
