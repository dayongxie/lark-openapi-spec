  /open-apis/approval/v4/instances/subscription:
    post:
      operationId: approval_instance_subscription
      summary: 订阅审批实例状态变更事件
      tags:
      - instance
      description: |-
        ## 功能介绍
        订阅审批实例的状态变更通知，当审批实例状态发生变化时，将向订阅方推送对应事件消息，用于实现审批流程的实时同步。

        ### 前提条件
        - 调用方需具备审批实例的订阅权限。

        ### 注意事项
        - 订阅后需确保接收通知的地址可正常访问，否则可能导致通知推送失败。
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/approval-v4/instance/subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subscription_type:
                  type: string
                  description: 订阅类型，用于指定需要接收的审批实例事件类型，取值需符合系统定义的订阅规则。
                  enum:
                  - INVOLVED_APPROVAL
                  - MANAGED_APPROVAL
                  x-enum-descriptions:
                    INVOLVED_APPROVAL: 参与审批订阅
                    MANAGED_APPROVAL: 管理审批订阅
                  example: '"INVOLVED_APPROVAL"'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
      x-lark-access-tokens:
      - user
      x-lark-scopes:
      - approval:instance:read
      x-lark-error-mappings:
      - code: 1390001
        httpCode: 400
        msg: param is invalid
      x-lark-rate-limit:
        tier: 7
    delete:
      operationId: approval_instance_unsubscription
      summary: 退订审批实例状态变更事件
      tags:
      - instance
      description: |-
        ## 功能介绍
        取消指定审批实例的订阅关系，取消后将不再接收该审批实例的状态变更通知。

        ### 注意事项
        - 仅已订阅的审批实例支持取消订阅操作。
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/approval-v4/instance/unsubscription
      parameters:
      - name: subscription_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - INVOLVED_APPROVAL
          - MANAGED_APPROVAL
          x-enum-descriptions:
            INVOLVED_APPROVAL: 参与审批订阅
            MANAGED_APPROVAL: 管理审批订阅
        description: 需取消订阅的审批类型，支持指定取消参与审批或管理审批的订阅关系。未传入该字段时表示取消所有类别订阅
        example: INVOLVED_APPROVAL
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
      x-lark-access-tokens:
      - user
      x-lark-scopes:
      - approval:instance:read
      x-lark-error-mappings:
      - code: 1390001
        httpCode: 400
        msg: param is invalid
      x-lark-rate-limit:
        tier: 7
