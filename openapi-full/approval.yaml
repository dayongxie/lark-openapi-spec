            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      version:
                        type: string
                        description: 地理库的版本，地理库更新时版本会同步更新，如果应用将地理数据存在本地，需要定时判断版本，在变化以及时更新本地数据
                        example: '7569941109133377539'
                      has_more:
                        type: boolean
                      page_token:
                        type: string
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/Item4'
                        description: 区域列表
      x-lark-access-tokens:
      - user
      - tenant
      x-lark-scopes:
      - approval:approval:readonly
      - approval:approval
      x-lark-error-mappings:
      - code: 1395001
        httpCode: 500
        msg: system error
      - code: 1390001
        httpCode: 400
        msg: ''
      - code: 1395061
        httpCode: 400
        msg: ''
      x-lark-rate-limit:
        tier: 7
      x-lark-pagination: true
