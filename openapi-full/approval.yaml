                        IMMUTABLE: 表单不会随流程进行改变
                        BY_NODE: 跟随流程节点变更更新缓存
                        BY_USER: 对于每个待办任务存储一份
                      example: DISABLE
                    form_vary_with_locale:
                      type: boolean
                      description: 表单是否随国际化改变
                      example: 'false'
                    form_version:
                      type: string
                      description: 当前使用的表单版本号，保证表单改变后，版本号增加，实际值为int64整数
