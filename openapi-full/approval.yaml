                  type: string
                  description: 发起审批用户
                  example: f7cb567e
                open_id:
                  type: string
                  description: 发起审批用户 open id, 如果传了 user_id 则优先使用 user_id
                  example: ou_123456
                department_id:
                  type: string
                  description: 发起审批用户部门id，如果用户只属于一个部门，可以不填。如果属于多个部门，默认会选择部门列表第一个部门
                  example: '123456'
                form:
                  type: string
                  description: json 数组，控件值
                  example: '[{"id":"user_name", "type": "input", "value":"test-\-test"}]'
                node_approver_user_id_list:
                  type: array
                  items:
                    type: object
                    properties:
                      key:
                        type: string
                        description: node id 或 custom node id
                        example: manager_node_id
                      value:
                        type: array
                        items:
                          type: string
                        description: '通过 查看审批定义 获取 value: 审批人列表'
                        example: f7cb567e
                  description: 如果有发起人自选节点，则需要填写对应节点的审批人
                node_approver_open_id_list:
                  type: array
                  items:
                    type: object
                    properties:
                      key:
                        type: string
                        description: node id 或 custom node id
                        example: manager_node_id
                      value:
                        type: array
                        items:
                          type: string
                        description: '通过 查看审批定义 获取 value: 审批人列表'
                        example: f7cb567e
                  description: 审批人发起人自选 open id，与上述node_approver_user_id_list字段取并集
                node_cc_user_id_list:
                  type: array
                  items:
                    type: object
                    properties:
                      key:
                        type: string
                        description: node id 或 custom node id
                        example: manager_node_id
                      value:
                        type: array
                        items:
                          type: string
                        description: '通过 查看审批定义 获取 value: 审批人列表'
                        example: f7cb567e
                  description: 如果有发起人自选节点，则可填写对应节点的抄送人，单个节点最多选择20位抄送人
                node_cc_open_id_list:
                  type: array
                  items:
                    type: object
                    properties:
                      key:
                        type: string
                        description: node id 或 custom node id
                        example: manager_node_id
                      value:
                        type: array
                        items:
                          type: string
                        description: '通过 查看审批定义 获取 value: 审批人列表'
                        example: f7cb567e
                  description: 抄送人发起人自选 open id 单个节点最多选择20位抄送人
                uuid:
                  type: string
                  description: 审批实例 uuid，用于幂等操作, 每个租户下面的唯一key，同一个 uuid 只能用于创建一个审批实例，如果冲突，返回错误码 60012 ，格式建议为 XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX，不区分大小写
                  example: XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX
                allow_resubmit:
                  type: boolean
                  description: 可配置是否可以再次提交
                  example: 'true'
                allow_submit_again:
                  type: boolean
                  description: 可配置是否可以重新提交
                  example: 'true'
                cancel_bot_notification:
                  type: string
                  description: 配置bot是否取消通知结果
                  example: '0'
                  format: int64
                forbid_revoke:
                  type: boolean
                  description: 配置是否可以禁止撤销
                  default: false
                  example: 'false'
                i18n_resources:
                  type: array
                  items:
                    $ref: '#/components/schemas/Item'
                  description: 国际化文案
                title:
                  type: string
                  description: 审批展示名称，如果填写了该字段，则审批列表中的审批名称使用该字段，如果不填该字段，则审批名称使用审批定义的名称
                  example: '@i18n@1'
                title_display_method:
                  type: integer
                  description: 详情页title展示模式
                  enum:
                  - 0
                  - 1
                  x-enum-descriptions:
                    '0': 如果都有title，展示approval 和instance的title，竖线分割。
                    '1': 如果都有title，只展示instance的title
                  default: 0
                  example: '0'
                node_auto_approval_list:
                  type: array
                  items:
                    type: object
                    properties:
                      node_id_type:
                        type: string
                        description: 节点id的类型
                        enum:
                        - CUSTOM
                        - NON_CUSTOM
                        x-enum-descriptions:
                          CUSTOM: 自定义节点ID
                          NON_CUSTOM: 非自定义节点ID
                        example: NON_CUSTOM
                      node_id:
                        type: string
                        description: 节点id
                        example: manager_node_id
                  description: 自动通过节点ID
                with_link:
                  type: boolean
                  description: 是否可选返回链接
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
