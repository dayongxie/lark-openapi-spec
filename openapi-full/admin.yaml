  /open-apis/admin/v1/password/reset:
    post:
      operationId: admin_password_reset
      summary: 重置用户的企业邮箱密码
      tags:
      - password
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/admin-v1/password/reset
      parameters:
      - name: user_id_type
        in: query
        required: true
        schema:
          type: string
          enum:
          - open_id
          - union_id
          - user_id
          x-enum-descriptions:
            open_id: open_id
            union_id: union_id
            user_id: user_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户ID类型
        example: user_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: object
                  properties:
                    ent_email_password:
                      type: string
                      description: 企业邮箱密码
                      example: abcd*efg
                  required:
                  - ent_email_password
                  description: 需要重置的密码参数，不少于8个字符，字母、数字和符号，至少三选二
                  example: 1234abcd
                user_id:
                  type: string
                  description: 待修改密码的用户ID，只针对邮箱登录凭证与企业邮箱(包括别名)相等的用户生效
                  example: abc123
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - admin:ent_email_password
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      x-lark-error-mappings:
      - code: 1050023
        httpCode: 400
        msg: reach reset password num limit
      - code: 1050022
        httpCode: 400
        msg: password format is not valid
      - code: 1050024
        httpCode: 400
        msg: user cant reset password.may be user enterprise email not equal email
      x-lark-rate-limit:
        tier: 7
      x-lark-id-transform:
      - fromTo:
          from: x_user_id
          idType: ''
          idTypeKey: user_id_type
          idTypeSection: 2
          to: lark_id
        key: $.user_id
        section: 0
