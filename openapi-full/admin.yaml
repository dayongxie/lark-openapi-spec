                            example: g_49Z7CQ
                          badge_id:
                            type: string
                            description: 企业勋章的唯一ID
                            example: m_qTR2HM
                          name:
                            type: string
                            description: 授予名单名称，最多100个字符。
                            example: 激励勋章的授予名单
                          grant_type:
                            type: integer
                            description: 勋章下唯一的授予事项
                            enum:
                            - 0
                            - 1
                            x-enum-descriptions:
                              '0': 手动选择有效期
                              '1': 匹配系统入职时间
                            default: 0
                            example: '0'
                          time_zone:
                            type: string
                            description: 授予名单的生效时间对应的时区，用于检查RuleDetail的时间戳的取值是否规范，取值范围为TZ database name
                            example: Asia/Shanghai
