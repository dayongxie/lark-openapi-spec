  /open-apis/admin/v1/badges/{badge_id}/grants:
    post:
      operationId: admin_badge_grant_create
      summary: 创建授予名单
      tags:
      - badge.grant
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/admin-v1/badge-grant/create
      parameters:
      - name: badge_id
        in: path
        required: true
        schema:
          type: string
        description: 勋章ID
        example: m_DjMzaK
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - open_id
          - union_id
          - user_id
          x-enum-descriptions:
            open_id: 用户的open_id
            union_id: 用户的union_id
            user_id: 用户的user_id
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 用户 ID 类型
        example: open_id
      - name: department_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - department_id
          - open_department_id
          x-enum-descriptions:
            department_id: 以自定义department_id来标识部门
            open_department_id: 以open_department_id来标识部门
          default: open_department_id
          x-lark-id-types:
            department_id: department
            open_department_id: department
        description: 此次调用中使用的部门ID的类型。
        example: open_department_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 授予名单名称，最多100个字符。
                  example: 激励勋章的授予名单
                grant_type:
                  type: integer
                  description: 勋章下唯一的授予事项
                  enum:
                  - 0
                  - 1
                  x-enum-descriptions:
                    '0': 手动选择有效期
                    '1': 匹配系统入职时间
                  default: 0
                  example: '0'
                time_zone:
                  type: string
                  description: 授予名单的生效时间对应的时区，用于检查RuleDetail的时间戳的取值是否规范，取值范围为TZ database name
                  example: Asia/Shanghai
                rule_detail:
                  type: object
                  properties:
                    effective_time:
                      type: string
                      description: 开始生效的时间戳。1.手动设置有效期类型勋章，配置有效期限需要配置该字段；2.时间戳必须是所在时区当天的零点时间戳，如时区为Asia/Shanghai时区时的1649606400
                      example: '1649606400'
                      format: int64
                    expiration_time:
                      type: string
                      description: 结束生效的时间戳。1.手动设置有效期类型勋章，配置有效期限需要配置该字段；2.最大值：不得超过effective_time+100 年；3.非永久有效：时间戳必须是所在时区当天的23:59:59时间戳，如时区为Asia/Shanghai时区时的1649692799；4.永久有效：传值为0即可
                      example: '1649692799'
                      format: int64
                    anniversary:
                      type: integer
                      description: 入职周年日。根据入职时间发放类型勋章，需要配置该字段。
                      default: 1
                      example: '1'
                    effective_period:
                      type: integer
                      description: 有效期限。根据入职时间发放类型勋章，需要配置该字段。
                      enum:
                      - 1
                      - 2
                      x-enum-descriptions:
                        '1': 有效期为一年
                        '2': 永久有效
                      default: 1
                      example: '1'
                  description: 规则详情
                is_grant_all:
                  type: boolean
                  description: 是否授予给全员。1.为false时，需要关联1~500个用户群体。2.为true时，不可关联用户、用户组、部门。
                  default: false
                  example: 'true'
                user_ids:
                  type: array
                  items:
                    type: string
                  description: 授予的用户ID列表，授予名单列表接口返回结果中不返回该字段，只在详情接口返回
                  example: '[u273y71]'
                department_ids:
                  type: array
                  items:
                    type: string
                  description: 授予的部门ID列表，授予名单列表接口返回结果中不返回该字段，只在详情接口返回
                group_ids:
                  type: array
                  items:
                    type: string
                  description: 授予的用户组ID列表，授予名单列表接口返回结果中不返回该字段，只在详情接口返回
                  example: '[g122817]'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
