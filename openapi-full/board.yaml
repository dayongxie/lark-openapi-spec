  /open-apis/board/v1/whiteboards/{whiteboard_id}/nodes/plantuml:
    post:
      operationId: board_whiteboard_node_create_plantuml
      summary: 解析画板语法
      tags:
      - whiteboard.node
      description: 创建 plant uml 图形
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/ukTMukTMukTM/uUDN04SN0QjL1QDN/board-v1/whiteboard-node/create_plantuml
      parameters:
      - name: whiteboard_id
        in: path
        required: true
        schema:
          type: string
        description: 画板 token
        example: VF5Bwo7Z5icC0bk8EWbb57Vbckh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plant_uml_code:
                  type: string
                  description: plant uml 代码
                  example: '@startuml\nAlice -> Bob: Authentication Request\nBob --> Alice: Authentication Response\n@enduml'
                style_type:
                  type: integer
                  enum:
                  - 1
                  - 2
                  x-enum-descriptions:
                    '1': 画板样式
                    '2': 经典样式
                  example: '1'
                syntax_type:
                  type: integer
                  description: 语法类型
                  enum:
                  - 0
                  - 1
                  - 2
                  - 3
                  x-enum-descriptions:
                    '0': 未知
                    '1': Plantuml解析
                    '2': Mermaid解析
                    '3': SVG 语法解析
                diagram_type:
                  type: integer
                  enum:
                  - 0
                  - 1
                  - 2
                  - 3
                  - 4
                  - 5
                  - 6
                  - 7
                  - 8
                  - 101
                  - 102
                  - 201
                  x-enum-descriptions:
                    '0': 未知
                    '1': 思维导图
                    '2': 时序图
                    '3': 活动图
                    '4': 类图
                    '5': ER
                    '6': 流程图
                    '7': 用例图
                    '8': 组件图
                    '101': ai流式生成流程图
                    '102': ai流式生成时序图
                    '201': plantUML语法补充超集GML
                overwrite:
                  type: boolean
                  description: 是否覆盖画板内容：true=覆盖，会将画板当前内容清除再写入；false=不覆盖，直接写入画板。默认为 false
                parse_mode:
                  type: integer
                  description: 解析模式
                  enum:
                  - 0
                  - 1
                  x-enum-descriptions:
                    '0': 直接解析成画板节点
                    '1': 解析成画板节点并且保留PlantUml语法，可以对语法进行二次编辑（会将所有节点放到一个Section节点下）（当前只支持PlantUml）
                  example: '0'
                look_type:
                  type: integer
                  description: 外观类型
                  enum:
                  - 1
                  x-enum-descriptions:
                    '1': LarkAI样式
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      node_id:
                        type: string
                        description: 创建生成的plant uml节点id
                        example: t1:1
                      extra:
                        type: string
                        x-lark-original-type: map
                        description: 额外的解析信息
      x-lark-access-tokens:
      - user
      - tenant
      x-lark-scopes:
      - board:whiteboard:node:create
      x-lark-error-mappings:
      - code: 2890001
        httpCode: 400
        msg: invalid format
      - code: 2890002
        httpCode: 400
        msg: invalid arg
      - code: 2890003
        httpCode: 400
        msg: record missing
      - code: 2890004
        httpCode: 401
