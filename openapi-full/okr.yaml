  /open-apis/okr/v2/cycles:
    get:
      operationId: okr_okr_cycle_list
      summary: 获取用户 OKR 周期列表
      tags:
      - okr.cycle
      description: 批量获取用户周期
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/okr-v2/okr-cycle/list
      parameters:
      - name: user_id
        in: query
        required: true
        schema:
          type: string
        description: 用户 ID
        example: ou_3bbe8a09c20e89cce9bff989ed840674
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户 ID 的类型
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 10
        description: 分页大小，最大 100
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页键，首个分页键传入空串
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      has_more:
                        type: boolean
                        description: 是否有下一页
                      page_token:
                        type: string
                        description: 分页键，下一个分页需传入该键
                        example: '1'
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: 用户周期 ID
                              example: '1'
                              format: int64
                            create_time:
                              type: string
                              description: 用户周期的创建时间，时间戳
                              example: '1760604634563'
                              format: int64
                            update_time:
                              type: string
                              description: 用户周期的更新时间，时间戳
                              example: '1760604634563'
                              format: int64
                            tenant_cycle_id:
                              type: string
                              description: 租户周期 ID
                              example: '1'
                              format: int64
                            owner:
                              type: object
                              properties:
                                owner_type:
                                  type: string
                                  description: 所有者类型
                                  enum:
                                  - user
                                  x-enum-descriptions:
                                    user: 员工
                                  example: user
                                user_id:
                                  type: string
                                  description: 员工 ID
                                  example: ou_3bbe8a09c20e89cce9bff989ed840674
                              required:
                              - owner_type
                              description: 所有者
                            start_time:
                              type: string
                              description: 周期的开始时间，时间戳
                              example: '1760604634563'
                              format: int64
                            end_time:
                              type: string
                              description: 周期的结束时间，时间戳
                              example: '1760604634563'
                              format: int64
                            cycle_status:
                              type: integer
                              description: 用户周期状态
                              enum:
                              - 0
                              - 1
                              - 2
                              - 3
                              x-enum-descriptions:
                                '0': 默认
                                '1': 正常
                                '2': 失效
                                '3': 隐藏
                              example: '1'
                            score:
                              type: number
                              description: 用户周期的分数：[0,1]，支持一位小数
                              example: '0.5'
                          required:
                          - id
                          - create_time
                          - update_time
                          - tenant_cycle_id
                          - owner
                          - start_time
                          - end_time
                        description: 用户周期列表
      x-lark-access-tokens:
      - user
      - tenant
      x-lark-scopes:
      - okr:okr.period:readonly
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
      x-lark-error-mappings:
      - code: 1009999
        httpCode: 500
        msg: internal server error
      - code: 1009998
        httpCode: 500
        msg: system exception
      - code: 1001001
        httpCode: 400
        msg: invalid parameters
      - code: 1001002
        httpCode: 400
        msg: no permission
      - code: 1001003
        httpCode: 400
        msg: user no found
      - code: 1001004
        httpCode: 400
        msg: okr data not found
      x-lark-rate-limit:
        tier: 3
      x-lark-pagination: true
