        in: path
        required: true
        schema:
          type: string
          format: int64
        description: 指标 ID
        example: '1'
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
          default: open_id
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户 ID 的类型
      - name: department_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - department_id
          - open_department_id
          x-enum-descriptions:
            department_id: 以department_id来识别部门
            open_department_id: 以open_department_id来识别部门
          default: open_department_id
          x-lark-id-types:
            department_id: department
            open_department_id: department
        description: 此次调用中使用的部门 ID 的类型
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                current_value_calculate_type:
                  type: integer
                  description: 指标的当前值的计算方式，目标仅支持 0、1；关键结果仅支持 0、2
                  enum:
                  - 0
                  - 1
                  - 2
                  x-enum-descriptions:
                    '0': 手动更新
                    '1': 基于关键结果进度自动更新
                    '2': 基于拆解的关键结果进度更新
                  example: '0'
                status_calculate_type:
                  type: integer
                  description: 指标的状态的计算方式，目标仅支持 0、1、2；关键结果仅支持 0、1
                  enum:
                  - 0
                  - 1
                  - 2
                  x-enum-descriptions:
                    '0': 手动更新
                    '1': 基于进度和当前时间自动更新
                    '2': 基于风险最高的关键结果状态更新
                  example: '0'
                start_value:
                  type: number
                  description: 指标的起始值，不支持目标修改
                  example: '0'
                target_value:
                  type: number
                  description: 指标的目标值，不支持目标修改；不支持有承接记录的关键结果修改
                  example: '0'
                current_value:
                  type: number
                  description: 指标的当前值，不支持基于关键结果进度自动更新的目标修改；不支持基于拆解记录自动更新的关键结果修改
                  example: '0'
                unit:
                  type: object
                  properties:
                    unit_type:
                      type: integer
                      description: 指标的单位类型
                      enum:
                      - 0
                      - 1
                      x-enum-descriptions:
                        '0': 公共
                        '1': 自定义
                      example: '0'
                    unit_value:
                      type: string
                      description: 指标单位的值。如果是自定义，字符长度不超过 5；如果单元类型是「公共」，单位值为以下枚举值 百分比：PERCENT；无单位：NONE；元：YUAN；美元：DOLLAR
                      example: PERCENT
                  required:
                  - unit_type
                  - unit_value
                  description: 指标的单位，不支持目标修改；不支持有承接记录的关键结果修改
                indicator_status:
                  type: integer
                  description: 指标的状态，只支持指标的状态的计算方式为手动更新时修改
                  enum:
                  - -1
                  - 0
                  - 1
                  - 2
                  x-enum-descriptions:
                    '-1': 未定义
                    '0': 正常
                    '1': 有风险
                    '2': 已延期
                  example: '0'
      responses:
        '200':
