                                enum:
                                - 0
                                - 1
                                x-enum-descriptions:
                                  '0': 公共
                                  '1': 自定义
                                example: '0'
                              unit_value:
                                type: string
                                description: 指标单位的值。如果是自定义，字符长度不超过 5；如果单元类型是「公共」，单位值为以下枚举值 百分比：PERCENT；无单位：NONE；元：YUAN；美元：DOLLAR
                                example: PERCENT
                            required:
                            - unit_type
                            - unit_value
                            description: 指标的单位
                        required:
