          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      indicator:
                        type: object
                        properties:
                          id:
                            type: string
                            description: 指标的 ID
                            example: '1'
                            format: int64
                          create_time:
                            type: string
                            description: 指标的创建时间，时间戳
                            example: '1760604634563'
                            format: int64
                          update_time:
                            type: string
                            description: 指标的更新时间，时间戳
                            example: '1760604634563'
                            format: int64
                          owner:
                            type: object
                            properties:
                              owner_type:
                                type: string
                                description: 所有者类型
                                enum:
                                - user
                                x-enum-descriptions:
                                  user: 员工
                                example: user
                              user_id:
                                type: string
                                description: 员工 ID
                                example: ou_3bbe8a09c20e89cce9bff989ed840674
                            required:
                            - owner_type
                            description: 所有者
                          entity_type:
                            type: integer
                            description: 指标所属的实体类型
                            enum:
                            - 2
                            - 3
                            x-enum-descriptions:
                              '2': 目标
                              '3': 关键结果
                            example: '2'
                          entity_id:
                            type: string
                            description: 指标所属的实体 ID
                            example: '1'
                            format: int64
                          indicator_status:
                            type: integer
                            description: 指标的状态
                            enum:
                            - -1
                            - 0
                            - 1
                            - 2
                            x-enum-descriptions:
                              '-1': 未定义
                              '0': 正常
                              '1': 有风险
                              '2': 已延期
                            example: '0'
                          status_calculate_type:
                            type: integer
                            description: 指标的状态的计算方式
                            enum:
                            - 0
                            - 1
                            - 2
                            x-enum-descriptions:
                              '0': 手动更新
                              '1': 基于进度和当前时间自动更新
                              '2': 基于风险最高的关键结果状态更新
                            example: '0'
                          start_value:
                            type: number
                            description: 指标的起始值
                            example: '0'
                          target_value:
                            type: number
                            description: 指标的目标值
                            example: '0'
                          current_value:
                            type: number
                            description: 指标的当前值
                            example: '0'
                          current_value_calculate_type:
                            type: integer
                            description: 指标的当前值的计算方
                            enum:
