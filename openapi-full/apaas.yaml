  /open-apis/apaas/v1/applications/{namespace}/objects/{object_api_name}/records/batch_query:
    post:
      operationId: apaas_application_object_record_batch_query
      summary: 查询记录列表
      tags:
      - application.object.record
      description: 批量查询对象记录
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/apaas-v1/application-object-record/batch_query
      parameters:
      - name: namespace
        in: path
        required: true
        schema:
          type: string
        description: 命名空间
        example: package_test__c
      - name: object_api_name
        in: path
        required: true
        schema:
          type: string
        description: 目标对象的唯一标识符
        example: _user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                select:
                  type: array
                  items:
                    type: string
                  description: 需要获取的字段，使用字段唯一标识符进行查询，关联字段可使用「.」进行下钻
                filter:
                  allOf:
                  - $ref: '#/components/schemas/Filter'
                  description: 筛选条件，通过 JSON 格式指定条件
                order_by:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                        description: 字段唯一标识
                        example: _id
                      direction:
                        type: string
                        description: 排序方向，值为 "ASC" 或者 "DESC"，代表升序和降序
                        enum:
                        - ASC
                        - DESC
                        x-enum-descriptions:
                          ASC: 升序
                          DESC: 降序
                        example: ASC
                    required:
                    - field
                    - direction
                  description: 排序参数，通过 JSON 格式指定条件。其中， field 为参与排序字段，direction 为排序方向，多个条件按其在数组中的顺序生效。
                group_by:
                  type: array
                  items:
                    type: object
                    properties:
                      field:
                        type: string
                        description: 字段唯一标识
                        example: _id
                    required:
                    - field
                  description: 聚合参数，通过 JSON 格式指定条件。其中， field 为参与聚合的字段。
                page_token:
                  type: string
                  description: 分页的 Token 值，由服务端生成，可从 Response 中的 next_page_token 参数中获取。注意：第一页需填写空字符串 ""，且不能与 OFFSET 一起使用。
                use_page_token:
                  type: boolean
                  description: 是否使用 page_token 功能。为 True 时将使用 page_token 的值作为起始位置查询记录，并且会在 Response 中返回 next_page_token 。默认为
                    False 。
                  example: 'false'
                page_size:
                  type: integer
                  description: 期望服务端返回的记录条数，上限 500 条。不填则取默认值，默认值为 500。
                  example: '100'
                offset:
                  type: integer
                  description: 返回记录的偏移量，默认为 0 ，即从查询到的第一条记录开始返回。offset 较大时查询性能较差，可能引起接口响应超时，拉取全部记录时建议使用 ID 游标分页，具体见 ID 游标分页说明
                  example: '0'
                need_total_count:
                  type: boolean
                  description: 是否返回符合条件的记录总数（Total）。默认为 False，不返回记录总数。
                  example: 'true'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      items:
                        type: string
                        description: 符合条件的记录列表
                        example: '[{}]'
                      total:
                        type: integer
                        description: 符合条件的记录数
                        example: '0'
                      next_page_token:
                        type: string
                        description: 下一页的起始位置 Token ，访问至末尾时不返回
                        example: 'null'
                      has_more:
                        type: boolean
                        description: 是否还有数据
                    required:
                    - items
      x-lark-access-tokens:
      - tenant
      x-lark-scopes:
      - app_engine:object.record:read
      x-lark-error-mappings:
      - code: 2320001
        httpCode: 400
        msg: param is invalid
      x-lark-rate-limit:
        tier: 4
