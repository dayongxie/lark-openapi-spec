        schema:
          type: string
        description: 视图名称
        example: view_name_1
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 10
        description: 分页大小，用于限制一次请求所返回的数据条目数。默认10，最大500
        example: '10'
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该 page_token 获取查询结果
      - name: select
        in: query
        required: false
        schema:
          type: string
        description: |-
          返回的列，默认为 *，即返回所有列。
          遵循 PostgREST 语法，详情可查看 https://docs.postgrest.org/en/v13/references/api/tables_views.html#vertical-filtering
        example: _id,_created_at,name
      - name: filter
        in: query
        required: false
        schema:
          type: string
        description: 筛选条件，尊许 PostgREST 语法，详情可查看 https://docs.postgrest.org/en/v13/references/api/tables_views.html#horizontal-filtering
        example: age=gt.10
      - name: order
        in: query
        required: false
        schema:
          type: string
        description: |-
          排序条件，如果没指定 asc/desc，默认为 asc，null 值可排在最前或最后。
          尊许 PostgREST 语法，详情可查看
          https://docs.postgrest.org/en/v13/references/api/tables_views.html#ordering
        example: age.desc,score.asc
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      has_more:
                        type: boolean
                        description: 是否还有更多项
                      page_token:
                        type: string
                        description: 分页标记，当 has_more 为 true 时，会同时返回新的 page_token，否则不返回 page_token
                      total:
                        type: integer
                        description: 符合条件的记录总数
                        example: '2'
                      items:
                        type: string
                        description: 数据记录列表，格式为数组序列化后的 JSONString
                        example: '[{\"name\":\"王一一\",\"gender\":\"male\",\"age\":10},{\"name\":\"王二二\",\"gender\":\"female\",\"age\":10}]'
                    required:
                    - has_more
                    - page_token
                    - total
                    - items
      x-lark-access-tokens:
      - user
      x-lark-scopes:
      - app_engine:workspace.table.record:read
      - app_engine:workspace.table.record:write
      x-lark-error-mappings:
      - code: 2320001
        httpCode: 400
        msg: param is invalid
      x-lark-rate-limit:
        tier: 7
  /open-apis/apaas/v1/workspaces/{workspace_id}/sql_commands:
    post:
      operationId: apaas_workspace_sql_commands
      summary: 执行SQL
      tags:
      - workspace
      description: 执行 SQL
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/apaas-v1/workspace/sql_commands
      parameters:
      - name: workspace_id
        in: path
        required: true
        schema:
          type: string
        description: 工作空间id
        example: workspace_abc
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sql:
                  type: string
                  description: 要执行的 SQL 语句
                  example: SELECT name FROM student
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      result:
                        type: string
                        description: 如果是 SELECT 命令，返回的是查询结果的 JSON 序列化字符串。如果是其他无返回的命令，如 DELETE 等，result 为空。
                        example: '[{\"name\":\"王一一\"}]'
                    required:
                    - result
      x-lark-access-tokens:
      - user
      x-lark-scopes:
      - app_engine:workspace.sql_commands:write
      x-lark-error-mappings:
      - code: 2320001
        httpCode: 400
        msg: param is invalid
      x-lark-rate-limit:
        tier: 7
