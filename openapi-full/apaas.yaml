  /open-apis/apaas/v1/tenant_app_metrics/query:
    post:
      operationId: apaas_tenant_app_metrics_query
      summary: 获取应用运营数据
      tags:
      - tenant_app_metrics
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/apaas-v1/tenant_app_metrics/query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                namespaces:
                  type: array
                  items:
                    type: string
                  description: aPaaS 应用 namespace 列表，单次请求最多查询 20 个 namespace
                date:
                  type: string
                  description: 查询日期，支持查询最近一年至前一日数据
                  example: '2006-01-02'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      metrics:
                        type: array
                        items:
                          type: object
                          properties:
                            namespace:
                              type: string
                              description: aPaaS 应用 namespace
                              example: package_a__c
                            data:
                              type: string
                              description: |-
                                指定应用的指标详情，对 []map[string]int64 数组进行序列化后得到的 json 字符串。数组每个元素包含名称（Name）、数值类型（ValueType）、数值（Value）三个字段。

                                Name枚举值：
                                active_user_1dcnt（近1日应用用户活跃数）、
                                active_user_7dcnt（近7日应用用户活跃数）、
                                active_user_30dcnt（近30日应用用户活跃数）、
                                function_run_1dcnt（近1日函数运行次数，含线上环境与开发环境）。

                                ValueType枚举值：amount（数量）。

                                json格式：[{"Name":"key1","ValueType":"amount","Value":100},
                                {"Name":"key2","ValueType":"amount","Value":200}
                                ]
                              example: '[{\"Name\":\"active_user_30dcnt\",\"ValueType\":\"amount\",\"Value\":6000},{\"Name\":\"active_user_7dcnt\",\"ValueType\":\"amount\",\"Value\":1400},{\"Name\":\"active_user_1dcnt\",\"ValueType\":\"amount\",\"Value\":200},{\"Name\":\"function_run_1dcnt\",\"ValueType\":\"amount\",\"Value\":400}]'
                        description: 查询应用的指标详情列表
      x-lark-access-tokens:
      - user
      x-lark-scopes:
      - app_engine:tenant_app_metrics:read
      x-lark-error-mappings:
      - code: 2320003
        httpCode: 404
        msg: tenant does not exist
      - code: 2320004
        httpCode: 404
        msg: user does not exist
      - code: 2320005
        httpCode: 403
        msg: insufficient permissions
      - code: 2320006
        httpCode: 400
        msg: bad request or invalid parameter
      x-lark-rate-limit:
        tier: 7
