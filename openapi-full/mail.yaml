                add_folder:
                  type: string
                  description: 需要移入的文件夹。支持INBOX、SENT、SPAM、ARCHIVED以及自定义文件夹ID
                  example: INBOX
                thread_ids:
                  type: array
                  items:
                    type: string
                  description: 需要操作的邮件会话ID，可通过列出邮件会话获取
