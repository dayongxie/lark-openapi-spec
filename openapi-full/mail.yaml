  /open-apis/mail/v1/user_mailboxes/{user_mailbox_id}/messages/batch_modify:
    post:
      operationId: mail_user_mailbox_message_batch_modify
      summary: 批量修改邮件
      tags:
      - user_mailbox.message
      description: 本接口提供修改邮件的能力，支持移动邮件的文件夹、给邮件添加和移除标签、标记邮件读和未读、移动邮件至垃圾邮件等能力。不支持移动邮件到已删除文件夹，如需，请使用批量删除邮件接口。
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/mail-v1/user_mailbox-message/batch_modify
      parameters:
      - name: user_mailbox_id
        in: path
        required: true
        schema:
          type: string
        description: 用户邮箱地址。当使用用户身份访问时，可以输入"me"代表当前调用接口用户
        example: adc@abc.com
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                message_ids:
                  type: array
                  items:
                    type: string
                  description: 需要修改的邮件ID，可通过列出邮件接口、收信事件通知等方式获得
                add_label_ids:
                  type: array
                  items:
                    type: string
                  description: 待添加的标签。可选值包括：UNREAD、IMPORTANT、OTHER、FLAGGED，以及自定义标签 ID。
                remove_label_ids:
                  type: array
                  items:
                    type: string
                  description: 待移除的标签。可选值包括：UNREAD、IMPORTANT、OTHER、FLAGGED，以及自定义标签 ID。
                add_folder:
                  type: string
                  description: 需要移入的文件夹。支持INBOX、SENT、SPAM、ARCHIVED以及自定义文件夹ID
                  example: INBOX
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
      x-lark-access-tokens:
      - user
      - tenant
      x-lark-scopes:
      - mail:user_mailbox.message:modify
      x-lark-error-mappings:
      - code: 1230001
        httpCode: 400
        msg: param is invalid
      - code: 1230002
        httpCode: 500
        msg: Internal error
      - code: 1236006
        httpCode: 429
        msg: Concurrent write conflict. Please retry later
      - code: 1230007
        httpCode: 400
        msg: message not exist
      - code: 1236008
        httpCode: 400
        msg: label or folder not exist
      - code: 1230009
        httpCode: 403
        msg: permission denied
      x-lark-rate-limit:
        tier: 6
