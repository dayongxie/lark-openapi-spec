  /open-apis/mail/v1/user_mailboxes/{user_mailbox_id}/profile:
    get:
      operationId: mail_user_mailbox_profile
      summary: 获取用户邮箱信息
      tags:
      - user_mailbox
      description: 用于在用户身份下获取自己的邮箱主地址。当用户没有邮箱时，返回的 primary_email_address 为空。
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/mail-v1/user_mailbox/profile
      parameters:
      - name: user_mailbox_id
        in: path
        required: true
        schema:
          type: string
        description: 只支持填写me
        example: me
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      primary_email_address:
                        type: string
                        description: 用户主账号邮箱地址
                        example: abc@abc.com
                      not_found_reason:
                        type: string
                        description: 邮箱地址不存在时的未命中原因；当 primary_email_address 为空时可用于判断未命中
                        example: mailbox address not found
      x-lark-access-tokens:
