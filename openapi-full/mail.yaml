        httpCode: 500
        msg: query is too long
      - code: 1231012
        httpCode: 500
        msg: invalid filter
      - code: 1231020
        httpCode: 500
        msg: page_token is invalid or expired
      - code: 1231021
        httpCode: 500
        msg: page_size exceeds maximum allowed value
      - code: 1231022
        httpCode: 500
        msg: pagination limit reached
      - code: 1231030
        httpCode: 500
        msg: user identity not found
      - code: 1231031
        httpCode: 500
        msg: failed to initialize request context
      - code: 1231040
