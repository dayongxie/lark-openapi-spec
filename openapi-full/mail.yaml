  /open-apis/mail/v1/multi_entity/search:
    post:
      operationId: mail_multi_entity_search
      summary: 多实体搜索
      tags:
      - multi_entity
      description: 适用于写信联系人搜索
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/mail-v1/multi_entity/search
      parameters:
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户ID的类型
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: |-
                    搜索关键词

                    **数据校验规则：** 长度范围：1 字符 ～ 50 字符
                  example: 周会
                size:
                  type: integer
                  description: 获取的数据条数，**默认20，支持1-20**
                  default: 20
                  example: '20'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                              description: 标识当前的实体是哪种（例如：user, chat 等）
                              example: user
                            id:
                              type: string
                              description: 唯一标识 ID
                              example: '6911188411932033028'
                            name:
                              type: string
                              description: 名称
                              example: 张三
                            email:
                              type: string
                              description: 邮箱地址
                              example: zhangsan@bytedance.com
                            display_name:
                              type: string
                              description: 备注名
                              example: 备注名
                            member_count:
                              type: integer
                              description: 群成员数量
                              example: '128'
                            user_id:
                              type: string
                              description: 用户 ID
                              example: ou_2d131f4c3a28b0
                            department:
                              type: string
                              description: 部门信息
                              example: 飞书研发团队
                            chat_id:
                              type: string
                              description: 群聊或会话 ID
                              example: oc_40ed357053e34b9
                              x-lark-id-types:
                                chat_id: chat
                            tag:
                              type: string
                              description: 标签
                              example: 超大群/部门群/邮箱联系人/邮件组/外部
                        description: 返回的实体详情
                      notice:
                        type: string
                        description: 搜索补充提示信息，返回本次搜索的额外说明，例如：query被截断；搜索结果不全 等
                        example: The query is too long and has been truncated to the first 50 characters for search.
      x-lark-access-tokens:
      - user
      x-lark-scopes:
      - mail:user_mailbox:readonly
      x-lark-field-scopes:
      - contact:user.employee_id:readonly
