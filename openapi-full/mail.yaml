  /open-apis/mail/v1/user_mailboxes/{user_mailbox_id}/messages:
    get:
      operationId: mail_user_mailbox_message_list
      summary: 列出邮件
      tags:
      - user_mailbox.message
      description: 根据用户指定的标签或文件夹，列出对应位置下的邮件列表。注意，必须填写folder_id或label_id中的一个字段。
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/mail-v1/user_mailbox-message/list
      parameters:
      - name: user_mailbox_id
        in: path
        required: true
        schema:
          type: string
        description: 用户邮箱地址 或 输入me代表当前调用接口用户
        example: user@xxx.xx 或 me
      - name: page_size
        in: query
        required: true
        schema:
          type: integer
        description: 分页大小
        example: '1'
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该 page_token 获取查询结果
        example: xxx
      - name: folder_id
        in: query
        required: false
        schema:
          type: string
        description: 文件夹 id，支持INBOX、SENT、SPAM、ARCHIVED、SCHEDULED、SCHEDULED、TRASH、DRAFT以及自定义文件夹ID
        example: INBOX 或者用户文件夹 id
      - name: only_unread
        in: query
        required: false
        schema:
          type: boolean
        description: 是否只查询未读邮件
        example: 'true'
      - name: label_id
        in: query
        required: false
        schema:
          type: string
        description: 标签id，支持IMPORTANT、OTHER、FLAGGED、SCHEDULED以及自定义文件夹标签
        example: FLAGGED
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: string
                        description: 邮件 id 列表
                      page_token:
                        type: string
                        description: 分页标记，当 has_more 为 true 时，会同时返回新的 page_token，否则不返回 page_token
                        example: xxx
                      has_more:
                        type: boolean
                        description: 是否还有更多项
                        example: 'true'
      x-lark-access-tokens:
      - tenant
      - user
      x-lark-scopes:
      - mail:user_mailbox.message:readonly
      x-lark-error-mappings:
      - code: 1230001
        httpCode: 400
        msg: ''
      - code: 1230002
        httpCode: 403
        msg: ''
      - code: 1230003
        httpCode: 500
        msg: ''
      x-lark-rate-limit:
        tier: 7
      x-lark-pagination: true
