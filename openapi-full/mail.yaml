  /open-apis/mail/v1/user_mailboxes/{user_mailbox_id}/drafts/{draft_id}/send:
    post:
      operationId: mail_user_mailbox_draft_send
      summary: 发送草稿
      tags:
      - user_mailbox.draft
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/mail-v1/user_mailbox-draft/send
      parameters:
      - name: user_mailbox_id
        in: path
        required: true
        schema:
          type: string
        description: 用户邮箱地址。当使用用户身份访问时，可以输入"me"代表当前调用接口用户
        example: aba@aac.com
      - name: draft_id
        in: path
        required: true
        schema:
          type: string
        description: 草稿ID，可通过创建草稿、更新草稿或列出草稿列表接口获得
        example: 268dce11-85f7-427d-8756-6be3abc850fd
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                send_time:
                  type: string
                  description: 定时发送的 Unix 时间戳（秒）。不传或为空时立即发送。需至少为当前时间 + 5 分钟。
                  example: '1720000000'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      message_id:
                        type: string
                        description: 发送后生成的已发送邮件ID
                        example: xxxx
                      thread_id:
                        type: string
                        description: 邮件所属会话ID
                        example: xxxx
                      recall_status:
                        type: string
                        description: 仅允许撤回时返回该字段，值为available
                        enum:
                        - unavailable
                        - available
                        x-enum-descriptions:
                          unavailable: 邮件不可撤回
                          available: 邮件可撤回
                        example: unavailable
                      automation_send_disable:
                        type: object
                        properties:
                          reason:
                            type: string
                            description: 自动化发信被禁用的原因说明
                            example: Automation send is disabled by your mailbox setting
                          reference:
                            type: string
                            description: 用户可参考reference内容解决
                            example: https://open.larksuite.com/mail/settings/automation
                        description: 当用户禁用自动化发信时返回此字段；为空表示发信成功
      x-lark-access-tokens:
      - user
      x-lark-scopes:
      - mail:user_mailbox.message:send
      x-lark-error-mappings:
      - code: 1234029
        httpCode: 429
        msg: too many requests, try again later
      - code: 1234008
        httpCode: 400
        msg: request parameter error
      - code: 1236003
        httpCode: 400
        msg: Recipient limit exceeded. Please use the Feishu App to send emails with a large number of recipients.
      - code: 1236004
        httpCode: 400
        msg: the number of attachments exceeds the limit
      - code: 1236014
        httpCode: 400
        msg: content risk
      - code: 1236017
        httpCode: 400
        msg: sender check fail
      - code: 1236018
        httpCode: 400
        msg: receiver check fail
      - code: 1234017
        httpCode: 403
        msg: permission deny
      - code: 1234050
        httpCode: 404
        msg: draft not found
      - code: 1234013
        httpCode: 404
        msg: user mailbox not found or user mailbox not active
      - code: 1236005
        httpCode: 409
        msg: send mail repeatedly
      - code: 1236006
        httpCode: 429
        msg: Concurrent write conflict. Please retry later
      - code: 1236007
        httpCode: 429
        msg: the daily number of emails sent by the user exceeds the limit
      - code: 1236008
        httpCode: 429
        msg: the number of external recipients the user sends messages to each day exceeds the limit
      - code: 1236009
        httpCode: 429
        msg: the number of external recipients the tenant sends messages to each day exceeds the limit
      - code: 1236010
        httpCode: 429
        msg: mail quota limit
      - code: 1236013
        httpCode: 429
        msg: tenant storage limit
      - code: 1236019
        httpCode: 500
        msg: internal server error
      - code: 1236022
        httpCode: 400
        msg: bcc is not supported for calendar invites
      - code: 1236023
        httpCode: 400
        msg: send_time is not supported for calendar invites
      - code: 1236024
        httpCode: 400
        msg: user is not able to create calendar invites
      x-lark-rate-limit:
        tier: 6
