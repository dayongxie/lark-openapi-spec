                            email_type:
                              type: string
                              description: 邮箱地址类型
                              enum:
                              - MAIL_GROUP
                              - PUBLIC_MAILBOX
                              - USER_PRIMARY
                              - USER_ALIAS
                              - PUBLIC_MAILBOX_ALIAS
                              x-enum-descriptions:
                                MAIL_GROUP: 邮件组
                                PUBLIC_MAILBOX: 公共邮箱
                                USER_PRIMARY: 用户主地址
                                USER_ALIAS: 用户别名
                                PUBLIC_MAILBOX_ALIAS: 公共邮箱别名
                              example: USER_PRIMARY
                        description: 用户可访问的所有邮箱信息，包含主邮箱和公共邮箱
      x-lark-access-tokens:
      - user
      - tenant
      x-lark-scopes:
      - mail:user_mailbox
      - mail:user_mailbox:readonly
      x-lark-error-mappings:
      - code: 1230001
        httpCode: 400
        msg: param is invalid, check user_mailbox_id
      - code: 1230004
        httpCode: 403
        msg: 'permission denied: mailbox not found, unsupported mailbox type, or no access to this mailbox'
      - code: 1230003
        httpCode: 500
        msg: internal server error, please retry later
      - code: 1230005
        httpCode: 400
        msg: tenant access token not support me
      x-lark-rate-limit:
        tier: 7
  /open-apis/mail/v1/user_mailboxes/{user_mailbox_id}:
