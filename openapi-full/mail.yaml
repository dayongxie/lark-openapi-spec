                              reply_to:
                                type: string
                                description: Reply-To邮件头
                                example: 06d20.dbf451a3.808a.475a.acc9.1363dfd20f36@larksuite.com
                              priority_type:
                                type: string
                                description: 邮件优先级
                                enum:
                                - '0'
                                - '1'
                                - '3'
                                - '5'
                                x-enum-descriptions:
                                  '0': 无优先级
                                  '1': 高优先级
                                  '3': 正常优先级
                                  '5': 低优先级
