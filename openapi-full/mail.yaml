  /open-apis/mail/v1/user_mailboxes/{user_mailbox_id}/messages/{message_id}/recall:
    get:
      operationId: mail_user_mailbox_sent_message_get_recall_detail
      summary: 获取邮件撤回进度
      tags:
      - user_mailbox.sent_message
      description: 查询指定邮件的撤回结果详情，包括整体撤回进度、成功/失败/处理中的收件人数量，以及每个收件人的撤回状态和失败原因。
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/mail-v1/user_mailbox-sent_message/get_recall_detail
      parameters:
      - name: user_mailbox_id
        in: path
        required: true
        schema:
          type: string
        description: 用户邮箱地址。当使用用户身份访问时，可以输入"me"代表当前调用接口用户
        example: me
      - name: message_id
        in: path
        required: true
        schema:
          type: string
        description: 需要查询撤回结果的邮件ID
        example: xxx
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      recall_status:
                        type: string
                        description: 整体撤回进度
                        enum:
                        - in_progress
                        - done
                        x-enum-descriptions:
                          in_progress: 邮件撤回中
                          done: 邮件撤回结束
                        example: in_progress
                      recall_result:
                        type: string
                        description: 撤回最终结果，仅recall_status为done时有意义
                        enum:
                        - all_success
                        - all_fail
                        - some_fail
                        - processing
                        x-enum-descriptions:
                          all_success: 邮件已撤回
                          all_fail: 邮件撤回失败
                          some_fail: 部分撤回失败
                          processing: 邮件撤回中
                        example: all_success
                      success_count:
                        type: integer
                        description: 撤回成功的收件人数
                        example: '3'
                      failure_count:
                        type: integer
                        description: 撤回失败的收件人数
                        example: '1'
                      processing_count:
                        type: integer
                        description: 处理中的收件人数
                        example: '0'
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            recipient_address:
                              type: string
                              description: 收件人邮箱地址
                              example: zhangsan@example.com
                            recipient_name:
                              type: string
                              description: 收件人显示名称
                              example: 张三
                            status:
                              type: string
                              description: 该收件人的撤回状态
                              enum:
                              - success
                              - fail
                              - processing
                              x-enum-descriptions:
                                success: 撤回成功
                                fail: 撤回失败
                                processing: 处理中
                              example: success
                            fail_reason:
                              type: string
                              description: 撤回失败原因，仅status为fail时有值
                              enum:
                              - message_has_been_read
                              - not_using_lark_mail
                              - not_in_the_same_tenant
                              - invalid_address
                              - unknown
                              x-enum-descriptions:
                                message_has_been_read: 邮件已读
                                not_using_lark_mail: 不支持撤回发往外部的邮件
                                not_in_the_same_tenant: 收件人域名为外部域名
                                invalid_address: 地址已失效
                                unknown: 其他原因
                              example: message_has_been_read
                            is_mailing_list:
                              type: boolean
                              description: 是否为邮件组地址
                              example: 'false'
                            mailing_list_success_count:
                              type: integer
                              description: 邮件组内成功撤回人数，仅is_mailing_list为true时有值
                              example: '5'
                            mailing_list_failure_count:
                              type: integer
                              description: 邮件组内撤回失败人数，仅is_mailing_list为true时有值
                              example: '0'
                            mailing_list_finish_percent:
                              type: integer
                              description: 邮件组完成百分比0-100，仅is_mailing_list为true时有值
                              example: '100'
                        description: 每个收件人的撤回详情列表
      x-lark-access-tokens:
      - user
      - tenant
      x-lark-scopes:
      - mail:user_mailbox.message:readonly
      x-lark-error-mappings:
      - code: 1234008
        httpCode: 400
        msg: param is invalid
      - code: 1230004
        httpCode: 403
        msg: 'permission denied: mailbox not found, unsupported mailbox type, or no access to this mailbox'
      - code: 1234035
        httpCode: 404
        msg: recall record not found
      - code: 1235000
        httpCode: 500
        msg: internal error
      x-lark-rate-limit:
        tier: 2
    post:
      operationId: mail_user_mailbox_sent_message_recall
      summary: 撤回已发送邮件
      tags:
      - user_mailbox.sent_message
      description: 撤回指定邮件。前置条件：邮件须已投递，且发送时间在 24 小时以内；搬家中的域名不支持撤回。返回说明：若用户或邮件不满足撤回条件，接口仍返回 200，响应体中 recall_status 为 unavailable，recall_restriction_reason
        标明具体原因。返回成功仅表示撤回请求已受理，实际撤回结果请调用「查询邮件撤回进度」接口获取。
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/mail-v1/user_mailbox-sent_message/recall
      parameters:
      - name: user_mailbox_id
        in: path
        required: true
        schema:
          type: string
        description: 用户邮箱地址。当使用用户身份访问时，可以输入"me"代表当前调用接口用户
        example: me
      - name: message_id
        in: path
        required: true
        schema:
          type: string
        description: 需要撤回的邮件ID
        example: xxx
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      recall_status:
                        type: string
                        description: 撤回状态。仅当不支持撤回时返回unavailable
                        enum:
                        - unavailable
                        - available
