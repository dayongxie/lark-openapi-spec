      - name: user_mailbox_id
        in: path
        required: true
        schema:
          type: string
        description: 用户邮箱地址。当使用用户身份访问时，可以输入"me"代表当前调用接口用户
        example: user@xxx.xx 或 me
      - name: thread_id
        in: path
        required: true
        schema:
          type: string
        description: 邮件会话ID。可通过发送邮件、回复邮件的接口返回值或获取邮件详情接口查询获得。
        example: th_xxxxxxxxxxxx
      - name: format
        in: query
        required: false
        schema:
          type: string
          enum:
          - full
          - plain_text_full
          - metadata
          x-enum-descriptions:
            full: 全文，包括标签、文件夹、主题、收发件人、纯文本、HTML等信息
            plain_text_full: 全文，只返回纯文本正文内容，不返回HTML。返回内容包括标签、文件夹、主题、收发件人、纯文本等信息
            metadata: 邮件元数据信息，包括标签、文件夹、主题、收发件人、摘要等信息，不返回正文内容
        description: 需要获取的邮件内容。支持选择full/plain_text_full/metadata
