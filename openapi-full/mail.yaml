        msg: param is invalid
      - code: 1230002
        httpCode: 400
        msg: user does not have email
      - code: 1230003
        httpCode: 500
        msg: internal server error
      - code: 1230004
        httpCode: 403
        msg: permission denied
      x-lark-rate-limit:
        tier: 3
  /open-apis/mail/v1/user_mailboxes/{user_mailbox_id}/search:
    post:
      operationId: mail_user_mailbox_search
      summary: 搜索邮件
      tags:
      - user_mailbox
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/mail-v1/user_mailbox/search
      parameters:
      - name: user_mailbox_id
        in: path
        required: true
        schema:
          type: string
        description: 用户邮箱地址。当使用用户身份访问时，可以输入"me"代表当前调用接口用户
        example: user@xxx.xx or me
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
        description: |-
          翻页参数：单页返回结果数量。
          默认值：15。
          范围：1～15。
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 翻页 token：首页无需传参，后续请求使用上一次返回的 page_token 实现翻页。
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: |-
                    搜索关键词。
                    **数据校验规则：**
                    - 长度范围：0 ～ 50 字符
                  example: 合同审批通知
                filter:
                  type: object
                  properties:
                    from:
                      type: array
                      items:
                        type: string
                      description: 发件人姓名或邮箱地址筛选，仅返回来自该发件人的邮件
                    to:
                      type: array
                      items:
                        type: string
                      description: 收件人姓名或邮箱地址筛选，仅返回收件人列表包含该收件人的邮件。
                    cc:
                      type: array
                      items:
                        type: string
                      description: 抄送人姓名或邮箱地址筛选，仅返回抄送人列表包含该抄送人的邮件。
                    bcc:
                      type: array
                      items:
                        type: string
                      description: 密送人姓名或邮箱地址筛选，仅返回秘送人列表包含该秘送人的邮件。
                    subject:
                      type: string
                      description: 邮件主题搜索，仅返回主题中能搜到搜索词的结果。
                      example: 合同签署
                    folder:
                      type: array
                      items:
                        type: string
                      description: 文件夹名称筛选，仅返回在所选目录下的邮件。仅支持传入系统文件夹名称（固定值 inbox/sent/draft/trash/spam/archive/priority/flagged/other/scheduled，其中，priority指重要邮件）、自定义文件夹名称。子文件夹需使用
                        parent_name/child_name格式，可通过 folder list 接口查看文件夹名称。
                    label:
                      type: array
                      items:
                        type: string
                      description: 自定义标签名称筛选，仅返回包含指定自定义标签的邮件。子标签需使用parent_name/child_name 格式，可通过 label list 接口查看标签名称。
                    has_attachment:
                      type: boolean
                      description: 是否只筛选有附件的邮件，默认值：**否**
                      example: 'true'
                    is_unread:
                      type: boolean
                      description: 是否只筛选未读邮件，默认为**否**
                      example: 'true'
                    create_time:
                      type: object
                      properties:
                        start_time:
                          type: string
                          description: 时间范围的开始时间。（iso8601）精确到秒
                          example: '2026-03-10T00:00:00+08:00'
                        end_time:
                          type: string
                          description: 时间范围的截止时间。（iso8601）精确到秒
                          example: '2026-03-10T00:00:00+08:00'
                      description: |-
                        邮件接收时间范围筛选，只返回在所选时间范围内的邮件。
                        限制：一次搜索请求的时间范围不要超过1年。
                  description: |-
                    用于对搜索结果进行精细化筛选，支持按发件人、收件人、文件夹、时间范围等多维度组合过滤，缩小查询范围，提升搜索精准度。
                    **示例值：** {"from":["user@example.com"],"is_unread":true}
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: 邮件唯一标识
                              example: msg_XXX
                            display_info:
                              type: string
                              description: 包含邮件基本信息的卡片，用户搜索关键词命中的文本片段，使用<h></h>标签包裹标注
                              example: '{}'
                            meta_data:
                              type: object
                              properties:
                                title:
                                  type: string
                                  description: 邮件主题
                                  example: 测试邮件
                                thread_id:
                                  type: string
                                  description: 邮件线程 ID
                                  example: thread_id_XXX
                                create_time:
                                  type: string
                                  description: 邮件接收时间
                                  example: '2026-03-15T14:30:00+08:00'
                                message_biz_id:
                                  type: string
                                  description: 邮件唯一标识
                                  example: msg_id_xxx
                                from:
                                  type: object
                                  properties:
                                    mail_address:
                                      type: string
                                      description: 邮件地址
                                      example: mike@outlook.com
                                    name:
                                      type: string
                                      description: 名称
                                      example: Mike
                                  required:
                                  - mail_address
                                  description: 邮件发件人
                              description: 邮件元信息
                          required:
                          - id
                        description: 搜索结果列表
                      total:
                        type: integer
                        description: 搜索命中结果数
                        example: '99'
                      has_more:
                        type: boolean
                        description: 可继续翻页
                      page_token:
                        type: string
                        description: 翻页用的token。当has_more=true时，可用这个token作为入参继续翻页搜索。
                      notice:
                        type: string
                        description: 搜索补充提示信息，返回本次搜索的额外说明，例如：query被截断；搜索结果不全 等
                        example: The query is too long and has been truncated to the first 50 characters for search.
                    required:
                    - items
                    - has_more
      x-lark-access-tokens:
      - user
      x-lark-scopes:
      - mail:user_mailbox.message:readonly
      x-lark-error-mappings:
      - code: 1231020
        httpCode: 400
        msg: page_token is invalid or expired, please start a new search
      - code: 1231021
        httpCode: 400
        msg: page size is over the limit
      - code: 1231022
        httpCode: 400
        msg: page_token is over the limit，please refine your query with more specific keywords or filters
      - code: 1231030
        httpCode: 500
        msg: user identity not found, please check your access token
      - code: 1232501
        httpCode: 500
        msg: no permission to access mailbox
      - code: 1231040
        httpCode: 400
        msg: search service error, see logs for details.
      x-lark-rate-limit:
        tier: 4
      x-lark-pagination: true
