        in: path
        required: true
        schema:
          type: string
        description: 文档的唯一标识
        example: doxcnePuYufKa49ISjhD8Ih0ikh
      - name: document_revision_id
        in: query
        required: false
        schema:
          type: integer
          default: -1
        description: 操作的文档版本，-1表示文档最新版本。若此时操作的版本为文档最新版本，则需要持有文档的阅读权限；若此时操作的版本为文档的历史版本，则需要持有文档的编辑权限。
        example: '-1'
      - name: client_token
        in: query
        required: false
        schema:
          type: string
        description: 操作的唯一标识，与接口返回值的 client_token 相对应，用于幂等的进行更新操作。此值为空表示将发起一次新的请求，此值非空表示幂等的进行更新操作。
        example: 0e2633a3-aa1a-4171-af9e-0768ff863566
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
