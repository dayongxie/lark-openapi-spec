  /open-apis/docx/v1/documents/{document_id}/blocks/batch_update:
    patch:
      operationId: docx_document_block_batch_update
      summary: 批量更新块的内容
      tags:
      - document.block
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/ukTMukTMukTM/uUDN04SN0QjL1QDN/document-docx/docx-v1/document-block/batch_update
      parameters:
