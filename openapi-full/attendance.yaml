  /open-apis/attendance/v1/shifts:
    post:
      operationId: attendance_shift_create
      summary: 创建班次
      tags:
      - shift
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/attendance-v1/shift/create
      parameters:
      - name: employee_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - employee_id
          - employee_no
          x-enum-descriptions:
            employee_id: 员工employeeId
            employee_no: 员工工号
        description: 用户 ID 的类型 不提供则用户相关字段无效
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                shift_name:
                  type: string
                  description: 班次名称
                  example: 早班
                punch_times:
                  type: integer
                  description: 打卡次数
                  example: '1'
                sub_shift_leader_ids:
                  type: array
                  items:
                    type: string
                  description: 排班组子负责人id列表
                is_flexible:
                  type: boolean
                  description: 是否弹性打卡
                  example: 'false'
                flexible_minutes:
                  type: integer
                  description: 弹性打卡时间，设置【上班最多可晚到】与【下班最多可早走】时间，如果不设置flexible_rule则生效
                  example: '60'
                flexible_rule:
                  type: array
                  items:
                    type: object
                    properties:
                      flexible_early_minutes:
                        type: integer
                        description: 下班最多可早走（上班早到几分钟，下班可早走几分钟）
                        example: '60'
                      flexible_late_minutes:
                        type: integer
                        description: 上班最多可晚到（上班晚到几分钟，下班须晚走几分钟）
                        example: '60'
                    required:
                    - flexible_early_minutes
                    - flexible_late_minutes
                  description: 弹性打卡时间设置
                no_need_off:
                  type: boolean
                  description: 不需要打下班卡
                  example: 'true'
                punch_time_rule:
                  type: array
                  items:
                    type: object
                    properties:
                      on_time:
                        type: string
                        description: 上班时间
                        example: '9:00'
                      off_time:
                        type: string
                        description: 下班时间
                        example: '18:00'
                      late_minutes_as_late:
                        type: integer
                        description: 晚到多久记为迟到
                        example: '30'
                      late_minutes_as_lack:
                        type: integer
                        description: 晚到多久记为缺卡
                        example: '60'
                      on_advance_minutes:
                        type: integer
                        description: 最早多久可打上班卡
                        example: '60'
                      early_minutes_as_early:
                        type: integer
                        description: 早退多久记为早退
                        example: '30'
                      early_minutes_as_lack:
                        type: integer
                        description: 早退多久记为缺卡
                        example: '60'
                      off_delay_minutes:
                        type: integer
                        description: 最晚多久可打下班卡
                        example: '60'
                      late_minutes_as_serious_late:
                        type: integer
                        description: 晚到多久记为严重迟到
                        example: '40'
                      no_need_on:
                        type: boolean
                        description: 不需要打上班卡
                        example: 'true'
                      no_need_off:
                        type: boolean
                        description: 不需要打下班卡（优先级比原有字段高）
                        example: 'true'
                    required:
                    - on_time
                    - off_time
                    - late_minutes_as_late
                    - late_minutes_as_lack
                    - on_advance_minutes
                    - early_minutes_as_early
                    - early_minutes_as_lack
                    - off_delay_minutes
                  description: 打卡规则
                late_off_late_on_rule:
                  type: array
                  items:
                    type: object
                    properties:
                      late_off_minutes:
                        type: integer
                        description: 晚走多久
                        example: '60'
                      late_on_minutes:
                        type: integer
                        description: 晚到多久
                        example: '30'
                    required:
                    - late_off_minutes
                    - late_on_minutes
                  description: 晚走晚到规则
                rest_time_rule:
                  type: array
                  items:
                    type: object
                    properties:
                      rest_begin_time:
                        type: string
                        description: 休息开始
                        example: '13:00'
                      rest_end_time:
                        type: string
                        description: 休息结束
                        example: '14:00'
                    required:
                    - rest_begin_time
                    - rest_end_time
                  description: 休息规则
                overtime_rule:
                  type: array
                  items:
                    type: object
                    properties:
