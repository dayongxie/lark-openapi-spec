                  example: '1'
                employment_id:
                  type: string
                  description: 员工ID
                  example: '1'
                leave_type_id:
                  type: string
                  description: 假期类型ID
                  example: '1'
                reason:
                  type: array
                  items:
                    type: object
                    properties:
                      lang:
                        type: string
                        description: 语言码
                        example: cn_zh
                      value:
                        type: string
                        description: 语言码对应的文本
                        example: test
                    required:
                    - lang
                    - value
                  description: 修改授予记录原因
                time_offset:
                  type: integer
                  description: 时间偏移，东八区：480    8*60
                  example: '480'
                expiration_date:
                  type: string
                  description: 失效日期，格式"2020-01-01"
                  example: '2020-01-01'
                quantity:
                  type: string
                  description: 修改source 余额
                  example: '1'
                section_type:
                  type: integer
                  description: 是否参与清算
                  example: '1'
