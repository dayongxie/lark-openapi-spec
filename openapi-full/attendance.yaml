    post:
      operationId: attendance_user_task_query
      summary: 查询打卡结果
      tags:
      - user_task
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/attendance-v1/user_task/query
      parameters:
      - name: employee_type
        in: query
        required: true
        schema:
          type: string
          enum:
          - employee_id
          - employee_no
          x-enum-descriptions:
            employee_id: 员工employeeId
            employee_no: 员工工号
        description: 员工工号类型
        example: employee_id
      - name: ignore_invalid_users
        in: query
        required: false
        schema:
          type: boolean
        description: 是否忽略无效和没有权限的用户。如果 true，则返回有效用户的信息，并告知无效和没有权限的用户信息；如果 false，且 user_ids 中存在无效或没有权限的用户，则返回错误
        example: 'true'
      - name: include_terminated_user
        in: query
        required: false
        schema:
          type: boolean
        description: 由于新入职员工可以复用已离职员工的 employee_no/employee_id，如果 true，则返回 employee_no/employee_id 对应的所有在职 + 离职员工的数据；如果 false，则只返回
          employee_no/employee_id 对应的在职或最近一个离职员工的数据
        example: 'true'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_ids:
                  type: array
                  items:
                    type: string
                  description: employee_no 或 employee_id 列表
                check_date_from:
                  type: integer
                  description: 查询的起始工作日
                  example: '20190817'
                check_date_to:
                  type: integer
                  description: 查询的结束工作日
                  example: '20190820'
                need_overtime_result:
                  type: boolean
                  description: 是否需要加班班段打卡结果
                  example: 'true'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      user_task_results:
                        type: array
                        items:
                          type: object
                          properties:
                            result_id:
