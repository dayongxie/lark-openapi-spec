        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      record:
                        type: object
                        properties:
                          id:
                            type: string
                            description: 授予记录唯一ID
                            example: '1'
                          employment_id:
                            type: string
                            description: 员工ID
                            example: '1'
                          leave_type_id:
                            type: string
                            description: 假期类型ID
                            example: '1'
                          granting_quantity:
                            type: string
                            description: 授予数量
                            example: '1'
                          granting_unit:
                            type: integer
                            description: 授予单位，1表示天，2表示小时
                            example: '1'
                          effective_date:
                            type: string
                            description: 生效日期，格式"2020-01-01"
                            example: '2020-01-01'
                          expiration_date:
                            type: string
                            description: 失效日期，格式"2020-01-01"
                            example: '2020-01-01'
                          granted_by:
                            type: integer
                            description: 授予来源，1：系统授予；2：手动授予；3：外部系统授予
                            example: '1'
                          reason:
                            type: array
                            items:
                              type: object
                              properties:
                                lang:
                                  type: string
                                  description: 语言码
                                  example: cn_zh
                                value:
                                  type: string
                                  description: 语言码对应的文本
                                  example: test
                              required:
                              - lang
                              - value
                            description: 授予原因
                          created_at:
                            type: string
                            description: 授予记录的创建时间，unix时间戳
                            example: '1'
                          created_by:
                            type: string
                            description: 授予记录的创建人的ID
