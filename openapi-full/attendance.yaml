        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/attendance-v1/user_task_remedy/query_user_allowed_remedys
      parameters:
      - name: employee_type
        in: query
        required: true
        schema:
          type: string
          enum:
          - employee_id
          - employee_no
          x-enum-descriptions:
            employee_id: 员工employeeId
            employee_no: 员工工号
        description: 请求体和响应体中的 user_id 的员工工号类型
        example: employee_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: string
                  description: 用户 ID
                remedy_date:
                  type: integer
                  description: 补卡日期
                  example: '20210104'
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      user_allowed_remedys:
                        type: array
                        items:
                          type: object
                          properties:
                            user_id:
                              type: string
                              description: 用户id
                            remedy_date:
                              type: integer
                              description: 补卡日期
                            is_free_punch:
                              type: boolean
                              description: 是否为自由班次
                            punch_no:
                              type: integer
                              description: 第几次上下班，可能值0，1，2
                            work_type:
                              type: integer
                              description: 上班/下班，1是上班，2是下班
                            punch_status:
                              type: string
                              description: 打卡状态，可用值：Early（早退），Late（迟到），Lack（缺卡）
                            normal_punch_time:
                              type: string
                              description: 正常应打卡时间
                            remedy_start_time:
                              type: string
                              description: 可选补卡时间的最小值
                            remedy_end_time:
                              type: string
                              description: 可选补卡时间的最大值
                          required:
                          - user_id
                          - remedy_date
                        description: 用户可补卡时间
