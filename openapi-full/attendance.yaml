                      type: array
                      items:
                        type: string
                      description: 参加考勤的人员id列表
                    except_user_ids:
                      type: array
                      items:
                        type: string
                      description: 参加考勤的人员id列表
                    group_leader_ids:
                      type: array
                      items:
                        type: string
                      description: 考勤组主负责人id列表
                    sub_group_leader_ids:
                      type: array
                      items:
                        type: string
                      description: 考勤组子负责人id列表
                    allow_out_punch:
                      type: boolean
                      description: 是否允许外勤打卡
                      example: 'true'
                    out_punch_need_approval:
                      type: boolean
                      description: 外勤打卡需审批，先审批后打卡（需要允许外勤打卡才能设置生效）
                      example: 'true'
                    out_punch_need_post_approval:
                      type: boolean
                      description: 外勤打卡需审批，先打卡后审批（需要允许外勤打卡才能设置生效）
                      example: 'true'
                    out_punch_need_remark:
                      type: boolean
                      description: 外勤打卡需填写备注（需要允许外勤打卡才能设置生效）
                      example: 'true'
                    out_punch_need_photo:
                      type: boolean
                      description: 外勤打卡需拍照（需要允许外勤打卡才能设置生效）
                      example: 'true'
                    out_punch_allowed_hide_addr:
                      type: boolean
                      description: 外勤打卡允许员工隐藏详细地址（需要允许外勤打卡才能设置生效）
                      example: 'true'
                    out_punch_allowed_adjust_addr:
                      type: boolean
                      description: 外勤打卡允许微调地址（需要允许外勤打卡才能设置生效）
                      example: 'true'
                    adjust_range:
                      type: integer
                      description: 微调范围，默认为 50 米
                      example: '50'
                    allow_pc_punch:
                      type: boolean
                      description: 是否允许pc打卡
                      example: 'true'
                    allow_remedy:
                      type: boolean
                      description: 是否允许补卡
                      example: 'true'
                    remedy_limit:
                      type: boolean
                      description: 补卡次数是否限制（需要允许补卡才能设置生效）
                      example: 'true'
                    remedy_limit_count:
                      type: integer
                      description: 补卡次数（需要允许补卡才能设置生效）
                      example: '3'
