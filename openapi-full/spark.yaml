  /open-apis/spark/v1/apps/{app_id}/tables/{table_name}/records_batch_update:
    patch:
      operationId: spark_app_table_batch_update_table_records
      summary: 批量更新数据表中的记录
      tags:
      - app.table
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/spark-v1/app-table/batch_update_table_records
      parameters:
      - name: app_id
        in: path
