        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/spark-v1/app-table/get_table_detail
      parameters:
      - name: app_id
        in: path
        required: true
        schema:
          type: string
        description: 妙搭应用 id，可从妙搭应用 URL 中获取，如 https://miaoda.feishu.cn/app/app_4jcn5n11bpf5v 中的 app_4jcn5n11bpf5v 即为 app_id
        example: app_4jcn5n11bpf5v
      - name: table_name
        in: path
        required: true
        schema:
          type: string
        description: 数据表表名
        example: table_name_1
      - name: env
        in: query
        required: false
        schema:
          type: string
          default: online
        description: 访问的 database 环境，默认为 online（线上环境）
        example: online
      - name: format
        in: query
        required: false
        schema:
          type: string
        description: 返回格式，是否包含建表ddl
        example: ddl
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      name:
                        type: string
                        description: 数据表名，如 student
                        example: student
                      description:
                        type: string
                        description: 数据表描述
                        example: 这是student表的描述
                      columns:
                        type: array
                        items:
                          $ref: '#/components/schemas/Item'
                        description: 数据表列
                      indexes:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              description: 索引名
                              example: orders_pkey
                            columns:
                              type: array
                              items:
                                type: string
                              description: 索引涉及的列名（按索引定义顺序）
                            type:
                              type: string
                              description: 索引类型
                              example: '"btree" / "hash" / "gin" / "gist"'
                            definition:
                              type: string
                              description: PG 索引定义语句
                              example: CREATE INDEX idx_orders_user_id ON orders USING btree (user_id)
                          required:
                          - name
                          - type
                          - definition
                        description: 数据表索引
                      constraints:
                        type: array
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                              description: 约束类型
                              example: '"primary_key" / "unique" / "foreign_key"'
                            name:
                              type: string
                              description: 约束名
                              example: orders_pkey
                            columns:
                              type: array
                              items:
                                type: string
                              description: 约束涉及的列名
                            referenced_table:
                              type: string
                              description: 引用的目标表名
                              example: users
                            referenced_columns:
                              type: array
                              items:
                                type: string
                              description: 引用的目标列名
                          required:
                          - type
                          - name
                          - columns
                        description: 数据表约束
                      estimated_row_count:
                        type: integer
                        description: 表预估行数
                        example: '10'
                      size_bytes:
                        type: integer
                        description: 表占用字节数
                        example: '10'
                      ddl:
                        type: string
                        description: 建表ddl语句
                        example: 'CREATE TABLE IF NOT EXISTS users ( id uuid) '
                    required:
                    - name
                    - description
                    - columns
      x-lark-access-tokens:
      - user
      x-lark-scopes:
      - spark:app.table:read
      - spark:app.table:write
      - spark:app:read
      x-lark-error-mappings:
      - code: 3340001
        httpCode: 400
        msg: param is invalid
      x-lark-rate-limit:
        tier: 7
