                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      page_token:
                        type: string
                        description: 分页标记，用于获取下一页数据。当前页数据返回完毕且存在更多数据时返回，为空表示已无更多数据
                        example: eyJwYWdlX251bWJlciI6MiwiY29udGVudF9pZHMiOlsiMTIzNCIsIjU2NzgiXX0=
                      items:
