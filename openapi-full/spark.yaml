    post:
      operationId: spark_app_table_post_table_records
      summary: 向数据表中添加或更新记录
      tags:
      - app.table
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/spark-v1/app-table/post_table_records
      parameters:
      - name: app_id
        in: path
        required: true
        schema:
          type: string
        description: 妙搭应用 id，可从妙搭应用 URL 中获取，如 https://miaoda.feishu.cn/app/app_4jcn5n11bpf5v 中的 app_4jcn5n11bpf5v 即为 app_id
        example: app_4jcn5n11bpf5v
      - name: table_name
        in: path
        required: true
        schema:
          type: string
        description: 数据表表名
        example: table_name_1
      - name: columns
        in: query
        required: false
        schema:
          type: string
        description: UPSERT 时使用，指定列，多列英文逗号拼接
        example: name,age
      - name: on_conflict
        in: query
        required: false
        schema:
          type: string
        description: |-
          UPSERT 时使用，指定使用哪一个或多个具有唯一约束的字段作为冲突判断依据，默认为表主键。
          假设 user_products 表有一个由 user_id 和 product_id 组成的复合唯一约束
        example: user_id,product_id
      - name: env
        in: query
        required: false
        schema:
          type: string
          default: online
        description: 访问的 database 环境，默认为 online（线上环境）
        example: online
