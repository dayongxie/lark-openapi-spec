      summary: 查询数据表数据记录
      tags:
      - app.table
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/spark-v1/app-table/get_table_record_list
      parameters:
      - name: app_id
        in: path
        required: true
        schema:
          type: string
        description: 妙搭应用 id，可从妙搭应用 URL 中获取，如 https://miaoda.feishu.cn/app/app_4jcn5n11bpf5v 中的 app_4jcn5n11bpf5v 即为 app_id
        example: app_4jcn5n11bpf5v
      - name: table_name
        in: path
        required: true
        schema:
          type: string
        description: 数据表表名
        example: table_name_1
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 10
        description: 分页大小，用于限制一次请求所返回的数据条目数。默认10，最大500
        example: '10'
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该 page_token 获取查询结果
      - name: select
        in: query
        required: false
        schema:
          type: string
        description: |-
          返回的列，默认为 *，即返回所有列。
          遵循 PostgREST 语法，详情可查看 https://docs.postgrest.org/en/v13/references/api/tables_views.html#vertical-filtering
        example: _id,_created_at,name
      - name: filter
        in: query
        required: false
        schema:
          type: string
        description: 筛选条件，尊许 PostgREST 语法，详情可查看 https://docs.postgrest.org/en/v13/references/api/tables_views.html#horizontal-filtering
        example: age=gt.10
      - name: order
        in: query
        required: false
        schema:
          type: string
        description: |-
          排序条件，如果没指定 asc/desc，默认为 asc，null 值可排在最前或最后。
          尊许 PostgREST 语法，详情可查看
          https://docs.postgrest.org/en/v13/references/api/tables_views.html#ordering
        example: age.desc,score.asc
      - name: env
        in: query
        required: false
        schema:
          type: string
          default: online
        description: 访问的 database 环境，默认为 online（线上环境）
        example: online
      - name: user_identifier_type
        in: query
        required: false
        schema:
          type: string
          default: miaoda_user_id
        description: |-
          此次调用使用的用户 ID 类型，将使用指定的 ID 来标示某个用户在接口入参和出参中的值。
          示例值：`miaoda_user_id`
          可选值：
          - `miaoda_user_id`：标识一个用户在飞书开发套件应用中的身份。示例值：1838493619298330
          - `open_id`：标识一个用户在某个应用中的身份。同一个用户在不同应用中的 Open ID 不同。示例值：ou_bdbbd8f3f919829064b3ffc1b9476105 了解更多：如何获取 Open ID
          - `union_id`：标识一个用户在某个应用开发商下的身份。同一用户在同一开发商下的应用中的 Union ID 是相同的，在不同开发商下的应用中的 Union ID 是不同的。通过 Union ID，应用开发商可以把同个用户在多个应用中的身份关联起来。示例值：on_b1b44199e8f3def4ebda5355409e2033 了解更多：如何获取 Union ID？

          默认值：`miaoda_user_id`
        example: miaoda_user_id
      responses:
        '200':
          description: 调用成功（业务错误通过 code 字段表达；常见错误码见 x-lark-error-mappings）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
                    properties:
                      has_more:
                        type: boolean
                        description: 是否还有更多项
                      page_token:
                        type: string
                        description: 分页标记，当 has_more 为 true 时，会同时返回新的 page_token，否则不返回 page_token
                      total:
                        type: integer
                        description: 符合条件的记录总数
                        example: '2'
                      items:
                        type: string
                        description: 数据记录列表，格式为数组序列化后的 JSONString
                        example: '[{\"name\":\"王一一\",\"gender\":\"male\",\"age\":10},{\"name\":\"王二二\",\"gender\":\"female\",\"age\":10}]'
                    required:
                    - has_more
                    - page_token
                    - total
                    - items
      x-lark-access-tokens:
      - user
      x-lark-scopes:
      - spark:app.table.record:read
      - spark:app.table.record:write
      - spark:app:read
      x-lark-error-mappings:
      - code: 3340001
        httpCode: 400
        msg: param is invalid
      x-lark-rate-limit:
        tier: 7
