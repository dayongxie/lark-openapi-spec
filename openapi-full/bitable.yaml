  /open-apis/bitable/v1/apps/{app_token}/tables/{table_id}/records/search:
    post:
      operationId: bitable_app_table_record_search
      summary: 查询记录
      tags:
      - app.table.record
      description: 查找多维表格记录
      externalDocs:
        description: 飞书开放平台官方文档
        url: https://open.feishu.cn/document/uAjLw4CM/ukTMukTMukTM/reference/bitable-v1/app-table-record/search
      parameters:
      - name: app_token
        in: path
        required: true
        schema:
          type: string
        description: 表格token
        example: NQRxbRkBMa6OnZsjtERcxhNWnNh
      - name: table_id
        in: path
        required: true
        schema:
          type: string
        description: 表ID
        example: tbl0xe5g8PP3U3cS
      - name: user_id_type
        in: query
        required: false
        schema:
          type: string
          enum:
          - user_id
          - union_id
          - open_id
          x-enum-descriptions:
            user_id: 以user_id来识别用户
            union_id: 以union_id来识别用户
            open_id: 以open_id来识别用户
          x-lark-id-types:
            open_id: user
            union_id: user
            user_id: user
        description: 此次调用中使用的用户ID的类型
        example: open_id
      - name: page_token
        in: query
        required: false
        schema:
          type: string
        description: 分页标记，第一次请求不填，表示从头开始遍历；分页查询结果还有更多项时会同时返回新的 page_token，下次遍历可采用该page_token 获取查询结果
      - name: page_size
        in: query
        required: false
        schema:
          type: integer
          default: 20
        description: 分页大小
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                view_id:
                  type: string
                  description: 视图Id,指定视图id则按照视图的筛选排序结果返回数据
                  example: viex
                field_names:
                  type: array
                  items:
                    type: string
                  description: 指定要返回的字段
                sort:
                  type: array
                  items:
                    type: object
                    properties:
                      field_name:
                        type: string
                        description: 字段名称
                        example: 多行文本
                      desc:
                        type: boolean
                        description: 是否倒序排序
                        default: false
                        example: 'true'
                  description: 排序条件
                filter:
                  type: object
                  properties:
                    conjunction:
                      type: string
                      description: 条件逻辑连接词
                      enum:
                      - and
                      - or
                      x-enum-descriptions:
                        and: 满足全部条件
                        or: 满足任一条件
                      example: and
                    conditions:
                      type: array
                      items:
                        type: object
                        properties:
                          field_name:
                            type: string
                            description: 筛选条件的左值，值为字段的名称
                            example: 字段名称
                          operator:
                            type: string
                            description: 条件运算符
                            enum:
                            - is
                            - isNot
                            - contains
                            - doesNotContain
                            - isEmpty
                            - isNotEmpty
                            - isGreater
                            - isGreaterEqual
                            - isLess
                            - isLessEqual
                            - like
                            - in
                            x-enum-descriptions:
                              is: is
                              isNot: isNot
                              contains: contains
                              doesNotContain: doesNotContain
                              isEmpty: isEmpty
                              isNotEmpty: isNotEmpty
                              isGreater: isGreater
                              isGreaterEqual: isGreaterEqual
                              isLess: isLess
                              isLessEqual: isLessEqual
                              like: like
                              in: in
                            example: is
                          value:
                            type: array
                            items:
                              type: string
                            description: 目标值
                        required:
                        - field_name
                        - operator
                      description: 筛选条件集合
                  required:
                  - conjunction
                  description: 筛选条件
                automatic_fields:
                  type: boolean
                  description: 控制是否返回自动计算的字段, true 表示返回
