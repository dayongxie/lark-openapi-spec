name: Update API specs

on:
  schedule:
    # Daily at 01:17 UTC (off the top-of-hour rush)
    - cron: "17 1 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    # Changing the converter or this workflow regenerates the specs —
    # also covers the first-run bootstrap (no raw/registry.json committed yet).
    paths:
      - "tools/**"
      - ".github/workflows/update.yml"

permissions:
  contents: write

concurrency:
  group: update-specs
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r tools/requirements.txt

      # ------------------------------------------------------------------
      # 1. lark-cli registry track — incremental check by data_version.
      #    The endpoint returns an empty payload when nothing changed.
      # ------------------------------------------------------------------
      - name: Check registry for updates
        id: registry
        run: |
          if [ -f raw/registry.json ]; then
            cp raw/registry.json /tmp/registry.old.json
          else
            # bootstrap: no snapshot committed yet — diff against an empty registry
            echo '{"version": "", "services": []}' > /tmp/registry.old.json
          fi
          python tools/fetch_registry.py --check >> "$GITHUB_OUTPUT"

      - name: Rebuild OpenAPI specs (lark-cli track)
        if: steps.registry.outputs.changed == 'true'
        run: |
          PYTHONPATH=tools python tools/build_openapi.py
          python tools/diff_registry.py /tmp/registry.old.json raw/registry.json \
            --version "${{ steps.registry.outputs.version }}" --prepend CHANGELOG.md

      # ------------------------------------------------------------------
      # 2. Full track (official API Explorer, ~1600 APIs).
      #    No upstream versioning — content-hash change detection: every run
      #    re-fetches all definitions and compares sha256 with the committed
      #    index. Nothing is committed when hashes are unchanged.
      # ------------------------------------------------------------------
      - name: Refresh Explorer catalog + definitions
        id: explorer
        run: |
          mkdir -p raw/explorer
          if [ -f raw/explorer/index.json ]; then
            cp raw/explorer/index.json /tmp/explorer.old.json
          else
            echo '{}' > /tmp/explorer.old.json
          fi
          python tools/fetch_explorer.py --workers 6 > /tmp/explorer_summary.json
          python3 - <<'EOF' >> "$GITHUB_OUTPUT"
          import json
          with open('/tmp/explorer_summary.json') as f:
              s = json.load(f)
          changed = bool(s['added'] or s['removed'] or s['changed'])
          print(f"changed={'true' if changed else 'false'}")
          print(f"added={len(s['added'])}")
          print(f"removed={len(s['removed'])}")
          print(f"modified={len(s['changed'])}")
          EOF

      - name: Rebuild full-track specs
        if: steps.explorer.outputs.changed == 'true'
        run: |
          python tools/build_openapi_full.py
          python tools/diff_explorer.py /tmp/explorer.old.json raw/explorer/index.json \
            --prepend CHANGELOG.md

      # ------------------------------------------------------------------
      # 3. Shortcut reference — follows lark-cli releases.
      # ------------------------------------------------------------------
      - name: Check lark-cli release
        id: cli
        run: |
          LATEST=$(curl -fsSL https://api.github.com/repos/larksuite/cli/releases/latest | jq -r .tag_name)
          CURRENT=$(grep -m1 '^cli_version:' shortcuts/im.yaml | awk '{print $2}' || echo "none")
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" != "v$CURRENT" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract shortcut reference
        if: steps.cli.outputs.changed == 'true'
        run: |
          VER="${{ steps.cli.outputs.latest }}"
          curl -fsSL -o /tmp/lark-cli.tar.gz \
            "https://github.com/larksuite/cli/releases/download/${VER}/lark-cli-${VER#v}-linux-amd64.tar.gz"
          tar xzf /tmp/lark-cli.tar.gz -C /tmp
          python tools/extract_shortcuts.py --cli /tmp/lark-cli --cli-version "${VER#v}"

      # ------------------------------------------------------------------
      # 4. Commit everything that changed in one go.
      # ------------------------------------------------------------------
      - name: Commit updates
        if: steps.registry.outputs.changed == 'true' || steps.cli.outputs.changed == 'true' || steps.explorer.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add raw openapi openapi-curated shortcuts manifest.yaml CHANGELOG.md
          MSG=""
          if [ "${{ steps.registry.outputs.changed }}" = "true" ]; then
            MSG="registry v${{ steps.registry.outputs.version }}"
          fi
          if [ "${{ steps.explorer.outputs.changed }}" = "true" ]; then
            MSG="${MSG:+$MSG, }explorer: +${{ steps.explorer.outputs.added }}/-${{ steps.explorer.outputs.removed }}/~${{ steps.explorer.outputs.modified }}"
          fi
          if [ "${{ steps.cli.outputs.changed }}" = "true" ]; then
            MSG="${MSG:+$MSG, }shortcuts @ lark-cli ${{ steps.cli.outputs.latest }}"
          fi
          git commit -m "chore: update specs ($MSG)"
          git push

      - name: Tag and release registry update
        if: steps.registry.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="registry-v${{ steps.registry.outputs.version }}"
          git tag "$TAG" || true
          git push origin "$TAG" || true
          gh release create "$TAG" --title "Registry v${{ steps.registry.outputs.version }}" \
            --notes "API registry v${{ steps.registry.outputs.version }}. See CHANGELOG.md for the method-level diff." || true
