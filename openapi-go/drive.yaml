  /open-apis/drive/v1permissions/{permission_id}/members:
    post:
      operationId: drive_member_add
      summary: Add a collaborator/member permission to a Drive document, file, folder, or wiki node
      description: |-
        Add a collaborator/member permission to a Drive document, file, folder, or wiki node


        **Tips（来自 lark-cli 源码）**

        - Resource type is auto-inferred from URL paths; pass --type when --token is a bare token.
        - Supported --member-type values: email, openid, unionid, openchat, opendepartmentid, groupid, appid, wikispaceid.
        - When --member-type=wikispaceid, pass --member-kind wiki_space_member, wiki_space_viewer, or wiki_space_editor.
        - --member-type is required; if the ID prefix conflicts with --member-type (e.g. ou_xxx with email), the command rejects it.
        - --perm defaults to view (safest); use --dry-run first when granting edit or full_access.
        - For wiki nodes, --perm-type defaults to container (current page and sub-pages), except --member-type=wikispaceid where --member-kind provides the wiki-space role.
        - Department collaborator (--member-type=opendepartmentid) requires --as user; bot identity is not supported for department authorization.
      tags:
      - drive
      x-lark-cli-command: lark-cli drive +member-add
      x-lark-source: lark-cli-go
      x-lark-risk: high-risk-write
      x-lark-scopes:
      - docs:permission.member:create
      x-lark-access-tokens:
      - user_access_token
      - tenant_access_token
      parameters:
      - name: permission_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: target token or document URL; type is auto-inferred from URL path when omitted
                type:
                  type: string
                  description: target resource type; required when --token is a bare token
                member_id:
                  type: string
                  description: collaborator ID; comma-separated for batch (max 10). Interpretation is decided by --member-type
                member_type:
                  type: string
                  description: 'ID type for --member-id; supported: email|openid|unionid|openchat|opendepartmentid|groupid|appid|wikispaceid'
                member_kind:
                  type: string
                  description: request body type when --member-type=wikispaceid; one of wiki_space_member|wiki_space_viewer|wiki_space_editor
                perm:
                  type: string
                  description: permission role to grant; defaults to view
                perm_type:
                  type: string
                  description: wiki permission scope; defaults to container; rejected for non-wiki types
                need_notification:
                  type: boolean
                  description: send an in-app notification after the grant (user identity only)
              required:
              - token
              - member_id
              - member_type
      responses:
        '200':
          description: 飞书标准响应信封（data 结构未在 lark-cli 源码中声明）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
