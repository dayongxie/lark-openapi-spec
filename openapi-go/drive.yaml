  /open-apis/search/v2/doc_wiki/search:
    post:
      operationId: drive_search
      summary: 'Search Lark docs, Wiki, and spreadsheet files with flat filters (Search v2: doc_wiki/search)'
      description: |-
        Search Lark docs, Wiki, and spreadsheet files with flat filters (Search v2: doc_wiki/search)


        **Tips（来自 lark-cli 源码）**

        - Time flags accept relative (e.g. 7d, 1m, 1y), absolute (2026-04-01, RFC3339), or unix seconds.
        - my_edit_time and my_comment_time are hour-aggregated server-side; sub-hour inputs are snapped and a notice is printed to stderr.
        - Use --created-by-me for "docs I created". Use --mine for "docs I own" (owner semantic).
        - --folder-tokens limits to doc-only search; --space-ids limits to wiki-only. They cannot be combined.
      tags:
      - drive
      x-lark-cli-command: lark-cli drive +search
      x-lark-source: lark-cli-go
      x-lark-risk: read
      x-lark-scopes:
      - search:docs:read
      x-lark-access-tokens:
      - user_access_token
      - tenant_access_token
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: search keyword (may be empty to browse by filter only); max 30 characters by Unicode code point
                    (CJK counts 1 each), over 30 the server rejects with 99992402 field validation failed
                mine:
                  type: boolean
                  description: restrict to docs I own (server-side owner semantic, NOT original creator; uses current user's
                    open_id)
                creator_ids:
                  type: string
                  description: comma-separated owner open_ids (API field is creator_ids but matched by owner); mutually exclusive
                    with --mine
                created_by_me:
                  type: boolean
                  description: restrict to docs originally created by me (uses current user's open_id as original_creator_ids)
                original_creator_ids:
                  type: string
                  description: comma-separated original creator open_ids; mutually exclusive with --created-by-me
                edited_since:
                  type: string
                  description: start of [my edited] time window (e.g. 7d, 1m, 1y, 2026-04-01, RFC3339, unix seconds)
                edited_until:
                  type: string
                  description: end of [my edited] time window
                commented_since:
                  type: string
                  description: start of [my commented] time window
                commented_until:
                  type: string
                  description: end of [my commented] time window
                opened_since:
                  type: string
                  description: start of [my opened] time window
                opened_until:
                  type: string
                  description: end of [my opened] time window
                created_since:
                  type: string
                  description: start of [document created] time window
                created_until:
                  type: string
                  description: end of [document created] time window
                doc_types:
                  type: string
                  description: 'comma-separated types: doc,sheet,bitable,mindnote,file,wiki,docx,folder,catalog,slides,shortcut'
                folder_tokens:
                  type: string
                  description: comma-separated folder tokens (doc-only; mutually exclusive with --space-ids)
                space_ids:
                  type: string
                  description: comma-separated wiki space IDs (wiki-only; mutually exclusive with --folder-tokens)
                chat_ids:
                  type: string
                  description: comma-separated chat IDs
                sharer_ids:
                  type: string
                  description: comma-separated sharer open_ids
                only_title:
                  type: boolean
                  description: match titles only
                only_comment:
                  type: boolean
                  description: search comments only
                sort:
                  type: string
                  description: sort type
                page_token:
                  type: string
                  description: pagination token from a previous response
                page_size:
                  type: string
                  default: '15'
                  description: page size (1-20, default 15)
      responses:
        '200':
          description: 飞书标准响应信封（data 结构未在 lark-cli 源码中声明）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
