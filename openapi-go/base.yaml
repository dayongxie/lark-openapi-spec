      summary: Submit a form (fill and submit form data)
      description: |-
        Submit a form (fill and submit form data)


        **Tips（来自 lark-cli 源码）**

        - Example (no attachments): --share-token shrXXXX --json '{"fields":{"Service Rating":5,"Review":"Good service"}}'
        - Example (with attachments): --share-token shrXXXX --base-token basXXX --json '{"fields":{"Service Rating":5},"attachments":{"Attachment":["./report.pdf"]}}'
        - Cell values in "fields" follow lark-base-cell-value.md conventions; "attachments" maps field names to local file path arrays — the CLI uploads them in parallel and merges them into the submission.
      tags:
      - base
      x-lark-cli-command: lark-cli base +form-submit
      x-lark-source: lark-cli-go
      x-lark-risk: write
      x-lark-scopes:
      - base:form:update
      - docs:document.media:upload
      x-lark-access-tokens:
      - user_access_token
      - tenant_access_token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                share_token:
                  type: string
                  description: Form share token (required), extracted from the form share link
                base_token:
                  type: string
                  description: Base token (required when --json contains attachments, used for uploading attachments to Base
                    Drive Media)
              required:
              - share_token
      responses:
        '200':
          description: 飞书标准响应信封（data 结构未在 lark-cli 源码中声明）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
  /open-apis/search/v2/doc_wiki/search:
    post:
      operationId: base_title_resolve
      summary: Resolve a Base title or keyword through Drive search
      description: |-
        Resolve a Base title or keyword through Drive search


        **Tips（来自 lark-cli 源码）**

        - Example: lark-cli base +title-resolve --title "Sales pipeline"
        - Pass a short keyword from the Base title, 30 characters or fewer. Use +url-resolve for URLs.
      tags:
      - base
      x-lark-cli-command: lark-cli base +title-resolve
      x-lark-source: lark-cli-go
      x-lark-risk: read
      x-lark-scopes:
      - search:docs:read
      x-lark-access-tokens:
      - user_access_token
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Base title keyword to search via Drive (30 characters or fewer)
      responses:
        '200':
          description: 飞书标准响应信封（data 结构未在 lark-cli 源码中声明）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
  /open-apis/wiki/v2/spaces/get_node:
    get:
      operationId: base_url_resolve
      summary: Resolve a Base-related URL into Base coordinates
      description: |-
        Resolve a Base-related URL into Base coordinates


        **Tips（来自 lark-cli 源码）**

        - Example: lark-cli base +url-resolve --url "https://example.larkoffice.com/base/<base_token>?table=<table_id>&view=<view_id>"
        - Only URLs are accepted. For Base titles or keywords, use +title-resolve --title.
      tags:
      - base
      x-lark-cli-command: lark-cli base +url-resolve
      x-lark-source: lark-cli-go
      x-lark-risk: read
      x-lark-access-tokens:
      - user_access_token
      - tenant_access_token
      parameters:
      - name: url
        in: query
        required: false
        schema:
          type: string
          description: Base/Wiki/record-share URL to resolve
      responses:
        '200':
          description: 飞书标准响应信封（data 结构未在 lark-cli 源码中声明）
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  msg:
                    type: string
                  data:
                    type: object
