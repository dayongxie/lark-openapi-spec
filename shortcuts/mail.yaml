  summary: Send a read-receipt reply for an incoming message that requested one (i.e. carries the READ_RECEIPT_REQUEST label).
    Body is auto-generated (subject / recipient / send time / read time) to match the Lark client's receipt format — callers
    cannot customize it, matching the industry norm that read-receipt bodies are system-generated templates, not free-form
    replies. Intended for agent use after the user confirms.
