- name: +template-update
  summary: 'Update an existing mail template. Supports --inspect (read-only projection), --print-patch-template (prints a
    JSON skeleton for --patch-file), and flat flags (--set-subject / --set-name / etc). Internally it GETs the template, applies
    the patch, rewrites <img> local paths to cid: refs, and PUTs a full-replace update (no optimistic locking: last-write-wins).'
  description: 'Update an existing mail template. Supports --inspect (read-only projection), --print-patch-template (prints
    a JSON skeleton for --patch-file), and flat flags (--set-subject / --set-name / etc). Internally it GETs the template,
    applies the patch, rewrites <img> local paths to cid: refs, and PUTs a full-replace update (no optimistic locking: last-write-wins).'
  usage: lark-cli mail +template-update [flags]
  risk: write
  flags:
  - name: --as
    shorthand: null
    type: string
    description: 'identity type: user | bot'
  - name: --attach
    shorthand: null
    type: string
    description: Additional non-inline attachment file path(s), comma-separated. Each file is uploaded to Drive and appended
      to the template's attachments[] in the exact flag order.
  - name: --dry-run
    shorthand: null
    type: bool
    description: print request without executing
  - name: --format
    shorthand: null
    type: string
    description: 'output format: json (default) | pretty | table | ndjson | csv'
    default: json
  - name: --help
    shorthand: -h
    type: bool
    description: help for +template-update
  - name: --inspect
    shorthand: null
    type: bool
    description: Inspect the template without modifying it. Returns the current template projection (name/subject/addresses/attachments).
      No write is performed.
  - name: --jq
    shorthand: -q
    type: string
    description: jq expression to filter JSON output
  - name: --json
    shorthand: null
    type: bool
    description: shorthand for --format json
  - name: --mailbox
    shorthand: null
    type: string
    description: 'Mailbox email address that owns the template (default: me).'
  - name: --patch-file
    shorthand: null
    type: string
    description: Path to a JSON patch file (relative path only). Shape is the same as --print-patch-template output.
  - name: --print-patch-template
    shorthand: null
    type: bool
    description: Print a JSON template describing the supported --patch-file structure. No network call is made.
  - name: --set-bcc
    shorthand: null
    type: string
    description: Replace the Bcc recipient list. Pass --set-bcc="" to clear the list.
  - name: --set-cc
    shorthand: null
    type: string
    description: Replace the Cc recipient list. Pass --set-cc="" to clear the list.
  - name: --set-name
    shorthand: null
    type: string
    description: Replace the template name (≤100 chars).
  - name: --set-plain-text
    shorthand: null
    type: bool
    description: Set is_plain_text_mode=true.
  - name: --set-subject
    shorthand: null
    type: string
    description: Replace the template subject.
  - name: --set-template-content
    shorthand: null
    type: string
    description: Replace the template body content. Prefer HTML for rich formatting.
  - name: --set-template-content-file
    shorthand: null
    type: string
    description: Replace template body content with the contents of a file (relative path only). Mutually exclusive with --set-template-content.
  - name: --set-to
    shorthand: null
    type: string
    description: Replace the To recipient list. Separate multiple addresses with commas. Pass --set-to="" to clear the list.
