  summary: 'Create a personal mail template. Scans HTML <img src> local paths (reusing draft inline-image detection), uploads
    inline images and non-inline attachments to Drive, rewrites HTML to cid: references, and POSTs a Template payload to mail.user_mailbox.templates.create.'
  description: 'Create a personal mail template. Scans HTML <img src> local paths (reusing draft inline-image detection),
    uploads inline images and non-inline attachments to Drive, rewrites HTML to cid: references, and POSTs a Template payload
    to mail.user_mailbox.templates.create.'
  usage: lark-cli mail +template-create [flags]
  risk: write
  flags:
  - name: --as
    shorthand: null
    type: string
    description: 'identity type: user | bot'
  - name: --attach
    shorthand: null
    type: string
    description: Optional. Non-inline attachment file path(s), comma-separated (relative path only). Each file is uploaded
      to Drive; the order follows the flag order exactly (order-sensitive for LARGE/SMALL classification).
  - name: --bcc
    shorthand: null
    type: string
    description: Optional. Default Bcc recipient list. Separate multiple addresses with commas.
  - name: --cc
    shorthand: null
    type: string
    description: Optional. Default Cc recipient list. Separate multiple addresses with commas.
  - name: --dry-run
    shorthand: null
    type: bool
    description: print request without executing
  - name: --format
