    --yes.
  description: Soft-delete existing mail messages. Batches message IDs in groups of 20 and calls batch_trash sequentially.
    Requires --yes.
  usage: lark-cli mail +message-trash [flags]
  risk: high-risk-write
  flags:
  - name: --as
    shorthand: null
    type: string
    description: 'identity type: user'
  - name: --dry-run
    shorthand: null
    type: bool
    description: print request without executing
  - name: --format
    shorthand: null
    type: string
    description: 'output format: json (default) | pretty | table | ndjson | csv'
    default: json
  - name: --help
    shorthand: -h
    type: bool
    description: help for +message-trash
  - name: --jq
    shorthand: -q
    type: string
    description: jq expression to filter JSON output
  - name: --json
    shorthand: null
    type: bool
    description: shorthand for --format json
  - name: --mailbox
    shorthand: null
    type: string
    description: 'Mailbox email address that owns the messages (default: me).'
  - name: --message-ids
    shorthand: null
    type: stringArray
    description: Message IDs to soft-delete; comma-separated or repeat the flag.
  - name: --yes
    shorthand: null
    type: bool
    description: confirm high-risk operation
- name: +messages
  summary: Use when reading full content for multiple emails by message ID. You may pass more than 20 IDs; the CLI handles
    them in batches of 20 and merges output while preserving request order.
  description: Use when reading full content for multiple emails by message ID. You may pass more than 20 IDs; the CLI handles
    them in batches of 20 and merges output while preserving request order.
  usage: lark-cli mail +messages [flags]
