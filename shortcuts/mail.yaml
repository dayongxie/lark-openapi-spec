    shorthand: null
    type: bool
    description: Print output field reference (run this first to learn field names before parsing output)
- name: +reply
  summary: 'Reply to a message and save as draft (default). Use --confirm-send to send immediately after user confirmation.
    Sets Re: subject, In-Reply-To, and References headers automatically.'
  description: 'Reply to a message and save as draft (default). Use --confirm-send to send immediately after user confirmation.
    Sets Re: subject, In-Reply-To, and References headers automatically.'
  usage: lark-cli mail +reply [flags]
  risk: write
  flags:
  - name: --as
    shorthand: null
    type: string
    description: 'identity type: user'
  - name: --attach
    shorthand: null
    type: string
    description: Attachment file path(s), comma-separated (relative path only)
  - name: --bcc
    shorthand: null
    type: string
    description: BCC email address(es), comma-separated
  - name: --body
    shorthand: null
    type: string
    description: Reply body. Prefer HTML for rich formatting; plain text is also supported. Body type is auto-detected from
      the reply body and the original message. Use --plain-text to force plain-text mode. Mutually exclusive with --body-file.
      Required unless --template-id supplies a non-empty body.
  - name: --body-file
    shorthand: null
    type: string
    description: Path (relative, within cwd subtree) to a file containing the email body HTML. Mutually exclusive with --body.
      Size capped at 32 MB. (supports @file)
  - name: --cc
    shorthand: null
    type: string
    description: Additional CC email address(es), comma-separated
  - name: --confirm-send
    shorthand: null
    type: bool
    description: Send the reply immediately instead of saving as draft. Only use after the user has explicitly confirmed recipients
      and content.
  - name: --dry-run
    shorthand: null
    type: bool
    description: print request without executing
  - name: --event-end
    shorthand: null
    type: string
    description: Event end time (ISO 8601). Required when --event-summary is set.
  - name: --event-location
    shorthand: null
    type: string
    description: Event location (optional).
  - name: --event-start
    shorthand: null
    type: string
    description: Event start time (ISO 8601, e.g. 2026-04-20T14:00+08:00). Required when --event-summary is set.
  - name: --event-summary
    shorthand: null
    type: string
    description: Calendar event title. Setting this enables calendar invitation mode.
  - name: --format
    shorthand: null
    type: string
    description: 'output format: json (default) | pretty | table | ndjson | csv'
    default: json
  - name: --from
    shorthand: null
    type: string
    description: Sender email address for the From header. When using an alias (send_as) address, set this to the alias and
      use --mailbox for the owning mailbox. Defaults to the mailbox's primary address.
  - name: --help
    shorthand: -h
    type: bool
    description: help for +reply
  - name: --inline
    shorthand: null
    type: string
    description: 'Inline images as a JSON array. Each entry: {"cid":"<unique-id>","file_path":"<relative-path>"}. All file_path
      values must be relative paths. Cannot be used with --plain-text. CID images are embedded via <img src="cid:..."> in
      the HTML body. CID is a unique identifier, e.g. a random hex string like "a1b2c3d4e5f6a7b8c9d0".'
  - name: --jq
    shorthand: -q
    type: string
    description: jq expression to filter JSON output
  - name: --json
    shorthand: null
    type: bool
    description: shorthand for --format json
  - name: --mailbox
    shorthand: null
    type: string
    description: 'Mailbox email address that owns the draft (default: falls back to --from, then me). Use this when the sender
      (--from) differs from the mailbox, e.g. sending via an alias or send_as address.'
  - name: --message-id
    shorthand: null
    type: string
    description: Required. Message ID to reply to
  - name: --no-signature
    shorthand: null
    type: bool
    description: Skip automatic default signature insertion. Mutually exclusive with --signature-id.
  - name: --plain-text
    shorthand: null
    type: bool
    description: Force plain-text mode, ignoring all HTML auto-detection. Cannot be used with --inline.
  - name: --priority
    shorthand: null
    type: string
    description: 'Email priority: high, normal, low. If omitted, no priority header is set.'
  - name: --request-receipt
    shorthand: null
    type: bool
    description: Request a read receipt (Message Disposition Notification, RFC 3798) addressed to the sender. Recipient mail
      clients may prompt the user, send automatically, or silently ignore — delivery of a receipt is not guaranteed.
  - name: --send-time
    shorthand: null
    type: string
    description: Scheduled send time as a Unix timestamp in seconds. Must be at least 5 minutes in the future. Use with --confirm-send
      to schedule the email.
  - name: --show-lint-details
    shorthand: null
    type: bool
    description: 'Include lint metadata (lint_applied[] / original_blocked[]) in the envelope. Default: no lint fields are
      returned to keep the envelope small.'
  - name: --subject
    shorthand: null
    type: string
    description: 'Optional. Override the auto-generated Re: subject. When set, the shortcut uses this value verbatim instead
      of prefixing the original subject.'
  - name: --template-id
    shorthand: null
    type: string
    description: Optional. Apply a saved template by ID (decimal integer string) before composing. The template's body/to/cc/bcc/attachments
      are appended to the reply-derived values (no de-duplication; see warning in Execute output).
  - name: --to
    shorthand: null
    type: string
    description: Additional To address(es), comma-separated (appended to original sender's address)
